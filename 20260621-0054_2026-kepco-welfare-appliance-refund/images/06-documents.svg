<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#F4F7FB"/>
  <rect width="1080" height="170" fill="#1B5FA6"/>
  <text x="60" y="110" font-family="Noto Sans CJK KR" font-weight="bold" font-size="58" fill="#ffffff">구비서류 체크리스트</text>

  <g font-family="Noto Sans CJK KR" font-size="44" fill="#1a1a1a">
    <rect x="60" y="230" width="960" height="110" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="298" font-weight="bold" fill="#1B5FA6">✓</text><text x="160" y="298" font-weight="bold">신분증</text>
    <text x="370" y="298" font-size="34" fill="#5B6B7C">주민등록증·운전면허증 등 사본</text>

    <rect x="60" y="360" width="960" height="110" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="428" font-weight="bold" fill="#1B5FA6">✓</text><text x="160" y="428" font-weight="bold">효율등급 라벨 사진</text>
    <text x="560" y="428" font-size="34" fill="#5B6B7C">등급·모델명·시행일</text>

    <rect x="60" y="490" width="960" height="110" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="558" font-weight="bold" fill="#1B5FA6">✓</text><text x="160" y="558" font-weight="bold">제조번호(명판) 사진</text>
    <text x="600" y="558" font-size="34" fill="#5B6B7C">시리얼번호 표시</text>

    <rect x="60" y="620" width="960" height="110" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="688" font-weight="bold" fill="#1B5FA6">✓</text><text x="160" y="688" font-weight="bold">거래내역서(구매내역서)</text>

    <rect x="60" y="750" width="960" height="110" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="818" font-weight="bold" fill="#1B5FA6">✓</text><text x="160" y="818" font-weight="bold">영수증</text>
    <text x="370" y="818" font-size="34" fill="#5B6B7C">금액·일시·승인번호·매장명</text>
  </g>

  <rect x="60" y="890" width="960" height="100" rx="16" fill="#FFF6D6" stroke="#F0D98A"/>
  <text x="90" y="952" font-family="Noto Sans CJK KR" font-size="36" fill="#B8860B">＋ 가구원 신청 시 주민등록등본 / 사회복지시설은 사업자등록증</text>

  <rect x="0" y="1000" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1052" font-family="Noto Sans CJK KR" font-size="34" fill="#5B6B7C">출처: 한전 고효율 가전 지원사업 신청방법 안내</text>
</svg>
