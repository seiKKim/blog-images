<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <rect width="1080" height="160" fill="#1B5FA6"/>
  <text x="60" y="105" font-family="Noto Sans CJK KR" font-weight="bold" font-size="58" fill="#ffffff">지원율·한도 한눈에</text>

  <rect x="60" y="210" width="960" height="110" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
  <text x="100" y="278" font-family="Noto Sans CJK KR" font-weight="bold" font-size="44" fill="#1a1a1a">지원율</text>
  <text x="980" y="278" font-family="Noto Sans CJK KR" font-weight="bold" font-size="44" fill="#1B5FA6" text-anchor="end">15% 또는 30%</text>

  <rect x="60" y="340" width="960" height="110" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
  <text x="100" y="408" font-family="Noto Sans CJK KR" font-weight="bold" font-size="44" fill="#1a1a1a">지원한도</text>
  <text x="980" y="408" font-family="Noto Sans CJK KR" font-weight="bold" font-size="44" fill="#1B5FA6" text-anchor="end">가구당 30만 원</text>

  <rect x="60" y="470" width="960" height="110" rx="16" fill="#FFF6D6" stroke="#F0D98A"/>
  <text x="100" y="538" font-family="Noto Sans CJK KR" font-weight="bold" font-size="44" fill="#1a1a1a">한도 성격</text>
  <text x="980" y="538" font-family="Noto Sans CJK KR" font-weight="bold" font-size="40" fill="#B8860B" text-anchor="end">과거연도 포함 누적</text>

  <text x="60" y="650" font-family="Noto Sans CJK KR" font-size="34" fill="#5B6B7C">※ 매년 갱신되지 않는 누적 한도 (예: 작년 15만 원 받으면 올해 15만 원만)</text>
</svg>
