<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <rect width="1080" height="170" fill="#243B6B"/>
  <text x="60" y="98" font-family="Malgun Gothic" font-weight="bold"
        font-size="56" fill="#ffffff">만기 후 연금계좌 전환</text>
  <text x="60" y="148" font-family="Malgun Gothic" font-size="34" fill="#E8EEF5">60일 내 이전하면 추가 세액공제</text>

  <!-- 흐름도 3단계 -->
  <g font-family="Malgun Gothic">
    <!-- 1 -->
    <rect x="50" y="240" width="270" height="200" rx="22" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="185" y="315" font-size="40" font-weight="bold" fill="#243B6B" text-anchor="middle">ISA 만기</text>
    <text x="185" y="375" font-size="32" fill="#1a1a1a" text-anchor="middle">해지 후</text>
    <text x="185" y="415" font-size="32" fill="#1a1a1a" text-anchor="middle">만기자금 확보</text>

    <text x="345" y="355" font-size="60" fill="#FFD23F" text-anchor="middle" font-weight="bold">&#8594;</text>

    <!-- 2 -->
    <rect x="405" y="240" width="270" height="200" rx="22" fill="#243B6B"/>
    <text x="540" y="305" font-size="40" font-weight="bold" fill="#FFD23F" text-anchor="middle">60일 이내</text>
    <text x="540" y="365" font-size="32" fill="#ffffff" text-anchor="middle">연금저축·IRP로</text>
    <text x="540" y="405" font-size="32" fill="#ffffff" text-anchor="middle">이전</text>

    <text x="700" y="355" font-size="60" fill="#FFD23F" text-anchor="middle" font-weight="bold">&#8594;</text>

    <!-- 3 -->
    <rect x="760" y="240" width="270" height="200" rx="22" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="895" y="305" font-size="38" font-weight="bold" fill="#243B6B" text-anchor="middle">추가 세액공제</text>
    <text x="895" y="365" font-size="32" fill="#1a1a1a" text-anchor="middle">이전금액의 10%</text>
    <text x="895" y="405" font-size="32" fill="#1a1a1a" text-anchor="middle">최대 300만원</text>
  </g>

  <!-- 하단 강조 -->
  <rect x="50" y="475" width="980" height="110" rx="20" fill="#FFF4D6" stroke="#FFD23F" stroke-width="2"/>
  <text x="540" y="523" font-family="Malgun Gothic" font-size="32" font-weight="bold" fill="#8a6d1a" text-anchor="middle">기존 연금공제(연 900만원) + 추가 = 연 최대 1,200만원</text>
  <text x="540" y="562" font-family="Malgun Gothic" font-size="27" fill="#8a6d1a" text-anchor="middle">예) 300만원 공제 시 16.5% 적용 약 49만 5,000원 환급 (총급여 5,500만원 이하)</text>

  <text x="60" y="640" font-family="Malgun Gothic" font-size="28" fill="#5B6B7C">※ 적용 조건 세분화 → 이전 전 홈택스·가입 증권사 공식 안내 재확인 권장</text>
  <text x="60" y="690" font-family="Malgun Gothic" font-size="28" fill="#5B6B7C">blog.naver.com/trip_chocho</text>
</svg>
