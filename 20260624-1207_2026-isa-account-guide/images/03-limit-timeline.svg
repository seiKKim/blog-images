  <!-- 3개 박스 -->
  <g font-family="Malgun Gothic">
    <rect x="60" y="230" width="300" height="290" rx="22" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="210" y="320" font-size="38" fill="#5B6B7C" text-anchor="middle">연간 납입한도</text>
    <text x="210" y="420" font-size="74" font-weight="bold" fill="#243B6B" text-anchor="middle">2,000</text>
    <text x="210" y="480" font-size="40" fill="#1a1a1a" text-anchor="middle">만원</text>

    <rect x="390" y="230" width="300" height="290" rx="22" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="540" y="320" font-size="38" fill="#5B6B7C" text-anchor="middle">총 납입한도</text>
    <text x="540" y="420" font-size="74" font-weight="bold" fill="#243B6B" text-anchor="middle">1억원</text>
