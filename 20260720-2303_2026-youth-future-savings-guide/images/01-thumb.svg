<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#243B6B"/>
      <stop offset="1" stop-color="#16264A"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="950" cy="170" r="270" fill="#ffffff" opacity="0.06"/>
  <circle cx="110" cy="990" r="210" fill="#ffffff" opacity="0.05"/>

  <!-- 카테고리 뱃지 -->
  <rect x="64" y="80" rx="34" ry="34" width="240" height="68" fill="#FFD23F"/>
  <text x="184" y="126" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#16264A" text-anchor="middle">금융·재테크</text>

  <!-- 서브 카피 -->
  <text x="64" y="270" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#E8EEF5">2026 청년 목돈 재테크</text>

  <!-- 메인 카피 -->
  <text x="64" y="410" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="88" fill="#ffffff">청년도약계좌 <tspan fill="#FF9AA6">끝?</tspan></text>
  <text x="64" y="520" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="88" fill="#ffffff">이젠 <tspan fill="#FFD23F">청년미래적금</tspan></text>

  <!-- 핵심 숫자 3칸 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="64" y="590" width="300" height="170" rx="22" fill="#ffffff" opacity="0.12"/>
    <text x="214" y="655" font-size="34" fill="#E8EEF5" text-anchor="middle">월 납입한도</text>
    <text x="214" y="720" font-size="60" font-weight="bold" fill="#FFD23F" text-anchor="middle">50만원</text>

    <rect x="390" y="590" width="300" height="170" rx="22" fill="#ffffff" opacity="0.12"/>
    <text x="540" y="655" font-size="34" fill="#E8EEF5" text-anchor="middle">만기</text>
    <text x="540" y="720" font-size="60" font-weight="bold" fill="#FFD23F" text-anchor="middle">3년</text>

    <rect x="716" y="590" width="300" height="170" rx="22" fill="#ffffff" opacity="0.12"/>
    <text x="866" y="655" font-size="34" fill="#E8EEF5" text-anchor="middle">정부기여금</text>
    <text x="866" y="720" font-size="60" font-weight="bold" fill="#FFD23F" text-anchor="middle">6~12%</text>
  </g>

  <!-- 디테일 박스 -->
  <rect x="64" y="800" rx="20" ry="20" width="952" height="120" fill="#FFD23F"/>
  <text x="540" y="878" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#16264A" text-anchor="middle">1차 종료 · 다음 신규모집 12월</text>

  <!-- 채널 -->
  <text x="64" y="1010" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="32" fill="#E8EEF5" opacity="0.85">만 19~34세 · 월 최대 50만원 · 비과세</text>
</svg>
