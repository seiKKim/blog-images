  <rect x="60" y="480" width="960" height="150" rx="20" fill="#FCE3E8"/>
  <text x="100" y="545" font-family="Noto Sans CJK KR" font-weight="bold" font-size="42" fill="#B23A52">당첨자 결제 마감(6/24 18시) 넘기면</text>
  <text x="100" y="600" font-family="Noto Sans CJK KR" font-weight="bold" font-size="42" fill="#1a1a1a">환불이 아니라 당첨 자체가 자동 취소</text>

  <rect x="0" y="660" width="1080" height="60" fill="#EADBE0"/>
  <text x="60" y="700" font-family="Noto Sans CJK KR" font-size="30" fill="#7A6670">출처: 숲나들e 예약·환불 안내 (예약 시 규정 확인)</text>
