<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F7F1F3"/>
  <rect width="1080" height="160" fill="#E0556E"/>
  <text x="60" y="100" font-family="Noto Sans CJK KR" font-weight="bold" font-size="56" fill="#ffffff">취소·환불 주의사항</text>

  <g font-family="Noto Sans CJK KR">
    <rect x="60" y="210" width="960" height="110" rx="16" fill="#ffffff" stroke="#E6C7CF"/>
    <text x="100" y="278" font-size="40" font-weight="bold" fill="#1a1a1a">취소 수수료·기한</text>
    <text x="1000" y="278" font-size="40" font-weight="bold" fill="#E0556E" text-anchor="end">휴양림별 상이</text>

    <rect x="60" y="340" width="960" height="110" rx="16" fill="#ffffff" stroke="#E6C7CF"/>
