<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#E0556E"/>
  <text x="60" y="125" font-family="'Noto Sans CJK KR','NanumGothic',sans-serif" font-weight="bold" font-size="60" fill="#ffffff">삼계탕 1인분 가격 비교</text>

  <g font-family="'Noto Sans CJK KR','NanumGothic',sans-serif" font-size="50" fill="#1a1a1a">
    <rect x="60" y="290" width="960" height="180" rx="16" fill="#ffffff" stroke="#EAD3D9"/>
    <text x="110" y="365" font-weight="bold">외식 (서울 평균)</text>
    <text x="110" y="430" font-size="36" fill="#8A6E75">참가격 · 2026년 5월</text>
    <text x="970" y="400" font-weight="bold" font-size="62" fill="#B03A52" text-anchor="end">18,154원</text>

    <rect x="60" y="500" width="960" height="180" rx="16" fill="#ffffff" stroke="#EAD3D9"/>
    <text x="110" y="575" font-weight="bold">집밥 (시장 재료비)</text>
    <text x="110" y="640" font-size="36" fill="#8A6E75">한국물가정보 · 7/8 조사</text>
    <text x="970" y="610" font-weight="bold" font-size="62" fill="#1F8A53" text-anchor="end">8,800원</text>

    <rect x="60" y="710" width="960" height="180" rx="16" fill="#ffffff" stroke="#EAD3D9"/>
    <text x="110" y="785" font-weight="bold">밀키트 · 간편식</text>
    <text x="110" y="850" font-size="36" fill="#8A6E75">시중 출시가</text>
