  <rect x="60" y="950" width="960" height="210" rx="16" fill="#E0556E" opacity="0.10"/>
  <text x="110" y="1035" font-family="'Noto Sans CJK KR','NanumGothic',sans-serif" font-weight="bold" font-size="46" fill="#B03A52">4인 가족 기준 외식 약 72,600원</text>
  <text x="110" y="1105" font-family="'Noto Sans CJK KR','NanumGothic',sans-serif" font-size="40" fill="#4A3A3E">집밥(35,260원)이면 약 3만 7천원 절약</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#F0DFE3"/>
  <text x="60" y="1322" font-family="'Noto Sans CJK KR','NanumGothic',sans-serif" font-size="34" fill="#7A5B63">출처: 한국소비자원 참가격 · 한국물가정보</text>
