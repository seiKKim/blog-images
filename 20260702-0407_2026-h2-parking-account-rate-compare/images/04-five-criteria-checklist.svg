<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#243B6B"/>
  <rect x="60" y="52" rx="30" ry="30" width="196" height="60" fill="#FFD23F"/>
  <text x="158" y="93" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="32" fill="#1a1a1a" text-anchor="middle">금융·재테크</text>
  <text x="60" y="176" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">파킹통장 고르는 5가지 기준</text>

  <g font-family="'Noto Sans KR','Malgun Gothic',sans-serif">
    <!-- 1 -->
    <rect x="60" y="270" width="960" height="180" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="150" cy="360" r="52" fill="#243B6B"/>
    <text x="150" y="378" font-size="54" fill="#FFD23F" text-anchor="middle" font-weight="bold">1</text>
    <text x="240" y="350" font-size="46" font-weight="bold" fill="#1a1a1a">금리 — 구간별 실질금리</text>
    <text x="240" y="410" font-size="34" fill="#5B6B7C">‘최고 %’ 아닌 내 금액이 받는 구간 확인</text>

    <!-- 2 -->
    <rect x="60" y="470" width="960" height="180" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="150" cy="560" r="52" fill="#243B6B"/>
    <text x="150" y="578" font-size="54" fill="#FFD23F" text-anchor="middle" font-weight="bold">2</text>
    <text x="240" y="550" font-size="46" font-weight="bold" fill="#1a1a1a">예치한도 — 초과분 저금리</text>
    <text x="240" y="610" font-size="34" fill="#5B6B7C">고금리 한도 초과 시 수익률 급락</text>

    <!-- 3 -->
    <rect x="60" y="670" width="960" height="180" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="150" cy="760" r="52" fill="#243B6B"/>
    <text x="150" y="778" font-size="54" fill="#FFD23F" text-anchor="middle" font-weight="bold">3</text>
    <text x="240" y="750" font-size="46" font-weight="bold" fill="#1a1a1a">이자지급주기 — 일복리 유리</text>
    <text x="240" y="810" font-size="34" fill="#5B6B7C">매일 지급 &gt; 분기 1회 (복리 효과)</text>

    <!-- 4 -->
    <rect x="60" y="870" width="960" height="180" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="150" cy="960" r="52" fill="#243B6B"/>
    <text x="150" y="978" font-size="54" fill="#FFD23F" text-anchor="middle" font-weight="bold">4</text>
    <text x="240" y="950" font-size="46" font-weight="bold" fill="#1a1a1a">우대조건 — 달성 가능성</text>
    <text x="240" y="1010" font-size="34" fill="#5B6B7C">조건 못 채우면 낮은 기본금리만 적용</text>

    <!-- 5 -->
    <rect x="60" y="1070" width="960" height="180" rx="20" fill="#243B6B"/>
    <circle cx="150" cy="1160" r="52" fill="#FFD23F"/>
    <text x="150" y="1178" font-size="54" fill="#243B6B" text-anchor="middle" font-weight="bold">5</text>
    <text x="240" y="1150" font-size="46" font-weight="bold" fill="#ffffff">예금자보호 — 1인당 1억원</text>
    <text x="240" y="1210" font-size="34" fill="#E8EEF5">CMA·MMF 등 투자형은 보호 대상 아님</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="32" fill="#5B6B7C">※ 예금자보호 한도 1억원 = 2025.9.1 상향 기준</text>
</svg>
