<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#243B6B"/>
  <circle cx="950" cy="180" r="260" fill="#ffffff" opacity="0.08"/>
  <circle cx="120" cy="980" r="200" fill="#ffffff" opacity="0.06"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="86" rx="34" ry="34" width="230" height="68" fill="#FFD23F"/>
  <text x="195" y="132" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="36" fill="#1a1a1a" text-anchor="middle">금융·재테크</text>

  <!-- 서브 카피 -->
  <text x="80" y="288" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="56" fill="#E8EEF5">2026 하반기 파킹통장 금리</text>

  <!-- 메인 카피 -->
  <text x="80" y="432" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="118" fill="#ffffff">같은 돈 넣고</text>
  <text x="80" y="566" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="150" fill="#FFD23F">이자 3배 차이</text>

  <!-- 비교 미니 카드 3개 -->
  <g font-family="'Noto Sans KR','Malgun Gothic',sans-serif">
    <rect x="80" y="650" width="280" height="180" rx="20" fill="#ffffff" opacity="0.12"/>
    <rect x="400" y="650" width="280" height="180" rx="20" fill="#ffffff" opacity="0.12"/>
    <rect x="720" y="650" width="280" height="180" rx="20" fill="#ffffff" opacity="0.12"/>

    <text x="220" y="720" font-size="34" fill="#E8EEF5" text-anchor="middle" font-weight="bold">토스뱅크</text>
    <text x="220" y="792" font-size="58" fill="#ffffff" text-anchor="middle" font-weight="bold">연 3%</text>

    <text x="540" y="720" font-size="34" fill="#E8EEF5" text-anchor="middle" font-weight="bold">저축은행</text>
    <text x="540" y="792" font-size="58" fill="#FFD23F" text-anchor="middle" font-weight="bold">최고 7%</text>

    <text x="860" y="720" font-size="34" fill="#E8EEF5" text-anchor="middle" font-weight="bold">카카오뱅크</text>
    <text x="860" y="792" font-size="58" fill="#ffffff" text-anchor="middle" font-weight="bold">연 1.6%</text>
  </g>

  <!-- 디테일 -->
  <rect x="80" y="870" rx="20" ry="20" width="920" height="96" fill="#ffffff" opacity="0.14"/>
  <text x="110" y="932" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="44" fill="#ffffff">최고금리 함정·예금자보호 1억까지 총정리</text>

  <text x="80" y="1024" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="32" fill="#E8EEF5" opacity="0.9">※ 금리는 확인 시점(2026.7 초) 기준·변동</text>
</svg>
