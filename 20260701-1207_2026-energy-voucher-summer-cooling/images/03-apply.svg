<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="210" fill="#1B5FA6"/>
  <rect x="60" y="70" rx="26" ry="26" width="200" height="60" fill="#FFD23F"/>
  <text x="160" y="112" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="32" fill="#14477D" text-anchor="middle">신청 방법</text>
  <text x="60" y="185" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">4가지 중 편한 방법으로</text>

  <!-- 4 카드 (2x2) -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 방문 -->
    <rect x="60" y="270" width="465" height="230" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="95" y="345" font-weight="bold" font-size="40" fill="#1B5FA6">① 방문 신청</text>
    <text x="95" y="410" font-size="35" fill="#1a1a1a">읍·면·동 행정복지</text>
    <text x="95" y="458" font-size="35" fill="#1a1a1a">센터 직접 방문</text>

    <!-- 온라인 -->
    <rect x="555" y="270" width="465" height="230" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="590" y="345" font-weight="bold" font-size="40" fill="#1B5FA6">② 온라인 신청</text>
    <text x="590" y="410" font-size="35" fill="#1a1a1a">복지로 홈페이지</text>
    <text x="590" y="458" font-size="33" fill="#1a1a1a">bokjiro.go.kr</text>

    <!-- 대리 -->
    <rect x="60" y="530" width="465" height="230" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="95" y="605" font-weight="bold" font-size="40" fill="#1B5FA6">③ 대리 신청</text>
    <text x="95" y="670" font-size="35" fill="#1a1a1a">위임장 + 대리인</text>
    <text x="95" y="718" font-size="35" fill="#1a1a1a">신분증 지참</text>

    <!-- 직권 -->
    <rect x="555" y="530" width="465" height="230" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="590" y="605" font-weight="bold" font-size="40" fill="#1B5FA6">④ 직권 신청</text>
    <text x="590" y="670" font-size="35" fill="#1a1a1a">담당 공무원이</text>
    <text x="590" y="718" font-size="35" fill="#1a1a1a">동의받아 접수</text>
  </g>

  <!-- 필요서류 강조 -->
  <rect x="60" y="800" width="960" height="330" rx="20" fill="#14477D"/>
  <text x="100" y="875" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#FFD23F">꼭 챙길 서류</text>
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="38" fill="#ffffff">
    <text x="100" y="950">· 에너지이용권 발급 신청서</text>
    <text x="100" y="1015">· (대리 시) 위임장 + 대리인 신분증</text>
    <text x="100" y="1080" font-weight="bold" fill="#FFD23F">· 요금차감 시: 최근 전기요금 고지서</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 에너지바우처(energyv.or.kr) · 복지로</text>
</svg>
