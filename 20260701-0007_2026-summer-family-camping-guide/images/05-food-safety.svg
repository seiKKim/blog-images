<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FBF4EC"/>
  <rect width="1080" height="180" fill="#E8722C"/>
  <text x="60" y="115" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">여름 식중독 예방 핵심</text>

  <!-- 온도 강조 박스 -->
  <rect x="60" y="240" width="960" height="280" rx="24" fill="#1E6E94"/>
  <text x="540" y="330" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="44" font-weight="bold" fill="#BFE3F2" text-anchor="middle">아이스박스 적정온도</text>
  <text x="540" y="460" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="150" font-weight="900" fill="#ffffff" text-anchor="middle">4~5℃ 이하</text>

  <!-- 적재 순서 카드 -->
  <text x="60" y="610" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="46" font-weight="bold" fill="#1a1a1a">적재 순서 &amp; 관리 수칙</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="60" y="650" width="960" height="110" rx="16" fill="#ffffff" stroke="#EAD8C6"/>
    <circle cx="120" cy="705" r="28" fill="#E8722C"/>
    <text x="120" y="718" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
    <text x="172" y="718" font-size="38" fill="#1a1a1a">아래부터 아이스팩 → 고기·해산물·유제품</text>

    <rect x="60" y="780" width="960" height="110" rx="16" fill="#ffffff" stroke="#EAD8C6"/>
    <circle cx="120" cy="835" r="28" fill="#E8722C"/>
    <text x="120" y="848" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
    <text x="172" y="848" font-size="38" fill="#1a1a1a">위에 채소·과일 → 다시 얼음/냉매로 덮기</text>

    <rect x="60" y="910" width="960" height="110" rx="16" fill="#ffffff" stroke="#EAD8C6"/>
    <circle cx="120" cy="965" r="28" fill="#E8722C"/>
    <text x="120" y="978" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
    <text x="172" y="978" font-size="38" fill="#1a1a1a">생고기·채소 분리, 육류·어패류 이중밀봉</text>

    <rect x="60" y="1040" width="960" height="110" rx="16" fill="#ffffff" stroke="#EAD8C6"/>
    <circle cx="120" cy="1095" r="28" fill="#E8722C"/>
    <text x="120" y="1108" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
    <text x="172" y="1108" font-size="38" fill="#1a1a1a">그늘에 두고 뚜껑 개폐 최소화</text>
  </g>

  <rect x="60" y="1180" width="960" height="110" rx="16" fill="#FFF3DE" stroke="#F0C97A"/>
  <text x="540" y="1248" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="38" font-weight="bold" fill="#B24A38" text-anchor="middle">조리 전 손 30초 이상 세척 · 고기는 완전히 익히기</text>
</svg>
