<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EF8233"/>
      <stop offset="1" stop-color="#D8631F"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="950" cy="170" r="260" fill="#ffffff" opacity="0.08"/>
  <circle cx="120" cy="980" r="220" fill="#ffffff" opacity="0.06"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="86" rx="34" ry="34" width="220" height="68" fill="#FFD23F"/>
  <text x="190" y="132" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#1a1a1a" text-anchor="middle">여름 캠핑</text>

  <!-- 서브 카피 -->
  <text x="80" y="300" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#FFEFD6">어린 자녀와 첫 캠핑</text>

  <!-- 메인 카피 -->
  <text x="80" y="448" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="900"
        font-size="120" fill="#ffffff">준비물 4분류</text>
  <text x="80" y="588" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="900"
        font-size="120" fill="#FFD23F">+ 안전수칙</text>

  <!-- 4분류 칩 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">
    <rect x="80" y="660" rx="20" width="430" height="86" fill="#ffffff" opacity="0.16"/>
    <rect x="80" y="660" rx="20" width="430" height="86" fill="none"/>
    <text x="295" y="716">① 숙박  ② 조리</text>
    <rect x="540" y="660" rx="20" width="460" height="86" fill="#ffffff" opacity="0.16"/>
    <text x="770" y="716">③ 안전  ④ 여름특화</text>
  </g>

  <!-- 디테일 띠 -->
  <rect x="80" y="790" rx="20" ry="20" width="920" height="150" fill="#ffffff" opacity="0.16"/>
  <text x="110" y="852" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff">안전사고 <tspan fill="#FFD23F">61.2%</tspan>가 만 13세 미만</text>
  <text x="110" y="912" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff">체크리스트 · 식중독 · 예약까지 총정리</text>

  <text x="80" y="1014" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="32" fill="#FFEFD6" opacity="0.9">blog.naver.com/trip_chocho</text>
</svg>
