<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="1080" height="1350" fill="#F4F7FB"/>
<rect width="1080" height="200" fill="#243B6B"/>
<text x="60" y="125" font-family="Noto Sans CJK KR" font-weight="bold" font-size="56" fill="#ffffff" text-anchor="start">보호되는 상품 vs 아닌 상품</text>
<rect x="60" y="250" width="960" height="410" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
<path d="M84,250 h912 a24,24 0 0 1 24,24 v66 h-960 v-66 a24,24 0 0 1 24,-24 z" fill="#1F8A53"/>
<text x="90" y="318" font-family="Noto Sans CJK KR" font-weight="bold" font-size="44" fill="#ffffff" text-anchor="start">보호 대상 (원금보장형)</text>
<path d="M110,426 l15,15 l25,-31" stroke="#1F8A53" stroke-width="6" fill="none"/>
<text x="175" y="438" font-family="Noto Sans CJK KR" font-weight="normal" font-size="40" fill="#1a1a1a" text-anchor="start">예금 · 적금</text>
<path d="M110,488 l15,15 l25,-31" stroke="#1F8A53" stroke-width="6" fill="none"/>
<text x="175" y="500" font-family="Noto Sans CJK KR" font-weight="normal" font-size="40" fill="#1a1a1a" text-anchor="start">외화예금 (원화환산 1억원까지)</text>
<path d="M110,550 l15,15 l25,-31" stroke="#1F8A53" stroke-width="6" fill="none"/>
<text x="175" y="562" font-family="Noto Sans CJK KR" font-weight="normal" font-size="40" fill="#1a1a1a" text-anchor="start">퇴직연금·연금저축 원금보장형</text>
<path d="M110,612 l15,15 l25,-31" stroke="#1F8A53" stroke-width="6" fill="none"/>
<text x="175" y="624" font-family="Noto Sans CJK KR" font-weight="normal" font-size="40" fill="#1a1a1a" text-anchor="start">사고보험금</text>
<rect x="60" y="700" width="960" height="480" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
<path d="M84,700 h912 a24,24 0 0 1 24,24 v66 h-960 v-66 a24,24 0 0 1 24,-24 z" fill="#D24646"/>
<text x="90" y="768" font-family="Noto Sans CJK KR" font-weight="bold" font-size="44" fill="#ffffff" text-anchor="start">보호 대상 아님</text>
<line x1="110" y1="840" x2="145" y2="875" stroke="#D24646" stroke-width="6"/>
<line x1="145" y1="840" x2="110" y2="875" stroke="#D24646" stroke-width="6"/>
<text x="175" y="870" font-family="Noto Sans CJK KR" font-weight="normal" font-size="40" fill="#1a1a1a" text-anchor="start">펀드 · 실적배당형 상품</text>
<line x1="110" y1="910" x2="145" y2="945" stroke="#D24646" stroke-width="6"/>
<line x1="145" y1="910" x2="110" y2="945" stroke="#D24646" stroke-width="6"/>
<text x="175" y="940" font-family="Noto Sans CJK KR" font-weight="normal" font-size="40" fill="#1a1a1a" text-anchor="start">증권사 CMA</text>
<line x1="110" y1="980" x2="145" y2="1015" stroke="#D24646" stroke-width="6"/>
<line x1="145" y1="980" x2="110" y2="1015" stroke="#D24646" stroke-width="6"/>
<text x="175" y="1010" font-family="Noto Sans CJK KR" font-weight="normal" font-size="40" fill="#1a1a1a" text-anchor="start">후순위채권</text>
<line x1="110" y1="1050" x2="145" y2="1085" stroke="#D24646" stroke-width="6"/>
<line x1="145" y1="1050" x2="110" y2="1085" stroke="#D24646" stroke-width="6"/>
<text x="175" y="1080" font-family="Noto Sans CJK KR" font-weight="normal" font-size="40" fill="#1a1a1a" text-anchor="start">변액보험 (최저보증 제외 주계약)</text>
<text x="90" y="1148" font-family="Noto Sans CJK KR" font-weight="normal" font-size="30" fill="#5B6B7C" text-anchor="start">* 기준은 가입처가 아니라 상품 성격(원금보장 여부)</text>
<rect x="0" y="1290" width="1080" height="60" fill="#E8EEF5"/>
<text x="60" y="1328" font-family="Noto Sans CJK KR" font-weight="normal" font-size="30" fill="#5B6B7C" text-anchor="start">출처: 예금보험공사 보호대상 금융상품 기준</text>
</svg>