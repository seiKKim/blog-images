<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="210" fill="#243B6B"/>
  <rect x="60" y="60" rx="26" ry="26" width="190" height="60" fill="#FFD23F"/>
  <text x="155" y="101" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="32" fill="#1a1a1a" text-anchor="middle">금융·재테크</text>
  <text x="60" y="185" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">청년도약계좌 vs 청년미래적금</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 헤더 행 -->
    <rect x="60" y="270" width="300" height="110" rx="14" fill="#E8EEF5"/>
    <rect x="372" y="270" width="324" height="110" rx="14" fill="#243B6B"/>
    <rect x="708" y="270" width="312" height="110" rx="14" fill="#3A5488"/>
    <text x="210" y="338" font-size="40" font-weight="bold" fill="#5B6B7C" text-anchor="middle">구분</text>
    <text x="534" y="338" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">청년도약계좌</text>
    <text x="864" y="338" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">청년미래적금</text>

    <!-- 행 그리기: 각 행 높이 128 -->
    <!-- 신규 가입 -->
    <rect x="60" y="392" width="960" height="128" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="90" y="472" font-size="38" font-weight="bold" fill="#1a1a1a">신규 가입</text>
    <text x="534" y="472" font-size="36" font-weight="bold" fill="#E23B3B" text-anchor="middle">종료(2025.12)</text>
    <text x="864" y="463" font-size="34" font-weight="bold" fill="#1F8A53" text-anchor="middle">가능</text>
    <text x="864" y="500" font-size="28" fill="#5B6B7C" text-anchor="middle">(다음 12월 모집)</text>

    <!-- 만기 -->
    <rect x="60" y="532" width="960" height="128" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="90" y="612" font-size="38" font-weight="bold" fill="#1a1a1a">만기</text>
    <text x="534" y="612" font-size="38" font-weight="bold" fill="#243B6B" text-anchor="middle">5년</text>
    <text x="864" y="612" font-size="38" font-weight="bold" fill="#243B6B" text-anchor="middle">3년</text>

    <!-- 월 한도 -->
    <rect x="60" y="672" width="960" height="128" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="90" y="752" font-size="38" font-weight="bold" fill="#1a1a1a">월 한도</text>
    <text x="534" y="752" font-size="38" font-weight="bold" fill="#243B6B" text-anchor="middle">70만원</text>
    <text x="864" y="752" font-size="38" font-weight="bold" fill="#243B6B" text-anchor="middle">50만원</text>

    <!-- 금리 -->
    <rect x="60" y="812" width="960" height="128" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="90" y="892" font-size="38" font-weight="bold" fill="#1a1a1a">금리</text>
    <text x="534" y="884" font-size="32" font-weight="bold" fill="#243B6B" text-anchor="middle">기본+우대</text>
    <text x="534" y="920" font-size="28" fill="#5B6B7C" text-anchor="middle">(은행별)</text>
    <text x="864" y="884" font-size="32" font-weight="bold" fill="#243B6B" text-anchor="middle">기본 5.0%</text>
    <text x="864" y="920" font-size="28" fill="#5B6B7C" text-anchor="middle">+ 우대</text>

    <!-- 정부기여금 -->
    <rect x="60" y="952" width="960" height="128" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="90" y="1032" font-size="38" font-weight="bold" fill="#1a1a1a">정부기여금</text>
    <text x="534" y="1032" font-size="34" font-weight="bold" fill="#243B6B" text-anchor="middle">소득별 3.0~6.0%</text>
    <text x="864" y="1032" font-size="34" font-weight="bold" fill="#243B6B" text-anchor="middle">일반 6%/우대 12%</text>
  </g>

  <text x="60" y="1160" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#5B6B7C">가구소득 기준: 도약 250% vs 미래 200%(맞벌이 250%)</text>
  <text x="60" y="1218" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="34" fill="#5B6B7C">금리·조건은 시점마다 바뀌니 신청 전 최신 수치 확인</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">출처: 서민금융진흥원·은행연합회 소비자포털</text>
</svg>
