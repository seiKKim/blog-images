<text x="60" y="105" font-family="Malgun Gothic" font-weight="bold" font-size="62" fill="#ffffff">원룸·소형 (7~15평)</text>
<text x="60" y="168" font-family="Malgun Gothic" font-weight="bold" font-size="54" fill="#FFD23F">추천 10~13L</text>
