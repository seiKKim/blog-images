<rect x="60" y="920" width="960" height="330" rx="20" fill="#0E3A44"/>
<text x="100" y="1000" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#FFD23F">이럴 땐 한 단계 위로</text>
<text x="100" y="1070" font-family="Malgun Gothic" font-size="40" fill="#ffffff">· 습한 저층(반지하·1층)</text>
<text x="100" y="1130" font-family="Malgun Gothic" font-size="40" fill="#ffffff">· 환기 안 되는 구조</text>
<text x="100" y="1190" font-family="Malgun Gothic" font-size="40" fill="#ffffff">· 빨래를 자주 실내 건조</text>
