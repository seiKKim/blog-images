<text x="100" y="522" font-weight="bold">적정 평수</text><text x="1000" y="522" font-weight="bold" fill="#1E6B7A" text-anchor="end">7~15평(방 한 칸)</text>
<rect x="60" y="590" width="960" height="130" rx="16" fill="#ffffff" stroke="#CFE2E7"/>
<text x="100" y="656" font-weight="bold">핵심 스펙</text><text x="100" y="702" font-size="36" fill="#3B5560">연속배수·습도표시·인버터 저소음</text>
