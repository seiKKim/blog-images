<rect x="60" y="290" width="960" height="130" rx="16" fill="#ffffff" stroke="#CFE2E7"/>
<text x="100" y="372" font-weight="bold">제습량</text><text x="1000" y="372" font-weight="bold" fill="#1E6B7A" text-anchor="end">10~13L</text>
