<rect x="60" y="920" width="960" height="330" rx="20" fill="#0E3A44"/>
<text x="100" y="1000" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#FFD23F">물통 용량도 체크</text>
<text x="100" y="1075" font-family="Malgun Gothic" font-size="40" fill="#ffffff">일 16L · 물통 4L → 하루 약 5회 비움</text>
<text x="100" y="1150" font-family="Malgun Gothic" font-size="40" fill="#ffffff">큰 물통·연속배수면 번거로움 확↓</text>
<text x="100" y="1215" font-family="Malgun Gothic" font-size="36" fill="#DFF3F7">용량 부족하면 종일 풀가동 → 전기세 더↑</text>
</svg>