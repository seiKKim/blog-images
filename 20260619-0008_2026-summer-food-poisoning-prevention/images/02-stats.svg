<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FFF6EE"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <rect x="60" y="60" rx="26" ry="26" width="150" height="56" fill="#FFD23F"/>
  <text x="135" y="99" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">생활꿀팁</text>
  <text x="60" y="170" font-family="Noto Sans CJK KR" font-weight="bold" font-size="60" fill="#ffffff">2024년 식중독 통계</text>

  <g font-family="Noto Sans CJK KR" font-size="44" fill="#1a1a1a">
    <rect x="60" y="270" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="344" font-weight="bold">전체 발생</text>
    <text x="1000" y="344" font-weight="bold" fill="#E8722C" text-anchor="end">265건 · 7,624명</text>

    <rect x="60" y="410" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="484" font-weight="bold">1위 원인균</text>
    <text x="1000" y="484" font-weight="bold" fill="#E8722C" text-anchor="end">살모넬라 32%</text>

    <rect x="60" y="550" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="624" font-weight="bold">2위 / 3위</text>
    <text x="1000" y="624" font-weight="bold" fill="#E8722C" text-anchor="end">노로 20% / 대장균 13%</text>

    <rect x="60" y="690" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="764" font-weight="bold">최다 장소</text>
    <text x="1000" y="764" font-weight="bold" fill="#E8722C" text-anchor="end">음식점 154건</text>

    <rect x="60" y="830" width="960" height="120" rx="16" fill="#FFE9D4" stroke="#F0C9A8"/>
    <text x="100" y="904" font-weight="bold">여름철(7~9월)</text>
    <text x="1000" y="904" font-weight="bold" fill="#C8551A" text-anchor="end">환자 50% 집중</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#F0DECF"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="32" fill="#7A5A44">출처: 식품의약품안전처 2024년 식중독 통계(2025.8 발표)</text>
</svg>
