  <rect x="0" y="1270" width="1080" height="80" fill="#F0DECF"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="32" fill="#7A5A44">출처: 식품의약품안전처 식중독 예방 6대 수칙('손보구가세')</text>
