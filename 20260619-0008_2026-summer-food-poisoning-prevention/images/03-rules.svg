  <g font-family="Noto Sans CJK KR" font-size="42" fill="#1a1a1a">
    <rect x="60" y="270" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="344" font-weight="bold">손 · 손 씻기</text>
    <text x="1000" y="344" font-weight="bold" fill="#E8722C" text-anchor="end">비누로 30초 이상</text>

    <rect x="60" y="410" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="484" font-weight="bold">보 · 보관온도</text>
    <text x="1000" y="484" font-weight="bold" fill="#E8722C" text-anchor="end">냉장 5℃·냉동 -18℃</text>

    <rect x="60" y="550" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="624" font-weight="bold">구 · 구분 사용</text>
    <text x="1000" y="624" font-weight="bold" fill="#E8722C" text-anchor="end">칼·도마 식재료별</text>

    <rect x="60" y="690" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
