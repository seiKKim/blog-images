<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FFF6EE"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <rect x="60" y="60" rx="26" ry="26" width="150" height="56" fill="#FFD23F"/>
  <text x="135" y="99" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">생활꿀팁</text>
  <text x="60" y="170" font-family="Noto Sans CJK KR" font-weight="bold" font-size="60" fill="#ffffff">냉장고 보관 꿀팁</text>

  <g font-family="Noto Sans CJK KR" font-size="42" fill="#1a1a1a">
    <rect x="60" y="270" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="344" font-weight="bold">적정 채움</text>
    <text x="1000" y="344" font-weight="bold" fill="#E8722C" text-anchor="end">전체 용량 70% 이하</text>

    <rect x="60" y="410" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="484" font-weight="bold">조리음식</text>
    <text x="1000" y="484" font-weight="bold" fill="#E8722C" text-anchor="end">2시간 이내 섭취</text>

    <rect x="60" y="550" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="624" font-weight="bold">육류 보관</text>
    <text x="1000" y="624" font-weight="bold" fill="#E8722C" text-anchor="end">밀폐 후 맨 아래칸</text>

    <rect x="60" y="690" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="764" font-weight="bold">장보기 순서</text>
    <text x="1000" y="764" font-weight="bold" fill="#E8722C" text-anchor="end">육류·어패류 맨 마지막</text>

    <rect x="60" y="830" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="904" font-weight="bold">운반</text>
    <text x="1000" y="904" font-weight="bold" fill="#E8722C" text-anchor="end">아이스박스 서늘하게</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#F0DECF"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="32" fill="#7A5A44">출처: 식품의약품안전처 폭염 대비 당부('5℃·70% 룰')</text>
</svg>
