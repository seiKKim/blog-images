<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <!-- 상단 색띠 + 제목 -->
  <rect width="1080" height="200" fill="#2B2F36"/>
  <rect x="0" y="200" width="1080" height="8" fill="#E23B3B"/>
  <text x="60" y="112" font-family="Malgun Gothic" font-weight="bold"
        font-size="60" fill="#ffffff">차 안에 갇혔을 때 탈출 순서</text>
  <text x="60" y="168" font-family="Malgun Gothic" font-weight="normal"
        font-size="36" fill="#E8EEF5">당황 금지 · 순서대로만 따라 하세요</text>

  <!-- STEP 1 -->
  <g>
    <circle cx="115" cy="325" r="46" fill="#E23B3B"/>
    <text x="115" y="342" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#ffffff" text-anchor="middle">1</text>
    <text x="192" y="312" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#1a1a1a">창문 '모서리'를 깬다</text>
    <text x="192" y="366" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#5B6B7C">망치·목받침대 지지봉 등 단단한 물체로</text>
  </g>
  <line x1="115" y1="378" x2="115" y2="452" stroke="#C9D4E0" stroke-width="4"/>

  <!-- STEP 2 (강조) -->
  <g>
    <rect x="60" y="470" width="960" height="220" rx="20" fill="#FDECEC" stroke="#E23B3B" stroke-width="3"/>
    <circle cx="130" cy="540" r="46" fill="#E23B3B"/>
    <text x="130" y="557" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#ffffff" text-anchor="middle">2</text>
    <text x="200" y="530" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#1a1a1a">못 깼다면 '수위차 30cm'</text>
    <text x="200" y="586" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#5B6B7C">차 안팎 물 높이 차이가</text>
    <text x="130" y="660" font-family="Malgun Gothic" font-weight="bold" font-size="54" fill="#E23B3B">30cm 이하가 되면 문이 열린다</text>
  </g>
  <line x1="115" y1="700" x2="115" y2="762" stroke="#C9D4E0" stroke-width="4"/>

  <!-- STEP 3 -->
  <g>
    <circle cx="115" cy="815" r="46" fill="#2B2F36"/>
    <text x="115" y="832" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#ffffff" text-anchor="middle">3</text>
    <text x="192" y="802" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#1a1a1a">급류엔 '반대쪽 문'으로</text>
    <text x="192" y="856" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#5B6B7C">급류 밀려오는 반대편 문을 열고 탈출</text>
  </g>
  <line x1="115" y1="868" x2="115" y2="942" stroke="#C9D4E0" stroke-width="4"/>

  <!-- STEP 4 -->
  <g>
    <circle cx="115" cy="1005" r="46" fill="#2B2F36"/>
    <text x="115" y="1022" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#ffffff" text-anchor="middle">4</text>
    <text x="192" y="992" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#1a1a1a">지붕 위로 올라가 119 신고</text>
    <text x="192" y="1046" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#5B6B7C">물보다 높은 곳으로 대피 후 구조 대기</text>
  </g>

  <!-- 사전 팁 띠 -->
  <rect x="60" y="1110" width="960" height="140" rx="18" fill="#2B2F36"/>
  <text x="100" y="1172" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#FFD23F">미리! 타이어 2/3 잠기기 전 이동</text>
  <text x="100" y="1222" font-family="Malgun Gothic" font-weight="normal" font-size="36" fill="#ffffff">시동 꺼지기 전 창문·선루프 열어두기</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1290" width="1080" height="60" fill="#E8EEF5"/>
  <text x="60" y="1330" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C">긴급: 119 · 112 · 교통정보 1644-5000</text>
</svg>
