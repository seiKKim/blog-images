<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <!-- 상단 색띠 + 제목 -->
  <rect width="1080" height="200" fill="#2B2F36"/>
  <rect x="0" y="200" width="1080" height="8" fill="#E23B3B"/>
  <text x="60" y="112" font-family="Malgun Gothic" font-weight="bold"
        font-size="60" fill="#ffffff">장마철 비상용품, 미리 챙기기</text>
  <text x="60" y="168" font-family="Malgun Gothic" font-weight="normal"
        font-size="36" fill="#E8EEF5">정전·단수에 대비하는 5종</text>

  <!-- 아이템 카드 그리드 -->
  <!-- 1 손전등/랜턴 -->
  <rect x="60" y="270" width="450" height="300" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="255" y="330" width="60" height="70" rx="8" fill="#2B2F36"/>
  <polygon points="255,330 315,330 340,300 230,300" fill="#FFD23F"/>
  <text x="285" y="500" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#1a1a1a" text-anchor="middle">손전등·랜턴</text>
  <text x="285" y="545" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#5B6B7C" text-anchor="middle">양초는 화재 위험</text>

  <!-- 2 보조배터리 -->
  <rect x="570" y="270" width="450" height="300" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="750" y="320" width="90" height="130" rx="12" fill="#2B2F36"/>
  <rect x="770" y="350" width="50" height="16" rx="4" fill="#FFD23F"/>
  <rect x="770" y="380" width="50" height="16" rx="4" fill="#FFD23F"/>
  <text x="795" y="500" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#1a1a1a" text-anchor="middle">보조배터리</text>
  <text x="795" y="545" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#5B6B7C" text-anchor="middle">여분 배터리 함께</text>

  <!-- 3 생수 -->
  <rect x="60" y="600" width="450" height="300" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="262" y="650" width="46" height="130" rx="10" fill="#1B5FA6" opacity="0.7"/>
  <rect x="275" y="636" width="20" height="24" rx="4" fill="#2B2F36"/>
  <text x="285" y="830" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#1a1a1a" text-anchor="middle">식수·생수</text>
  <text x="285" y="875" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#5B6B7C" text-anchor="middle">욕조에 물도 받아두기</text>

  <!-- 4 라디오 -->
  <rect x="570" y="600" width="450" height="300" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="735" y="655" width="120" height="90" rx="10" fill="#2B2F36"/>
  <circle cx="825" cy="700" r="22" fill="#FFD23F"/>
  <line x1="855" y1="655" x2="885" y2="615" stroke="#2B2F36" stroke-width="6"/>
  <text x="795" y="830" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#1a1a1a" text-anchor="middle">라디오</text>
  <text x="795" y="875" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#5B6B7C" text-anchor="middle">재난 정보 확인</text>

  <!-- 5 응급약품 (가로 넓게) -->
  <rect x="60" y="930" width="960" height="200" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="130" y="985" width="90" height="90" rx="12" fill="#E23B3B"/>
  <rect x="167" y="1005" width="16" height="50" fill="#ffffff"/>
  <rect x="150" y="1022" width="50" height="16" fill="#ffffff"/>
  <text x="270" y="1015" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#1a1a1a">응급약품</text>
  <text x="270" y="1070" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#5B6B7C">상비약 · 비상식량 · 핸드폰 충전기</text>

  <!-- 하단 강조 띠 -->
  <rect x="60" y="1160" width="960" height="90" rx="18" fill="#2B2F36"/>
  <text x="540" y="1218" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#FFD23F" text-anchor="middle">'안전디딤돌' 앱 미리 설치해두기</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1290" width="1080" height="60" fill="#E8EEF5"/>
  <text x="60" y="1330" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C">출처: 행정안전부 · 국민재난안전포털</text>
</svg>
