<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <!-- 상단 색띠 + 제목 -->
  <rect width="1080" height="200" fill="#2B2F36"/>
  <rect x="0" y="200" width="1080" height="8" fill="#E23B3B"/>
  <text x="60" y="112" font-family="Malgun Gothic" font-weight="bold"
        font-size="60" fill="#ffffff">반지하·지하, 물 차면 즉시</text>
  <text x="60" y="168" font-family="Malgun Gothic" font-weight="normal"
        font-size="36" fill="#E8EEF5">망설이면 문이 안 열립니다</text>

  <!-- 핵심 경고 카드 -->
  <rect x="60" y="260" width="960" height="360" rx="24" fill="#FDECEC" stroke="#E23B3B" stroke-width="3"/>
  <!-- 사람/문 간단 도형 -->
  <rect x="120" y="320" width="150" height="240" rx="8" fill="#ffffff" stroke="#2B2F36" stroke-width="4"/>
  <circle cx="195" cy="440" r="10" fill="#2B2F36"/>
  <!-- 물 -->
  <rect x="120" y="470" width="820" height="90" fill="#1B5FA6" opacity="0.35"/>
  <text x="320" y="360" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#1a1a1a">외부 수심</text>
  <text x="320" y="470" font-family="Malgun Gothic" font-weight="bold" font-size="120" fill="#E23B3B">50cm</text>
  <text x="320" y="540" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1a1a1a">무릎 이상이면 혼자 못 엽니다</text>

  <!-- 행동 지침 -->
  <rect x="60" y="660" width="960" height="100" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="120" cy="710" r="14" fill="#E23B3B"/>
  <text x="160" y="726" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1a1a1a">전기 전원 차단 → 여러 명이 함께 문 열기</text>

  <rect x="60" y="775" width="960" height="100" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="120" cy="825" r="14" fill="#E23B3B"/>
  <text x="160" y="841" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1a1a1a">바닥에 물 조금·하수구 역류 시 즉시 대피</text>

  <!-- 대피 신발 안내 -->
  <rect x="60" y="915" width="960" height="290" rx="20" fill="#2B2F36"/>
  <text x="100" y="985" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#FFD23F">대피 신발은?</text>
  <text x="100" y="1055" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#ffffff">○ 운동화 유리   · 없으면 맨발</text>
  <text x="100" y="1120" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#ffffff">✕ 장화는 물 차서 오히려 위험</text>
  <text x="100" y="1180" font-family="Malgun Gothic" font-weight="normal" font-size="36" fill="#E8EEF5">이동 땐 계단 난간 꼭 잡기</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1290" width="1080" height="60" fill="#E8EEF5"/>
  <text x="60" y="1330" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C">출처: 행정안전부 국민행동요령</text>
</svg>
