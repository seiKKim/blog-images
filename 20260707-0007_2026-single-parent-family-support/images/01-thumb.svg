      <stop offset="0" stop-color="#1B5FA6"/>
      <stop offset="1" stop-color="#124A82"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="950" cy="170" r="270" fill="#ffffff" opacity="0.07"/>
  <circle cx="120" cy="1000" r="220" fill="#ffffff" opacity="0.05"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="88" rx="34" ry="34" width="220" height="68" fill="#FFD23F"/>
  <text x="190" y="134" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
