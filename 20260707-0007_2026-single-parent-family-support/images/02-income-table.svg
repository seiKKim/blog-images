<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="230" fill="#1B5FA6"/>
  <rect x="60" y="52" rx="26" ry="26" width="190" height="56" fill="#FFD23F"/>
  <text x="155" y="90" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="30" fill="#1a1a1a" text-anchor="middle">정부지원금</text>
  <text x="60" y="182" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">가구 규모별 소득인정액 기준</text>

  <text x="60" y="300" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1B5FA6">2026년 1월 기준 · 기준중위소득 65% 이하(월)</text>

  <!-- 헤더 -->
  <rect x="60" y="340" width="960" height="96" rx="16" fill="#1B5FA6"/>
  <text x="110" y="402" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#ffffff">가구 규모</text>
  <text x="970" y="402" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#FFD23F" text-anchor="end">소득인정액(월)</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" fill="#1a1a1a">
    <rect x="60" y="456" width="960" height="130" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="110" y="538" font-weight="bold" font-size="48">2인 가구</text>
    <text x="970" y="538" font-weight="bold" font-size="52" fill="#1B5FA6" text-anchor="end">2,729,540원</text>

    <rect x="60" y="606" width="960" height="130" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="110" y="688" font-weight="bold" font-size="48">3인 가구</text>
    <text x="970" y="688" font-weight="bold" font-size="52" fill="#1B5FA6" text-anchor="end">3,483,373원</text>

    <rect x="60" y="756" width="960" height="130" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="110" y="838" font-weight="bold" font-size="48">4인 가구</text>
    <text x="970" y="838" font-weight="bold" font-size="52" fill="#1B5FA6" text-anchor="end">4,221,580원</text>
  </g>

  <!-- 안내 박스 -->
  <rect x="60" y="930" width="960" height="248" rx="20" fill="#EAF1F9"/>
  <text x="96" y="1002" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1B5FA6">확인 포인트</text>
  <text x="96" y="1066" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="36" fill="#2b3a4a">· 근로·사업 소득은 30% 공제해 반영</text>
  <text x="96" y="1122" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="36" fill="#2b3a4a">· 실수령 월급이 아닌 소득인정액 기준</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">본문 근거: 2026 한부모가족 지원 안내 · 정확한 금액은 관할 주민센터 확인</text>
</svg>
