<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <rect width="1080" height="180" fill="#1B5FA6"/>
  <rect x="60" y="44" rx="24" ry="24" width="190" height="52" fill="#FFD23F"/>
  <text x="155" y="80" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="28" fill="#1a1a1a" text-anchor="middle">정부지원금</text>
  <text x="60" y="146" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">함께 챙기는 부가 지원</text>

  <!-- 카드 1 -->
  <rect x="60" y="230" width="460" height="330" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="150" cy="330" r="46" fill="#EAF1F9"/>
  <text x="150" y="348" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="46" text-anchor="middle">📚</text>
  <text x="230" y="345" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="44" fill="#1a1a1a">학용품비</text>
  <text x="90" y="440" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="72" fill="#1B5FA6">연 10만 원</text>
  <text x="90" y="510" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">초·중·고 자녀 1인당</text>

  <!-- 카드 2 -->
  <rect x="560" y="230" width="460" height="330" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="650" cy="330" r="46" fill="#EAF1F9"/>
  <text x="650" y="348" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="46" text-anchor="middle">🏠</text>
  <text x="730" y="345" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="44" fill="#1a1a1a">생활보조금</text>
  <text x="590" y="440" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="72" fill="#1B5FA6">월 10만 원</text>
  <text x="590" y="510" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">복지시설 입소 가구당</text>

  <rect x="0" y="640" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="692" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">학용품비는 아동양육비와 별개로 신청 가능 · 대상 자녀 있으면 함께 신청</text>
</svg>
