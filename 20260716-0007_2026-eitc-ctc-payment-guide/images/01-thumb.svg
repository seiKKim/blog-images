  <text x="80" y="360" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#E8EEF5">8월 말 입금 임박</text>

  <!-- 메인 카피 -->
  <text x="80" y="530" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
