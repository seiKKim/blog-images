<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#E8722C"/>
  <circle cx="950" cy="170" r="280" fill="#ffffff" opacity="0.08"/>
  <circle cx="110" cy="980" r="220" fill="#ffffff" opacity="0.06"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="86" rx="34" ry="34" width="220" height="68" fill="#FFD23F"/>
  <text x="190" y="132" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#2A2118" text-anchor="middle">생활꿀팁</text>

  <!-- 서브 카피 -->
  <text x="80" y="320" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#FFF3E8">장마철 빨래, 안 마르고 쉰내까지?</text>

  <!-- 메인 카피 -->
  <text x="80" y="470" font-family="Malgun Gothic" font-weight="bold" font-size="128" fill="#FFFFFF">빨리 말리고</text>
  <text x="80" y="610" font-family="Malgun Gothic" font-weight="bold" font-size="128" fill="#FFD23F">냄새까지 잡기</text>

  <!-- 핵심 3요소 박스 -->
  <rect x="80" y="700" rx="22" ry="22" width="920" height="150" fill="#ffffff" opacity="0.16"/>
  <text x="540" y="772" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#FFFFFF" text-anchor="middle">공기 순환 · 습도 낮추기 · 빨래 간격</text>
  <text x="540" y="828" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#FFF3E8" text-anchor="middle">핵심은 딱 세 가지</text>

  <!-- 일러스트: 건조대 + 선풍기 + 제습기 -->
  <g transform="translate(80,890)">
    <!-- 건조대 옷 (지그재그) -->
    <rect x="40" y="20" width="34" height="120" rx="8" fill="#FFF3E8"/>
    <rect x="92" y="40" width="34" height="80" rx="8" fill="#FFD23F"/>
    <rect x="144" y="20" width="34" height="120" rx="8" fill="#FFF3E8"/>
    <rect x="196" y="40" width="34" height="80" rx="8" fill="#FFD23F"/>
    <rect x="20" y="8" width="220" height="12" rx="6" fill="#FFFFFF"/>
    <!-- 선풍기 -->
    <circle cx="420" cy="80" r="58" fill="none" stroke="#FFFFFF" stroke-width="8"/>
    <circle cx="420" cy="80" r="14" fill="#FFD23F"/>
    <path d="M420 80 L420 30 A50 50 0 0 1 463 105 Z" fill="#FFFFFF" opacity="0.85"/>
    <path d="M420 80 L463 105 A50 50 0 0 1 377 105 Z" fill="#FFFFFF" opacity="0.6"/>
    <path d="M420 80 L377 105 A50 50 0 0 1 420 30 Z" fill="#FFFFFF" opacity="0.4"/>
    <!-- 제습기 -->
    <rect x="560" y="40" width="92" height="120" rx="14" fill="#FFFFFF"/>
    <rect x="578" y="60" width="56" height="40" rx="6" fill="#C85D1C"/>
    <circle cx="606" cy="128" r="14" fill="#FFD23F"/>
  </g>

  <text x="1000" y="1040" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#FFF3E8" opacity="0.9" text-anchor="end">blog.naver.com/trip_chocho</text>
</svg>