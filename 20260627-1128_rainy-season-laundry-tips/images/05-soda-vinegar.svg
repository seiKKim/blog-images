<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#FFF3E8"/>
  <rect width="1080" height="180" fill="#E8722C"/>
  <rect x="60" y="56" rx="26" ry="26" width="172" height="60" fill="#FFD23F"/>
  <text x="146" y="98" font-family="Malgun Gothic" font-weight="bold" font-size="32" fill="#2A2118" text-anchor="middle">생활꿀팁</text>
  <text x="252" y="120" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#FFFFFF">순서를 나눠서!</text>

  <!-- STEP 1 -->
  <rect x="50" y="230" width="430" height="290" rx="20" fill="#FFFFFF" stroke="#E8722C" stroke-width="6"/>
  <circle cx="110" cy="290" r="34" fill="#E8722C"/>
  <text x="110" y="303" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="170" y="303" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#2A2118">세탁 전 불림</text>
  <text x="90" y="375" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#C85D1C">과탄산소다</text>
  <text x="90" y="440" font-family="Malgun Gothic" font-size="34" fill="#2A2118">A. 30분 이상 불림</text>
  <text x="90" y="488" font-family="Malgun Gothic" font-size="34" fill="#2A2118">B. 물 5L에 1작은술·하루</text>

  <!-- 화살표 -->
  <polygon points="500,360 560,405 500,450" fill="#C85D1C"/>

  <!-- STEP 2 -->
  <rect x="600" y="230" width="430" height="290" rx="20" fill="#FFFFFF" stroke="#E8722C" stroke-width="6"/>
  <circle cx="660" cy="290" r="34" fill="#E8722C"/>
  <text x="660" y="303" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="720" y="303" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#2A2118">마지막 헹굼</text>
  <text x="640" y="375" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#C85D1C">식초</text>
  <text x="640" y="440" font-family="Malgun Gothic" font-size="34" fill="#2A2118">1~2스푼(소량)</text>
  <text x="640" y="488" font-family="Malgun Gothic" font-size="34" fill="#2A2118">냄새 중화·살균</text>

  <!-- 경고 -->
  <rect x="50" y="560" width="980" height="110" rx="18" fill="#E23B3B"/>
  <text x="540" y="628" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#FFFFFF" text-anchor="middle">⚠ 과탄산소다 + 식초 동시 사용 금지</text>
</svg>