<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FFF6EE"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <text x="60" y="125" font-family="Noto Sans CJK KR" font-weight="bold" font-size="60" fill="#ffffff">초파리, 왜 꼬일까요?</text>

  <g font-family="Noto Sans CJK KR">
    <rect x="60" y="270" width="960" height="150" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="340" font-size="44" font-weight="bold" fill="#1a1a1a">발생 원인</text>
    <text x="100" y="395" font-size="38" fill="#5B4636">익은 과일·음식물 쓰레기 등 발효 유기물</text>

    <rect x="60" y="440" width="960" height="150" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="510" font-size="44" font-weight="bold" fill="#1a1a1a">유인 요소</text>
    <text x="100" y="565" font-size="38" fill="#5B4636">당분 · 시큼한 발효(초산) 냄새 · 습한 환경</text>

    <rect x="60" y="610" width="960" height="150" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="680" font-size="44" font-weight="bold" fill="#1a1a1a">번식 속도</text>
    <text x="100" y="735" font-size="38" fill="#5B4636">한 번에 수백 개 산란 · 약 열흘이면 성충</text>

    <rect x="60" y="780" width="960" height="150" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="850" font-size="44" font-weight="bold" fill="#1a1a1a">알 낳는 곳</text>
    <text x="100" y="905" font-size="38" fill="#5B4636">배수구 · 음식물통 바닥 · 과일 바구니 주변</text>
  </g>

  <rect x="60" y="980" width="960" height="230" rx="20" fill="#E8722C"/>
  <text x="540" y="1070" font-family="Noto Sans CJK KR" font-size="46" font-weight="bold" fill="#ffffff" text-anchor="middle">성충만 잡으면 끝이 안 납니다.</text>
  <text x="540" y="1140" font-family="Noto Sans CJK KR" font-size="46" font-weight="bold" fill="#FFD23F" text-anchor="middle">알 낳을 환경을 없애는 게 핵심!</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#F3E2D4"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="32" fill="#8A6A52">출처: 위키트리·식자재왕몰 등 (2026)</text>
</svg>
