<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FFF6EE"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <text x="60" y="125" font-family="Noto Sans CJK KR" font-weight="bold" font-size="56" fill="#ffffff">3단계 · 사과식초 트랩</text>

  <g font-family="Noto Sans CJK KR">
    <rect x="60" y="270" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="345" font-size="42" font-weight="bold" fill="#1a1a1a">① 종이컵에 사과식초 조금 붓기</text>

    <rect x="60" y="410" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="485" font-size="42" font-weight="bold" fill="#1a1a1a">② 주방세제 2~3방울 떨어뜨려 섞기</text>

    <rect x="60" y="550" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0C9A8"/>
    <text x="100" y="625" font-size="42" fill="#1a1a1a">③ (선택) 랩 덮고 1mm 구멍 송송</text>
  </g>

  <text x="60" y="780" font-family="Noto Sans CJK KR" font-size="46" font-weight="bold" fill="#1a1a1a">작동 원리</text>
  <rect x="60" y="810" width="960" height="200" rx="20" fill="#E8722C"/>
  <text x="540" y="890" font-family="Noto Sans CJK KR" font-size="44" font-weight="bold" fill="#FFD23F" text-anchor="middle">식초 향으로 유인</text>
  <text x="540" y="960" font-family="Noto Sans CJK KR" font-size="44" font-weight="bold" fill="#ffffff" text-anchor="middle">→ 세제가 표면장력 낮춰 침몰</text>

  <rect x="60" y="1040" width="960" height="170" rx="20" fill="#FFF1CC"/>
  <text x="540" y="1115" font-family="Noto Sans CJK KR" font-size="40" font-weight="bold" fill="#9A6A1A" text-anchor="middle">트랩은 보조 수단!</text>
  <text x="540" y="1170" font-family="Noto Sans CJK KR" font-size="36" fill="#7A5A2A" text-anchor="middle">과일·음식물·배수구 정리를 함께</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#F3E2D4"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="32" fill="#8A6A52">출처: 푸드레시피·식자재왕몰 (2026)</text>
</svg>
