<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FFF6EE"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <text x="60" y="125" font-family="Noto Sans CJK KR" font-weight="bold" font-size="58" fill="#ffffff">4단계 · 배수구 관리</text>

  <text x="60" y="290" font-family="Noto Sans CJK KR" font-size="40" fill="#5B4636">계속 생긴다면 범인은 배수구 슬라임!</text>

  <g font-family="Noto Sans CJK KR">
    <circle cx="130" cy="400" r="46" fill="#E8722C"/>
    <text x="130" y="418" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
    <text x="210" y="415" font-size="44" font-weight="bold" fill="#1a1a1a">거름망·덮개 분리</text>

    <circle cx="130" cy="540" r="46" fill="#E8722C"/>
    <text x="130" y="558" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
    <text x="210" y="555" font-size="44" font-weight="bold" fill="#1a1a1a">끈적한 슬라임 닦기</text>

    <circle cx="130" cy="680" r="46" fill="#E8722C"/>
    <text x="130" y="698" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
    <text x="210" y="695" font-size="44" font-weight="bold" fill="#1a1a1a">끓는 물 부어 소독</text>

    <circle cx="130" cy="820" r="46" fill="#E8722C"/>
    <text x="130" y="838" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
    <text x="210" y="835" font-size="44" font-weight="bold" fill="#1a1a1a">락스 소독 주 1~2회</text>
  </g>

  <rect x="60" y="910" width="960" height="190" rx="20" fill="#FFF1CC"/>
  <text x="100" y="980" font-family="Noto Sans CJK KR" font-size="38" font-weight="bold" fill="#9A6A1A">⚠ 락스+식초(산성)는 절대 금지</text>
  <text x="100" y="1040" font-family="Noto Sans CJK KR" font-size="34" fill="#7A5A2A">유독가스 발생 위험 · 환기하며 하나씩만</text>

  <rect x="60" y="1120" width="960" height="100" rx="16" fill="#E8722C"/>
  <text x="540" y="1185" font-family="Noto Sans CJK KR" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">싱크대: 베이킹소다→과산화수소(3%)도 OK</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#F3E2D4"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="32" fill="#8A6A52">출처: 아던트뉴스·care1 (2026)</text>
</svg>
