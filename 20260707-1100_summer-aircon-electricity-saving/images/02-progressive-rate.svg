<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FBF4EE"/>
  <rect width="1080" height="210" fill="#E8722C"/>
  <text x="60" y="105" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">2026 주택용 누진 단가</text>
  <text x="60" y="170" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#FFE9D6">저압 · 전력량요금(원/kWh)</text>

  <!-- 1단계 -->
  <text x="60" y="360" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#333333">1단계</text>
  <text x="60" y="410" font-family="Malgun Gothic" font-size="34" fill="#777777">200kWh 이하</text>
  <rect x="330" y="320" width="234" height="90" rx="12" fill="#F4B183"/>
  <text x="600" y="382" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#E8722C">120.0원</text>

  <!-- 2단계 -->
  <text x="60" y="560" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#333333">2단계</text>
  <text x="60" y="610" font-family="Malgun Gothic" font-size="34" fill="#777777">201~400kWh</text>
  <rect x="330" y="520" width="418" height="90" rx="12" fill="#ED8B4E"/>
  <text x="784" y="582" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#E8722C">214.6원</text>

  <!-- 3단계 -->
  <text x="60" y="760" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#333333">3단계</text>
  <text x="60" y="810" font-family="Malgun Gothic" font-size="34" fill="#777777">400kWh 초과</text>
  <rect x="330" y="720" width="600" height="90" rx="12" fill="#E8722C"/>
  <text x="965" y="782" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#C25317" text-anchor="end">307.3원</text>

  <!-- 여름 완화 박스 -->
  <rect x="60" y="900" width="960" height="290" rx="20" fill="#ffffff" stroke="#F0C9AE" stroke-width="2"/>
  <text x="100" y="975" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#E8722C">☀ 7~8월 하계 누진 완화</text>
  <text x="100" y="1045" font-family="Malgun Gothic" font-size="40" fill="#333333">· 1단계 상한 200 → 300kWh 확대</text>
  <text x="100" y="1105" font-family="Malgun Gothic" font-size="40" fill="#333333">· 2단계 상한 400 → 450kWh 확대</text>
  <text x="100" y="1165" font-family="Malgun Gothic" font-size="38" fill="#777777">단가 인하가 아닌 구간 확대 방식</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#F0E2D6"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#8A6A52">기본요금·기후환경·연료비조정·부가세 별도 · 조건에 따라 상이</text>
</svg>
