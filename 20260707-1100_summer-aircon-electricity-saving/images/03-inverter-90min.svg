<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FBF4EE"/>
  <rect width="1080" height="210" fill="#E8722C"/>
  <text x="60" y="105" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">인버터 에어컨, 외출 기준</text>
  <text x="60" y="170" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#FFE9D6">껐다 켜기 vs 계속 켜두기</text>

  <!-- 30분 -->
  <rect x="60" y="290" width="960" height="150" rx="18" fill="#ffffff" stroke="#F0C9AE" stroke-width="2"/>
  <text x="100" y="360" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#333333">30분 외출</text>
  <text x="100" y="415" font-family="Malgun Gothic" font-size="36" fill="#777777">껐다 켜면 재가동 전력 소모</text>
  <text x="980" y="392" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#ED8B4E" text-anchor="end">+5%</text>

  <!-- 60분 -->
  <rect x="60" y="470" width="960" height="150" rx="18" fill="#ffffff" stroke="#F0C9AE" stroke-width="2"/>
  <text x="100" y="540" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#333333">60분 외출</text>
  <text x="100" y="595" font-family="Malgun Gothic" font-size="36" fill="#777777">아직은 켜두는 편이 유리</text>
  <text x="980" y="572" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#ED8B4E" text-anchor="end">+2%</text>

  <!-- 90분 -->
  <rect x="60" y="650" width="960" height="170" rx="18" fill="#E8722C"/>
  <text x="100" y="720" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#ffffff">90분 초과 외출</text>
  <text x="100" y="778" font-family="Malgun Gothic" font-size="38" fill="#FFE9D6">이때부터는 끄고 나가기</text>
  <text x="980" y="748" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#FFD23F" text-anchor="end">끄기 ↓</text>

  <!-- 정리 박스 -->
  <rect x="60" y="880" width="960" height="310" rx="20" fill="#ffffff" stroke="#F0C9AE" stroke-width="2"/>
  <text x="100" y="955" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#E8722C">한 줄 정리</text>
  <text x="100" y="1030" font-family="Malgun Gothic" font-size="42" fill="#333333">· 인버터형 → 90분 이내는 켜두기</text>
  <text x="100" y="1092" font-family="Malgun Gothic" font-size="42" fill="#333333">· 반나절 외출 → 끄고 나가기</text>
  <text x="100" y="1154" font-family="Malgun Gothic" font-size="42" fill="#333333">· 정속형(구형) → 껐다 켜기 유리</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#F0E2D6"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#8A6A52">삼성전자 실험 기준 · 기기·환경에 따라 차이 있음</text>
</svg>
