<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FBF2F4"/>
  <rect width="1080" height="200" fill="#E0556E"/>
  <text x="60" y="100" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">2026 삼복 일정</text>
  <text x="60" y="160" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="38" fill="#FFD23F">초복부터 말복까지 한눈에</text>

  <!-- 날짜 카드 3개 -->
  <g font-family="'Noto Sans KR','Malgun Gothic',sans-serif">
    <rect x="60" y="270" width="290" height="300" rx="22" fill="#ffffff" stroke="#EBCBD3"/>
    <rect x="60" y="270" width="290" height="84" rx="22" fill="#E0556E"/>
    <rect x="60" y="320" width="290" height="34" fill="#E0556E"/>
    <text x="205" y="328" font-weight="bold" font-size="44" fill="#ffffff" text-anchor="middle">초복</text>
    <text x="205" y="450" font-weight="bold" font-size="70" fill="#1a1a1a" text-anchor="middle">7/15</text>
    <text x="205" y="520" font-weight="bold" font-size="40" fill="#C9405B" text-anchor="middle">수요일</text>

    <rect x="395" y="270" width="290" height="300" rx="22" fill="#ffffff" stroke="#EBCBD3"/>
    <rect x="395" y="270" width="290" height="84" rx="22" fill="#E0556E"/>
    <rect x="395" y="320" width="290" height="34" fill="#E0556E"/>
    <text x="540" y="328" font-weight="bold" font-size="44" fill="#ffffff" text-anchor="middle">중복</text>
    <text x="540" y="450" font-weight="bold" font-size="70" fill="#1a1a1a" text-anchor="middle">7/25</text>
    <text x="540" y="520" font-weight="bold" font-size="40" fill="#C9405B" text-anchor="middle">토요일</text>

    <rect x="730" y="270" width="290" height="300" rx="22" fill="#ffffff" stroke="#EBCBD3"/>
    <rect x="730" y="270" width="290" height="84" rx="22" fill="#E0556E"/>
    <rect x="730" y="320" width="290" height="34" fill="#E0556E"/>
    <text x="875" y="328" font-weight="bold" font-size="44" fill="#ffffff" text-anchor="middle">말복</text>
    <text x="875" y="450" font-weight="bold" font-size="70" fill="#1a1a1a" text-anchor="middle">8/14</text>
    <text x="875" y="520" font-weight="bold" font-size="40" fill="#C9405B" text-anchor="middle">금요일</text>
  </g>

  <!-- 간격 타임라인 -->
  <g font-family="'Noto Sans KR','Malgun Gothic',sans-serif">
    <line x1="120" y1="700" x2="960" y2="700" stroke="#E0556E" stroke-width="8"/>
    <circle cx="160" cy="700" r="22" fill="#E0556E"/>
    <circle cx="540" cy="700" r="22" fill="#E0556E"/>
    <circle cx="920" cy="700" r="22" fill="#E0556E"/>
    <text x="160" y="668" font-weight="bold" font-size="32" fill="#1a1a1a" text-anchor="middle">초복</text>
    <text x="540" y="668" font-weight="bold" font-size="32" fill="#1a1a1a" text-anchor="middle">중복</text>
    <text x="920" y="668" font-weight="bold" font-size="32" fill="#1a1a1a" text-anchor="middle">말복</text>
    <text x="350" y="760" font-weight="bold" font-size="34" fill="#5B6B7C" text-anchor="middle">10일</text>
    <text x="730" y="760" font-weight="bold" font-size="34" fill="#C9405B" text-anchor="middle">20일 (월복)</text>
  </g>

  <!-- 삼복 31일 강조 박스 -->
  <rect x="60" y="830" width="960" height="240" rx="24" fill="#E0556E"/>
  <text x="540" y="920" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="44" fill="#FFE9EE" text-anchor="middle">2026 삼복 기간 (7/15 ~ 8/14)</text>
  <text x="540" y="1020" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="92" fill="#FFD23F" text-anchor="middle">무려 31일</text>

  <!-- 설명 -->
  <text x="60" y="1160" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="38" fill="#1a1a1a">올해는 중복·말복 사이가 20일로 길어지는</text>
  <text x="60" y="1215" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="38" fill="#1a1a1a">'월복(越伏)' 해 → 삼복더위가 더 길게 이어져요</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#EFD9DF"/>
  <text x="60" y="1322" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="32" fill="#7A5560">절기 기준: 하지 6/21 · 입추 8/7 (한국천문연구원 기준 역산)</text>
</svg>
