<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FBF2F4"/>
  <rect width="1080" height="200" fill="#E0556E"/>
  <text x="60" y="100" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">보양식 열량 비교</text>
  <text x="60" y="160" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="38" fill="#FFD23F">콩국수 vs 삼계탕, 얼마나 차이날까?</text>

  <!-- 막대그래프: 기준선 x=420, 최대 1551 -> 560px 폭 (1px≈0.36kcal) -->
  <g font-family="'Noto Sans KR','Malgun Gothic',sans-serif">
    <!-- 장어양념구이 1551 -->
    <text x="390" y="375" font-weight="bold" font-size="40" fill="#1a1a1a" text-anchor="end">장어양념구이</text>
    <rect x="420" y="330" width="560" height="72" rx="10" fill="#E0556E"/>
    <text x="950" y="378" font-weight="bold" font-size="38" fill="#ffffff" text-anchor="end">약 1,551 kcal</text>

    <!-- 삼계탕 900~1000대 (대표 950 -> 343px) -->
    <text x="390" y="500" font-weight="bold" font-size="40" fill="#1a1a1a" text-anchor="end">삼계탕</text>
    <rect x="420" y="455" width="343" height="72" rx="10" fill="#E0556E"/>
    <text x="1010" y="503" font-weight="bold" font-size="34" fill="#C9405B" text-anchor="end">약 900~1,000kcal</text>

    <!-- 갈비탕 750 -> 271px -->
    <text x="390" y="625" font-weight="bold" font-size="40" fill="#1a1a1a" text-anchor="end">갈비탕</text>
    <rect x="420" y="580" width="271" height="72" rx="10" fill="#EE8AA0"/>
    <text x="711" y="628" font-weight="bold" font-size="36" fill="#C9405B" text-anchor="start">약 750 kcal</text>

    <!-- 추어탕 555 -> 200px -->
    <text x="390" y="750" font-weight="bold" font-size="40" fill="#1a1a1a" text-anchor="end">추어탕</text>
    <rect x="420" y="705" width="200" height="72" rx="10" fill="#EE8AA0"/>
    <text x="640" y="753" font-weight="bold" font-size="36" fill="#C9405B" text-anchor="start">약 555 kcal</text>

    <!-- 콩국수 약 500 -> 180px (채식 그린) -->
    <text x="390" y="875" font-weight="bold" font-size="40" fill="#2E8B57" text-anchor="end">콩국수</text>
    <rect x="420" y="830" width="180" height="72" rx="10" fill="#5BA86E"/>
    <text x="620" y="878" font-weight="bold" font-size="36" fill="#2E8B57" text-anchor="start">약 500 kcal</text>
  </g>

  <line x1="420" y1="310" x2="420" y2="920" stroke="#C9A9B1" stroke-width="3"/>

  <!-- 포인트 박스 -->
  <rect x="60" y="980" width="960" height="190" rx="24" fill="#2E8B57"/>
  <text x="90" y="1055" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="42" fill="#ffffff">콩국수는 약 500kcal로 한결 가벼운 편</text>
  <text x="90" y="1120" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#D8F0DC">체중 관리가 필요하거나 어르신께 좋은 대안</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#EFD9DF"/>
  <text x="60" y="1322" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="32" fill="#7A5560">삼계탕은 자료에 따라 약 930~1,001kcal로 폭이 있어요</text>
</svg>
