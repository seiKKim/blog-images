<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FBF2F4"/>
  <rect width="1080" height="200" fill="#E0556E"/>
  <text x="60" y="100" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">복날의 뜻</text>
  <text x="60" y="160" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="38" fill="#FFD23F">'伏'은 엎드리다·감추다</text>

  <!-- 伏 한자 카드 -->
  <rect x="60" y="270" width="960" height="320" rx="24" fill="#ffffff" stroke="#EBCBD3"/>
  <circle cx="240" cy="430" r="120" fill="#FFE9EE"/>
  <text x="240" y="478" font-family="'Noto Sans KR','Malgun Gothic',serif" font-weight="bold"
        font-size="150" fill="#E0556E" text-anchor="middle">伏</text>
  <text x="430" y="390" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="46" fill="#1a1a1a">복(伏) = "엎드리다, 감추다"</text>
  <text x="430" y="460" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#5B6B7C">서늘한 금(金) 기운이 여름의 강한</text>
  <text x="430" y="510" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#5B6B7C">더운 기운(火)에 눌려 엎드린다는</text>
  <text x="430" y="560" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#5B6B7C">데서 비롯됐다고 전해집니다.</text>

  <!-- 초중말복 명칭 -->
  <g font-family="'Noto Sans KR','Malgun Gothic',sans-serif">
    <rect x="60" y="640" width="960" height="120" rx="18" fill="#ffffff" stroke="#EBCBD3"/>
    <text x="100" y="716" font-weight="bold" font-size="46" fill="#E0556E">초복 (初伏)</text>
    <text x="1000" y="716" font-weight="bold" font-size="44" fill="#1a1a1a" text-anchor="end">더위의 시작</text>

    <rect x="60" y="780" width="960" height="120" rx="18" fill="#ffffff" stroke="#EBCBD3"/>
    <text x="100" y="856" font-weight="bold" font-size="46" fill="#E0556E">중복 (中伏)</text>
    <text x="1000" y="856" font-weight="bold" font-size="44" fill="#1a1a1a" text-anchor="end">더위의 한가운데</text>

    <rect x="60" y="920" width="960" height="120" rx="18" fill="#ffffff" stroke="#EBCBD3"/>
    <text x="100" y="996" font-weight="bold" font-size="46" fill="#E0556E">말복 (末伏)</text>
    <text x="1000" y="996" font-weight="bold" font-size="44" fill="#1a1a1a" text-anchor="end">더위의 끝</text>
  </g>

  <!-- 복달임 메모 -->
  <rect x="60" y="1080" width="960" height="150" rx="20" fill="#FFD23F"/>
  <text x="90" y="1150" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="40" fill="#1a1a1a">복달임 — 더위를 이기려 몸을 보(補)하는</text>
  <text x="90" y="1200" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="40" fill="#1a1a1a">음식을 챙겨 먹는 풍습</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#EFD9DF"/>
  <text x="60" y="1322" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="32" fill="#7A5560">삼복 풍습은 중국 진(秦)나라 때부터 전해진다고 합니다</text>
</svg>
