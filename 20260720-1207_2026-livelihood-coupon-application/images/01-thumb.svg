  <text x="80" y="372" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#E8EEF5">안 쓰면 국고 환수</text>

  <!-- 메인 카피 (마감일) -->
  <text x="80" y="560" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
