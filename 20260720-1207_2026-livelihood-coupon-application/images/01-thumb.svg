<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#2B2F36"/>
  <!-- 장식 도형 -->
  <circle cx="960" cy="170" r="270" fill="#ffffff" opacity="0.05"/>
  <circle cx="110" cy="990" r="210" fill="#E23B3B" opacity="0.10"/>

  <!-- 카테고리 뱃지 (좌상단) -->
  <rect x="80" y="88" rx="34" ry="34" width="230" height="68" fill="#E23B3B"/>
  <text x="195" y="134" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#ffffff" text-anchor="middle">오늘의 이슈</text>

  <!-- 서브 카피 -->
  <text x="80" y="300" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
