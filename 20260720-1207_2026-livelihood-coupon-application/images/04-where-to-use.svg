<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="220" fill="#2B2F36"/>
  <rect x="60" y="70" rx="26" ry="26" width="200" height="56" fill="#E23B3B"/>
  <text x="160" y="108" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="30" fill="#ffffff" text-anchor="middle">오늘의 이슈</text>
  <text x="60" y="185" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">쓸 수 있는 곳 vs 안 되는 곳</text>

  <!-- O 박스 -->
  <rect x="60" y="290" width="960" height="440" rx="24" fill="#ffffff" stroke="#1F8A53" stroke-width="4"/>
  <circle cx="130" cy="360" r="34" fill="#1F8A53"/>
  <text x="130" y="376" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff" text-anchor="middle">O</text>
  <text x="190" y="378" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="48" fill="#1F8A53">동네 소상공인 매장</text>
  <text x="100" y="460" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="42" fill="#2B2F36">· 연 매출 30억원 이하 소상공인 매장</text>
  <text x="100" y="524" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="42" fill="#2B2F36">· 편의점 · 식당 · 카페 · 전통시장</text>
  <text x="100" y="588" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="42" fill="#2B2F36">· 미용실 · 학원 · 병원 · 약국 · 주유소</text>
  <text x="100" y="666" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#5B6B7C">※ 원칙적으로 주소지 지자체 관내 · 업종별 상이</text>

  <!-- X 박스 -->
  <rect x="60" y="760" width="960" height="400" rx="24" fill="#ffffff" stroke="#E23B3B" stroke-width="4"/>
  <circle cx="130" cy="830" r="34" fill="#E23B3B"/>
  <text x="130" y="846" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff" text-anchor="middle">X</text>
  <text x="190" y="848" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="48" fill="#E23B3B">대형 · 온라인</text>
  <text x="100" y="930" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="42" fill="#2B2F36">· 대형마트 · SSM · 백화점 · 면세점</text>
  <text x="100" y="994" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="42" fill="#2B2F36">· 온라인 쇼핑몰 · 배달앱 선결제</text>
  <text x="100" y="1058" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="42" fill="#2B2F36">· 유흥·사행·상품권·귀금속</text>
  <text x="100" y="1122" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="42" fill="#2B2F36">· 세금·공공요금·보험·통신 자동이체</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">※ 배달은 '만나서 결제'(단말기 직접 결제) 시 사용 가능</text>
</svg>
