<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <!-- 상단 색띠 + 제목 -->
  <rect width="1080" height="220" fill="#2B2F36"/>
  <rect x="60" y="70" rx="26" ry="26" width="200" height="56" fill="#E23B3B"/>
  <text x="160" y="108" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="30" fill="#ffffff" text-anchor="middle">오늘의 이슈</text>
  <text x="60" y="185" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">아직 안 쓴 잔액이 이만큼</text>

  <text x="60" y="320" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="44" fill="#2B2F36">지역별 사용률 (표본)</text>

  <!-- 제주 카드 -->
  <rect x="60" y="370" width="960" height="230" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="100" y="450" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="50" fill="#2B2F36">제주</text>
  <text x="100" y="502" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">7월 8일 기준</text>
  <text x="980" y="470" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="76" fill="#E23B3B" text-anchor="end">72.5%</text>
  <!-- 게이지 -->
  <rect x="100" y="540" width="880" height="30" rx="15" fill="#E8EEF5"/>
  <rect x="100" y="540" width="638" height="30" rx="15" fill="#E23B3B"/>

  <!-- 경기 카드 -->
  <rect x="60" y="640" width="960" height="230" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="100" y="720" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="50" fill="#2B2F36">경기</text>
  <text x="100" y="772" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">7월 3일 기준</text>
  <text x="980" y="740" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="76" fill="#2B2F36" text-anchor="end">88.6%</text>
  <rect x="100" y="810" width="880" height="30" rx="15" fill="#E8EEF5"/>
  <rect x="100" y="810" width="780" height="30" rx="15" fill="#2B2F36"/>

  <!-- 강조 문구 -->
  <rect x="60" y="920" width="960" height="240" rx="20" fill="#2B2F36"/>
  <text x="540" y="1010" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="48" fill="#ffffff" text-anchor="middle">전국적으로 아직 안 쓴 잔액</text>
  <text x="540" y="1090" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="62" fill="#FFD23F" text-anchor="middle">수천억 원대 추정</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">※ 본문 표본 수치 기준 · 지역·시점에 따라 다름</text>
</svg>
