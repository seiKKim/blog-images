<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" font-family="Noto Sans CJK KR">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#2B2F36"/>
  <text x="60" y="108" font-weight="bold" font-size="54" fill="#fff">살모넬라 교차오염 예방</text>
  <text x="60" y="160" font-size="30" fill="#E8EEF5">달걀 취급 후 손 씻기 + 조리도구 구분이 핵심</text>
  <rect x="60" y="270" width="960" height="210" rx="18" fill="#fff" stroke="#D6E0EC"/><circle cx="135" cy="375" r="52" fill="#E23B3B"/><text x="135" y="391" font-size="46" font-weight="bold" fill="#fff" text-anchor="middle">01</text><text x="225" y="346" font-size="40" font-weight="bold" fill="#1a1a1a">생달걀 취급 후 비누로 손 씻기</text><text x="225" y="410" font-size="28" fill="#5B6B7C">달걀을 만진 손으로 다른 식재료·기구를 만지면 교차오염</text><rect x="60" y="510" width="960" height="210" rx="18" fill="#fff" stroke="#D6E0EC"/><circle cx="135" cy="615" r="52" fill="#E23B3B"/><text x="135" y="631" font-size="46" font-weight="bold" fill="#fff" text-anchor="middle">02</text><text x="225" y="586" font-size="40" font-weight="bold" fill="#1a1a1a">칼·도마·집게·장갑 구분 사용</text><text x="225" y="650" font-size="28" fill="#5B6B7C">날음식용과 조리음식용을 따로 — 섞어 쓰지 않기</text><rect x="60" y="750" width="960" height="210" rx="18" fill="#fff" stroke="#D6E0EC"/><circle cx="135" cy="855" r="52" fill="#E23B3B"/><text x="135" y="871" font-size="46" font-weight="bold" fill="#fff" text-anchor="middle">03</text><text x="225" y="826" font-size="40" font-weight="bold" fill="#1a1a1a">달걀은 냉장 보관 · 식재료와 분리</text><text x="225" y="890" font-size="28" fill="#5B6B7C">껍질 깨지지 않은 제품 구입, 채소와 직접 닿지 않게</text><rect x="60" y="990" width="960" height="210" rx="18" fill="#fff" stroke="#D6E0EC"/><circle cx="135" cy="1095" r="52" fill="#E23B3B"/><text x="135" y="1111" font-size="46" font-weight="bold" fill="#fff" text-anchor="middle">04</text><text x="225" y="1066" font-size="40" font-weight="bold" fill="#1a1a1a">생달걀 식품 주의 (계란장·에그커피 등)</text><text x="225" y="1130" font-size="28" fill="#5B6B7C">37℃ 내외에서 증식 활발 — 고온다습한 여름 특히 위험</text>
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1320" font-size="28" fill="#5B6B7C">출처: 식품의약품안전처 살모넬라 예방 안내</text>
</svg>