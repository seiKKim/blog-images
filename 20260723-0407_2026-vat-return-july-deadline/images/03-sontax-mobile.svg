<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1F8A53"/>
  <text x="60" y="110" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">손택스(모바일)로 신고</text>
  <text x="60" y="165" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#E8EEF5">신고/납부 → 부가가치세 경로</text>

  <!-- 스마트폰 목업 -->
  <rect x="360" y="250" width="360" height="720" rx="46" fill="#243B2E"/>
  <rect x="378" y="272" width="324" height="676" rx="28" fill="#ffffff"/>
  <!-- 상단바 -->
  <rect x="378" y="272" width="324" height="70" rx="28" fill="#1F8A53"/>
  <rect x="378" y="310" width="324" height="32" fill="#1F8A53"/>
  <text x="540" y="317" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" font-weight="bold" fill="#ffffff" text-anchor="middle">손택스</text>

  <!-- 앱 메뉴 항목 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="402" y="380" width="276" height="86" rx="14" fill="#FFF3D0" stroke="#FFD23F" stroke-width="3"/>
    <text x="424" y="435" font-size="34" font-weight="bold" fill="#B5860B">신고/납부</text>
    <text x="656" y="435" font-size="34" font-weight="bold" fill="#E23B3B" text-anchor="end">▶</text>

    <rect x="402" y="486" width="276" height="86" rx="14" fill="#E7F4EC" stroke="#1F8A53" stroke-width="3"/>
    <text x="424" y="541" font-size="34" font-weight="bold" fill="#1F8A53">부가가치세</text>
    <text x="656" y="541" font-size="34" font-weight="bold" fill="#1F8A53" text-anchor="end">▶</text>

    <rect x="402" y="592" width="276" height="72" rx="14" fill="#F1F5F9"/>
    <text x="424" y="638" font-size="30" fill="#8A98A6">종합소득세</text>

    <rect x="402" y="684" width="276" height="72" rx="14" fill="#F1F5F9"/>
    <text x="424" y="730" font-size="30" fill="#8A98A6">현금영수증</text>

    <rect x="402" y="776" width="276" height="72" rx="14" fill="#F1F5F9"/>
    <text x="424" y="822" font-size="30" fill="#8A98A6">My홈택스</text>
  </g>
  <!-- 홈버튼 -->
  <circle cx="540" cy="908" r="22" fill="#E8EEF5"/>

  <!-- 우측 설명 카드들 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="60" y="1010" width="960" height="100" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="90" y="1058" font-size="34" font-weight="bold" fill="#1a1a1a">인증서 로그인 후 위 경로로 진입</text>
    <text x="90" y="1096" font-size="28" fill="#5B6B7C">무실적 등 간단한 신고에 편리</text>

    <rect x="60" y="1130" width="960" height="100" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="90" y="1178" font-size="34" font-weight="bold" fill="#1a1a1a">무실적 신고는 ARS 1544-9944도 가능</text>
    <text x="90" y="1216" font-size="28" fill="#5B6B7C">매출·매입 복잡하면 PC 홈택스 권장</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">※ 예시 화면 · 실제 메뉴는 손택스 앱에서 확인</text>
</svg>
