<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1F8A53"/>
  <text x="60" y="110" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">홈택스(PC) 신고 순서</text>
  <text x="60" y="165" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#E8EEF5">hometax.go.kr · 세무대리 없이 직접 신고</text>

  <!-- 브라우저 창 목업 -->
  <rect x="60" y="260" width="960" height="230" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="60" y="260" width="960" height="64" rx="18" fill="#EAF1F8"/>
  <circle cx="98" cy="292" r="9" fill="#E27C7C"/>
  <circle cx="128" cy="292" r="9" fill="#E7C56B"/>
  <circle cx="158" cy="292" r="9" fill="#7CC28A"/>
  <rect x="200" y="276" width="780" height="32" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
  <text x="224" y="299" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="26" fill="#5B6B7C">hometax.go.kr</text>
  <!-- 상단 메뉴바 -->
  <text x="100" y="410" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" font-weight="bold" fill="#3a3a3a">로그인</text>
  <rect x="470" y="378" width="330" height="60" rx="12" fill="#FFF3D0" stroke="#FFD23F" stroke-width="3"/>
  <text x="635" y="418" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" font-weight="bold" fill="#B5860B" text-anchor="middle">세금신고</text>
  <text x="470" y="418" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="40" font-weight="bold" fill="#E23B3B" text-anchor="end">▶</text>

  <!-- 단계 목록 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- step1 -->
    <circle cx="110" cy="590" r="34" fill="#1F8A53"/>
    <text x="110" y="604" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
    <text x="170" y="580" font-size="40" font-weight="bold" fill="#1a1a1a">로그인</text>
    <text x="170" y="628" font-size="30" fill="#5B6B7C">공동인증서 · 카카오/PASS/네이버 간편인증</text>

    <!-- step2 -->
    <circle cx="110" cy="740" r="34" fill="#1F8A53"/>
    <text x="110" y="754" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
    <text x="170" y="730" font-size="40" font-weight="bold" fill="#1a1a1a">세금신고 → 부가가치세 신고</text>
    <text x="170" y="778" font-size="30" fill="#5B6B7C">상단 메뉴에서 선택</text>

    <!-- step3 -->
    <circle cx="110" cy="890" r="34" fill="#1F8A53"/>
    <text x="110" y="904" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
    <text x="170" y="880" font-size="40" font-weight="bold" fill="#1a1a1a">부가가치세 과세신고 선택</text>
    <text x="170" y="928" font-size="30" fill="#5B6B7C">일반 · 간이 · 대리납부 중 해당 항목</text>

    <!-- step4 -->
    <circle cx="110" cy="1040" r="34" fill="#1F8A53"/>
    <text x="110" y="1054" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
    <text x="170" y="1030" font-size="40" font-weight="bold" fill="#1a1a1a">미리채움 확인 → 작성 → 제출</text>
    <text x="170" y="1078" font-size="30" fill="#5B6B7C">약 30종 자료 자동 채움</text>
  </g>

  <!-- 팁 박스 -->
  <rect x="60" y="1130" width="960" height="110" rx="16" fill="#E7F4EC" stroke="#B7E0C6"/>
  <text x="90" y="1180" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" font-weight="bold" fill="#1F8A53">💡 직접 전자신고 시 전자신고 세액공제 1만 원</text>
  <text x="90" y="1218" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="28" fill="#3a6b50">무실적이어도 무실적 신고는 반드시 해야 무신고를 피합니다</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">※ 예시 화면 · 정확한 메뉴는 홈택스(hometax.go.kr)에서 확인</text>
</svg>
