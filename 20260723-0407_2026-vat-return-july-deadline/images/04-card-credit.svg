<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="220" fill="#1F8A53"/>
  <text x="60" y="108" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">신용카드매출전표 등</text>
  <text x="60" y="176" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#FFD23F">발행세액공제</text>

  <!-- 표 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="60" y="290" width="960" height="130" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="356" font-size="42" font-weight="bold" fill="#1a1a1a">대상</text>
    <text x="1000" y="356" font-size="40" font-weight="bold" fill="#1F8A53" text-anchor="end">직전연도 매출</text>
    <text x="1000" y="404" font-size="40" font-weight="bold" fill="#1F8A53" text-anchor="end">10억 원 이하 개인사업자</text>

    <rect x="60" y="440" width="960" height="130" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="506" font-size="42" font-weight="bold" fill="#1a1a1a">공제 대상 금액</text>
    <text x="1000" y="506" font-size="40" font-weight="bold" fill="#1F8A53" text-anchor="end">카드·현금영수증 등</text>
    <text x="1000" y="554" font-size="36" fill="#5B6B7C" text-anchor="end">발급금액(VAT 포함)</text>

    <rect x="60" y="590" width="960" height="130" rx="16" fill="#ffffff" stroke="#1F8A53" stroke-width="3"/>
    <text x="100" y="672" font-size="42" font-weight="bold" fill="#1a1a1a">공제율</text>
    <text x="1000" y="672" font-size="64" font-weight="bold" fill="#E23B3B" text-anchor="end">1.3%</text>

    <rect x="60" y="740" width="960" height="130" rx="16" fill="#ffffff" stroke="#1F8A53" stroke-width="3"/>
    <text x="100" y="822" font-size="42" font-weight="bold" fill="#1a1a1a">한도</text>
    <text x="1000" y="822" font-size="52" font-weight="bold" fill="#E23B3B" text-anchor="end">연간 최대 1,000만 원</text>
  </g>

  <!-- 함께 챙길 공제 -->
  <text x="60" y="960" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="40" font-weight="bold" fill="#1a1a1a">함께 놓치기 쉬운 공제</text>

  <rect x="60" y="990" width="960" height="100" rx="16" fill="#E7F4EC" stroke="#B7E0C6"/>
  <text x="90" y="1038" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" font-weight="bold" fill="#1F8A53">전자세금계산서 발급세액공제</text>
  <text x="90" y="1074" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" fill="#3a6b50">발행 1건당 200원 · 연간 최대 100만 원</text>

  <rect x="60" y="1110" width="960" height="120" rx="16" fill="#E7F4EC" stroke="#B7E0C6"/>
  <text x="90" y="1158" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" font-weight="bold" fill="#1F8A53">의제매입세액공제</text>
  <text x="90" y="1196" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" fill="#3a6b50">면세 농·축·수산물 원재료 음식점 등</text>
  <text x="90" y="1226" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="27" fill="#5B6B7C">업종별 공제율·한도 상이 → 홈택스/세무사 확인</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">※ 개인 상황에 따라 다름 · 세부 수치는 국세청 최신 고시 확인</text>
</svg>
