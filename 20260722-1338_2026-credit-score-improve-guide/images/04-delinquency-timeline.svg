<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#243B6B"/>
  <text x="60" y="102" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">연체 기준과 기록 보존기간</text>
  <text x="60" y="162" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#FFD23F">소액·단기라도 절대 안심 금지</text>

  <!-- 3층위 카드 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 카드1 -->
    <rect x="60" y="260" width="960" height="200" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="60" y="260" width="18" height="200" rx="9" fill="#F2B705"/>
    <text x="104" y="326" font-size="40" font-weight="bold" fill="#1a1a1a">KCB 평가 반영 최소기준</text>
    <text x="104" y="392" font-size="60" font-weight="bold" fill="#243B6B">5영업일 이상 + 10만원 이상</text>
    <text x="104" y="440" font-size="30" fill="#5B6B7C">KCB가 상환이력 평가에 반영하기 시작하는 기준</text>

    <!-- 카드2 -->
    <rect x="60" y="490" width="960" height="200" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="60" y="490" width="18" height="200" rx="9" fill="#E8722C"/>
    <text x="104" y="556" font-size="40" font-weight="bold" fill="#1a1a1a">단기연체 (전 금융권 공유)</text>
    <text x="104" y="622" font-size="60" font-weight="bold" fill="#243B6B">30만원 이상 + 30일 이상</text>
    <text x="104" y="670" font-size="30" fill="#5B6B7C">신용정보가 전 금융권에 공유되는 기준</text>

    <!-- 카드3 -->
    <rect x="60" y="720" width="960" height="200" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="60" y="720" width="18" height="200" rx="9" fill="#E23B3B"/>
    <text x="104" y="786" font-size="40" font-weight="bold" fill="#1a1a1a">장기연체</text>
    <text x="104" y="852" font-size="60" font-weight="bold" fill="#243B6B">100만원 이상 + 90일 이상</text>
    <text x="104" y="900" font-size="30" fill="#5B6B7C">장기연체로 분류 (NICE 기준 인용)</text>
  </g>

  <!-- 기록 보존 -->
  <rect x="60" y="950" width="960" height="240" rx="18" fill="#243B6B"/>
  <text x="90" y="1018" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#ffffff">완납해도 기록은 남습니다</text>
  <text x="90" y="1088" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#FFD23F">단기연체 최장 3년 · 장기연체 최장 5년</text>
  <text x="90" y="1148" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="32" fill="#E8EEF5">신용카드 연체는 5영업일만 지나도 평가사·은행연합회에 전달</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#243B6B"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#E8EEF5">출처: NICE·KCB 기준 및 관련 보도 인용</text>
</svg>
