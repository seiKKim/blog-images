<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#243B6B"/>
  <text x="60" y="102" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">비금융 성실납부, 어디서 제출?</text>
  <text x="60" y="162" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#FFD23F">앱으로 제출하면 가점 요인 (상승폭 개인차·상한)</text>

  <!-- 채널 카드들 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="60" y="270" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="60" y="270" width="14" height="150" rx="7" fill="#243B6B"/>
    <text x="104" y="332" font-size="42" font-weight="bold" fill="#1a1a1a">네이버페이 '신용관리'</text>
    <text x="104" y="388" font-size="32" fill="#5B6B7C">국세청·국민연금·건강보험·통신사 4개 기관 → NICE 반영</text>

    <rect x="60" y="446" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="60" y="446" width="14" height="150" rx="7" fill="#243B6B"/>
    <text x="104" y="508" font-size="42" font-weight="bold" fill="#1a1a1a">카카오뱅크 '신용점수 올리기'</text>
    <text x="104" y="564" font-size="32" fill="#5B6B7C">건강보험·세금 납부 내역을 신용평가사로 실시간 전달</text>

    <rect x="60" y="622" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="60" y="622" width="14" height="150" rx="7" fill="#243B6B"/>
    <text x="104" y="684" font-size="42" font-weight="bold" fill="#1a1a1a">NICE지키미 / 올크레딧 홈페이지</text>
    <text x="104" y="740" font-size="32" fill="#5B6B7C">비금융정보·마이데이터 직접 등록 (KCB 약 5분 내 등록 안내)</text>

    <rect x="60" y="798" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="60" y="798" width="14" height="150" rx="7" fill="#243B6B"/>
    <text x="104" y="860" font-size="42" font-weight="bold" fill="#1a1a1a">토스 · 뱅크샐러드</text>
    <text x="104" y="916" font-size="32" fill="#5B6B7C">유사한 비금융정보 제출 기능 제공</text>
  </g>

  <!-- 포인트 박스 -->
  <rect x="60" y="1000" width="960" height="190" rx="18" fill="#E8EEF5"/>
  <text x="90" y="1066" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#243B6B">금액 크기보다 '매달 연체 없이 성실히'가 핵심</text>
  <text x="90" y="1122" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="34" fill="#5B6B7C">금융이력이 얇은 사회초년생·주부·프리랜서에게 특히 효과</text>
  <text x="90" y="1168" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="30" fill="#8494A6">※ "최대 20점"·"평균 30~50점"은 매체 인용값, 공식 확정 수치 아님</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#243B6B"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#E8EEF5">출처: 각 앱 서비스 안내·NICE/KCB 공시</text>
</svg>
