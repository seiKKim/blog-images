<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#FBF4EC"/>
  <!-- 상단 색띠 + 제목 -->
  <rect width="1080" height="150" fill="#E8722C"/>
  <text x="60" y="95" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">실외기는 그늘·차광이 기본</text>

  <!-- 태양 -->
  <circle cx="220" cy="290" r="60" fill="#FFD23F"/>
  <g stroke="#FFD23F" stroke-width="10" stroke-linecap="round">
    <line x1="220" y1="195" x2="220" y2="215"/>
    <line x1="150" y1="240" x2="165" y2="252"/>
    <line x1="290" y1="240" x2="275" y2="252"/>
    <line x1="140" y1="300" x2="160" y2="300"/>
  </g>
  <!-- 차단되는 햇살 (점선) -->
  <g stroke="#F0B060" stroke-width="6" stroke-dasharray="14 12" stroke-linecap="round">
    <line x1="300" y1="330" x2="470" y2="410"/>
    <line x1="330" y1="300" x2="520" y2="380"/>
  </g>

  <!-- 차광막 -->
  <rect x="470" y="360" width="380" height="24" rx="8" fill="#8AA0B4"/>
  <rect x="470" y="360" width="380" height="24" rx="8" fill="#8AA0B4"/>
  <line x1="500" y1="384" x2="500" y2="430" stroke="#8AA0B4" stroke-width="10"/>
  <line x1="820" y1="384" x2="820" y2="430" stroke="#8AA0B4" stroke-width="10"/>
  <text x="660" y="348" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="34" fill="#5B6B7C" text-anchor="middle">차광막 (은박 돗자리 등)</text>

  <!-- 실외기 -->
  <rect x="510" y="440" width="330" height="200" rx="14" fill="#ffffff" stroke="#C9CED6" stroke-width="4"/>
  <circle cx="675" cy="540" r="72" fill="none" stroke="#B7C0CB" stroke-width="10"/>
  <g stroke="#B7C0CB" stroke-width="10" stroke-linecap="round">
    <line x1="675" y1="490" x2="705" y2="560"/>
    <line x1="720" y1="530" x2="650" y2="560"/>
    <line x1="700" y1="580" x2="650" y2="520"/>
  </g>
  <rect x="530" y="470" width="70" height="18" rx="6" fill="#E0E5EB"/>

  <!-- 체크 포인트 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <circle cx="130" cy="470" r="18" fill="#E8722C"/>
    <text x="122" y="482" font-weight="bold" font-size="28" fill="#fff">✓</text>
    <text x="165" y="482" font-weight="bold" font-size="38" fill="#3A3F47">직사광 막기</text>

    <circle cx="130" cy="540" r="18" fill="#E8722C"/>
    <text x="122" y="552" font-weight="bold" font-size="28" fill="#fff">✓</text>
    <text x="165" y="552" font-weight="bold" font-size="38" fill="#3A3F47">주변 장애물 제거</text>

    <circle cx="130" cy="610" r="18" fill="#E8722C"/>
    <text x="122" y="622" font-weight="bold" font-size="28" fill="#fff">✓</text>
    <text x="165" y="622" font-weight="bold" font-size="38" fill="#3A3F47">냉방 효율 UP</text>
  </g>
</svg>
