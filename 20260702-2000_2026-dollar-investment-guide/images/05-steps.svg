<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="180" fill="#243B6B"/>
  <text x="60" y="115" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">초보 달러 투자 시작 5단계</text>

  <g font-family="Malgun Gothic">
    <!-- STEP 1 -->
    <rect x="50" y="240" width="980" height="180" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="150" cy="330" r="54" fill="#243B6B"/>
    <text x="150" y="348" font-size="52" font-weight="bold" fill="#FFD23F" text-anchor="middle">1</text>
    <text x="240" y="315" font-size="44" font-weight="bold" fill="#1a1a1a">목적·기간 정하기</text>
    <text x="240" y="372" font-size="31" fill="#5B6B7C">단기 파킹 · 장기 헤지 · 환차익 베팅 구분</text>

    <!-- STEP 2 -->
    <rect x="50" y="450" width="980" height="180" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="150" cy="540" r="54" fill="#243B6B"/>
    <text x="150" y="558" font-size="52" font-weight="bold" fill="#FFD23F" text-anchor="middle">2</text>
    <text x="240" y="525" font-size="44" font-weight="bold" fill="#1a1a1a">계좌 개설</text>
    <text x="240" y="582" font-size="31" fill="#5B6B7C">외화통장(은행) · 증권계좌(RP·ETF)</text>

    <!-- STEP 3 -->
    <rect x="50" y="660" width="980" height="180" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="150" cy="750" r="54" fill="#243B6B"/>
    <text x="150" y="768" font-size="52" font-weight="bold" fill="#FFD23F" text-anchor="middle">3</text>
    <text x="240" y="735" font-size="44" font-weight="bold" fill="#1a1a1a">환율우대 확인 후 환전</text>
    <text x="240" y="792" font-size="31" fill="#5B6B7C">우대율(90~100%)·매매기준율 확인, 소액부터</text>

    <!-- STEP 4 -->
    <rect x="50" y="870" width="980" height="180" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="150" cy="960" r="54" fill="#243B6B"/>
    <text x="150" y="978" font-size="52" font-weight="bold" fill="#FFD23F" text-anchor="middle">4</text>
    <text x="240" y="945" font-size="44" font-weight="bold" fill="#1a1a1a">상품 선택·매수</text>
    <text x="240" y="1002" font-size="31" fill="#5B6B7C">안전=외화예금 / 이자=RP / 베팅=달러 ETF</text>

    <!-- STEP 5 -->
    <rect x="50" y="1080" width="980" height="180" rx="20" fill="#ffffff" stroke="#243B6B" stroke-width="3"/>
    <circle cx="150" cy="1170" r="54" fill="#FFD23F"/>
    <text x="150" y="1188" font-size="52" font-weight="bold" fill="#243B6B" text-anchor="middle">5</text>
    <text x="240" y="1155" font-size="44" font-weight="bold" fill="#1a1a1a">분할·적립식 운용</text>
    <text x="240" y="1212" font-size="31" fill="#5B6B7C">정기 분할매수로 평균 단가 관리(몰빵 금지)</text>
  </g>
</svg>
