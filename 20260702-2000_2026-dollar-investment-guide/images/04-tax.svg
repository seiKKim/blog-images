<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="180" fill="#243B6B"/>
  <text x="60" y="115" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">달러 투자 방법별 세금</text>

  <g font-family="Malgun Gothic">
    <!-- 헤더 행 -->
    <rect x="50" y="240" width="980" height="120" rx="14" fill="#243B6B"/>
    <text x="235" y="315" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">구분</text>
    <text x="520" y="315" font-size="32" font-weight="bold" fill="#FFD23F" text-anchor="middle">이자·분배금</text>
    <text x="720" y="315" font-size="32" font-weight="bold" fill="#FFD23F" text-anchor="middle">매매·환차익</text>
    <text x="925" y="315" font-size="32" font-weight="bold" fill="#FFD23F" text-anchor="middle">양도세</text>

    <!-- 세로 구분선 위치 참고: 구분(50~420) 이자(420~620) 매매(620~820) 양도(820~1030) -->
    <!-- 행1 외화예금 -->
    <rect x="50" y="372" width="980" height="150" rx="14" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="235" y="465" font-size="36" font-weight="bold" fill="#1a1a1a" text-anchor="middle">외화예금</text>
    <text x="520" y="465" font-size="34" fill="#1a1a1a" text-anchor="middle">15.4%</text>
    <text x="720" y="465" font-size="32" font-weight="bold" fill="#1F8A53" text-anchor="middle">비과세</text>
    <text x="925" y="465" font-size="34" fill="#9AA7B4" text-anchor="middle">-</text>

    <!-- 행2 외화 RP -->
    <rect x="50" y="534" width="980" height="150" rx="14" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="235" y="627" font-size="36" font-weight="bold" fill="#1a1a1a" text-anchor="middle">외화 RP</text>
    <text x="520" y="627" font-size="34" fill="#1a1a1a" text-anchor="middle">15.4%</text>
    <text x="720" y="627" font-size="32" font-weight="bold" fill="#1F8A53" text-anchor="middle">비과세</text>
    <text x="925" y="627" font-size="34" fill="#9AA7B4" text-anchor="middle">-</text>

    <!-- 행3 국내 달러 ETF -->
    <rect x="50" y="696" width="980" height="150" rx="14" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="235" y="789" font-size="34" font-weight="bold" fill="#1a1a1a" text-anchor="middle">국내 달러 ETF</text>
    <text x="520" y="789" font-size="34" fill="#1a1a1a" text-anchor="middle">15.4%</text>
    <text x="720" y="789" font-size="34" fill="#1a1a1a" text-anchor="middle">15.4%</text>
    <text x="925" y="789" font-size="34" fill="#9AA7B4" text-anchor="middle">-</text>

    <!-- 행4 해외 ETF·주식 -->
    <rect x="50" y="858" width="980" height="150" rx="14" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="235" y="951" font-size="32" font-weight="bold" fill="#1a1a1a" text-anchor="middle">해외 ETF·주식</text>
    <text x="520" y="951" font-size="30" fill="#1a1a1a" text-anchor="middle">배당 15.4%</text>
    <text x="720" y="951" font-size="34" fill="#9AA7B4" text-anchor="middle">-</text>
    <text x="925" y="951" font-size="32" font-weight="bold" fill="#E23B3B" text-anchor="middle">22%</text>
  </g>

  <!-- 안내 박스 -->
  <rect x="50" y="1060" width="980" height="180" rx="20" fill="#EAEFF7"/>
  <text x="90" y="1128" font-family="Malgun Gothic" font-size="32" fill="#243B6B">· 해외 양도세는 <tspan font-weight="bold">연 250만원 공제</tspan> 후 초과분 22%</text>
  <text x="90" y="1188" font-family="Malgun Gothic" font-size="32" fill="#243B6B">· 금융소득 <tspan font-weight="bold">연 2,000만원 초과</tspan> 시 종합과세 대상</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">2026년 기준 현행 세율 · 세법 개정 가능</text>
</svg>
