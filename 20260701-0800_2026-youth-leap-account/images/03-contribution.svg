<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>

  <!-- 카테고리 뱃지 -->
  <rect x="60" y="50" rx="28" ry="28" width="190" height="60" fill="#FFD23F"/>
  <text x="155" y="92" font-family="Malgun Gothic" font-weight="bold"
        font-size="32" fill="#1a1a1a" text-anchor="middle">정부지원금</text>
  <text x="60" y="170" font-family="Malgun Gothic" font-weight="bold"
        font-size="58" fill="#ffffff">정부기여금 6% vs 12%</text>

  <!-- 막대그래프 영역 -->
  <!-- 일반형 6% -->
  <text x="280" y="340" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#243B6B" text-anchor="middle">일반형</text>
  <rect x="180" y="900" width="200" height="0" fill="#6E8AAB"/>
  <rect x="180" y="700" width="200" height="200" rx="10" fill="#6E8AAB"/>
  <text x="280" y="650" font-family="Malgun Gothic" font-weight="bold" font-size="90" fill="#243B6B" text-anchor="middle">6%</text>

  <!-- 우대형 12% -->
  <text x="780" y="340" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#1B5FA6" text-anchor="middle">우대형</text>
  <rect x="680" y="500" width="200" height="400" rx="10" fill="#1B5FA6"/>
  <rect x="680" y="500" width="200" height="56" rx="10" fill="#FFD23F"/>
  <text x="780" y="450" font-family="Malgun Gothic" font-weight="bold" font-size="90" fill="#1B5FA6" text-anchor="middle">12%</text>

  <!-- 기준선 -->
  <line x1="120" y1="900" x2="960" y2="900" stroke="#C3D2E2" stroke-width="4"/>

  <!-- 설명 박스 -->
  <rect x="60" y="960" width="960" height="100" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="90" y="1005" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#1B5FA6">우대형(12%)</text>
  <text x="90" y="1045" font-family="Malgun Gothic" font-size="30" fill="#1a1a1a">중소기업 재직자·신규취업자, 연매출 1억원 이하 소상공인 등</text>

  <rect x="60" y="1075" width="960" height="100" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="90" y="1120" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#6E8AAB">일반형(6%)</text>
  <text x="90" y="1160" font-family="Malgun Gothic" font-size="30" fill="#1a1a1a">우대형 외 총급여 6,000만원 이하 일반소득자·소상공인</text>

  <text x="60" y="1235" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C">※ 총급여 6,000만~7,500만원 구간은 기여금 미지급(비과세만)</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">일반형/우대형은 소득 심사 결과에 따라 자동 결정</text>
</svg>
