<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <rect width="1080" height="160" fill="#1B5FA6"/>

  <!-- 카테고리 뱃지 -->
  <rect x="60" y="44" rx="28" ry="28" width="190" height="60" fill="#FFD23F"/>
  <text x="155" y="86" font-family="Malgun Gothic" font-weight="bold"
        font-size="32" fill="#1a1a1a" text-anchor="middle">정부지원금</text>
  <text x="280" y="104" font-family="Malgun Gothic" font-weight="bold"
        font-size="48" fill="#ffffff">청년상품 전환 타임라인</text>

  <!-- 타임라인 가로선 -->
  <line x1="180" y1="400" x2="900" y2="400" stroke="#C3D2E2" stroke-width="8"/>

  <!-- 1단계: 청년도약계좌 종료 -->
  <circle cx="320" cy="400" r="30" fill="#6E8AAB"/>
  <rect x="150" y="250" width="340" height="100" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="320" y="298" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1B5FA6" text-anchor="middle">청년도약계좌</text>
  <text x="320" y="338" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#5B6B7C" text-anchor="middle">2025.12 신규가입 종료</text>
  <text x="320" y="490" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#6E8AAB" text-anchor="middle">기존 가입자만 유지</text>

  <!-- 화살표 -->
  <text x="540" y="412" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#1B5FA6" text-anchor="middle">→</text>

  <!-- 2단계: 청년미래적금 출시 -->
  <circle cx="760" cy="400" r="30" fill="#1B5FA6"/>
  <rect x="590" y="250" width="340" height="100" rx="18" fill="#1B5FA6"/>
  <text x="760" y="298" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#FFD23F" text-anchor="middle">청년미래적금</text>
  <text x="760" y="338" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#ffffff" text-anchor="middle">2026.6 출시 (현재 가능)</text>
  <text x="760" y="490" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#1B5FA6" text-anchor="middle">지금 신청 가능 상품</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="640" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="690" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">2026년 7월 기준 · 자격·일정은 취급은행·공식 안내로 확인</text>
</svg>
