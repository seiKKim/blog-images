<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>

  <!-- 카테고리 뱃지 -->
  <rect x="60" y="50" rx="28" ry="28" width="190" height="60" fill="#FFD23F"/>
  <text x="155" y="92" font-family="Malgun Gothic" font-weight="bold"
        font-size="32" fill="#1a1a1a" text-anchor="middle">정부지원금</text>
  <text x="60" y="170" font-family="Malgun Gothic" font-weight="bold"
        font-size="58" fill="#ffffff">1차 신청 일정 (2026)</text>

  <!-- 세로 단계 타임라인 -->
  <line x1="130" y1="320" x2="130" y2="1080" stroke="#C3D2E2" stroke-width="6"/>

  <!-- 1단계 -->
  <circle cx="130" cy="370" r="26" fill="#FFD23F" stroke="#1B5FA6" stroke-width="6"/>
  <rect x="200" y="300" width="820" height="150" rx="18" fill="#1B5FA6"/>
  <text x="240" y="365" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#ffffff">가입신청 (자격조회)</text>
  <text x="240" y="420" font-family="Malgun Gothic" font-weight="bold" font-size="50" fill="#FFD23F">2026.6.22 ~ 7.3</text>

  <!-- 2단계 -->
  <circle cx="130" cy="560" r="26" fill="#ffffff" stroke="#1B5FA6" stroke-width="6"/>
  <rect x="200" y="500" width="820" height="130" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="240" y="565" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1a1a1a">심사</text>
  <text x="980" y="565" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#1B5FA6" text-anchor="end">7.6 ~ 7.24</text>
  <text x="240" y="610" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C">신청시간: 영업일 09:00 ~ 18:30</text>

  <!-- 3단계 -->
  <circle cx="130" cy="720" r="26" fill="#ffffff" stroke="#1B5FA6" stroke-width="6"/>
  <rect x="200" y="680" width="820" height="100" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="240" y="745" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1a1a1a">결과 개별통보</text>
  <text x="980" y="745" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#1B5FA6" text-anchor="end">7.24</text>

  <!-- 4단계 -->
  <circle cx="130" cy="870" r="26" fill="#ffffff" stroke="#1B5FA6" stroke-width="6"/>
  <rect x="200" y="830" width="820" height="100" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="240" y="895" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1a1a1a">계좌개설</text>
  <text x="980" y="895" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#1B5FA6" text-anchor="end">7.27 ~ 8.7</text>

  <!-- 안내 박스 -->
  <rect x="60" y="990" width="960" height="220" rx="18" fill="#FFF7DA" stroke="#FFD23F" stroke-width="3"/>
  <text x="90" y="1055" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1a1a1a">7월 1일 현재 1차 신청 마감 임박!</text>
  <text x="90" y="1115" font-family="Malgun Gothic" font-size="34" fill="#1a1a1a">첫 주 5부제: 6.22(1·6)/6.23(2·7)/6.24(3·8)</text>
  <text x="90" y="1160" font-family="Malgun Gothic" font-size="34" fill="#1a1a1a">6.25(4·9)/6.26(5·0) · 6.29~7.3 출생연도 제한 없음</text>
  <text x="90" y="1200" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#1B5FA6">놓쳤다면 2차 신청은 2026년 12월 예정</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">계좌개설 주말 제외 · 취급기관 앱 비대면 신청</text>
</svg>
