<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <defs>
    <linearGradient id="vsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CFE8F0"/>
      <stop offset="1" stop-color="#EAF5EE"/>
    </linearGradient>
    <linearGradient id="stream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7FD3D8"/>
      <stop offset="1" stop-color="#49B4C0"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="720" fill="url(#vsky)"/>

  <!-- 먼 산 -->
  <path d="M0 340 L220 150 L430 340 Z" fill="#7FA98C"/>
  <path d="M300 360 L560 130 L820 360 Z" fill="#5E9575"/>
  <path d="M680 350 L900 180 L1080 350 L1080 360 Z" fill="#6FA383"/>
  <!-- 능선 숲 -->
  <rect x="0" y="330" width="1080" height="90" fill="#3E7E56"/>

  <!-- 계곡 물줄기 -->
  <path d="M420 330 Q470 460 380 560 Q320 640 200 700 L1080 700 L1080 400 Q820 520 640 460 Q520 420 500 330 Z" fill="url(#stream)"/>
  <path d="M470 380 Q430 470 360 540" stroke="#ffffff" stroke-width="6" fill="none" opacity="0.5"/>
  <path d="M700 470 Q820 500 980 470" stroke="#ffffff" stroke-width="6" fill="none" opacity="0.45"/>

  <!-- 너른 반석(바위) -->
  <ellipse cx="230" cy="600" rx="180" ry="70" fill="#BEB9AD"/>
  <ellipse cx="230" cy="596" rx="180" ry="66" fill="#D9D4C9"/>
  <ellipse cx="470" cy="660" rx="150" ry="55" fill="#C7C2B6"/>

  <!-- 나무 그늘 -->
  <g transform="translate(120 300)">
    <rect x="-10" y="0" width="22" height="120" fill="#6B4A2E"/>
    <circle cx="0" cy="-20" r="70" fill="#357C4E"/>
    <circle cx="-50" cy="10" r="50" fill="#3E8C58"/>
    <circle cx="50" cy="10" r="50" fill="#3E8C58"/>
  </g>

  <!-- 라벨 박스 -->
  <rect x="60" y="588" rx="20" ry="20" width="620" height="96" fill="#E0556E"/>
  <text x="90" y="651" font-family="Malgun Gothic" font-weight="bold"
        font-size="52" fill="#ffffff">강원 동해 무릉계곡</text>
</svg>
