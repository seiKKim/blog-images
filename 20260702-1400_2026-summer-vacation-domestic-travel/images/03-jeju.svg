<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <defs>
    <linearGradient id="jsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#BFE9F2"/>
      <stop offset="1" stop-color="#EAF9FB"/>
    </linearGradient>
    <linearGradient id="jsea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#31CFD6"/>
      <stop offset="0.6" stop-color="#1FB2C4"/>
      <stop offset="1" stop-color="#1690A6"/>
    </linearGradient>
  </defs>

  <!-- 하늘 -->
  <rect width="1080" height="720" fill="url(#jsky)"/>
  <circle cx="900" cy="140" r="80" fill="#FFE58A"/>

  <!-- 에메랄드 바다 -->
  <rect x="0" y="300" width="1080" height="240" fill="url(#jsea)"/>
  <path d="M0 360 Q200 340 420 360 T880 360 T1080 360" stroke="#ffffff" stroke-width="5" fill="none" opacity="0.55"/>
  <path d="M0 440 Q260 420 520 440 T1080 440" stroke="#ffffff" stroke-width="5" fill="none" opacity="0.45"/>

  <!-- 백사장 -->
  <path d="M0 520 Q300 490 600 515 T1080 500 V720 H0 Z" fill="#F7E7C4"/>

  <!-- 야자수 -->
  <g transform="translate(180 300)">
    <rect x="-12" y="0" width="24" height="230" rx="10" fill="#8A5A34"/>
    <path d="M0 0 Q-120 -40 -180 -10 Q-110 -30 0 5 Z" fill="#2E9E5B"/>
    <path d="M0 0 Q120 -40 190 -12 Q110 -32 0 6 Z" fill="#38B168"/>
    <path d="M0 0 Q-70 -110 -30 -170 Q-30 -90 8 -6 Z" fill="#2E9E5B"/>
    <path d="M0 0 Q80 -100 50 -175 Q35 -95 -6 -4 Z" fill="#38B168"/>
  </g>

  <!-- 라벨 박스 -->
  <rect x="60" y="580" rx="20" ry="20" width="560" height="96" fill="#E0556E"/>
  <text x="90" y="643" font-family="Malgun Gothic" font-weight="bold"
        font-size="52" fill="#ffffff">제주 협재해수욕장</text>
</svg>
