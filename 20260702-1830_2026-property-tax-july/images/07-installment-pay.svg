<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4FBF7"/>
  <rect width="1080" height="180" fill="#1F8A53"/>
  <text x="60" y="105" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">재산세 분납(분할납부)</text>
  <text x="60" y="158" font-family="Malgun Gothic" font-size="34" fill="#E8F5EC">기준 금액과 기한 정리</text>

  <!-- 대상 강조 -->
  <rect x="60" y="240" width="960" height="150" rx="20" fill="#1F8A53"/>
  <text x="540" y="315" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#ffffff" text-anchor="middle">납부세액 250만 원 초과 시</text>
  <text x="540" y="365" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#FFD23F" text-anchor="middle">분납 가능</text>

  <!-- 표 -->
  <rect x="60" y="430" width="960" height="130" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
  <text x="100" y="485" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1a1a1a">500만 원 이하</text>
  <text x="990" y="510" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#1F8A53" text-anchor="end">250만 원 초과분</text>

  <rect x="60" y="580" width="960" height="130" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
  <text x="100" y="635" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1a1a1a">500만 원 초과</text>
  <text x="990" y="660" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#1F8A53" text-anchor="end">세액의 50% 이하 금액</text>

  <rect x="60" y="730" width="960" height="130" rx="16" fill="#E8F5EC" stroke="#1F8A53"/>
  <text x="100" y="785" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1a1a1a">분납 기한</text>
  <text x="990" y="810" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1F8A53" text-anchor="end">납부기한 지난 날부터 2개월 이내</text>

  <!-- 참고 -->
  <rect x="60" y="890" width="960" height="320" rx="20" fill="#FFF6E0"/>
  <text x="100" y="960" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#B8860B">· 근거: 지방세법 제118조 · 시행령 제116조</text>
  <text x="100" y="1030" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#B8860B">· 현행 분납 기한은 2개월</text>
  <text x="100" y="1090" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#B8860B">  (2→6개월 연장은 개정 논의 단계)</text>
  <text x="100" y="1160" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#B8860B">· 세액이 큰 경우 부담을 나눌 수 있는 제도</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">정확한 적용은 본인 고지서·관할 지자체·위택스에서 확인</text>
</svg>
