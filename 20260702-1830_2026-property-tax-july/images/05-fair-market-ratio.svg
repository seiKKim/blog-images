<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4FBF7"/>
  <rect width="1080" height="180" fill="#1F8A53"/>
  <text x="60" y="105" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#ffffff">2026 공정시장가액비율</text>
  <text x="60" y="158" font-family="Malgun Gothic" font-size="34" fill="#E8F5EC">1세대 1주택자 vs 다주택·법인</text>

  <!-- 1세대 1주택자 그룹 -->
  <rect x="60" y="240" width="960" height="70" rx="14" fill="#1F8A53"/>
  <text x="90" y="288" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#ffffff">1세대 1주택자</text>

  <rect x="60" y="330" width="960" height="110" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
  <text x="100" y="398" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1a1a1a">3억 원 이하</text>
  <text x="990" y="398" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#1F8A53" text-anchor="end">43%</text>

  <rect x="60" y="455" width="960" height="110" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
  <text x="100" y="523" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1a1a1a">3억 초과 ~ 6억 이하</text>
  <text x="990" y="523" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#1F8A53" text-anchor="end">44%</text>

  <rect x="60" y="580" width="960" height="110" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
  <text x="100" y="648" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1a1a1a">6억 초과</text>
  <text x="990" y="648" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#1F8A53" text-anchor="end">45%</text>

  <!-- 그 외 그룹 -->
  <rect x="60" y="720" width="960" height="70" rx="14" fill="#5B6B7C"/>
  <text x="90" y="768" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#ffffff">그 외 (다주택 · 법인 등)</text>

  <rect x="60" y="810" width="960" height="130" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
  <text x="100" y="890" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1a1a1a">전 구간</text>
  <text x="990" y="890" font-family="Malgun Gothic" font-weight="bold" font-size="64" fill="#E23B3B" text-anchor="end">60%</text>

  <!-- 참고 -->
  <rect x="60" y="980" width="960" height="230" rx="20" fill="#E8F5EC"/>
  <text x="100" y="1045" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#1F8A53">· 2025년과 동일하게 유지 (2026.4.22 입법예고)</text>
  <text x="100" y="1105" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#1F8A53">· 과세표준 = 공시가격 × 공정시장가액비율</text>
  <text x="100" y="1165" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#1F8A53">· 비율이 낮을수록 과세표준이 줄어 유리</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">출처: 행정안전부 입법예고 · 정책브리핑(korea.kr)</text>
</svg>
