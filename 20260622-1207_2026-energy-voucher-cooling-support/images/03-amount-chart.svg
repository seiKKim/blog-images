<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="115" font-family="Noto Sans CJK KR" font-weight="bold" font-size="58" fill="#ffffff">세대원 수별 연간 총 지원금액</text>
  <text x="60" y="170" font-family="Noto Sans CJK KR" font-size="36" fill="#E8EEF5">2026년 · 여름·겨울 구분 없이 사용</text>

  <!-- 막대그래프: 최대값 701,300 기준 (막대 영역 폭 760px) -->
  <!-- 1인 295,200 -> 320px -->
