  <rect x="60" y="1030" width="760" height="90" rx="12" fill="#1B5FA6"/>
  <text x="60" y="1092" font-family="Noto Sans CJK KR" font-weight="bold" font-size="46" fill="#FFD23F">701,300원</text>

  <rect x="60" y="1170" width="960" height="80" rx="16" fill="#FFF6DA" stroke="#FFD23F"/>
