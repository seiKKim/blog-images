  <rect x="60" y="400" width="320" height="90" rx="12" fill="#7FA8D0"/>
  <text x="400" y="462" font-family="Noto Sans CJK KR" font-weight="bold" font-size="46" fill="#1B5FA6">295,200원</text>

  <!-- 2인 407,500 -> 442px -->
  <text x="60" y="585" font-family="Noto Sans CJK KR" font-weight="bold" font-size="42" fill="#1a1a1a">2인 세대</text>
  <rect x="60" y="610" width="442" height="90" rx="12" fill="#4E86C0"/>
  <text x="522" y="672" font-family="Noto Sans CJK KR" font-weight="bold" font-size="46" fill="#1B5FA6">407,500원</text>

  <!-- 3인 532,700 -> 577px -->
  <text x="60" y="795" font-family="Noto Sans CJK KR" font-weight="bold" font-size="42" fill="#1a1a1a">3인 세대</text>
  <rect x="60" y="820" width="577" height="90" rx="12" fill="#2D6DB0"/>
  <text x="657" y="882" font-family="Noto Sans CJK KR" font-weight="bold" font-size="46" fill="#1B5FA6">532,700원</text>

