  <text x="170" y="968" font-family="Noto Sans CJK KR" font-weight="bold" font-size="54" fill="#ffffff" text-anchor="middle">3</text>
  <text x="270" y="930" font-family="Noto Sans CJK KR" font-weight="bold" font-size="48" fill="#1a1a1a">직권 신청</text>
