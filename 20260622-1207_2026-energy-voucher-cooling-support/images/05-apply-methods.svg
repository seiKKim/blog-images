  <text x="270" y="765" font-family="Noto Sans CJK KR" font-weight="bold" font-size="36" fill="#1B5FA6">www.bokjiro.go.kr</text>

  <!-- 직권 -->
  <rect x="60" y="830" width="960" height="240" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
