  <text x="270" y="370" font-family="Noto Sans CJK KR" font-weight="bold" font-size="48" fill="#1a1a1a">방문 신청</text>
  <text x="270" y="435" font-family="Noto Sans CJK KR" font-size="38" fill="#444444">읍·면·동 행정복지센터(주민센터)</text>
  <text x="270" y="485" font-family="Noto Sans CJK KR" font-size="34" fill="#666666">발급 신청서 제출 (본인·대리인)</text>

  <!-- 온라인 -->
  <rect x="60" y="550" width="960" height="240" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
  <circle cx="170" cy="670" r="64" fill="#1B5FA6"/>
  <text x="170" y="688" font-family="Noto Sans CJK KR" font-weight="bold" font-size="54" fill="#ffffff" text-anchor="middle">2</text>
  <text x="270" y="650" font-family="Noto Sans CJK KR" font-weight="bold" font-size="48" fill="#1a1a1a">온라인 신청</text>
