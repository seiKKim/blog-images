<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="125" font-family="Noto Sans CJK KR" font-weight="bold" font-size="56" fill="#ffffff">복지로 온라인 신청 따라하기</text>

  <!-- 브라우저 목업 -->
  <rect x="60" y="270" width="960" height="700" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
  <rect x="60" y="270" width="960" height="80" rx="20" fill="#E8EEF5"/>
  <circle cx="110" cy="310" r="12" fill="#E0556E"/>
  <circle cx="150" cy="310" r="12" fill="#FFD23F"/>
  <circle cx="190" cy="310" r="12" fill="#1F8A53"/>
  <rect x="240" y="288" width="720" height="46" rx="23" fill="#ffffff" stroke="#C9D6E5"/>
  <text x="270" y="320" font-family="Noto Sans CJK KR" font-size="32" fill="#5B6B7C">www.bokjiro.go.kr</text>

  <!-- 단계 안내 (예시 화면 일러스트) -->
  <text x="100" y="430" font-family="Noto Sans CJK KR" font-weight="bold" font-size="40" fill="#1B5FA6">STEP 1. 복지로 접속 후 로그인</text>
  <text x="100" y="510" font-family="Noto Sans CJK KR" font-weight="bold" font-size="40" fill="#1B5FA6">STEP 2. 서비스 신청 메뉴 선택</text>

  <!-- 강조된 메뉴 버튼 -->
  <rect x="100" y="545" width="820" height="110" rx="16" fill="#EAF1FA" stroke="#1B5FA6" stroke-width="3"/>
  <text x="135" y="612" font-family="Noto Sans CJK KR" font-weight="bold" font-size="42" fill="#1a1a1a">복지서비스 &gt; 에너지바우처 신청</text>

  <text x="100" y="745" font-family="Noto Sans CJK KR" font-weight="bold" font-size="40" fill="#1B5FA6">STEP 3. 신청서 작성 · 제출</text>
  <text x="100" y="815" font-family="Noto Sans CJK KR" font-size="36" fill="#444444">대상자·자격 확인 후 안내에 따라 진행</text>
  <text x="100" y="880" font-family="Noto Sans CJK KR" font-size="34" fill="#888888">※ 본 화면은 신청 흐름을 설명한 예시 이미지입니다</text>

  <rect x="60" y="1010" width="960" height="200" rx="20" fill="#FFF6DA" stroke="#FFD23F"/>
  <text x="90" y="1075" font-family="Noto Sans CJK KR" font-weight="bold" font-size="40" fill="#9A6B00">방문이 편하면 주민센터,</text>
  <text x="90" y="1135" font-family="Noto Sans CJK KR" font-weight="bold" font-size="40" fill="#9A6B00">작년 수급자라면 자동신청 대상 확인</text>
  <text x="90" y="1185" font-family="Noto Sans CJK KR" font-size="34" fill="#9A6B00">문의: 통합상담센터 1600-3190</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="32" fill="#5B6B7C">출처: 복지로(www.bokjiro.go.kr)</text>
</svg>
