<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F1F8FB"/>
  <!-- 상단 색띠 -->
  <rect width="1080" height="210" fill="#0B6FA6"/>
  <text x="60" y="118" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">여름 물놀이 사고, 장소·원인</text>
  <text x="60" y="182" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="38" fill="#BEE6F2">최근 5년(2020~2024) 여름철 물놀이 사망 112명 기준</text>

  <!-- 섹션1: 사고 장소 -->
  <text x="60" y="320" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#0B4B6E">■ 사고 장소</text>

  <!-- 하천·계곡 65% -->
  <text x="60" y="400" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#1a1a1a">하천·계곡</text>
  <rect x="60" y="420" width="960" height="70" rx="14" fill="#DCEAF2"/>
  <rect x="60" y="420" width="624" height="70" rx="14" fill="#0B6FA6"/>
  <text x="700" y="468" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="44" fill="#0B4B6E">약 65%</text>

  <text x="60" y="562" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">※ 안전요원 없고 수심 변화가 큰 계곡·하천에 집중</text>

  <!-- 섹션2: 사고 원인 -->
  <text x="60" y="668" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#0B4B6E">■ 사고 원인</text>

  <!-- 안전 부주의 37% -->
  <text x="60" y="748" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#1a1a1a">안전 부주의(구명조끼 미착용 등)</text>
  <rect x="60" y="768" width="960" height="64" rx="14" fill="#DCEAF2"/>
  <rect x="60" y="768" width="355" height="64" rx="14" fill="#E8722C"/>
  <text x="435" y="812" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="42" fill="#B4531B">37%</text>

  <!-- 수영 미숙 34% -->
  <text x="60" y="908" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#1a1a1a">수영 미숙</text>
  <rect x="60" y="928" width="960" height="64" rx="14" fill="#DCEAF2"/>
  <rect x="60" y="928" width="326" height="64" rx="14" fill="#F0A030"/>
  <text x="406" y="972" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="42" fill="#B4531B">34%</text>

  <!-- 음주 수영 17% -->
  <text x="60" y="1068" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#1a1a1a">음주 수영</text>
  <rect x="60" y="1088" width="960" height="64" rx="14" fill="#DCEAF2"/>
  <rect x="60" y="1088" width="163" height="64" rx="14" fill="#F5C24B"/>
  <text x="243" y="1132" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="42" fill="#8A6410">17%</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#DCEAF2"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#4B5E6E">출처: 행정안전부 통계 기반 보도 · 본문 참고</text>
</svg>
