<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F1F8FB"/>
  <!-- 상단 색띠 -->
  <rect width="1080" height="200" fill="#0B6FA6"/>
  <text x="60" y="112" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">어린이 구명조끼 착용법</text>
  <text x="60" y="172" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="38" fill="#BEE6F2">끈·지퍼·사타구니 스트랩까지 제대로</text>

  <!-- 아이 + 구명조끼 일러스트 -->
  <g transform="translate(360 640)">
    <!-- 머리 -->
    <circle cx="0" cy="-260" r="72" fill="#FFD9BF"/>
    <path d="M-72 -280 Q0 -360 72 -280 L72 -300 Q0 -350 -72 -300 Z" fill="#5A3A26"/>
    <!-- 다리 -->
    <rect x="-52" y="120" width="42" height="150" rx="18" fill="#2E5D74"/>
    <rect x="10" y="120" width="42" height="150" rx="18" fill="#2E5D74"/>
    <!-- 팔 -->
    <rect x="-150" y="-150" width="42" height="150" rx="18" fill="#FFD9BF"/>
    <rect x="108" y="-150" width="42" height="150" rx="18" fill="#FFD9BF"/>
    <!-- 구명조끼 몸통 -->
    <rect x="-100" y="-170" width="200" height="300" rx="30" fill="#FF7A3C"/>
    <rect x="-24" y="-170" width="48" height="300" fill="#0B6FA6"/>
    <!-- 지퍼 -->
    <line x1="0" y1="-166" x2="0" y2="126" stroke="#0B4B6E" stroke-width="8" stroke-dasharray="10 8"/>
    <!-- 가슴 끈 (버클) -->
    <rect x="-104" y="-70" width="208" height="26" rx="8" fill="#0B4B6E"/>
    <rect x="-104" y="20" width="208" height="26" rx="8" fill="#0B4B6E"/>
    <!-- 사타구니 생명줄 -->
    <path d="M-30 130 Q0 210 30 130" fill="none" stroke="#0B4B6E" stroke-width="22" stroke-linecap="round"/>
  </g>

  <!-- 체크 포인트 (오른쪽 라벨과 연결선) -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 몸에 맞는 사이즈 -->
    <rect x="600" y="380" width="420" height="96" rx="16" fill="#ffffff" stroke="#CFE3EE"/>
    <text x="640" y="426" font-size="34" fill="#0B6FA6" font-weight="bold">✔ 몸에 맞는 사이즈</text>
    <text x="640" y="464" font-size="28" fill="#5B6B7C">크면 벗겨지고 작으면 부력 부족</text>

    <!-- 지퍼·끈 -->
    <rect x="600" y="500" width="420" height="96" rx="16" fill="#ffffff" stroke="#CFE3EE"/>
    <text x="640" y="546" font-size="34" fill="#0B6FA6" font-weight="bold">✔ 지퍼·끈 끝까지 채우기</text>
    <text x="640" y="584" font-size="28" fill="#5B6B7C">가슴 버클까지 단단히</text>

    <!-- 사타구니 스트랩 -->
    <rect x="600" y="620" width="420" height="96" rx="16" fill="#FFF7DE" stroke="#F0CE5A"/>
    <text x="640" y="666" font-size="34" fill="#B4531B" font-weight="bold">✔ 사타구니 생명줄</text>
    <text x="640" y="704" font-size="28" fill="#8A6410">아이용은 가랑이 스트랩 필수</text>
  </g>

  <!-- 하단 강조 박스 -->
  <rect x="60" y="1000" width="960" height="200" rx="20" fill="#0B6FA6"/>
  <text x="540" y="1080" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#FFD23F" text-anchor="middle">구명조끼 = 모든 공식 소스가 꼽는</text>
  <text x="540" y="1148" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#ffffff" text-anchor="middle">물놀이 1순위 안전 장비</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#DCEAF2"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#4B5E6E">출처: 행정안전부 물놀이 안전수칙 · 본문 참고</text>
</svg>
