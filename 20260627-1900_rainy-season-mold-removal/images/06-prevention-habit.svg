<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FFF3EA"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <text x="60" y="125" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#FFFFFF">재발 막는 예방 습관</text>

  <!-- 습도계 -->
  <rect x="60" y="270" width="960" height="240" rx="20" fill="#ffffff" stroke="#E3D2C4"/>
  <circle cx="200" cy="390" r="80" fill="none" stroke="#E8722C" stroke-width="10"/>
  <text x="200" y="408" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#E8722C" text-anchor="middle">50%</text>
  <text x="340" y="370" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#1a1a1a">습도계로 관리</text>
  <text x="340" y="440" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#5B6B7C">자주 머무는 공간마다 습도 40~50%</text>

  <!-- 맞통풍 환기 -->
  <rect x="60" y="540" width="960" height="240" rx="20" fill="#ffffff" stroke="#E3D2C4"/>
  <rect x="130" y="600" width="70" height="120" fill="none" stroke="#E8722C" stroke-width="8"/>
  <rect x="240" y="600" width="70" height="120" fill="none" stroke="#E8722C" stroke-width="8"/>
  <path d="M150 660 h140" stroke="#E8722C" stroke-width="8" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#E8722C"/></marker></defs>
  <text x="360" y="640" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#1a1a1a">맞통풍 환기</text>
  <text x="360" y="710" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#5B6B7C">비 그친 30분 뒤 · 하루 3회 30분씩</text>

  <!-- 제습기 -->
  <rect x="60" y="810" width="960" height="240" rx="20" fill="#ffffff" stroke="#E3D2C4"/>
  <rect x="140" y="860" width="120" height="150" rx="14" fill="none" stroke="#E8722C" stroke-width="8"/>
  <line x1="170" y1="900" x2="230" y2="900" stroke="#E8722C" stroke-width="6"/>
  <circle cx="200" cy="960" r="22" fill="none" stroke="#E8722C" stroke-width="7"/>
  <text x="360" y="910" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#1a1a1a">제습기·에어컨 제습</text>
  <text x="360" y="980" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#5B6B7C">순환 잘 되는 곳에 · 과도하게는 금물</text>

  <!-- 핵심 한줄 -->
  <rect x="60" y="1080" width="960" height="130" rx="20" fill="#E8722C"/>
  <text x="540" y="1130" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#FFFFFF" text-anchor="middle">젖은 곳은 24~48시간 안에 건조!</text>
  <text x="540" y="1185" font-family="Malgun Gothic" font-weight="bold" font-size="36" fill="#FFD23F" text-anchor="middle">누수는 발견 즉시 수리</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">출처: 미국 EPA·CDC 권고 종합</text>
</svg>