<rect x="60" y="1138" width="960" height="120" rx="18" ry="18" fill="#fcecf0"/>
<text x="90" y="1212" font-family="Noto Sans CJK KR" font-weight="bold" font-size="36" fill="#B23850" text-anchor="start">※ 심장에서 먼 곳부터 적셔 심장마비를 예방하세요</text>
<rect x="0" y="1270" width="1080" height="80" rx="0" ry="0" fill="#E8EEF5"/><text x="60" y="1318" font-family="Noto Sans CJK KR" font-weight="normal" font-size="30" fill="#5B6B7C" text-anchor="start">출처: 행정안전부 등 공공기관 표준 물놀이 안전수칙</text>
