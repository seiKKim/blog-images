<rect x="60" y="46" width="258.0" height="56" rx="28.0" ry="28.0" fill="#FFD23F"/><text x="189.0" y="84.5" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">여름안전·시즌</text>
<text x="60" y="150" font-family="Noto Sans CJK KR" font-weight="bold" font-size="60" fill="#ffffff" text-anchor="start">올바른 입수 순서</text>
