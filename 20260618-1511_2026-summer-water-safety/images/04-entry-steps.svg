<text x="240" y="810" font-family="Noto Sans CJK KR" font-weight="bold" font-size="56" fill="#B23850" text-anchor="start">얼굴</text>
<text x="240" y="874" font-family="Noto Sans CJK KR" font-weight="bold" font-size="38" fill="#1a1a1a" text-anchor="start">찬물에 적응시키고</text>
