<text x="240" y="676" font-family="Noto Sans CJK KR" font-weight="bold" font-size="38" fill="#1a1a1a" text-anchor="start">천천히 위로 올라오며</text>
<rect x="60" y="732" width="960" height="178" rx="22" ry="22" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
