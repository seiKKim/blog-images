<text x="100" y="762" font-family="Noto Sans CJK KR" font-weight="bold" font-size="38" fill="#1a1a1a" text-anchor="start">3  막대·로프로 끌어당기기</text>
<polygon points="524,800 556,800 540,814" fill="#E0556E"/>
<rect x="60" y="816" width="960" height="92" rx="14" ry="14" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
