<text x="100" y="650" font-family="Noto Sans CJK KR" font-weight="bold" font-size="38" fill="#1a1a1a" text-anchor="start">2  물에 뜨는 물체 던지기</text>
<polygon points="524,688 556,688 540,702" fill="#E0556E"/>
