<line x1="104" y1="1172" x2="140" y2="1208" stroke="#c82828" stroke-width="6"/>
<text x="170" y="1202" font-family="Noto Sans CJK KR" font-weight="bold" font-size="36" fill="#c82828" text-anchor="start">배·등 누르기 금지 (기도 막힐 수 있음)</text>
<rect x="0" y="1270" width="1080" height="80" rx="0" ry="0" fill="#E8EEF5"/><text x="60" y="1318" font-family="Noto Sans CJK KR" font-weight="normal" font-size="30" fill="#5B6B7C" text-anchor="start">출처: 행정안전부 등 공공기관 응급처치 안내</text>
