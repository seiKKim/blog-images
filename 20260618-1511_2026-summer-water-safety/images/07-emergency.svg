<text x="90" y="318" font-family="Noto Sans CJK KR" font-weight="bold" font-size="44" fill="#ffffff" text-anchor="start">골든타임 4분 — 4분 내 CPR 시 소생률↑</text>
<text x="60" y="440" font-family="Noto Sans CJK KR" font-weight="bold" font-size="40" fill="#B23850" text-anchor="start">구조 순서 (직접 뛰어들지 마세요)</text>
