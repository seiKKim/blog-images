<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#243B6B"/>
  <text x="60" y="105" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">서민형 vs 일반형</text>
  <text x="60" y="165" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="38" fill="#E8EEF5">자격 요건 · 비과세 한도 비교</text>

  <!-- 두 카드: 일반형 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="60" y="270" width="460" height="620" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <rect x="60" y="270" width="460" height="120" rx="24" fill="#B8C4D4"/>
    <rect x="60" y="330" width="460" height="60" fill="#B8C4D4"/>
    <text x="290" y="348" font-weight="bold" font-size="52" fill="#2a3a55" text-anchor="middle">일반형</text>

    <text x="290" y="470" font-weight="normal" font-size="34" fill="#5B6B7C" text-anchor="middle">비과세 한도</text>
    <text x="290" y="560" font-weight="bold" font-size="80" fill="#243B6B" text-anchor="middle">200만원</text>

    <line x1="120" y1="620" x2="460" y2="620" stroke="#E0E6EE" stroke-width="2"/>
    <text x="290" y="690" font-weight="bold" font-size="34" fill="#1a1a1a" text-anchor="middle">소득요건</text>
    <text x="290" y="750" font-weight="normal" font-size="32" fill="#5B6B7C" text-anchor="middle">별도 요건 없음</text>
    <text x="290" y="800" font-weight="normal" font-size="30" fill="#8a95a3" text-anchor="middle">(서민형 요건</text>
    <text x="290" y="845" font-weight="normal" font-size="30" fill="#8a95a3" text-anchor="middle">초과 시 자동 적용)</text>
  </g>

  <!-- 서민형 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="560" y="270" width="460" height="620" rx="24" fill="#ffffff" stroke="#243B6B" stroke-width="3"/>
    <rect x="560" y="270" width="460" height="120" rx="24" fill="#243B6B"/>
    <rect x="560" y="330" width="460" height="60" fill="#243B6B"/>
    <text x="790" y="348" font-weight="bold" font-size="52" fill="#FFD23F" text-anchor="middle">서민·농어민형</text>

    <text x="790" y="470" font-weight="normal" font-size="34" fill="#5B6B7C" text-anchor="middle">비과세 한도</text>
    <text x="790" y="560" font-weight="bold" font-size="80" fill="#E23B3B" text-anchor="middle">400만원</text>

    <line x1="620" y1="620" x2="960" y2="620" stroke="#E0E6EE" stroke-width="2"/>
    <text x="790" y="690" font-weight="bold" font-size="34" fill="#1a1a1a" text-anchor="middle">소득요건</text>
    <text x="790" y="748" font-weight="normal" font-size="31" fill="#5B6B7C" text-anchor="middle">근로소득만: 총급여</text>
    <text x="790" y="790" font-weight="bold" font-size="34" fill="#243B6B" text-anchor="middle">5,000만원 이하</text>
    <text x="790" y="840" font-weight="normal" font-size="28" fill="#8a95a3" text-anchor="middle">종합소득 3,800만원 이하</text>
  </g>

  <!-- 하단 체크 포인트 -->
  <rect x="60" y="930" width="960" height="270" rx="20" fill="#243B6B" opacity="0.06"/>
  <text x="90" y="1000" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#243B6B">체크 포인트</text>
  <text x="90" y="1065" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal" font-size="34" fill="#333">직전연도 소득 기준으로 자격 판정</text>
  <text x="90" y="1120" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal" font-size="34" fill="#333">요건 충족 시 비과세 한도 2배(400만원)</text>
  <text x="90" y="1175" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal" font-size="34" fill="#333">요건 초과 시 일반형(200만원) 자동 가입</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">2026년 7월 현행 기준 · 소득 증빙으로 자격 확인</text>
</svg>
