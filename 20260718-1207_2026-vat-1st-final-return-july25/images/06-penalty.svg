<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1F8A53"/>
  <text x="60" y="105" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">미신고·미납 가산세</text>
  <text x="60" y="165" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="38" fill="#E8EEF5">놓쳤다면 빨리 기한 후 신고가 손해 최소화</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <text x="60" y="330" font-size="42" font-weight="bold" fill="#5B6B7C">가산세 종류</text>

    <rect x="60" y="360" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="436" font-size="44" font-weight="bold" fill="#1a1a1a">무신고</text>
    <text x="1000" y="436" font-size="46" font-weight="bold" fill="#E23B3B" text-anchor="end">20% (부정 40%)</text>

    <rect x="60" y="500" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="576" font-size="44" font-weight="bold" fill="#1a1a1a">과소신고</text>
    <text x="1000" y="576" font-size="46" font-weight="bold" fill="#E23B3B" text-anchor="end">10% (부당 40%)</text>

    <rect x="60" y="640" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="700" font-size="42" font-weight="bold" fill="#1a1a1a">납부지연</text>
    <text x="100" y="742" font-size="30" fill="#5B6B7C">미납세액 × 미납일수</text>
    <text x="1000" y="716" font-size="42" font-weight="bold" fill="#E23B3B" text-anchor="end">1일 0.022%</text>

    <!-- 기한 후 신고 감면 -->
    <text x="60" y="870" font-size="42" font-weight="bold" fill="#5B6B7C">기한 후 신고 감면 (빨리 할수록 유리)</text>

    <rect x="60" y="910" width="300" height="240" rx="20" fill="#1F8A53"/>
    <text x="210" y="985" font-size="40" font-weight="bold" fill="#E8EEF5" text-anchor="middle">1개월 이내</text>
    <text x="210" y="1075" font-size="72" font-weight="bold" fill="#FFD23F" text-anchor="middle">50%</text>
    <text x="210" y="1125" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">감면</text>

    <rect x="390" y="910" width="300" height="240" rx="20" fill="#2E9E64"/>
    <text x="540" y="985" font-size="40" font-weight="bold" fill="#E8EEF5" text-anchor="middle">3개월 이내</text>
    <text x="540" y="1075" font-size="72" font-weight="bold" fill="#FFD23F" text-anchor="middle">30%</text>
    <text x="540" y="1125" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">감면</text>

    <rect x="720" y="910" width="300" height="240" rx="20" fill="#5AB688"/>
    <text x="870" y="985" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">6개월 이내</text>
    <text x="870" y="1075" font-size="72" font-weight="bold" fill="#FFD23F" text-anchor="middle">20%</text>
    <text x="870" y="1125" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">감면</text>

    <text x="60" y="1225" font-size="32" fill="#5B6B7C">※ 7.27을 놓쳤어도 가능한 한 빨리 기한 후 신고</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 국세청 부가가치세 신고안내</text>
</svg>
