<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1F8A53"/>
  <text x="60" y="105" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">부가세 계산 구조</text>
  <text x="60" y="165" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="38" fill="#E8EEF5">매출세액 − 매입세액 = 납부세액</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 공식 배너 -->
    <rect x="60" y="270" width="960" height="140" rx="20" fill="#243B6B"/>
    <text x="540" y="360" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">납부세액 = 매출세액 − 매입세액</text>

    <text x="60" y="490" font-size="40" font-weight="bold" fill="#5B6B7C">☕ 커피숍 예시 (반기 기준)</text>

    <!-- 매출세액 카드 -->
    <rect x="60" y="530" width="960" height="150" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="595" font-size="44" font-weight="bold" fill="#1a1a1a">매출세액</text>
    <text x="100" y="645" font-size="32" fill="#5B6B7C">매출 1억원 × 10%</text>
    <text x="1000" y="620" font-size="56" font-weight="bold" fill="#1F8A53" text-anchor="end">1,000만원</text>

    <!-- 마이너스 -->
    <text x="540" y="740" font-size="60" font-weight="bold" fill="#5B6B7C" text-anchor="middle">−</text>

    <!-- 매입세액 카드 -->
    <rect x="60" y="770" width="960" height="150" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="835" font-size="44" font-weight="bold" fill="#1a1a1a">매입세액</text>
    <text x="100" y="885" font-size="32" fill="#5B6B7C">매입(원두·우유 등) 4,000만원 × 10%</text>
    <text x="1000" y="860" font-size="56" font-weight="bold" fill="#E8722C" text-anchor="end">400만원</text>

    <!-- 등호 -->
    <text x="540" y="980" font-size="60" font-weight="bold" fill="#5B6B7C" text-anchor="middle">=</text>

    <!-- 납부세액 배너 -->
    <rect x="60" y="1010" width="960" height="170" rx="20" fill="#1F8A53"/>
    <text x="100" y="1095" font-size="48" font-weight="bold" fill="#ffffff">납부세액</text>
    <text x="1000" y="1110" font-size="72" font-weight="bold" fill="#FFD23F" text-anchor="end">600만원</text>

    <text x="60" y="1240" font-size="32" fill="#5B6B7C">※ 이후 예정고지 납부분·신용카드공제·전자신고공제 등을 추가 차감</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 국세청 부가가치세 신고안내</text>
</svg>
