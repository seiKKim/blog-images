<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1F8A53"/>
  <text x="60" y="105" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="54" fill="#ffffff">신용카드매출세액공제</text>
  <text x="60" y="165" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="38" fill="#E8EEF5">개인사업자, 2026년은 아직 넉넉한 조건</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 표 행 -->
    <rect x="60" y="280" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="356" font-size="44" font-weight="bold" fill="#1a1a1a">공제율</text>
    <text x="1000" y="356" font-size="46" font-weight="bold" fill="#1F8A53" text-anchor="end">공급대가의 1.3%</text>

    <rect x="60" y="420" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="496" font-size="44" font-weight="bold" fill="#1a1a1a">연간 한도</text>
    <text x="1000" y="496" font-size="46" font-weight="bold" fill="#1F8A53" text-anchor="end">1,000만원</text>

    <rect x="60" y="560" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="636" font-size="44" font-weight="bold" fill="#1a1a1a">적용 기한</text>
    <text x="1000" y="636" font-size="46" font-weight="bold" fill="#1F8A53" text-anchor="end">2026.12.31까지</text>

    <rect x="60" y="700" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="762" font-size="40" font-weight="bold" fill="#1a1a1a">제외 대상</text>
    <text x="100" y="806" font-size="30" fill="#5B6B7C">법인 / 직전연도 공급가액 10억원 초과 개인</text>

    <!-- 2026 vs 2027 비교 -->
    <text x="60" y="920" font-size="42" font-weight="bold" fill="#5B6B7C">2027년 축소 예정 (비교)</text>

    <rect x="60" y="960" width="465" height="230" rx="20" fill="#1F8A53"/>
    <text x="292" y="1030" font-size="44" font-weight="bold" fill="#FFD23F" text-anchor="middle">~2026년</text>
    <text x="292" y="1095" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">1.3%</text>
    <text x="292" y="1150" font-size="38" font-weight="bold" fill="#E8EEF5" text-anchor="middle">연 1,000만원</text>

    <rect x="555" y="960" width="465" height="230" rx="20" fill="#B0BEC5"/>
    <text x="787" y="1030" font-size="44" font-weight="bold" fill="#2B2F36" text-anchor="middle">2027년~</text>
    <text x="787" y="1095" font-size="52" font-weight="bold" fill="#2B2F36" text-anchor="middle">1%</text>
    <text x="787" y="1150" font-size="38" font-weight="bold" fill="#2B2F36" text-anchor="middle">연 500만원</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 국세청 부가가치세 신고안내</text>
</svg>
