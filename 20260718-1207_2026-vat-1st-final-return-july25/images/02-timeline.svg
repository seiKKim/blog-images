<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1F8A53"/>
  <text x="60" y="105" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">과세기간 vs 확정신고 대상기간</text>
  <text x="60" y="165" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="38" fill="#E8EEF5">1기 부가세, 4~6월분만 확정신고</text>

  <!-- 타임라인 축 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 월 라벨 -->
    <text x="60" y="330" font-size="40" font-weight="bold" fill="#5B6B7C">2026년 제1기 과세기간 (1.1 ~ 6.30)</text>

    <!-- 전체 바 배경 -->
    <rect x="60" y="360" width="960" height="120" rx="16" fill="#E8EEF5" stroke="#D6E0EC"/>
    <!-- 1~3월 구간 -->
    <rect x="60" y="360" width="480" height="120" rx="16" fill="#9BC7AD"/>
    <text x="300" y="420" font-size="40" font-weight="bold" fill="#1a1a1a" text-anchor="middle">1~3월분</text>
    <text x="300" y="462" font-size="30" fill="#2B2F36" text-anchor="middle">예정신고·예정고지</text>
    <!-- 4~6월 구간 -->
    <rect x="540" y="360" width="480" height="120" rx="16" fill="#1F8A53"/>
    <text x="780" y="420" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">4~6월분</text>
    <text x="780" y="462" font-size="30" fill="#E8EEF5" text-anchor="middle">이번 확정신고 대상</text>

    <!-- 화살표/설명 카드 -->
    <rect x="60" y="560" width="960" height="150" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="630" font-size="44" font-weight="bold" fill="#1a1a1a">확정신고 대상기간</text>
    <text x="1000" y="630" font-size="48" font-weight="bold" fill="#1F8A53" text-anchor="end">2026.4.1 ~ 6.30</text>
    <text x="100" y="682" font-size="34" fill="#5B6B7C">1~3월분은 예정신고(법인)·예정고지(개인)로 선처리</text>

    <rect x="60" y="740" width="960" height="150" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="810" font-size="44" font-weight="bold" fill="#1a1a1a">신고·납부 기간</text>
    <text x="1000" y="810" font-size="48" font-weight="bold" fill="#1F8A53" text-anchor="end">7.1 ~ 7.27(월)</text>
    <text x="100" y="862" font-size="34" fill="#5B6B7C">원칙 7.25이나 토요일이라 다음 영업일로 연장</text>

    <!-- 강조 배너 -->
    <rect x="60" y="950" width="960" height="180" rx="20" fill="#1F8A53"/>
    <text x="540" y="1030" font-size="46" font-weight="bold" fill="#FFD23F" text-anchor="middle">과세기간 전체가 아니라</text>
    <text x="540" y="1095" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">하반기 3개월분만 확정신고</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 국세청 부가가치세 신고안내</text>
</svg>
