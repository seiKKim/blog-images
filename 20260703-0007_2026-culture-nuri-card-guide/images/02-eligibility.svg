<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="125" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">발급대상 — 누가 받나요?</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 나이 -->
    <rect x="60" y="270" width="960" height="200" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <rect x="60" y="270" width="14" height="200" rx="7" fill="#1B5FA6"/>
    <text x="110" y="345" font-size="42" font-weight="bold" fill="#1B5FA6">나이</text>
    <text x="110" y="418" font-size="50" font-weight="bold" fill="#1a1a1a">6세 이상 (2020.12.31 이전 출생자)</text>

    <!-- 자격 -->
    <rect x="60" y="500" width="960" height="200" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <rect x="60" y="500" width="14" height="200" rx="7" fill="#1B5FA6"/>
    <text x="110" y="575" font-size="42" font-weight="bold" fill="#1B5FA6">자격</text>
    <text x="110" y="648" font-size="50" font-weight="bold" fill="#1a1a1a">기초생활수급자 · 차상위계층</text>

    <!-- 지급 단위 -->
    <rect x="60" y="730" width="960" height="200" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <rect x="60" y="730" width="14" height="200" rx="7" fill="#1B5FA6"/>
    <text x="110" y="805" font-size="42" font-weight="bold" fill="#1B5FA6">지급 단위</text>
    <text x="110" y="878" font-size="50" font-weight="bold" fill="#1a1a1a">가구 아닌 <tspan fill="#E23B3B">개인 단위</tspan> — 각자 발급</text>
  </g>

  <!-- 강조 박스 -->
  <rect x="60" y="970" width="960" height="230" rx="20" fill="#FFF6D6" stroke="#FFD23F" stroke-width="3"/>
  <text x="100" y="1050" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="44" font-weight="bold" fill="#8a6d00">가족이 모두 수급 · 차상위라면?</text>
  <text x="100" y="1120" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="46" font-weight="bold" fill="#1a1a1a">한 명만 X → 각자 15만원씩 발급 가능</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">출처: 문화누리 누리집 · 정책브리핑(korea.kr)</text>
</svg>
