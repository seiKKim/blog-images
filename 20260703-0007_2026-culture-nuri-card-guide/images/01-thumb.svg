<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#1B5FA6"/>
  <circle cx="950" cy="180" r="260" fill="#ffffff" opacity="0.08"/>
  <circle cx="120" cy="980" r="200" fill="#ffffff" opacity="0.06"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="90" rx="34" ry="34" width="220" height="68" fill="#FFD23F"/>
  <text x="190" y="136" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#1a1a1a" text-anchor="middle">정부지원금</text>

  <!-- 서브 카피 -->
  <text x="80" y="300" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#E8EEF5">2026 문화누리카드</text>

  <!-- 메인 카피 -->
  <text x="80" y="470" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="150" fill="#ffffff">1인당 <tspan fill="#FFD23F">15만원</tspan></text>

  <!-- 마감 강조 박스 -->
  <rect x="80" y="540" rx="24" ry="24" width="920" height="150" fill="#E23B3B"/>
  <text x="540" y="638" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="76" fill="#ffffff" text-anchor="middle">안 쓴 잔액 12.31 소멸</text>

  <!-- 디테일 -->
  <rect x="80" y="740" rx="20" ry="20" width="920" height="180" fill="#ffffff" opacity="0.14"/>
  <text x="110" y="812" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff">이월 없이 전액 소멸 · 지금 잔액부터 확인</text>
  <text x="110" y="880" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#FFD23F">대상 · 잔액확인 · 사용처 총정리</text>

  <!-- 채널 표시 -->
  <text x="80" y="1010" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#E8EEF5" opacity="0.9">blog.naver.com/trip_chocho</text>
</svg>
