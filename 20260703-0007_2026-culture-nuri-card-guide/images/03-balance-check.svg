<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="125" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">잔액 확인 3가지 방법</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 앱 -->
    <rect x="60" y="270" width="960" height="230" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="160" cy="385" r="56" fill="#1B5FA6"/>
    <text x="160" y="405" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">앱</text>
    <text x="270" y="360" font-size="50" font-weight="bold" fill="#1a1a1a">모바일 앱</text>
    <text x="270" y="430" font-size="40" fill="#4a5a6a">문화누리카드 앱에서 잔액·내역 조회</text>

    <!-- 웹 -->
    <rect x="60" y="530" width="960" height="230" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="160" cy="645" r="56" fill="#1B5FA6"/>
    <text x="160" y="665" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">웹</text>
    <text x="270" y="620" font-size="50" font-weight="bold" fill="#1a1a1a">누리집(홈페이지)</text>
    <text x="270" y="690" font-size="40" fill="#4a5a6a">카드사용내역 및 잔액확인 메뉴</text>

    <!-- 전화 -->
    <rect x="60" y="790" width="960" height="230" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="160" cy="905" r="56" fill="#1B5FA6"/>
    <text x="160" y="925" font-size="46" font-weight="bold" fill="#ffffff" text-anchor="middle">전화</text>
    <text x="270" y="880" font-size="50" font-weight="bold" fill="#1a1a1a">고객지원센터</text>
    <text x="270" y="950" font-size="46" font-weight="bold" fill="#1B5FA6">1544-3412 (평일 09~18시)</text>
  </g>

  <!-- 카드사 안내 -->
  <rect x="60" y="1055" width="960" height="150" rx="20" fill="#EDF3FA" stroke="#D6E0EC" stroke-width="2"/>
  <text x="100" y="1120" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="40" font-weight="bold" fill="#1a1a1a">분실신고 · 카드사 문의</text>
  <text x="100" y="1175" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="42" font-weight="bold" fill="#1B5FA6">NH농협카드 1644-4000</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">출처: 문화누리 누리집(mnuri.kr)</text>
</svg>
