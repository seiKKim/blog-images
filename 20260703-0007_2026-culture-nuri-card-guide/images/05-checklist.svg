<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="115" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">하반기 잔액 소진 체크</text>
  <text x="60" y="170" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="38" fill="#FFD23F">12.31 자정 전액 소멸 전에!</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 체크 항목 1 -->
    <rect x="60" y="270" width="960" height="190" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <rect x="95" y="335" width="60" height="60" rx="12" fill="#1F8A53"/>
    <path d="M108 365 l14 14 l24 -28" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="190" y="350" font-size="48" font-weight="bold" fill="#1a1a1a">집에서 편하게</text>
    <text x="190" y="415" font-size="42" fill="#1B5FA6">온라인 지정 서점 도서·전자책</text>

    <!-- 체크 항목 2 -->
    <rect x="60" y="490" width="960" height="190" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <rect x="95" y="555" width="60" height="60" rx="12" fill="#1F8A53"/>
    <path d="M108 585 l14 14 l24 -28" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="190" y="570" font-size="48" font-weight="bold" fill="#1a1a1a">가족과 함께</text>
    <text x="190" y="635" font-size="42" fill="#1B5FA6">영화·공연 관람, 국내 여행</text>

    <!-- 체크 항목 3 -->
    <rect x="60" y="710" width="960" height="190" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <rect x="95" y="775" width="60" height="60" rx="12" fill="#1F8A53"/>
    <path d="M108 805 l14 14 l24 -28" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="190" y="790" font-size="48" font-weight="bold" fill="#1a1a1a">스포츠 팬이라면</text>
    <text x="190" y="855" font-size="42" fill="#1B5FA6">4대 프로스포츠 경기 관람</text>
  </g>

  <!-- 강조 박스 -->
  <rect x="60" y="940" width="960" height="260" rx="20" fill="#FFF6D6" stroke="#FFD23F" stroke-width="3"/>
  <text x="100" y="1020" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="44" font-weight="bold" fill="#8a6d00">가장 실패 없는 방법</text>
  <text x="100" y="1090" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="48" font-weight="bold" fill="#1a1a1a">온라인 도서 구매</text>
  <text x="100" y="1155" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="40" fill="#4a5a6a">앉은 자리에서 잔액 확인 후 바로 소진</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">출처: 문화누리 공식 사용안내</text>
</svg>
