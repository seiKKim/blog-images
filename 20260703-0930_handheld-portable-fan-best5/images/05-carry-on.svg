<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="1080" height="1350" fill="#F1F8FA"/>
<rect width="1080" height="200" fill="#1E6B7A"/>
<text x="60" y="105" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">손풍기·보조배터리 기내반입</text>
<text x="60" y="165" font-family="Malgun Gothic" font-size="38" fill="#DFF3F7">여름 여행 전 꼭 확인하세요</text>
<!-- 대원칙 -->
<rect x="60" y="240" width="960" height="120" rx="16" fill="#0E3A44"/>
<text x="540" y="315" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#ffffff" text-anchor="middle">위탁수하물 불가 · 기내 휴대 필수</text>
<!-- 용량 기준 3행 -->
<g font-family="Malgun Gothic">
<rect x="60" y="390" width="960" height="110" rx="14" fill="#ffffff" stroke="#D6E4E8"/>
<text x="96" y="458" font-weight="bold" font-size="44" fill="#1E6B7A">100Wh 이하</text>
<text x="984" y="458" font-size="38" fill="#3B5560" text-anchor="end">승인 없이, 최대 5개</text>
<rect x="60" y="514" width="960" height="110" rx="14" fill="#ffffff" stroke="#D6E4E8"/>
<text x="96" y="582" font-weight="bold" font-size="44" fill="#1E6B7A">100~160Wh</text>
<text x="984" y="582" font-size="38" fill="#3B5560" text-anchor="end">사전 승인, 최대 2개</text>
<rect x="60" y="638" width="960" height="110" rx="14" fill="#FBEAEA" stroke="#E7B7B7"/>
<text x="96" y="706" font-weight="bold" font-size="44" fill="#C0392B">160Wh 초과</text>
<text x="984" y="706" font-size="38" fill="#C0392B" text-anchor="end">기내·위탁 모두 불가</text>
</g>
<text x="60" y="812" font-family="Malgun Gothic" font-size="32" fill="#7A8B94">환산: Wh = mAh × 3.7V ÷ 1000 · 손풍기는 대부분 100Wh 미만</text>
<!-- 2026 신규 -->
<rect x="60" y="852" width="960" height="360" rx="20" fill="#FFF7DE" stroke="#FFD23F" stroke-width="3"/>
<text x="90" y="922" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#0C2A31">2026년 새 규정</text>
<g font-family="Malgun Gothic" font-size="38" fill="#3B5560">
<text x="90" y="988">· 1/26부터 기내 사용·충전 금지</text>
<text x="90" y="1046">· 머리 위 선반 보관 금지(눈에 보이는 곳)</text>
<text x="90" y="1104">· 단락 방지: 단자 절연·지퍼백 보관</text>
<text x="90" y="1162">· Wh/mAh 미표기 제품은 반입 거부될 수 있음</text>
</g>
<rect x="0" y="1270" width="1080" height="80" fill="#E3EEF1"/>
<text x="60" y="1322" font-family="Malgun Gothic" font-size="34" fill="#5B6B7C">세부 개수 제한은 출발 전 항공사 공지 직접 확인</text>
</svg>