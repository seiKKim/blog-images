<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
<rect width="1080" height="1080" fill="#F1F8FA"/>
<rect width="1080" height="180" fill="#1E6B7A"/>
<text x="60" y="115" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff">가격대별 3구간</text>
<!-- 1만원대 -->
<rect x="60" y="250" width="960" height="230" rx="20" fill="#ffffff" stroke="#D6E4E8"/>
<rect x="60" y="250" width="14" height="230" rx="7" fill="#C9D8DC"/>
<text x="110" y="330" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#3B5560">1만원대 이하</text>
<text x="1000" y="330" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#1E6B7A" text-anchor="end">다이소 5,000원</text>
<text x="110" y="398" font-family="Malgun Gothic" font-size="38" fill="#3B5560">가성비 입문 · 잠깐/예비용</text>
<text x="110" y="450" font-family="Malgun Gothic" font-size="36" fill="#7A8B94">추천: 저강도 사용자</text>
<!-- 2~4만원대 -->
<rect x="60" y="504" width="960" height="230" rx="20" fill="#ffffff" stroke="#3FA9C9" stroke-width="3"/>
<rect x="60" y="504" width="14" height="230" rx="7" fill="#3FA9C9"/>
<rect x="770" y="520" width="220" height="56" rx="28" fill="#3FA9C9"/>
<text x="880" y="558" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#ffffff" text-anchor="middle">가장 무난</text>
<text x="110" y="588" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#3B5560">2~4만원대</text>
<text x="110" y="652" font-family="Malgun Gothic" font-size="38" fill="#3B5560">국산 BLDC 대중화 (신일·아이리버 등)</text>
<text x="110" y="704" font-family="Malgun Gothic" font-size="36" fill="#7A8B94">추천: 대다수 일반 사용자</text>
<!-- 5만원 이상 -->
<rect x="60" y="758" width="960" height="230" rx="20" fill="#ffffff" stroke="#D6E4E8"/>
<rect x="60" y="758" width="14" height="230" rx="7" fill="#FFD23F"/>
<text x="110" y="838" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#3B5560">5만원 이상</text>
<text x="1000" y="838" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#1E6B7A" text-anchor="end">다이슨 약 15만원</text>
<text x="110" y="906" font-family="Malgun Gothic" font-size="38" fill="#3B5560">프리미엄 · 초강풍/초저소음</text>
<text x="110" y="958" font-family="Malgun Gothic" font-size="36" fill="#7A8B94">추천: 강풍·장시간·디자인 중시</text>
<text x="60" y="1046" font-family="Malgun Gothic" font-size="34" fill="#7A8B94">* 국내 출시·가격은 시점에 따라 다를 수 있어요</text>
</svg>