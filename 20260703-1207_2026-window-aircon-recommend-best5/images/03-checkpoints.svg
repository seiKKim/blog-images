<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FBF5EF"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <rect x="60" y="88" rx="26" ry="26" width="188" height="56" fill="#FFD23F"/>
  <text x="154" y="126" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="30" fill="#1a1a1a" text-anchor="middle">생활꿀팁</text>
  <text x="60" y="178" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#ffffff">고르는 법 5가지 체크포인트</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 1 -->
    <rect x="60" y="256" width="960" height="192" rx="18" fill="#ffffff" stroke="#EDD9C7"/>
    <circle cx="140" cy="352" r="46" fill="#E8722C"/>
    <text x="140" y="368" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
    <text x="220" y="330" font-size="46" font-weight="bold" fill="#333">냉방능력 / 평형</text>
    <text x="220" y="392" font-size="36" fill="#666">쓸 공간보다 1평 크게 (5평 방 → 6평형)</text>

    <!-- 2 -->
    <rect x="60" y="464" width="960" height="192" rx="18" fill="#ffffff" stroke="#EDD9C7"/>
    <circle cx="140" cy="560" r="46" fill="#E8722C"/>
    <text x="140" y="576" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
    <text x="220" y="538" font-size="46" font-weight="bold" fill="#333">인버터 vs 정속형</text>
    <text x="220" y="600" font-size="36" fill="#666">오래·매일·취침용이면 인버터 1등급 유리</text>

    <!-- 3 -->
    <rect x="60" y="672" width="960" height="192" rx="18" fill="#ffffff" stroke="#EDD9C7"/>
    <circle cx="140" cy="768" r="46" fill="#E8722C"/>
    <text x="140" y="784" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
    <text x="220" y="746" font-size="46" font-weight="bold" fill="#333">소음 (dB)</text>
    <text x="220" y="808" font-size="36" fill="#666">제품·모드·설치에 따라 30dB대~50dB대 편차</text>

    <!-- 4 -->
    <rect x="60" y="880" width="960" height="192" rx="18" fill="#ffffff" stroke="#EDD9C7"/>
    <circle cx="140" cy="976" r="46" fill="#E8722C"/>
    <text x="140" y="992" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
    <text x="220" y="954" font-size="46" font-weight="bold" fill="#333">자가설치 / 창틀 호환</text>
    <text x="220" y="1016" font-size="36" fill="#666">미서기창·창 폭 약 65cm 이상, 실측이 먼저</text>

    <!-- 5 -->
    <rect x="60" y="1088" width="960" height="192" rx="18" fill="#ffffff" stroke="#EDD9C7"/>
    <circle cx="140" cy="1184" r="46" fill="#E8722C"/>
    <text x="140" y="1200" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">5</text>
    <text x="220" y="1162" font-size="46" font-weight="bold" fill="#333">에너지효율등급</text>
    <text x="220" y="1224" font-size="36" fill="#666">1등급끼리 차이 작음, 정속형과 차이가 더 큼</text>
  </g>

  <text x="1000" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" fill="#a08a72" text-anchor="end">blog.naver.com/trip_chocho</text>
</svg>
