<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FBF5EF"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <rect x="60" y="88" rx="26" ry="26" width="188" height="56" fill="#FFD23F"/>
  <text x="154" y="126" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="30" fill="#1a1a1a" text-anchor="middle">생활꿀팁</text>
  <text x="60" y="178" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="54" fill="#ffffff">창문형 vs 이동식 설치 구조</text>

  <!-- 창문형 패널 -->
  <rect x="60" y="256" width="460" height="640" rx="20" fill="#ffffff" stroke="#EDD9C7"/>
  <rect x="60" y="256" width="460" height="90" rx="20" fill="#E8722C"/>
  <text x="290" y="316" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="44" fill="#ffffff" text-anchor="middle">창문형</text>
  <!-- 창틀 + 유닛 그림 -->
  <g transform="translate(130,380)">
    <rect x="0" y="0" width="320" height="300" rx="10" fill="#EAF1F7" stroke="#B9C6D4" stroke-width="4"/>
    <line x1="160" y1="0" x2="160" y2="300" stroke="#B9C6D4" stroke-width="4"/>
    <line x1="0" y1="150" x2="320" y2="150" stroke="#B9C6D4" stroke-width="4"/>
    <!-- 창에 끼운 유닛 -->
    <rect x="20" y="60" width="150" height="180" rx="8" fill="#F0863A"/>
    <rect x="36" y="80" width="118" height="60" rx="5" fill="#ffffff"/>
    <line x1="44" y1="180" x2="146" y2="180" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <line x1="44" y1="202" x2="146" y2="202" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <!-- 냉기 실내로 -->
    <path d="M60 250 q8 20 0 40" stroke="#5FB0E8" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M100 250 q8 20 0 40" stroke="#5FB0E8" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
  <text x="290" y="748" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="34" fill="#333" text-anchor="middle">창에 끼움 · 타공 X</text>
  <text x="290" y="800" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" fill="#666" text-anchor="middle">열을 직접 외부로 배출</text>
  <text x="290" y="852" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" fill="#666" text-anchor="middle">본체만 떼어 이사 가능</text>

  <!-- 이동식 패널 -->
  <rect x="560" y="256" width="460" height="640" rx="20" fill="#ffffff" stroke="#EDD9C7"/>
  <rect x="560" y="256" width="460" height="90" rx="20" fill="#8a8a8a"/>
  <text x="790" y="316" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="44" fill="#ffffff" text-anchor="middle">이동식</text>
  <g transform="translate(620,380)">
    <rect x="0" y="0" width="320" height="300" rx="10" fill="#EAF1F7" stroke="#B9C6D4" stroke-width="4"/>
    <line x1="0" y1="150" x2="320" y2="150" stroke="#B9C6D4" stroke-width="4"/>
    <!-- 방 안 본체 -->
    <rect x="30" y="150" width="110" height="130" rx="8" fill="#9AA6B2"/>
    <rect x="46" y="168" width="78" height="40" rx="4" fill="#ffffff"/>
    <!-- 배기호스 창밖으로 -->
    <path d="M140 190 q90 0 130 -80" stroke="#C0808A" stroke-width="22" fill="none" stroke-linecap="round"/>
    <text x="240" y="250" font-size="26" fill="#B05" text-anchor="middle">배기호스</text>
  </g>
  <text x="790" y="748" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="34" fill="#333" text-anchor="middle">배기호스만 창밖으로</text>
  <text x="790" y="800" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" fill="#666" text-anchor="middle">압축기가 방 안 → 소음 직접</text>
  <text x="790" y="852" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" fill="#666" text-anchor="middle">호스 상태에 따라 효율 편차</text>

  <!-- 핵심 비교 배너 -->
  <rect x="60" y="936" width="960" height="150" rx="18" fill="#FFF3E6" stroke="#F0C89A"/>
  <text x="540" y="1002" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#333" text-anchor="middle">창문형 냉방효율 <tspan fill="#E8722C">이동식보다 약 1.5배 우수</tspan></text>
  <text x="540" y="1054" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#777" text-anchor="middle">(비교 자료 기준 · 설치·조건에 따라 달라짐)</text>

  <!-- 창문형이 맞는 사람 -->
  <text x="60" y="1150" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#333">창문형이 맞는 사람</text>
  <text x="60" y="1210" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#555">전월세·원룸·기숙사 · 방 하나 계속 시원하게 · 창 규격이 맞을 때</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#F0E3D6"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#8a6f58">blog.naver.com/trip_chocho · 본문 참고 정리</text>
</svg>
