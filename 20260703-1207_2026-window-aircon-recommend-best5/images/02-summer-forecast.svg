<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FBF5EF"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <rect x="60" y="88" rx="26" ry="26" width="188" height="56" fill="#FFD23F"/>
  <text x="154" y="126" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="30" fill="#1a1a1a" text-anchor="middle">생활꿀팁</text>
  <text x="60" y="178" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="54" fill="#ffffff">2026 여름 더위 전망</text>

  <!-- 상단 설명 -->
  <text x="60" y="272" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#333">평년보다 더울 확률 (기상청 전망)</text>

  <!-- 막대 그래프 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 기준선 -->
    <line x1="150" y1="620" x2="1020" y2="620" stroke="#D9C9BB" stroke-width="3"/>

    <!-- 6·7월 60% -->
    <rect x="230" y="380" width="180" height="240" rx="10" fill="#E8722C"/>
    <text x="320" y="352" font-size="52" font-weight="bold" fill="#E8722C" text-anchor="middle">약 60%</text>
    <text x="320" y="672" font-size="40" font-weight="bold" fill="#444" text-anchor="middle">6·7월</text>

    <!-- 8월 50% -->
    <rect x="620" y="420" width="180" height="200" rx="10" fill="#F0A05A"/>
    <text x="710" y="392" font-size="52" font-weight="bold" fill="#D2691E" text-anchor="middle">약 50%</text>
    <text x="710" y="672" font-size="40" font-weight="bold" fill="#444" text-anchor="middle">8월</text>
  </g>

  <!-- 열대야 카드 -->
  <rect x="60" y="750" width="960" height="180" rx="18" fill="#ffffff" stroke="#EDD9C7"/>
  <text x="100" y="820" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#333">2025 서울 열대야</text>
  <text x="100" y="890" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#666">관측 이래 최다 → 침실·작은방만 식히려는 수요 증가</text>
  <text x="1000" y="865" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="88" fill="#E8722C" text-anchor="end">46일</text>

  <!-- 전기요금 카드 -->
  <rect x="60" y="960" width="960" height="180" rx="18" fill="#ffffff" stroke="#EDD9C7"/>
  <text x="100" y="1030" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#333">인버터 1등급 전기요금</text>
  <text x="100" y="1100" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#666">하루 8시간 기준 · 설정온도·단열·사용시간에 따라 다름</text>
  <text x="1000" y="1075" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="66" fill="#E8722C" text-anchor="end">월 2~3만원대</text>

  <!-- 주의 문구 -->
  <text x="60" y="1210" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#8a8a8a">※ 위 수치는 전망·대략값으로, 조건에 따라 달라집니다</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#F0E3D6"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#8a6f58">blog.naver.com/trip_chocho · 본문 참고 정리</text>
</svg>
