<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <rect x="60" y="56" rx="30" ry="30" width="200" height="60" fill="#FFD23F"/>
  <text x="160" y="98" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="32" fill="#1a1a1a" text-anchor="middle">정부지원금</text>
  <text x="60" y="170" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">이런 경우는 지원 제외</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 항목 6개 -->
    <rect x="60" y="270" width="960" height="140" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="110" y="352" font-size="52" fill="#E23B3B" font-weight="bold">✕</text>
    <text x="180" y="345" font-size="40" fill="#1a1a1a" font-weight="bold">주택 소유자</text>
    <text x="180" y="392" font-size="30" fill="#5B6B7C">분양권·입주권 포함 여부는 공고 확인</text>

    <rect x="60" y="430" width="960" height="140" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="110" y="512" font-size="52" fill="#E23B3B" font-weight="bold">✕</text>
    <text x="180" y="505" font-size="40" fill="#1a1a1a" font-weight="bold">부모·2촌 이내 혈족 집 임차</text>
    <text x="180" y="552" font-size="30" fill="#5B6B7C">친인척 소유 주택 월세</text>

    <rect x="60" y="590" width="960" height="140" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="110" y="672" font-size="52" fill="#E23B3B" font-weight="bold">✕</text>
    <text x="180" y="665" font-size="40" fill="#1a1a1a" font-weight="bold">공공임대주택 거주자</text>
    <text x="180" y="712" font-size="30" fill="#5B6B7C">행복주택·매입임대·전세임대 등</text>

    <rect x="60" y="750" width="960" height="140" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="110" y="832" font-size="52" fill="#E23B3B" font-weight="bold">✕</text>
    <text x="180" y="825" font-size="40" fill="#1a1a1a" font-weight="bold">순수 전세 거주자</text>
    <text x="180" y="872" font-size="30" fill="#5B6B7C">월세가 없는 경우</text>

    <rect x="60" y="910" width="960" height="140" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="110" y="992" font-size="52" fill="#E23B3B" font-weight="bold">✕</text>
    <text x="180" y="985" font-size="40" fill="#1a1a1a" font-weight="bold">보증금·월세 상한 초과 주택</text>
    <text x="180" y="1032" font-size="30" fill="#5B6B7C">국토부 보증금 5천·월세 70만 원 기준</text>

    <rect x="60" y="1070" width="960" height="140" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="110" y="1152" font-size="52" fill="#E23B3B" font-weight="bold">✕</text>
    <text x="180" y="1145" font-size="40" fill="#1a1a1a" font-weight="bold">다른 청년월세 지원 수급 중</text>
    <text x="180" y="1192" font-size="30" fill="#5B6B7C">지자체 사업과 중복 수급 불가</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 청년월세 특별지원 공고 / 복지로 · 세부는 거주지 공고 확인</text>
</svg>
