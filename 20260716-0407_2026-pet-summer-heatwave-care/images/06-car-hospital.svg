<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F1F8FB"/>
  <rect width="1080" height="210" fill="#0E7C9E"/>
  <rect x="60" y="72" rx="26" ry="26" width="260" height="56" fill="#FFD23F"/>
  <text x="190" y="111" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="32" fill="#0A5A73" text-anchor="middle">차량·응급</text>
  <text x="60" y="185" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">차량 방치 & 병원 신호</text>

  <!-- 차량 온도 상승 강조 -->
  <rect x="60" y="270" width="960" height="285" rx="18" fill="#FFE9E9" stroke="#F3B4B4"/>
  <text x="100" y="340" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#E23B3B">차 안은 단시간에도 치명적</text>
  <!-- 온도 화살표 표현 -->
  <text x="110" y="470" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="90" fill="#0E7C9E">30℃</text>
  <text x="380" y="470" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="70" fill="#5B7684">→</text>
  <text x="470" y="470" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="90" fill="#E23B3B">40℃↑</text>
  <text x="100" y="530" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#243B4A">외부 30℃일 때 차 내부는 10분 만에 40℃ 이상</text>

  <!-- 잠깐도 금지 -->
  <rect x="60" y="575" width="960" height="90" rx="16" fill="#0E7C9E"/>
  <text x="540" y="633" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="44" fill="#ffffff" text-anchor="middle">잠깐이라도 절대 혼자 두지 마세요</text>

  <!-- 병원 신호 -->
  <text x="60" y="740" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="48" fill="#0A5A73">즉시 병원 가야 할 신호</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="38" fill="#243B4A">
    <rect x="60" y="775" width="960" height="88" rx="14" fill="#ffffff" stroke="#CFE6EF"/>
    <text x="100" y="830" fill="#E23B3B" font-weight="bold">체온 40℃ 이상</text>

    <rect x="60" y="878" width="960" height="88" rx="14" fill="#ffffff" stroke="#CFE6EF"/>
    <text x="100" y="933">잇몸·혀가 파랗거나 창백 · 검붉음~보라색</text>

    <rect x="60" y="981" width="960" height="88" rx="14" fill="#ffffff" stroke="#CFE6EF"/>
    <text x="100" y="1036">1분 호흡수 40회 넘겨 지속 · 심한 헐떡임</text>

    <rect x="60" y="1084" width="960" height="88" rx="14" fill="#ffffff" stroke="#CFE6EF"/>
    <text x="100" y="1139">거품 섞인 침 · 비틀거림 · 구토·설사·경련</text>
  </g>

  <text x="60" y="1235" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="38" fill="#0E7C9E">분 단위로 다투는 응급 — 빨리 식히고 빨리 병원으로</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#DCEAF1"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B7684">차량 방치 경고: 농림축산식품부</text>
</svg>
