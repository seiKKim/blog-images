<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F1F8FB"/>
  <rect width="1080" height="210" fill="#0E7C9E"/>
  <rect x="60" y="72" rx="26" ry="26" width="220" height="56" fill="#FFD23F"/>
  <text x="170" y="111" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="32" fill="#0A5A73" text-anchor="middle">쿨링용품</text>
  <text x="60" y="185" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">쿨매트 소재별 비교</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 젤 타입 -->
    <rect x="60" y="270" width="960" height="215" rx="18" fill="#ffffff" stroke="#CFE6EF"/>
    <text x="100" y="335" font-weight="bold" font-size="46" fill="#0A5A73">젤 타입</text>
    <text x="100" y="392" font-size="36" fill="#243B4A">즉각 냉감 · 체열 흡수 후 미지근해짐</text>
    <text x="100" y="448" font-size="34" fill="#E23B3B">무는 습관 있는 아이는 피하기(섭취 위험)</text>

    <!-- 알루미늄·대리석 -->
    <rect x="60" y="500" width="960" height="215" rx="18" fill="#ffffff" stroke="#CFE6EF"/>
    <text x="100" y="565" font-weight="bold" font-size="46" fill="#0A5A73">알루미늄·대리석(석재/금속)</text>
    <text x="100" y="622" font-size="36" fill="#243B4A">지속적인 냉감에 유리</text>
    <text x="100" y="678" font-size="34" fill="#5B7684">대형견은 넓은 면적 필요</text>

    <!-- 인견·에어매쉬 -->
    <rect x="60" y="730" width="960" height="215" rx="18" fill="#ffffff" stroke="#CFE6EF"/>
    <text x="100" y="795" font-weight="bold" font-size="46" fill="#0A5A73">인견·에어매쉬 쿨방석</text>
    <text x="100" y="852" font-size="36" fill="#243B4A">통풍이 좋아 도움</text>
    <text x="100" y="908" font-size="34" fill="#5B7684">처음엔 지켜보며 적응</text>

    <!-- 쿨링 조끼 -->
    <rect x="60" y="960" width="960" height="215" rx="18" fill="#ffffff" stroke="#CFE6EF"/>
    <text x="100" y="1025" font-weight="bold" font-size="46" fill="#0A5A73">쿨링 조끼</text>
    <text x="100" y="1082" font-size="36" fill="#243B4A">아이스팩 넣는 형태로 즉각 냉감</text>
    <text x="100" y="1138" font-size="34" fill="#5B7684">더위 많이 타는 아이·외출 시 유용</text>
  </g>

  <!-- 주의 띠 -->
  <rect x="60" y="1200" width="960" height="60" rx="14" fill="#FFE9E9"/>
  <text x="90" y="1240" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="34" fill="#E23B3B">⚠ 쿨링용품은 보조 수단 · 그늘·환기·물이 기본</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#DCEAF1"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B7684">지속 냉감은 젤보다 알루미늄·대리석이 유리</text>
</svg>
