<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F1F8FB"/>
  <!-- 상단 색띠 + 제목 -->
  <rect width="1080" height="210" fill="#0E7C9E"/>
  <rect x="60" y="72" rx="26" ry="26" width="220" height="56" fill="#FFD23F"/>
  <text x="170" y="111" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="32" fill="#0A5A73" text-anchor="middle">열사병 신호</text>
  <text x="60" y="185" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">증상 단계별 체크리스트</text>

  <!-- 초기 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="60" y="270" width="960" height="200" rx="18" fill="#ffffff" stroke="#CFE6EF"/>
    <rect x="60" y="270" width="14" height="200" rx="7" fill="#3BB5D6"/>
    <text x="100" y="335" font-weight="bold" font-size="44" fill="#0A5A73">1단계 · 초기</text>
    <text x="100" y="392" font-size="37" fill="#243B4A">과도한 헐떡임(팬팅), 불안·안절부절</text>
    <text x="100" y="440" font-size="37" fill="#243B4A">끈적한 침을 심하게 흘림</text>
  </g>

  <!-- 진행 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="60" y="500" width="960" height="255" rx="18" fill="#ffffff" stroke="#CFE6EF"/>
    <rect x="60" y="500" width="14" height="255" rx="7" fill="#E8722C"/>
    <text x="100" y="565" font-weight="bold" font-size="44" fill="#0A5A73">2단계 · 진행</text>
    <text x="100" y="622" font-size="37" fill="#243B4A">혀·잇몸 색 변화(선홍→붉음→자주/청색)</text>
    <text x="100" y="670" font-size="37" fill="#243B4A">구토·설사, 비정상적으로 빠른 심장박동</text>
    <text x="100" y="718" font-size="37" fill="#243B4A">자주색·청색은 이미 위중한 신호</text>
  </g>

  <!-- 위중 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="60" y="785" width="960" height="200" rx="18" fill="#ffffff" stroke="#CFE6EF"/>
    <rect x="60" y="785" width="14" height="200" rx="7" fill="#E23B3B"/>
    <text x="100" y="850" font-weight="bold" font-size="44" fill="#E23B3B">3단계 · 위중</text>
    <text x="100" y="907" font-size="37" fill="#243B4A">심한 무기력, 비틀거림</text>
    <text x="100" y="955" font-size="37" fill="#243B4A">의식 저하·혼미, 경련</text>
  </g>

  <!-- 고양이 주의 박스 -->
  <rect x="60" y="1015" width="960" height="200" rx="18" fill="#E8F6FB" stroke="#9FD3E4"/>
  <text x="100" y="1080" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#0A5A73">🐱 고양이는 입 벌리고 헐떡이면 그 자체가 위험</text>
  <text x="100" y="1138" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="37" fill="#243B4A">심박 증가·끈적한 침·무기력·과도한 그루밍이</text>
  <text x="100" y="1186" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="37" fill="#243B4A">함께 나타나면 서둘러 병원으로</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#DCEAF1"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B7684">정상 체온 38~39℃ · 40℃ 넘으면 열사병</text>
</svg>
