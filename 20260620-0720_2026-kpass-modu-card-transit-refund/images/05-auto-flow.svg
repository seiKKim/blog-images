<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="980" viewBox="0 0 1080 980">
  <rect width="1080" height="980" fill="#F4F7FB"/>
  <rect width="1080" height="180" fill="#1B5FA6"/>
  <text x="60" y="112" font-family="Noto Sans CJK KR" font-weight="bold" font-size="56" fill="#ffffff">유리한 쪽 자동 적용</text>

  <!-- step1 -->
  <rect x="90" y="240" width="900" height="120" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="540" y="315" font-family="Noto Sans CJK KR" font-weight="bold" font-size="44" fill="#1a1a1a" text-anchor="middle">한 달 동안 대중교통 이용</text>

  <text x="540" y="408" font-family="Noto Sans CJK KR" font-size="56" fill="#1B5FA6" text-anchor="middle">▼</text>

  <!-- step2 두 박스 비교 -->
  <rect x="90" y="430" width="420" height="150" rx="18" fill="#E8EEF5" stroke="#1B5FA6" stroke-width="2"/>
  <text x="300" y="500" font-family="Noto Sans CJK KR" font-weight="bold" font-size="40" fill="#1B5FA6" text-anchor="middle">기본형</text>
  <text x="300" y="552" font-family="Noto Sans CJK KR" font-size="34" fill="#5B6B7C" text-anchor="middle">정률 환급</text>

  <text x="540" y="525" font-family="Noto Sans CJK KR" font-weight="bold" font-size="50" fill="#1a1a1a" text-anchor="middle">vs</text>

  <rect x="570" y="430" width="420" height="150" rx="18" fill="#FFF6D6" stroke="#FFD23F" stroke-width="3"/>
  <text x="780" y="500" font-family="Noto Sans CJK KR" font-weight="bold" font-size="40" fill="#E8722C" text-anchor="middle">모두의 카드</text>
  <text x="780" y="552" font-family="Noto Sans CJK KR" font-size="34" fill="#5B6B7C" text-anchor="middle">정액형(초과분 전액)</text>

  <text x="540" y="650" font-family="Noto Sans CJK KR" font-size="56" fill="#1B5FA6" text-anchor="middle">▼</text>

  <!-- step3 -->
  <rect x="90" y="670" width="900" height="120" rx="18" fill="#1B5FA6"/>
  <text x="540" y="745" font-family="Noto Sans CJK KR" font-weight="bold" font-size="44" fill="#FFD23F" text-anchor="middle">환급 큰 쪽 자동 적용 → 다음 달 환급</text>

  <text x="540" y="858" font-family="Noto Sans CJK KR" font-size="38" fill="#5B6B7C" text-anchor="middle">사전 선택 X · 기존 K-패스 카드 그대로</text>
  <rect x="0" y="900" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="952" font-family="Noto Sans CJK KR" font-size="32" fill="#5B6B7C">출처: 정책브리핑(korea.kr) · 국토부 대광위</text>
</svg>
