<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1120" viewBox="0 0 1080 1120">
  <rect width="1080" height="1120" fill="#F4F7FB"/>
  <rect width="1080" height="180" fill="#1B5FA6"/>
  <text x="60" y="112" font-family="Noto Sans CJK KR" font-weight="bold" font-size="58" fill="#ffffff">상황별 추천 요약</text>

  <g font-family="Noto Sans CJK KR">
    <rect x="60" y="240" width="960" height="170" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="312" font-size="40" fill="#5B6B7C">가끔 타는 편이라면</text>
    <text x="100" y="372" font-size="46" font-weight="bold" fill="#1B5FA6">→ 기본형(정률) 자동 적용</text>

    <rect x="60" y="430" width="960" height="170" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="502" font-size="40" font-weight="bold" fill="#5B6B7C">출퇴근·통학 매일 탄다면</text>
    <text x="100" y="562" font-size="46" font-weight="bold" fill="#1B5FA6">→ 모두의 카드가 유리</text>

    <rect x="60" y="620" width="960" height="170" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="692" font-size="40" font-weight="bold" fill="#5B6B7C">신분당선·GTX까지 탄다면</text>
    <text x="100" y="752" font-size="46" font-weight="bold" fill="#1B5FA6">→ 플러스형 기준 적용</text>

    <rect x="60" y="810" width="960" height="170" rx="18" fill="#FFF6D6" stroke="#FFD23F"/>
    <text x="100" y="882" font-size="40" font-weight="bold" fill="#5B6B7C">만 65세 이상이라면</text>
    <text x="100" y="942" font-size="46" font-weight="bold" fill="#1B5FA6">→ 어르신 30% 환급 챙기기</text>
  </g>

  <rect x="0" y="1040" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1092" font-family="Noto Sans CJK KR" font-size="32" fill="#5B6B7C">출처: 정책브리핑(korea.kr) · 국토부 대광위</text>
</svg>
