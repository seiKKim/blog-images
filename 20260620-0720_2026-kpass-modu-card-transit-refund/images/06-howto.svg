<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1180" viewBox="0 0 1080 1180">
  <rect width="1080" height="1180" fill="#F4F7FB"/>
  <rect width="1080" height="180" fill="#1B5FA6"/>
  <text x="60" y="112" font-family="Noto Sans CJK KR" font-weight="bold" font-size="58" fill="#ffffff">K-패스 이용 4단계</text>

  <g font-family="Noto Sans CJK KR">
    <!-- 1 -->
    <circle cx="135" cy="320" r="55" fill="#1B5FA6"/>
    <text x="135" y="338" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
    <text x="230" y="305" font-size="46" font-weight="bold" fill="#1a1a1a">누리집·앱에서 카드 발급·등록</text>
    <text x="230" y="358" font-size="34" fill="#5B6B7C">모두의 카드 신청 27개 카드사 가능</text>

    <!-- 2 -->
    <circle cx="135" cy="520" r="55" fill="#1B5FA6"/>
    <text x="135" y="538" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
    <text x="230" y="505" font-size="46" font-weight="bold" fill="#1a1a1a">평소처럼 버스·지하철 이용</text>
    <text x="230" y="558" font-size="34" fill="#5B6B7C">전국 218개 기초지자체 적용</text>

    <!-- 3 -->
    <circle cx="135" cy="720" r="55" fill="#1B5FA6"/>
    <text x="135" y="738" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
    <text x="230" y="705" font-size="46" font-weight="bold" fill="#1a1a1a">월 15회 이상이면 자동 적립</text>
    <text x="230" y="758" font-size="34" fill="#5B6B7C">매번 따로 신청할 필요 없음</text>

    <!-- 4 -->
    <circle cx="135" cy="920" r="55" fill="#FFD23F"/>
    <text x="135" y="938" font-size="52" font-weight="bold" fill="#1a1a1a" text-anchor="middle">4</text>
    <text x="230" y="905" font-size="46" font-weight="bold" fill="#1a1a1a">가장 유리한 방식으로 환급</text>
    <text x="230" y="958" font-size="34" fill="#5B6B7C">익월 7영업일경 카드사 전달 후 지급</text>
  </g>

  <rect x="0" y="1100" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1152" font-family="Noto Sans CJK KR" font-size="32" fill="#5B6B7C">출처: 정책브리핑(korea.kr)·카드사 안내</text>
</svg>
