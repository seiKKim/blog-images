<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350"><rect width="1080" height="1350" fill="#FFF6EE"/><rect width="1080" height="190" fill="#E8722C"/><rect x="64" y="60" rx="30" ry="30" width="200" height="60" fill="#FFD23F"/><text x="164" y="102" font-family="Malgun Gothic, 'Malgun Gothic', sans-serif" font-weight="bold" font-size="34" fill="#1a1a1a" text-anchor="middle">생활꿀팁</text><text x="64" y="160" font-family="Malgun Gothic, 'Malgun Gothic', sans-serif" font-weight="bold" font-size="60" fill="#ffffff">필터 청소 — 가장 기본, 셀프 가능</text>
