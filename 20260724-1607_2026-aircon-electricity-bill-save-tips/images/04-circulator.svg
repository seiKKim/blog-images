<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F9FC"/>
  <!-- 상단 색띠 + 제목 -->
  <rect width="1080" height="150" fill="#0E5C8A"/>
  <rect x="0" y="0" width="12" height="150" fill="#E8722C"/>
  <text x="56" y="95" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="52" fill="#ffffff">에어컨 + 서큘레이터 병행</text>

  <!-- 방 -->
  <rect x="70" y="210" width="600" height="440" rx="18" fill="#ffffff" stroke="#C5D6E2" stroke-width="4"/>

  <!-- 에어컨 (좌상단 벽걸이) -->
  <rect x="100" y="250" width="230" height="80" rx="14" fill="#E8F4FB" stroke="#1D8FC9" stroke-width="4"/>
  <line x1="120" y1="310" x2="310" y2="310" stroke="#9EC7DE" stroke-width="4"/>
  <text x="215" y="300" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="30" fill="#0E5C8A" text-anchor="middle">에어컨</text>

  <!-- 냉기 하강 화살표 -->
  <g stroke="#1D8FC9" stroke-width="7" fill="none" opacity="0.9">
    <path d="M215 340 q-30 90 10 180"/>
  </g>
  <path d="M225 520 l-15 -8 l3 26 z" fill="#1D8FC9"/>

  <!-- 서큘레이터 (우하단) -->
  <circle cx="560" cy="560" r="52" fill="#E8722C" opacity="0.15"/>
  <circle cx="560" cy="560" r="52" fill="none" stroke="#E8722C" stroke-width="6"/>
  <circle cx="560" cy="560" r="12" fill="#E8722C"/>
  <path d="M560 560 l0 -42 M560 560 l38 18 M560 560 l-38 18" stroke="#E8722C" stroke-width="7"/>
  <text x="560" y="650" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="28" fill="#C25A18" text-anchor="middle">서큘레이터</text>

  <!-- 순환(아래→위) 화살표 -->
  <g stroke="#E8722C" stroke-width="7" fill="none">
    <path d="M510 555 q-140 -30 -160 -180 q-8 -60 40 -110"/>
  </g>
  <path d="M405 262 l-24 -2 l16 20 z" fill="#E8722C"/>

  <text x="150" y="470" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="30" fill="#1D8FC9">냉기 하강</text>
  <text x="360" y="420" font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="30" fill="#E8722C">아래→위 순환</text>

  <!-- 효과 카드 -->
  <g font-family="'Noto Sans CJK KR','Noto Sans KR','Malgun Gothic',sans-serif">
    <rect x="710" y="215" width="300" height="200" rx="16" fill="#0E5C8A"/>
    <text x="860" y="290" font-weight="bold" font-size="36" fill="#E8F4FB" text-anchor="middle">설정온도</text>
    <text x="860" y="360" font-weight="bold" font-size="72" fill="#FFD23F" text-anchor="middle">2~3℃↑</text>

    <rect x="710" y="435" width="300" height="200" rx="16" fill="#E8722C"/>
    <text x="860" y="510" font-weight="bold" font-size="36" fill="#ffffff" text-anchor="middle">에너지 효율</text>
    <text x="860" y="580" font-weight="bold" font-size="72" fill="#ffffff" text-anchor="middle">약 20%↑</text>
  </g>
</svg>
