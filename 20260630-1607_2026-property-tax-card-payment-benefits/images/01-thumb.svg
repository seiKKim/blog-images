<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#1F8A53"/>
  <circle cx="950" cy="180" r="260" fill="#ffffff" opacity="0.08"/>
  <circle cx="120" cy="980" r="200" fill="#ffffff" opacity="0.06"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="90" rx="34" ry="34" width="200" height="68" fill="#FFD23F"/>
  <text x="180" y="136" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="36" fill="#1a1a1a" text-anchor="middle">세금/환급</text>

  <!-- 서브 카피 -->
  <text x="80" y="320" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
