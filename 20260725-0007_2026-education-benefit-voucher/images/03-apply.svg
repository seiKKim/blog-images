<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="105" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">교육급여 바우처 신청 방법</text>
  <text x="60" y="165" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#FFD23F">3곳 중 편한 곳에서 · 연중 신청 가능</text>

  <!-- 신청 경로 3개 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="60" y="270" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="140" cy="345" r="34" fill="#1B5FA6"/>
    <text x="140" y="360" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">1</text>
    <text x="215" y="332" font-weight="bold" font-size="46" fill="#1a1a1a">행정복지센터(주민센터)</text>
    <text x="215" y="386" font-size="34" fill="#5B6B7C">읍·면·동 방문 신청</text>

    <rect x="60" y="440" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="140" cy="515" r="34" fill="#1B5FA6"/>
    <text x="140" y="530" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">2</text>
    <text x="215" y="502" font-weight="bold" font-size="46" fill="#1a1a1a">복지로 (온라인)</text>
    <text x="215" y="556" font-size="34" fill="#5B6B7C">bokjiro.go.kr</text>

    <rect x="60" y="610" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="140" cy="685" r="34" fill="#1B5FA6"/>
    <text x="140" y="700" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">3</text>
    <text x="215" y="672" font-weight="bold" font-size="46" fill="#1a1a1a">교육비 원클릭 (온라인)</text>
    <text x="215" y="726" font-size="34" fill="#5B6B7C">oneclick.neis.go.kr</text>
  </g>

  <!-- 기간 안내 -->
  <rect x="60" y="820" width="960" height="230" rx="18" fill="#EAF1F9" stroke="#C9D6E4" stroke-width="2"/>
  <text x="100" y="895" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="44" fill="#1B5FA6">신청 기간</text>
  <text x="100" y="960" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="40" fill="#1a1a1a">집중신청 3/3~3/20 (종료)</text>
  <text x="100" y="1018" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="42" fill="#E8722C">놓쳤어도 연중 신청 가능!</text>

  <!-- 팁 -->
  <rect x="60" y="1090" width="960" height="140" rx="18" fill="#FFF6D9" stroke="#F0DD8E" stroke-width="2"/>
  <text x="100" y="1155" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#8a6d00">개학(8월) 전 신청해야</text>
  <text x="100" y="1205" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#8a6d00">2학기에 온전히 활용됩니다</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 복지로 · 교육부 · 정책브리핑(korea.kr)</text>
</svg>
