<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <rect width="1080" height="130" fill="#1B5FA6"/>
  <text x="60" y="85" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#ffffff">고교 무상교육 지원 항목</text>

  <text x="60" y="205" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1B5FA6">2021년부터 전 학년 전면 실시 · 원칙적 무상</text>

  <!-- 4개 항목 2x2 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="60" y="250" width="465" height="130" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="90" y="330" font-weight="bold" font-size="44" fill="#1a1a1a">입학금</text>

    <rect x="555" y="250" width="465" height="130" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="585" y="330" font-weight="bold" font-size="44" fill="#1a1a1a">수업료</text>

    <rect x="60" y="400" width="465" height="130" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="90" y="480" font-weight="bold" font-size="44" fill="#1a1a1a">학교운영지원비</text>

    <rect x="555" y="400" width="465" height="130" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="585" y="480" font-weight="bold" font-size="44" fill="#1a1a1a">교과서비</text>
  </g>

  <!-- 안내 띠 -->
  <rect x="60" y="560" width="960" height="90" rx="16" fill="#FFF6D9" stroke="#F0DD8E" stroke-width="2"/>
  <text x="90" y="617" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="34" fill="#8a6d00">저소득층 고교생 핵심 지원 = 교육활동지원비 86만원 바우처</text>

  <text x="1020" y="695" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" fill="#5B6B7C" text-anchor="end">초·중등교육법 제10조의2 · 교육급여 고교 학비는 무상교육 제외 학교 한정</text>
</svg>
