  <text x="80" y="320" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#ffffff">초·중·고 <tspan fill="#FFD23F">최대 86만원</tspan> 지원</text>

  <!-- 학교급별 금액 3열 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="80" y="380" rx="24" width="290" height="300" fill="#ffffff" opacity="0.12"/>
    <text x="225" y="452" font-weight="bold" font-size="46" fill="#E8EEF5" text-anchor="middle">초등</text>
    <text x="225" y="560" font-weight="bold" font-size="72" fill="#ffffff" text-anchor="middle">502,000</text>
    <text x="225" y="628" font-weight="bold" font-size="40" fill="#E8EEF5" text-anchor="middle">원</text>

    <rect x="395" y="380" rx="24" width="290" height="300" fill="#ffffff" opacity="0.12"/>
    <text x="540" y="452" font-weight="bold" font-size="46" fill="#E8EEF5" text-anchor="middle">중등</text>
    <text x="540" y="560" font-weight="bold" font-size="72" fill="#ffffff" text-anchor="middle">699,000</text>
    <text x="540" y="628" font-weight="bold" font-size="40" fill="#E8EEF5" text-anchor="middle">원</text>

    <rect x="710" y="380" rx="24" width="290" height="300" fill="#FFD23F"/>
    <text x="855" y="452" font-weight="bold" font-size="46" fill="#1a3a5c" text-anchor="middle">고등</text>
    <text x="855" y="560" font-weight="bold" font-size="72" fill="#1a1a1a" text-anchor="middle">860,000</text>
    <text x="855" y="628" font-weight="bold" font-size="40" fill="#1a3a5c" text-anchor="middle">원</text>
  </g>

  <!-- 디테일 박스 -->
  <rect x="80" y="730" rx="20" ry="20" width="920" height="150" fill="#ffffff" opacity="0.16"/>
  <text x="110" y="800" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
