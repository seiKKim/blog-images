  <!-- 채널 -->
  <text x="80" y="990" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#E8EEF5" opacity="0.9">blog.naver.com/trip_chocho</text>
