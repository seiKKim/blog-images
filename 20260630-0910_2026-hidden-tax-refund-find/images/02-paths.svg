<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
<rect width="1080" height="720" fill="#F4F7FB"/><rect width="1080" height="150" fill="#1F8A53"/><text x="54" y="108" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="60" fill="#ffffff" text-anchor="start">숨은 환급금, 어디서 찾나?</text><rect x="54" y="200" rx="22" width="320" height="440" fill="#ffffff" stroke="#D6E0EC"/><rect x="54" y="200" rx="22" width="320" height="90" fill="#1F8A53"/><text x="214.0" y="256" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">국세 환급금</text><text x="214.0" y="346" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal" font-size="34" fill="#1a1a1a" text-anchor="middle">홈택스 / 손택스 앱</text><text x="214.0" y="426" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal" font-size="34" fill="#1a1a1a" text-anchor="middle">ARS 1544-9944</text><text x="214.0" y="506" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="34" fill="#1F8A53" text-anchor="middle">→ 5년치 조회</text><rect x="404" y="200" rx="22" width="320" height="440" fill="#ffffff" stroke="#D6E0EC"/><rect x="404" y="200" rx="22" width="320" height="90" fill="#1F8A53"/><text x="564.0" y="256" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">지방세 환급금</text><text x="564.0" y="346" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal" font-size="34" fill="#1a1a1a" text-anchor="middle">위택스(wetax)</text><text x="564.0" y="426" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal" font-size="34" fill="#1a1a1a" text-anchor="middle">스마트위택스 앱</text><text x="564.0" y="506" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="34" fill="#1F8A53" text-anchor="middle">→ 계좌 등록·신청</text><rect x="754" y="200" rx="22" width="320" height="440" fill="#ffffff" stroke="#D6E0EC"/><rect x="754" y="200" rx="22" width="320" height="90" fill="#1F8A53"/><text x="914.0" y="256" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">한 번에 통합</text><text x="914.0" y="346" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal" font-size="34" fill="#1a1a1a" text-anchor="middle">정부24</text><text x="914.0" y="426" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal" font-size="34" fill="#1a1a1a" text-anchor="middle">&#x27;미환급금 찾기&#x27;</text><text x="914.0" y="506" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="34" fill="#1F8A53" text-anchor="middle">→ 여러 기관 동시</text>
