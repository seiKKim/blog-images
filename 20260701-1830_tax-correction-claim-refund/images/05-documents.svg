<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F9F6"/>
  <rect width="1080" height="170" fill="#1F8A53"/>
  <rect x="60" y="64" width="10" height="46" rx="5" fill="#FFD23F"/>
  <text x="92" y="118" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">경정청구 필요 서류 체크리스트</text>
  <text x="60" y="240" font-family="Malgun Gothic" font-size="34" fill="#5B6B62">누락 항목별 증빙을 미리 챙겨두면 처리가 빠릅니다</text>
  <rect x="60" y="300" width="960" height="135" fill="#1F8A53" stroke="#CFE3D7" stroke-width="2"/>
  <text x="150" y="382" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#FFFFFF" text-anchor="middle">항목</text>
  <text x="470" y="380" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#FFFFFF">필요 서류</text>
  <rect x="60" y="435" width="960" height="135" fill="#FFFFFF" stroke="#CFE3D7" stroke-width="2"/>
  <path d="M 92 498 l 16 18 l 30 -34" stroke="#1F8A53" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="160" y="516" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#176B40">의료비</text>
  <text x="470" y="514" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#1A2A22">병원·약국 영수증, 의료비 지급명세서</text>
  <rect x="60" y="570" width="960" height="135" fill="#EEF6F0" stroke="#CFE3D7" stroke-width="2"/>
  <path d="M 92 634 l 16 18 l 30 -34" stroke="#1F8A53" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="160" y="652" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#176B40">교육비</text>
  <text x="470" y="650" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#1A2A22">학원·학교 납입증명서</text>
  <rect x="60" y="705" width="960" height="135" fill="#FFFFFF" stroke="#CFE3D7" stroke-width="2"/>
  <path d="M 92 768 l 16 18 l 30 -34" stroke="#1F8A53" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="160" y="786" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#176B40">월세</text>
  <text x="470" y="784" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#1A2A22">임대차계약서, 월세 이체 내역</text>
  <rect x="60" y="840" width="960" height="135" fill="#EEF6F0" stroke="#CFE3D7" stroke-width="2"/>
  <path d="M 92 904 l 16 18 l 30 -34" stroke="#1F8A53" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="160" y="922" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#176B40">기부금</text>
  <text x="470" y="920" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#1A2A22">기부금 영수증</text>
  <rect x="60" y="975" width="960" height="135" fill="#FFFFFF" stroke="#CFE3D7" stroke-width="2"/>
  <path d="M 92 1038 l 16 18 l 30 -34" stroke="#1F8A53" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="160" y="1056" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#176B40">중소기업 감면</text>
  <text x="470" y="1054" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#1A2A22">감면신청서·감면명세서 등</text>
  <rect x="60" y="1110" width="960" height="135" fill="#EEF6F0" stroke="#CFE3D7" stroke-width="2"/>
  <path d="M 92 1174 l 16 18 l 30 -34" stroke="#1F8A53" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="160" y="1192" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#176B40">사업자</text>
  <text x="470" y="1190" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#1A2A22">당초 신고서류 + 추가 공제·경비 증빙</text>

  <rect x="60" y="1250" width="960" height="60" fill="#E8F3EC"/>
  <text x="60" y="1292" font-family="Malgun Gothic" font-size="30" fill="#5B6B62">간소화에 없는 증빙은 병원·학원·기관에 별도 요청</text>
</svg>