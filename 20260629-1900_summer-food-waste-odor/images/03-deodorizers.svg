  <rect x="60" y="68" width="10" height="60" rx="5" fill="#FFD23F"/>
  <text x="92" y="120" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#FFFFFF">천연 탈취제 5가지</text>

  <rect x="60" y="250" width="960" height="160" rx="20" fill="#FFFFFF" stroke="#F0CBA8"/>
  <circle cx="140" cy="330" r="44" fill="#E8722C"/>
  <text x="140" y="346" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="212" y="322" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#2A2A2A">베이킹소다</text>
  <text x="212" y="374" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C">알칼리로 산성 악취 중화 — 통 바닥·음식물 위에 솔솔</text>
  <rect x="60" y="434" width="960" height="160" rx="20" fill="#FFFFFF" stroke="#F0CBA8"/>
  <circle cx="140" cy="514" r="44" fill="#E8722C"/>
  <text x="140" y="530" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="212" y="506" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#2A2A2A">식초</text>
  <text x="212" y="558" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C">아세트산이 살균·탈취 동시 — 분무 후 뚜껑 닫기</text>
  <rect x="60" y="618" width="960" height="160" rx="20" fill="#FFFFFF" stroke="#F0CBA8"/>
  <circle cx="140" cy="698" r="44" fill="#E8722C"/>
  <text x="140" y="714" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="212" y="690" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#2A2A2A">커피찌꺼기·녹차</text>
  <text x="212" y="742" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C">탄닌 성분이 악취 흡착 — 바닥에 깔거나 위에 뿌리기</text>
  <rect x="60" y="802" width="960" height="160" rx="20" fill="#FFFFFF" stroke="#F0CBA8"/>
  <circle cx="140" cy="882" r="44" fill="#E8722C"/>
  <text x="140" y="898" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="212" y="874" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#2A2A2A">신문지</text>
  <text x="212" y="926" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C">수분 흡수 + 냄새 차단 — 베이킹소다와 함께 깔면 효과↑</text>
  <rect x="60" y="986" width="960" height="160" rx="20" fill="#FFFFFF" stroke="#F0CBA8"/>
  <circle cx="140" cy="1066" r="44" fill="#E8722C"/>
  <text x="140" y="1082" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="212" y="1058" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#2A2A2A">소주(알코올)</text>
  <text x="212" y="1110" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C">물:소주 3:1로 분무 — 날파리 예방 + 냄새 중화</text>
  <rect x="60" y="1170" width="960" height="96" rx="18" fill="#E8722C"/>
  <text x="540" y="1230" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#FFFFFF" text-anchor="middle">핵심: 배출 전 물기만 잘 짜도 냄새의 절반은 잡힌다</text>
  <rect x="0" y="1272" width="1080" height="78" fill="#FFF3E9"/>
  <text x="60" y="1320" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">출처: 정책브리핑·환경부 등 · blog.naver.com/trip_chocho</text>
