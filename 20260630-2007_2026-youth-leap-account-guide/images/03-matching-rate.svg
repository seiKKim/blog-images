<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#243B6B"/>
  <text x="60" y="98" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">청년도약계좌 정부기여금</text>
  <text x="60" y="160" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="44" fill="#FFD23F">소득구간별 매칭비율</text>

  <!-- 막대 그래프 영역. 기준선 x=480, 최대비율 6.0% -> 막대 최대폭 480px -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 행1: 2,400만원 이하 6.0% -->
    <text x="60" y="350" font-size="38" font-weight="bold" fill="#1a1a1a">총급여 2,400만원 이하</text>
    <rect x="60" y="372" width="480" height="64" rx="10" fill="#243B6B"/>
    <text x="560" y="416" font-size="42" font-weight="bold" fill="#243B6B">6.0%</text>

    <!-- 행2: 3,600만원 이하 4.6% -->
    <text x="60" y="540" font-size="38" font-weight="bold" fill="#1a1a1a">총급여 3,600만원 이하</text>
    <rect x="60" y="562" width="368" height="64" rx="10" fill="#3559A0"/>
    <text x="448" y="606" font-size="42" font-weight="bold" fill="#243B6B">4.6%</text>

    <!-- 행3: 4,800만원 이하 3.7% -->
    <text x="60" y="730" font-size="38" font-weight="bold" fill="#1a1a1a">총급여 4,800만원 이하</text>
    <rect x="60" y="752" width="296" height="64" rx="10" fill="#4E73B8"/>
    <text x="376" y="796" font-size="42" font-weight="bold" fill="#243B6B">3.7%</text>

    <!-- 행4: 6,000만원 이하 3.0% -->
    <text x="60" y="920" font-size="38" font-weight="bold" fill="#1a1a1a">총급여 6,000만원 이하</text>
    <rect x="60" y="942" width="240" height="64" rx="10" fill="#6B8CC4"/>
    <text x="320" y="986" font-size="42" font-weight="bold" fill="#243B6B">3.0%</text>

    <!-- 행5: 6,000~7,500만원 기여금 없음 -->
    <text x="60" y="1110" font-size="38" font-weight="bold" fill="#1a1a1a">6,000만~7,500만원</text>
    <rect x="60" y="1132" width="480" height="64" rx="10" fill="#D6E0EC"/>
    <text x="78" y="1176" font-size="36" font-weight="bold" fill="#5B6B7C">기여금 없음 · 비과세만 적용</text>
  </g>

  <!-- 보조 설명 -->
  <text x="60" y="1248" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">소득이 낮을수록 매칭비율이 높음 · 월 최대 기여금 약 3.3만원</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 서민금융진흥원 공고 기준 · 본인 적용분은 취급은행 앱 확인</text>
</svg>
