<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#243B6B"/>
  <text x="60" y="98" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">2025년 개선사항</text>
  <text x="60" y="160" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="44" fill="#FFD23F">기존 가입자에게 유용한 5가지</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 1 -->
    <rect x="60" y="250" width="960" height="190" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="150" cy="345" r="44" fill="#243B6B"/>
    <text x="150" y="362" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
    <text x="230" y="330" font-size="42" font-weight="bold" fill="#1a1a1a">정부기여금 확대</text>
    <text x="230" y="392" font-size="36" fill="#5B6B7C">월 최대 2.4만원 → 3.3만원 (2025.1 납입분~)</text>

    <!-- 2 -->
    <rect x="60" y="460" width="960" height="190" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="150" cy="555" r="44" fill="#243B6B"/>
    <text x="150" y="572" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
    <text x="230" y="540" font-size="42" font-weight="bold" fill="#1a1a1a">신용점수 가점</text>
    <text x="230" y="602" font-size="36" fill="#5B6B7C">2년 이상·누적 800만원 이상 → 5~10점</text>

    <!-- 3 -->
    <rect x="60" y="670" width="960" height="190" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="150" cy="765" r="44" fill="#243B6B"/>
    <text x="150" y="782" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
    <text x="230" y="750" font-size="42" font-weight="bold" fill="#1a1a1a">부분인출 서비스</text>
    <text x="230" y="812" font-size="36" fill="#5B6B7C">2년 이상 가입자, 1회·최대 40% 범위</text>

    <!-- 4 -->
    <rect x="60" y="880" width="960" height="190" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="150" cy="975" r="44" fill="#243B6B"/>
    <text x="150" y="992" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
    <text x="230" y="960" font-size="42" font-weight="bold" fill="#1a1a1a">중도해지 완화</text>
    <text x="230" y="1022" font-size="36" fill="#5B6B7C">3년 이상·특별사유 시 기여금·비과세 유지</text>

    <!-- 5 -->
    <rect x="60" y="1090" width="960" height="190" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="150" cy="1185" r="44" fill="#243B6B"/>
    <text x="150" y="1202" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">5</text>
    <text x="230" y="1170" font-size="42" font-weight="bold" fill="#1a1a1a">일시납입 연계</text>
    <text x="230" y="1232" font-size="36" fill="#5B6B7C">청년희망적금 만기금 일시납 인정(최대 1,260만원)</text>
  </g>

  <rect x="0" y="1300" width="1080" height="50" fill="#E8EEF5"/>
  <text x="60" y="1336" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" fill="#5B6B7C">부분인출·신용점수 가점은 '2년 이상 유지'가 전제</text>
</svg>
