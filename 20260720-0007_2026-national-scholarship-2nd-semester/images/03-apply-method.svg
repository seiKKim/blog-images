<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="115" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">신청 방법 &amp; 인증 수단</text>
  <text x="60" y="165" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#E8EEF5">홈페이지 · 원클릭 앱 · 24시간 신청 가능</text>

  <!-- 신청 채널 -->
  <text x="60" y="290" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#1B5FA6">📍 신청 채널 (2곳)</text>

  <rect x="60" y="320" width="465" height="200" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="292" y="400" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#2B2F36" text-anchor="middle">홈페이지</text>
  <text x="292" y="465" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="36" fill="#5B6B7C" text-anchor="middle">www.kosaf.go.kr</text>

  <rect x="555" y="320" width="465" height="200" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="787" y="400" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#2B2F36" text-anchor="middle">모바일 앱</text>
  <text x="787" y="465" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#5B6B7C" text-anchor="middle">원클릭 신청</text>

  <!-- 24시간 안내 띠 -->
  <rect x="60" y="550" width="960" height="90" rx="16" fill="#E8F1FB"/>
  <text x="540" y="608" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1B5FA6" text-anchor="middle">24시간 신청 · 단, 마감일은 오후 6시(18:00) 종료</text>

  <!-- 인증 수단 -->
  <text x="60" y="740" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#1B5FA6">🔑 본인 인증 · 가구원 동의 수단</text>

  <rect x="60" y="770" width="960" height="110" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="100" y="838" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="44" fill="#2B2F36">① 공동인증서 (구 공인인증서)</text>

  <rect x="60" y="895" width="960" height="110" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="100" y="963" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="44" fill="#2B2F36">② 금융인증서</text>

  <rect x="60" y="1020" width="960" height="110" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="100" y="1088" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="44" fill="#2B2F36">③ 간편(민간)인증서</text>

  <!-- 문의 -->
  <rect x="60" y="1160" width="960" height="90" rx="16" fill="#FFD23F"/>
  <text x="540" y="1218" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#1B5FA6" text-anchor="middle">문의: 한국장학재단 상담센터 ☎ 1599-2000</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">출처: 한국장학재단(kosaf.go.kr)</text>
</svg>
