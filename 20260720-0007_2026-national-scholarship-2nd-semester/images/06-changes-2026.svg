<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="115" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">2026년 달라진 점</text>
  <text x="60" y="165" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#E8EEF5">국가장학금, 이렇게 바뀌었습니다</text>

  <!-- 변화 1 -->
  <rect x="60" y="270" width="960" height="230" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="140" cy="385" r="46" fill="#1B5FA6"/>
  <text x="140" y="402" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="48" fill="#ffffff" text-anchor="middle">1</text>
  <text x="220" y="360" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#1B5FA6">지원 대상 9구간까지 확대</text>
  <text x="220" y="425" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="38" fill="#5B6B7C">기존 8구간 → 9구간(중산층 일부까지)</text>
  <text x="220" y="475" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="38" fill="#5B6B7C">기조 2026년에도 유지</text>

  <!-- 변화 2 -->
  <rect x="60" y="525" width="960" height="270" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="140" cy="640" r="46" fill="#1B5FA6"/>
  <text x="140" y="657" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="48" fill="#ffffff" text-anchor="middle">2</text>
  <text x="220" y="615" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#1B5FA6">9구간 지원 단가</text>
  <text x="220" y="680" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="38" fill="#5B6B7C">일반 Ⅰ유형: 연 100만원 (학기당 50만원)</text>
  <rect x="220" y="710" width="760" height="60" rx="14" fill="#FFF6D6"/>
  <text x="240" y="752" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="38" fill="#8A6D1A">다자녀 셋째 이상 9구간 200만원 신설</text>

  <!-- 변화 3 -->
  <rect x="60" y="820" width="960" height="230" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="140" cy="935" r="46" fill="#1B5FA6"/>
  <text x="140" y="952" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="48" fill="#ffffff" text-anchor="middle">3</text>
  <text x="220" y="910" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#1B5FA6">구간별 단가 인상</text>
  <text x="220" y="975" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="38" fill="#5B6B7C">정책브리핑(2026.3.10.) "구간별 지원</text>
  <text x="220" y="1025" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="38" fill="#5B6B7C">단가를 인상" → 전반적 단가 상향</text>

  <!-- 마무리 안내 -->
  <rect x="60" y="1080" width="960" height="150" rx="18" fill="#1B5FA6"/>
  <text x="540" y="1145" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#ffffff" text-anchor="middle">"소득이 좀 있어서 안 될 것 같아도"</text>
  <text x="540" y="1200" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#FFD23F" text-anchor="middle">지레 포기 말고 일단 신청해 보세요!</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">출처: 정책브리핑(korea.kr, 2026.3.10.) · 한국장학재단</text>
</svg>
