<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="115" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">신청 자격 체크리스트</text>
  <text x="60" y="165" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#E8EEF5">Ⅰ유형 재학생 기준 · 성적 · 소득 · 신청 횟수</text>

  <!-- 성적 -->
  <text x="60" y="290" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#1B5FA6">📗 성적·이수학점</text>
  <rect x="60" y="315" width="960" height="230" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="95" y="380" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#2B2F36">✓ 직전 학기 12학점 이상 + 80점(B) 이상</text>
  <text x="95" y="450" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#2B2F36">✓ 기초·차상위는 70점(C) 이상</text>
  <text x="95" y="520" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#2B2F36">✓ 신입·편입·재입학생 첫 학기는 성적 미적용</text>

  <!-- 소득 -->
  <text x="60" y="620" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#1B5FA6">📘 소득 조건</text>
  <rect x="60" y="645" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="95" y="715" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#2B2F36">✓ 학자금 지원 9구간 이하 해당</text>
  <text x="95" y="775" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="38" fill="#5B6B7C">   (9구간 초과 시 지원 대상 아님)</text>

  <!-- 재학생 2회 제한 -->
  <text x="60" y="875" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#E23B3B">⚠ 재학생 2회 신청 제한</text>
  <rect x="60" y="900" width="960" height="290" rx="18" fill="#FFF0F0" stroke="#F0B8B8" stroke-width="2"/>
  <text x="95" y="965" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#2B2F36">• 재학생은 1차 신청이 원칙</text>
  <text x="95" y="1030" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#2B2F36">• 2차 신청은 재학 중 최대 2회 구제</text>
  <text x="95" y="1095" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#E23B3B">• 2회 초과 시 '신청 기간 미준수' 탈락</text>
  <text x="95" y="1160" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#2B2F36">• 재학생 2차는 '신청 사유서' 요구 가능</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">출처: 한국장학재단(kosaf.go.kr)</text>
</svg>
