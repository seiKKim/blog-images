<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2C477E"/>
      <stop offset="1" stop-color="#1E3159"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="960" cy="170" r="270" fill="#ffffff" opacity="0.06"/>
  <circle cx="110" cy="990" r="210" fill="#ffffff" opacity="0.05"/>

  <!-- 카테고리 뱃지 -->
  <rect x="72" y="80" rx="34" ry="34" width="240" height="68" fill="#FFD23F"/>
  <text x="192" y="126" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="36" fill="#1a1a1a" text-anchor="middle">금융 · 재테크</text>

  <!-- 날짜 -->
  <text x="1008" y="126" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="34" fill="#B9C6DE" text-anchor="end">2026. 07. 16</text>

  <!-- 서브 카피 -->
  <text x="72" y="272" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="58" fill="#E8EEF5">3년 6개월 만의 첫 인상</text>

  <!-- 메인: 기준금리 인상 -->
  <text x="72" y="378" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="66" fill="#ffffff">기준금리</text>
  <text x="72" y="500" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="112" fill="#B9C6DE">2.50%</text>
  <!-- 화살표 -->
  <text x="560" y="500" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="112" fill="#FFD23F">→</text>
  <text x="690" y="500" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="112" fill="#FFD23F">2.75%</text>

  <!-- 라인 -->
  <rect x="72" y="560" width="936" height="4" fill="#3A548A"/>

  <!-- 핵심 문구 -->
  <text x="72" y="660" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="72" fill="#ffffff">파킹통장 금리</text>
  <text x="72" y="748" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
