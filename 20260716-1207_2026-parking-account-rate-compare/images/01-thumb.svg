  <!-- 디테일 박스 -->
  <rect x="72" y="820" rx="20" ry="20" width="936" height="130" fill="#ffffff" opacity="0.12"/>
  <text x="102" y="875" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="42" fill="#ffffff">예금자보호 1억원 · 한도 · 우대조건까지</text>
  <text x="102" y="925" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#D9E2F0">2026 하반기 비교 · 고르는 법</text>

  <text x="72" y="1022" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="32" fill="#9FB0CC">※ 개별 상품 금리는 예시 · 가입 전 각 사 공시 확인</text>
