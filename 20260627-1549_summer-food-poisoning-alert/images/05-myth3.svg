<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350"><rect width="1080" height="1350" fill="#F4F7FB"/><rect width="1080" height="200" fill="#2B2F36"/><rect x="0" y="200" width="1080" height="8" fill="#E23B3B"/><text x="60" y="125" font-family="Malgun Gothic, 맑은 고딕, sans-serif" font-weight="bold" font-size="60" fill="#FFFFFF" text-anchor="start">가장 위험한 착각 3가지</text><rect x="60" y="300" width="960" height="300" rx="20" fill="#FFFFFF" stroke="#D6E0EC"/><rect x="60" y="300" width="14" height="300" rx="7" fill="#E23B3B"/><text x="100" y="380" font-family="Malgun Gothic, 맑은 고딕, sans-serif" font-weight="bold" font-size="44" fill="#E23B3B" text-anchor="start">착각 ①</text><text x="100" y="460" font-family="Malgun Gothic, 맑은 고딕, sans-serif" font-weight="bold" font-size="50" fill="#2B2F36" text-anchor="start">"냉장고에 넣으면 안전하다"</text><text x="100" y="540" font-family="Malgun Gothic, 맑은 고딕, sans-serif" font-weight="bold" font-size="40" fill="#5B6B7C" text-anchor="start">→ 냉장은 증식을 늦출 뿐, 죽이지 못합니다</text><rect x="60" y="630" width="960" height="300" rx="20" fill="#FFFFFF" stroke="#D6E0EC"/><rect x="60" y="630" width="14" height="300" rx="7" fill="#E23B3B"/><text x="100" y="710" font-family="Malgun Gothic, 맑은 고딕, sans-serif" font-weight="bold" font-size="44" fill="#E23B3B" text-anchor="start">착각 ②</text><text x="100" y="790" font-family="Malgun Gothic, 맑은 고딕, sans-serif" font-weight="bold" font-size="50" fill="#2B2F36" text-anchor="start">"실온에 잠깐 둬도 괜찮다"</text><text x="100" y="870" font-family="Malgun Gothic, 맑은 고딕, sans-serif" font-weight="bold" font-size="40" fill="#5B6B7C" text-anchor="start">→ 2시간이면 식중독균이 급증합니다</text><rect x="60" y="960" width="960" height="300" rx="20" fill="#FFFFFF" stroke="#D6E0EC"/><rect x="60" y="960" width="14" height="300" rx="7" fill="#E23B3B"/><text x="100" y="1040" font-family="Malgun Gothic, 맑은 고딕, sans-serif" font-weight="bold" font-size="44" fill="#E23B3B" text-anchor="start">착각 ③</text><text x="100" y="1120" font-family="Malgun Gothic, 맑은 고딕, sans-serif" font-weight="bold" font-size="50" fill="#2B2F36" text-anchor="start">"끓여 재가열하면 다 죽는다"</text><text x="100" y="1200" font-family="Malgun Gothic, 맑은 고딕, sans-serif" font-weight="bold" font-size="40" fill="#5B6B7C" text-anchor="start">→ 독소는 100℃에서도 안 사라집니다</text><rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/><text x="60" y="1322" font-family="Malgun Gothic, 맑은 고딕, sans-serif" font-weight="normal" font-size="32" fill="#5B6B7C" text-anchor="start">출처: 식약처 식중독 예방 안내</text></svg>