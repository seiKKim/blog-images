<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="880" viewBox="0 0 1080 880">
<rect x="0" y="0" width="1080" height="880" rx="0" fill="#F4F1EC"/><rect x="0" y="0" width="1080" height="210" rx="0" fill="#E8722C"/><text x="60" y="118" font-family="Noto Sans CJK KR" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="start">가죽·신발 곰팡이 관리</text><text x="60" y="166" font-family="Noto Sans CJK KR" font-weight="600" font-size="34" fill="#FFE7D2" text-anchor="start">고가품은 전문 클리닝 권장</text><rect x="80" y="270" width="920" height="108" rx="18" fill="#FFFFFF" stroke="#E3DACB" stroke-width="2"/><rect x="80" y="270" width="12" height="108" rx="6" fill="#E8722C"/><text x="120" y="342" font-family="Noto Sans CJK KR" font-weight="800" font-size="40" fill="#2B2113" text-anchor="start">표면 곰팡이</text><text x="980" y="342" font-family="Noto Sans CJK KR" font-weight="600" font-size="33" fill="#5B6B7C" text-anchor="end">물 묻힌 수건 → 마른 수건으로 닦기</text><rect x="80" y="396" width="920" height="108" rx="18" fill="#FFFFFF" stroke="#E3DACB" stroke-width="2"/><rect x="80" y="396" width="12" height="108" rx="6" fill="#E8722C"/><text x="120" y="468" font-family="Noto Sans CJK KR" font-weight="800" font-size="40" fill="#2B2113" text-anchor="start">안쪽</text><text x="980" y="468" font-family="Noto Sans CJK KR" font-weight="600" font-size="33" fill="#5B6B7C" text-anchor="end">적신 천에 알코올 조금 묻혀 닦기</text><rect x="80" y="522" width="920" height="108" rx="18" fill="#FFFFFF" stroke="#E3DACB" stroke-width="2"/><rect x="80" y="522" width="12" height="108" rx="6" fill="#E8722C"/><text x="120" y="594" font-family="Noto Sans CJK KR" font-weight="800" font-size="40" fill="#2B2113" text-anchor="start">건조</text><text x="980" y="594" font-family="Noto Sans CJK KR" font-weight="600" font-size="33" fill="#5B6B7C" text-anchor="end">그늘에서 통풍 건조 (직사광선 X)</text><rect x="80" y="648" width="920" height="108" rx="18" fill="#FFFFFF" stroke="#E3DACB" stroke-width="2"/><rect x="80" y="648" width="12" height="108" rx="6" fill="#E8722C"/><text x="120" y="720" font-family="Noto Sans CJK KR" font-weight="800" font-size="40" fill="#2B2113" text-anchor="start">보관</text><text x="980" y="720" font-family="Noto Sans CJK KR" font-weight="600" font-size="33" fill="#5B6B7C" text-anchor="end">제습제·신문지로 습기·형태 관리</text><rect x="0" y="800" width="1080" height="80" rx="0" fill="#E8EEF5"/><text x="60" y="844" font-family="Noto Sans CJK KR" font-weight="600" font-size="32" fill="#5B6B7C" text-anchor="start">출처: 생활정보 매체 정리(참고용)</text>
