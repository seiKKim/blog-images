<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1120" viewBox="0 0 1080 1120">
<rect x="0" y="0" width="1080" height="1120" rx="0" fill="#F4F1EC"/><rect x="0" y="0" width="1080" height="210" rx="0" fill="#E8722C"/><text x="60" y="118" font-family="Noto Sans CJK KR" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="start">빨래 쉰내, 진짜 범인은?</text><text x="60" y="166" font-family="Noto Sans CJK KR" font-weight="600" font-size="34" fill="#FFE7D2" text-anchor="start">모락셀라균 + 4M3H 냄새물질</text><rect x="80" y="270" width="920" height="160" rx="20" fill="#FBE9DB"/><text x="110" y="318" font-family="Noto Sans CJK KR" font-weight="800" font-size="34" fill="#C85D1C" text-anchor="start">원인</text><text x="110" y="378" font-family="Noto Sans CJK KR" font-weight="700" font-size="37" fill="#2B2113" text-anchor="start">모락셀라균이 땀·피지 분해 → 4M3H 악취</text><text x="110" y="424" font-family="Noto Sans CJK KR" font-weight="600" font-size="34" fill="#5B6B7C" text-anchor="start">건조·자외선 내성 강함 → 햇볕만으론 부족</text><text x="80" y="512" font-family="Noto Sans CJK KR" font-weight="900" font-size="44" fill="#2B2113" text-anchor="start">검증된 쉰내 제거·예방법</text><rect x="80" y="545" width="920" height="92" rx="16" fill="#FFFFFF" stroke="#E3DACB" stroke-width="2"/><circle cx="128" cy="591" r="26" fill="#E8722C"/><text x="128" y="603" font-family="Noto Sans CJK KR" font-weight="900" font-size="34" fill="#FFFFFF" text-anchor="middle">1</text><text x="180" y="605" font-family="Noto Sans CJK KR" font-weight="800" font-size="38" fill="#2B2113" text-anchor="start">60도 안팎 온수 세탁</text><text x="980" y="603" font-family="Noto Sans CJK KR" font-weight="600" font-size="32" fill="#5B6B7C" text-anchor="end">균 사멸 가장 확실</text><rect x="80" y="645" width="920" height="92" rx="16" fill="#FFFFFF" stroke="#E3DACB" stroke-width="2"/><circle cx="128" cy="691" r="26" fill="#E8722C"/><text x="128" y="703" font-family="Noto Sans CJK KR" font-weight="900" font-size="34" fill="#FFFFFF" text-anchor="middle">2</text><text x="180" y="705" font-family="Noto Sans CJK KR" font-weight="800" font-size="38" fill="#2B2113" text-anchor="start">산소계 표백제 함께</text><text x="980" y="703" font-family="Noto Sans CJK KR" font-weight="600" font-size="32" fill="#5B6B7C" text-anchor="end">과탄산나트륨 계열</text><rect x="80" y="745" width="920" height="92" rx="16" fill="#FFFFFF" stroke="#E3DACB" stroke-width="2"/><circle cx="128" cy="791" r="26" fill="#E8722C"/><text x="128" y="803" font-family="Noto Sans CJK KR" font-weight="900" font-size="34" fill="#FFFFFF" text-anchor="middle">3</text><text x="180" y="805" font-family="Noto Sans CJK KR" font-weight="800" font-size="38" fill="#2B2113" text-anchor="start">세탁 직후 즉시 건조</text><text x="980" y="803" font-family="Noto Sans CJK KR" font-weight="600" font-size="32" fill="#5B6B7C" text-anchor="end">30분 이상 방치 금지</text><rect x="80" y="845" width="920" height="92" rx="16" fill="#FFFFFF" stroke="#E3DACB" stroke-width="2"/><circle cx="128" cy="891" r="26" fill="#E8722C"/><text x="128" y="903" font-family="Noto Sans CJK KR" font-weight="900" font-size="34" fill="#FFFFFF" text-anchor="middle">4</text><text x="180" y="905" font-family="Noto Sans CJK KR" font-weight="800" font-size="38" fill="#2B2113" text-anchor="start">제습기·선풍기 병행</text><text x="980" y="903" font-family="Noto Sans CJK KR" font-weight="600" font-size="32" fill="#5B6B7C" text-anchor="end">빨래 간격 충분히</text><rect x="80" y="945" width="920" height="92" rx="16" fill="#FFFFFF" stroke="#E3DACB" stroke-width="2"/><circle cx="128" cy="991" r="26" fill="#E8722C"/><text x="128" y="1003" font-family="Noto Sans CJK KR" font-weight="900" font-size="34" fill="#FFFFFF" text-anchor="middle">5</text><text x="180" y="1005" font-family="Noto Sans CJK KR" font-weight="800" font-size="38" fill="#2B2113" text-anchor="start">섬유유연제 최소화</text><text x="980" y="1003" font-family="Noto Sans CJK KR" font-weight="600" font-size="32" fill="#5B6B7C" text-anchor="end">오염 제거 방해 가능</text><rect x="0" y="1040" width="1080" height="80" rx="0" fill="#E8EEF5"/><text x="60" y="1084" font-family="Noto Sans CJK KR" font-weight="600" font-size="32" fill="#5B6B7C" text-anchor="start">출처: 경향신문(2026-05-23)·CDC 세탁 지침 인용</text>
</svg>
