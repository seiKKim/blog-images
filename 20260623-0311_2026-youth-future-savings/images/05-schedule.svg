<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="900" viewBox="0 0 1080 900">
  <rect width="1080" height="900" fill="#F4F7FB"/>
  <rect width="1080" height="180" fill="#1B5FA6"/>
  <rect x="60" y="50" rx="14" ry="14" width="150" height="56" fill="#FFD23F"/>
  <text x="135" y="89" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">일정</text>
  <text x="240" y="116" font-family="Noto Sans CJK KR" font-weight="bold" font-size="58" fill="#ffffff">신청 일정 (2주)</text>

  <g font-family="Noto Sans CJK KR">
    <rect x="60" y="240" width="960" height="230" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <rect x="60" y="240" width="14" height="230" rx="7" fill="#FFD23F"/>
    <text x="110" y="330" font-size="50" font-weight="bold" fill="#1B5FA6">1주차 · 6/22~6/26</text>
    <text x="110" y="402" font-size="44" fill="#1a1a1a">출생연도 끝자리 <tspan font-weight="bold">5부제</tspan></text>
    <text x="110" y="452" font-size="34" fill="#5B6B7C">본인 신청일은 앱·공식 페이지에서 확인</text>

    <rect x="60" y="500" width="960" height="230" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <rect x="60" y="500" width="14" height="230" rx="7" fill="#1B5FA6"/>
    <text x="110" y="590" font-size="50" font-weight="bold" fill="#1B5FA6">2주차 · 6/29~7/3</text>
    <text x="110" y="662" font-size="44" fill="#1a1a1a">출생연도 무관 <tspan font-weight="bold">전체 신청 가능</tspan></text>
    <text x="110" y="712" font-size="34" fill="#5B6B7C">취급기관 앱 · 비대면 · 서류 제출 없음</text>
  </g>

  <text x="540" y="788" font-family="Noto Sans CJK KR" font-size="38" font-weight="bold" fill="#E23B3B" text-anchor="middle">7월 3일 마감 · 2차 가입은 연말 예정</text>

  <rect x="0" y="820" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="872" font-family="Noto Sans CJK KR" font-size="32" fill="#5B6B7C">출처: 정책브리핑(korea.kr) · 서민금융진흥원</text>
</svg>
