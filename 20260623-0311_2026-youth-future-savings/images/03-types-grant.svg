<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <rect x="60" y="56" rx="14" ry="14" width="190" height="56" fill="#FFD23F"/>
  <text x="155" y="95" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">기여금</text>
  <text x="280" y="128" font-family="Noto Sans CJK KR" font-weight="bold" font-size="58" fill="#ffffff">유형별 정부기여금</text>

  <g font-family="Noto Sans CJK KR">
    <!-- 일반형 -->
    <rect x="60" y="280" width="960" height="240" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="375" font-size="56" font-weight="bold" fill="#1a1a1a">일반형</text>
    <text x="100" y="455" font-size="38" fill="#5B6B7C">일반 청년 · 비과세</text>
    <text x="1000" y="430" font-size="96" font-weight="bold" fill="#1B5FA6" text-anchor="end">6%</text>

    <!-- 우대형 -->
    <rect x="60" y="545" width="960" height="240" rx="20" fill="#1B5FA6"/>
    <text x="100" y="640" font-size="56" font-weight="bold" fill="#ffffff">우대형</text>
    <text x="100" y="720" font-size="36" fill="#E8EEF5">중소기업 재직·신규취업·소상공인</text>
    <text x="1000" y="700" font-size="96" font-weight="bold" fill="#FFD23F" text-anchor="end">12%</text>

    <!-- 비과세형 -->
    <rect x="60" y="810" width="960" height="240" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="905" font-size="56" font-weight="bold" fill="#1a1a1a">비과세형</text>
    <text x="100" y="985" font-size="36" fill="#5B6B7C">총급여 6,000만~7,500만 원</text>
    <text x="1000" y="960" font-size="60" font-weight="bold" fill="#5B6B7C" text-anchor="end">기여금 없음</text>

    <rect x="60" y="1080" width="960" height="150" rx="18" fill="#FFF6D6" stroke="#FFD23F" stroke-width="2"/>
    <text x="540" y="1148" font-size="40" font-weight="bold" fill="#8a6d00" text-anchor="middle">납입액 기준 매칭 · 이자소득세 비과세</text>
    <text x="540" y="1200" font-size="34" fill="#8a6d00" text-anchor="middle">월 최대 50만 원 · 3년 자유적립식</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="32" fill="#5B6B7C">출처: 정책브리핑(korea.kr) · 토스뱅크</text>
</svg>
