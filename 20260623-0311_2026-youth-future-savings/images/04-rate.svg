<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="900" viewBox="0 0 1080 900">
  <rect width="1080" height="900" fill="#F4F7FB"/>
  <rect width="1080" height="180" fill="#1B5FA6"/>
  <rect x="60" y="50" rx="14" ry="14" width="150" height="56" fill="#FFD23F"/>
  <text x="135" y="89" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">금리</text>
  <text x="240" y="116" font-family="Noto Sans CJK KR" font-weight="bold" font-size="58" fill="#ffffff">금리 구조</text>

  <g font-family="Noto Sans CJK KR">
    <rect x="60" y="240" width="960" height="130" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="322" font-size="44" font-weight="bold" fill="#1a1a1a">기본금리 (3년 고정)</text>
    <text x="1000" y="322" font-size="56" font-weight="bold" fill="#1B5FA6" text-anchor="end">연 5%</text>

    <rect x="60" y="390" width="960" height="120" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="465" font-size="40" fill="#1a1a1a">총급여 3,600만 원 이하</text>
    <text x="1000" y="465" font-size="52" font-weight="bold" fill="#1B5FA6" text-anchor="end">+0.5%p</text>

    <rect x="60" y="530" width="960" height="120" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="605" font-size="40" fill="#1a1a1a">'청년 모두를 위한 재무상담' 이수</text>
    <text x="1000" y="605" font-size="52" font-weight="bold" fill="#1B5FA6" text-anchor="end">+0.2%p</text>

    <rect x="60" y="680" width="960" height="130" rx="18" fill="#1B5FA6"/>
    <text x="100" y="762" font-size="44" font-weight="bold" fill="#ffffff">우대 더하면 최대</text>
    <text x="1000" y="762" font-size="60" font-weight="bold" fill="#FFD23F" text-anchor="end">연 7~8%</text>
  </g>

  <rect x="0" y="820" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="872" font-family="Noto Sans CJK KR" font-size="32" fill="#5B6B7C">출처: 정책브리핑(korea.kr) · 토스뱅크</text>
</svg>
