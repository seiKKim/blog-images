<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <rect x="60" y="56" rx="14" ry="14" width="150" height="56" fill="#FFD23F"/>
  <text x="135" y="95" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">대상</text>
  <text x="240" y="128" font-family="Noto Sans CJK KR" font-weight="bold" font-size="60" fill="#ffffff">가입 대상 조건</text>

  <g font-family="Noto Sans CJK KR">
    <!-- row1 -->
    <rect x="60" y="270" width="960" height="180" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="345" font-size="42" font-weight="bold" fill="#1B5FA6">연령</text>
    <text x="100" y="412" font-size="40" fill="#1a1a1a">만 19~34세 (1991.1.1~2007.8.7생)</text>

    <!-- row2 -->
    <rect x="60" y="470" width="960" height="180" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="545" font-size="42" font-weight="bold" fill="#1B5FA6">병역</text>
    <text x="100" y="612" font-size="40" fill="#1a1a1a">병역기간 최대 6년 연령에서 차감</text>

    <!-- row3 -->
    <rect x="60" y="670" width="960" height="180" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="745" font-size="42" font-weight="bold" fill="#1B5FA6">개인소득</text>
    <text x="100" y="812" font-size="40" fill="#1a1a1a">총급여 7,500만 원 이하 (소상공인 매출요건)</text>

    <!-- row4 -->
    <rect x="60" y="870" width="960" height="180" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="945" font-size="42" font-weight="bold" fill="#1B5FA6">가구소득</text>
    <text x="100" y="1012" font-size="40" fill="#1a1a1a">중위소득 200% 이하 (우대형 150%)</text>

    <!-- note -->
    <rect x="60" y="1080" width="960" height="150" rx="18" fill="#FFF6D6" stroke="#FFD23F" stroke-width="2"/>
    <text x="100" y="1148" font-size="38" font-weight="bold" fill="#8a6d00">결혼 시 2인가구 한해 기준 완화</text>
    <text x="100" y="1200" font-size="34" fill="#8a6d00">일반형 200→250% · 우대형 150→200%</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="32" fill="#5B6B7C">출처: 정책브리핑(korea.kr) · 토스뱅크</text>
</svg>
