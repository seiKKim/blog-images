<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B4F86"/>
      <stop offset="1" stop-color="#14263F"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="950" cy="170" r="280" fill="#ffffff" opacity="0.06"/>
  <circle cx="120" cy="980" r="220" fill="#ffffff" opacity="0.05"/>

  <rect x="80" y="88" rx="34" ry="34" width="210" height="68" fill="#E8722C"/>
  <text x="185.0" y="134" font-family="Malgun Gothic" font-weight="bold" font-size="36" fill="#ffffff" text-anchor="middle">생활꿀팁</text>

  <!-- 서브 카피 -->
  <text x="80" y="295" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#E8EEF5">열대야 숙면 꿀팁, 잠 잘 자는 법</text>

  <!-- 메인: 침실 온도 -->
  <text x="80" y="440" font-family="Malgun Gothic" font-weight="bold" font-size="64" fill="#ffffff">침실 온도</text>
  <text x="80" y="610" font-family="Malgun Gothic" font-weight="bold" font-size="170" fill="#FFD23F">24~26℃</text>

  <!-- 메인: 습도 -->
  <text x="80" y="745" font-family="Malgun Gothic" font-weight="bold" font-size="64" fill="#ffffff">침실 습도</text>
  <text x="80" y="845" font-family="Malgun Gothic" font-weight="bold" font-size="120" fill="#ffffff">50% <tspan font-size="64" fill="#E8EEF5">내외</tspan></text>

  <!-- 아이콘: 에어컨 (우측, 텍스트와 겹치지 않게) -->
  <g transform="translate(760,420)">
    <rect x="0" y="0" width="240" height="86" rx="16" fill="#ffffff"/>
    <rect x="0" y="58" width="240" height="14" rx="4" fill="#C9D7E8"/>
    <path d="M30 110 q20 16 40 0" stroke="#9FC2E8" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M100 110 q20 16 40 0" stroke="#9FC2E8" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M170 110 q20 16 40 0" stroke="#9FC2E8" stroke-width="9" fill="none" stroke-linecap="round"/>
  </g>
  <!-- 아이콘: 침대 (우측 하단) -->
  <g transform="translate(740,640)" opacity="0.95">
    <rect x="0" y="120" width="300" height="22" rx="6" fill="#ffffff" opacity="0.9"/>
    <rect x="0" y="60" width="300" height="70" rx="14" fill="#9FC2E8"/>
    <rect x="14" y="40" width="120" height="48" rx="12" fill="#ffffff"/>
    <rect x="0" y="142" width="20" height="60" fill="#ffffff" opacity="0.8"/>
    <rect x="280" y="142" width="20" height="60" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- 디테일 띠 -->
  <rect x="80" y="905" rx="20" ry="20" width="920" height="96" fill="#ffffff" opacity="0.14"/>
  <text x="110" y="967" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#ffffff">실내외 온도차 5℃ 이내 · 선풍기 병행</text>

  <text x="80" y="1052" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#E8EEF5" opacity="0.9">blog.naver.com/trip_chocho</text>
</svg>