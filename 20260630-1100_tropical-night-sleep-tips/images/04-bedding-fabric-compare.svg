<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="210" fill="#1B4F86"/>
  <rect x="60" y="58" rx="34" ry="34" width="210" height="68" fill="#E8722C"/>
  <text x="165.0" y="104" font-family="Malgun Gothic" font-weight="bold" font-size="36" fill="#ffffff" text-anchor="middle">생활꿀팁</text>
  <text x="60" y="190" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">여름 침구·잠옷 소재 비교</text>
  <rect x="60" y="300" width="960" height="170" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
  <rect x="60" y="300" width="14" height="170" rx="6" fill="#2E72B8"/>
  <text x="110" y="372" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#1a1a1a">린넨</text>
  <text x="110" y="435" font-family="Malgun Gothic" font-size="36" fill="#5B6B7C">불규칙 직조로 바람 잘 통함</text>
  <text x="1000" y="402" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#E8722C" text-anchor="end">통기성 우수</text>
  <rect x="60" y="500" width="960" height="170" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
  <rect x="60" y="500" width="14" height="170" rx="6" fill="#2E72B8"/>
  <text x="110" y="572" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#1a1a1a">인견</text>
  <text x="110" y="635" font-family="Malgun Gothic" font-size="36" fill="#5B6B7C">땀을 빠르게 흡수해 시원</text>
  <text x="1000" y="602" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#E8722C" text-anchor="end">흡습·배출 빠름</text>
  <rect x="60" y="700" width="960" height="170" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
  <rect x="60" y="700" width="14" height="170" rx="6" fill="#2E72B8"/>
  <text x="110" y="772" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#1a1a1a">텐셀(라이오셀)</text>
  <text x="110" y="835" font-family="Malgun Gothic" font-size="36" fill="#5B6B7C">습기를 잘 분산시키는 편</text>
  <text x="1000" y="802" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#E8722C" text-anchor="end">습기 분산 우수</text>
  <rect x="60" y="900" width="960" height="170" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
  <rect x="60" y="900" width="14" height="170" rx="6" fill="#2E72B8"/>
  <text x="110" y="972" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#1a1a1a">면 퍼케일</text>
  <text x="110" y="1035" font-family="Malgun Gothic" font-size="36" fill="#5B6B7C">촘촘한 평직으로 보송함</text>
  <text x="1000" y="1002" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#E8722C" text-anchor="end">산뜻한 감촉</text>
  <text x="60" y="1215" font-family="Malgun Gothic" font-size="34" fill="#5B6B7C">※ 통기성·흡습성 좋은 소재가 유리 (체감은 개인차)</text>
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="34" fill="#5B6B7C">출처: 소재별 통기성·흡습성 일반 정보</text>
</svg>