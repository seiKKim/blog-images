<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <text x="60" y="103" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">빨래 쉰내 잡는 법</text>
  <text x="60" y="165" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#FFE3CC">주범은 모락셀라균 · 젖은 채 두지 않기</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 항목 리스트 -->
    <rect x="60" y="270" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="140" cy="345" r="30" fill="#2F9E8F"/>
    <text x="140" y="360" font-weight="bold" font-size="36" fill="#ffffff" text-anchor="middle">1</text>
    <text x="200" y="360" font-weight="bold" font-size="42" fill="#1a1a1a">60℃ 이상 온수 세탁 (삶을 수 있는 것)</text>

    <rect x="60" y="440" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="140" cy="515" r="30" fill="#2F9E8F"/>
    <text x="140" y="530" font-weight="bold" font-size="36" fill="#ffffff" text-anchor="middle">2</text>
    <text x="200" y="530" font-weight="bold" font-size="42" fill="#1a1a1a">식초·과탄산소다에 담가두기</text>

    <rect x="60" y="610" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="140" cy="685" r="30" fill="#2F9E8F"/>
    <text x="140" y="700" font-weight="bold" font-size="36" fill="#ffffff" text-anchor="middle">3</text>
    <text x="200" y="700" font-weight="bold" font-size="42" fill="#1a1a1a">세탁 후 바로 꺼내 건조 · 문 열어 환기</text>

    <rect x="60" y="780" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="140" cy="855" r="30" fill="#2F9E8F"/>
    <text x="140" y="870" font-weight="bold" font-size="36" fill="#ffffff" text-anchor="middle">4</text>
    <text x="200" y="870" font-weight="bold" font-size="42" fill="#1a1a1a">세탁조는 월 1회 청소</text>
  </g>

  <!-- 실내건조 핵심 -->
  <rect x="60" y="960" width="960" height="240" rx="20" fill="#FFF1E9" stroke="#F0B79A"/>
  <text x="100" y="1032" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="44" fill="#E8722C">실내건조 핵심</text>
  <text x="100" y="1098" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="38" fill="#1a1a1a">빨래 근처에 제습기 바람을 쐬면</text>
  <text x="100" y="1150" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#1a1a1a">건조가 빨라져 냄새 예방에 유리</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">출처: 본문 정리 · LG전자 공식(건조기 관리)</text>
</svg>
