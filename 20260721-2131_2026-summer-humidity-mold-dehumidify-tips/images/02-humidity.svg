<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <rect width="1080" height="150" fill="#E8722C"/>
  <text x="60" y="98" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">실내 적정 습도와 곰팡이 조건</text>

  <!-- 습도 게이지 -->
  <text x="60" y="248" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1a1a1a">실내 상대습도</text>
  <!-- 바 배경 -->
  <rect x="60" y="272" width="960" height="70" rx="14" fill="#E3EAF2"/>
  <!-- 쾌적 범위 40~60% (전체 0~100 매핑, 폭960) -->
  <rect x="444" y="272" width="192" height="70" rx="0" fill="#2F9E8F"/>
  <!-- 70% 이상 위험 -->
  <rect x="732" y="272" width="288" height="70" fill="#E85C4A"/>
  <text x="540" y="317" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#ffffff" text-anchor="middle">40~60% 쾌적</text>
  <text x="876" y="317" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="34" fill="#ffffff" text-anchor="middle">70%+ 위험</text>

  <!-- 곰팡이 3조건 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="60" y="400" width="300" height="240" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="210" y="470" font-weight="bold" font-size="40" fill="#E8722C" text-anchor="middle">온도</text>
    <text x="210" y="540" font-weight="bold" font-size="52" fill="#1a1a1a" text-anchor="middle">20~30℃</text>
    <text x="210" y="595" font-size="30" fill="#5B6B7C" text-anchor="middle">잘 번식하는 범위</text>

    <rect x="390" y="400" width="300" height="240" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="540" y="470" font-weight="bold" font-size="40" fill="#E8722C" text-anchor="middle">습도</text>
    <text x="540" y="540" font-weight="bold" font-size="52" fill="#1a1a1a" text-anchor="middle">70% 이상</text>
    <text x="540" y="595" font-size="30" fill="#5B6B7C" text-anchor="middle">장시간 유지 시 급증</text>

    <rect x="720" y="400" width="300" height="240" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="870" y="470" font-weight="bold" font-size="40" fill="#E8722C" text-anchor="middle">영양분</text>
    <text x="870" y="540" font-weight="bold" font-size="46" fill="#1a1a1a" text-anchor="middle">먼지·이물질</text>
    <text x="870" y="595" font-size="30" fill="#5B6B7C" text-anchor="middle">표면에 붙은 유기물</text>
  </g>

  <text x="60" y="695" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" fill="#5B6B7C">출처: WHO · 정책브리핑 (본문 정리)</text>
</svg>
