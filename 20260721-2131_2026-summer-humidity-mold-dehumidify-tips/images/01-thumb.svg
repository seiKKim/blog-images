<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F08A3C"/>
      <stop offset="1" stop-color="#E8722C"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- 장식 도형 (물방울 느낌) -->
  <circle cx="930" cy="200" r="270" fill="#ffffff" opacity="0.09"/>
  <circle cx="140" cy="960" r="220" fill="#ffffff" opacity="0.07"/>
  <circle cx="880" cy="880" r="120" fill="#ffffff" opacity="0.06"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="88" rx="34" ry="34" width="200" height="68" fill="#FFD23F"/>
  <text x="180" y="134" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#1a1a1a" text-anchor="middle">생활꿀팁</text>

  <!-- 서브 카피 -->
  <text x="80" y="290" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#FFF3E6">2026 여름 장마철</text>

  <!-- 메인 카피 -->
  <text x="80" y="430" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="118" fill="#ffffff">집안 습기·곰팡이</text>
  <text x="80" y="560" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="150" fill="#FFD23F">제거 총정리</text>

  <!-- 포인트 칩들 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="46">
    <rect x="80" y="640" rx="18" width="360" height="88" fill="#ffffff" opacity="0.16"/>
    <text x="112" y="700" fill="#ffffff">적정습도 40~60%</text>
    <rect x="460" y="640" rx="18" width="330" height="88" fill="#ffffff" opacity="0.16"/>
    <text x="492" y="700" fill="#ffffff">곰팡이 안전제거</text>
  </g>

  <!-- 강조 박스 -->
  <rect x="80" y="770" rx="20" ry="20" width="920" height="150" fill="#ffffff" opacity="0.16"/>
  <text x="112" y="838" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#ffffff">우리 집엔 몇 L짜리 제습기가 맞을까?</text>
  <text x="112" y="898" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#FFD23F">평수 → 용량 → 인버터·1등급 순으로</text>

  <!-- 채널 표시 -->
  <text x="80" y="1010" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#FFF3E6" opacity="0.92">blog.naver.com/trip_chocho</text>
</svg>
