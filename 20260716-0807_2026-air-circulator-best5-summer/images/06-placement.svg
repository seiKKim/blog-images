<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <rect width="1080" height="150" fill="#E8722C"/>
  <text x="60" y="98" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">냉기 배치도 — 거실 &#8594; 방으로</text>

  <!-- 방 구조 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 거실 -->
    <rect x="60" y="210" width="560" height="420" rx="14" fill="#ffffff" stroke="#C7D2DE" stroke-width="3"/>
    <text x="90" y="262" font-size="34" font-weight="bold" fill="#5B6B7C">거실</text>
    <!-- 에어컨 -->
    <rect x="90" y="290" width="180" height="70" rx="10" fill="#1B5FA6"/>
    <text x="180" y="335" font-size="30" font-weight="bold" fill="#ffffff" text-anchor="middle">에어컨</text>
    <!-- 냉기 화살표 -->
    <g stroke="#5AB4E8" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.9">
      <path d="M180 370 L 180 470"/>
      <path d="M180 470 L 400 470"/>
    </g>
    <path d="M400 470 l -22 -14 l 0 28 z" fill="#5AB4E8"/>
    <text x="270" y="440" font-size="28" fill="#1B5FA6" font-weight="bold">찬 공기</text>

    <!-- 서큘레이터 (방 문 앞) -->
    <g transform="translate(500,470)">
      <circle cx="0" cy="0" r="46" fill="#E8722C"/>
      <g fill="#ffffff">
        <path d="M0 0 C 12 -28, 36 -24, 30 -6 C 16 -12, 6 -8, 0 0 Z"/>
        <path d="M0 0 C 28 -12, 24 12, 6 30 C 12 16, 8 6, 0 0 Z" transform="rotate(120)"/>
        <path d="M0 0 C 28 -12, 24 12, 6 30 C 12 16, 8 6, 0 0 Z" transform="rotate(240)"/>
      </g>
      <circle cx="0" cy="0" r="8" fill="#FFD23F"/>
    </g>
    <text x="500" y="560" font-size="26" font-weight="bold" fill="#E8722C" text-anchor="middle">서큘레이터</text>
    <text x="500" y="592" font-size="24" fill="#5B6B7C" text-anchor="middle">방 문 앞</text>

    <!-- 문 -->
    <rect x="606" y="360" width="28" height="220" fill="#EAD9C4" stroke="#C7A87E" stroke-width="2"/>

    <!-- 방 -->
    <rect x="660" y="210" width="360" height="420" rx="14" fill="#ffffff" stroke="#C7D2DE" stroke-width="3"/>
    <text x="690" y="262" font-size="34" font-weight="bold" fill="#5B6B7C">방</text>
    <g stroke="#E8722C" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.9">
      <path d="M620 470 L 900 470"/>
    </g>
    <path d="M900 470 l -22 -14 l 0 28 z" fill="#E8722C"/>
    <text x="800" y="440" font-size="28" fill="#E8722C" font-weight="bold" text-anchor="middle">냉기 확산</text>
  </g>

  <rect x="0" y="656" width="1080" height="64" fill="#FFF3E4"/>
  <text x="60" y="698" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" font-weight="bold" fill="#1a1a1a">중간 이상 세기로 운전 · 에어컨 바람 방향에 맞춰 배치</text>
</svg>
