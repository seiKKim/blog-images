<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0812F"/>
      <stop offset="1" stop-color="#D65E1A"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="960" cy="180" r="270" fill="#ffffff" opacity="0.08"/>
  <circle cx="120" cy="990" r="210" fill="#ffffff" opacity="0.06"/>

  <!-- 서큘레이터 아이콘 (우상단, 직접 그림) -->
  <g transform="translate(792,236)" opacity="0.95">
    <circle cx="0" cy="0" r="118" fill="#ffffff" opacity="0.16"/>
    <circle cx="0" cy="0" r="118" fill="none" stroke="#ffffff" stroke-width="10" opacity="0.55"/>
    <circle cx="0" cy="0" r="88" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.4"/>
    <g fill="#ffffff" opacity="0.9">
      <path d="M0 0 C 30 -70, 90 -60, 78 -14 C 40 -30, 14 -18, 0 0 Z"/>
      <path d="M0 0 C 70 -30, 60 30, 14 78 C 30 40, 18 14, 0 0 Z" transform="rotate(120)"/>
      <path d="M0 0 C 70 -30, 60 30, 14 78 C 30 40, 18 14, 0 0 Z" transform="rotate(240)"/>
    </g>
    <circle cx="0" cy="0" r="16" fill="#FFD23F"/>
  </g>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="92" rx="34" ry="34" width="196" height="68" fill="#FFD23F"/>
  <text x="178" y="138" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
