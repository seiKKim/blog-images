<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <text x="60" y="108" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">여름 누진제 450kWh 경계선</text>
  <text x="60" y="168" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#FFE7CF">한 칸 넘으면 기본요금 급증</text>

  <!-- 막대 그래프 영역 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- baseline -->
    <line x1="120" y1="820" x2="1000" y2="820" stroke="#D6E0EC" stroke-width="3"/>

    <!-- 300kWh 이하 -->
    <rect x="150" y="760" width="200" height="60" rx="8" fill="#F0C08A"/>
    <text x="250" y="740" font-size="46" font-weight="bold" fill="#5B6B7C" text-anchor="middle">910원</text>
    <text x="250" y="872" font-size="34" fill="#1a1a1a" text-anchor="middle">300kWh 이하</text>

    <!-- 301~450kWh -->
    <rect x="440" y="700" width="200" height="120" rx="8" fill="#EE9A4E"/>
    <text x="540" y="680" font-size="46" font-weight="bold" fill="#5B6B7C" text-anchor="middle">1,600원</text>
    <text x="540" y="872" font-size="34" fill="#1a1a1a" text-anchor="middle">301~450kWh</text>

    <!-- 450kWh 초과 -->
    <rect x="730" y="290" width="200" height="530" rx="8" fill="#E23B3B"/>
    <text x="830" y="262" font-size="60" font-weight="bold" fill="#E23B3B" text-anchor="middle">7,300원</text>
    <text x="830" y="872" font-size="34" font-weight="bold" fill="#E23B3B" text-anchor="middle">450kWh 초과</text>
  </g>

  <!-- 급증 화살표 표시 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="150" y="940" width="780" height="150" rx="18" fill="#ffffff" stroke="#E23B3B" stroke-width="3"/>
    <text x="540" y="1000" font-size="40" font-weight="bold" fill="#1a1a1a" text-anchor="middle">450 &#8594; 451kWh 한 칸 넘어가면</text>
    <text x="540" y="1058" font-size="46" font-weight="bold" fill="#E23B3B" text-anchor="middle">기본요금 1,600원 &#8594; 7,300원 (5,700원 급증)</text>
  </g>

  <!-- 팁 박스 -->
  <rect x="150" y="1120" width="780" height="120" rx="18" fill="#FFF3E4" stroke="#E8722C" stroke-width="2"/>
  <text x="540" y="1170" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" font-weight="bold" fill="#1a1a1a" text-anchor="middle">서큘레이터로 설정온도 1~2도 올려</text>
  <text x="540" y="1214" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" font-weight="bold" fill="#E8722C" text-anchor="middle">사용량을 경계선 아래로 관리하는 게 핵심</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">2026년 여름(7/1~8/31) 한시 완화 기준 · 초과분 전력량요금 307.3원/kWh</text>
</svg>
