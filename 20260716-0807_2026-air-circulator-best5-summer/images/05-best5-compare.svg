<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <text x="60" y="108" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">2026 서큘레이터 BEST 5</text>
  <text x="60" y="168" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#FFE7CF">유형별 한눈 비교</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 헤더 -->
    <rect x="40" y="250" width="1000" height="86" rx="12" fill="#2B2F36"/>
    <text x="92" y="304" font-size="32" font-weight="bold" fill="#ffffff">유형</text>
    <text x="470" y="304" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">모터</text>
    <text x="640" y="304" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">소음</text>
    <text x="800" y="304" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">무선</text>
    <text x="980" y="304" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="end">가격대</text>

    <!-- rows -->
    <!-- 1 -->
    <rect x="40" y="346" width="1000" height="150" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="80" cy="386" r="24" fill="#E8722C"/><text x="80" y="398" font-size="30" font-weight="bold" fill="#fff" text-anchor="middle">1</text>
    <text x="124" y="398" font-size="34" font-weight="bold" fill="#1a1a1a">저소음 프리미엄</text>
    <text x="124" y="452" font-size="28" fill="#5B6B7C">신일 SIF-BZ143D</text>
    <text x="470" y="440" font-size="32" fill="#1a1a1a" text-anchor="middle">BLDC</text>
    <text x="640" y="440" font-size="30" fill="#1a1a1a" text-anchor="middle">약 20dB</text>
    <text x="800" y="440" font-size="32" fill="#8A97A6" text-anchor="middle">X</text>
    <text x="980" y="440" font-size="32" font-weight="bold" fill="#E8722C" text-anchor="end">10만원대</text>

    <!-- 2 -->
    <rect x="40" y="506" width="1000" height="150" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="80" cy="546" r="24" fill="#E8722C"/><text x="80" y="558" font-size="30" font-weight="bold" fill="#fff" text-anchor="middle">2</text>
    <text x="124" y="558" font-size="34" font-weight="bold" fill="#1a1a1a">대중 신뢰형</text>
    <text x="124" y="612" font-size="28" fill="#5B6B7C">삼성 SFN-T23DSUG</text>
    <text x="470" y="600" font-size="32" fill="#1a1a1a" text-anchor="middle">BLDC</text>
    <text x="640" y="600" font-size="30" fill="#1a1a1a" text-anchor="middle">저소음</text>
    <text x="800" y="600" font-size="32" fill="#8A97A6" text-anchor="middle">X</text>
    <text x="980" y="600" font-size="32" font-weight="bold" fill="#E8722C" text-anchor="end">11만원대</text>

    <!-- 3 -->
    <rect x="40" y="666" width="1000" height="150" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="80" cy="706" r="24" fill="#E8722C"/><text x="80" y="718" font-size="30" font-weight="bold" fill="#fff" text-anchor="middle">3</text>
    <text x="124" y="718" font-size="34" font-weight="bold" fill="#1a1a1a">무선 캠핑형</text>
    <text x="124" y="772" font-size="28" fill="#5B6B7C">샤크 FA200 / 루메나 FAN3</text>
    <text x="470" y="760" font-size="32" fill="#1a1a1a" text-anchor="middle">BLDC</text>
    <text x="640" y="752" font-size="30" fill="#1a1a1a" text-anchor="middle">저소음</text>
    <text x="640" y="790" font-size="26" fill="#8A97A6" text-anchor="middle">/20dB</text>
    <text x="800" y="760" font-size="30" font-weight="bold" fill="#1F8A53" text-anchor="middle">O</text>
    <text x="800" y="794" font-size="24" fill="#8A97A6" text-anchor="middle">24~40h</text>
    <text x="980" y="760" font-size="30" font-weight="bold" fill="#E8722C" text-anchor="end">19~30만원대</text>

    <!-- 4 -->
    <rect x="40" y="826" width="1000" height="150" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="80" cy="866" r="24" fill="#E8722C"/><text x="80" y="878" font-size="30" font-weight="bold" fill="#fff" text-anchor="middle">4</text>
    <text x="124" y="878" font-size="34" font-weight="bold" fill="#1a1a1a">안전 타워형</text>
    <text x="124" y="932" font-size="28" fill="#5B6B7C">쿠오레 CCF-T1000W</text>
    <text x="470" y="920" font-size="32" fill="#1a1a1a" text-anchor="middle">DC</text>
    <text x="640" y="920" font-size="30" fill="#1a1a1a" text-anchor="middle">저소음</text>
    <text x="800" y="920" font-size="32" fill="#8A97A6" text-anchor="middle">X</text>
    <text x="980" y="920" font-size="32" font-weight="bold" fill="#E8722C" text-anchor="end">20만원대</text>

    <!-- 5 -->
    <rect x="40" y="986" width="1000" height="150" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="80" cy="1026" r="24" fill="#E8722C"/><text x="80" y="1038" font-size="30" font-weight="bold" fill="#fff" text-anchor="middle">5</text>
    <text x="124" y="1038" font-size="34" font-weight="bold" fill="#1a1a1a">가성비 입문</text>
    <text x="124" y="1092" font-size="28" fill="#5B6B7C">홈플래닛 NDX2215R</text>
    <text x="470" y="1080" font-size="32" fill="#1a1a1a" text-anchor="middle">AC</text>
    <text x="640" y="1080" font-size="30" fill="#1a1a1a" text-anchor="middle">중음</text>
    <text x="800" y="1080" font-size="32" fill="#8A97A6" text-anchor="middle">X</text>
    <text x="980" y="1080" font-size="32" font-weight="bold" fill="#E8722C" text-anchor="end">3만원대</text>

    <!-- + -->
    <rect x="40" y="1146" width="1000" height="110" rx="12" fill="#F0F3F7" stroke="#D6E0EC"/>
    <text x="80" y="1200" font-size="34" font-weight="bold" fill="#8A97A6">+</text>
    <text x="124" y="1194" font-size="32" font-weight="bold" fill="#1a1a1a">공업용 대형 &#183; 듀플렉스 DP-M50PF</text>
    <text x="124" y="1234" font-size="26" fill="#5B6B7C">AC · 소음 큼 · 강력 환기</text>
    <text x="980" y="1210" font-size="32" font-weight="bold" fill="#E8722C" text-anchor="end">6만원대</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">가격대·재고·구성은 2026년 여름 시점 기준이며 시점마다 변동될 수 있습니다</text>
</svg>
