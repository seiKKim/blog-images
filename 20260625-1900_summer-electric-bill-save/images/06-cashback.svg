<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FBF4ED"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <text x="60" y="118" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">한전:ON 에너지캐시백 신청</text>
  <text x="60" y="170" font-family="Malgun Gothic" font-size="34" fill="#FFF3E6">절약한 만큼 돌려받기 · 성수기 전 미리 신청</text>

  <!-- 휴대폰 목업 -->
  <rect x="290" y="250" width="500" height="900" rx="44" fill="#ffffff" stroke="#D8C6B6" stroke-width="6"/>
  <rect x="290" y="250" width="500" height="110" rx="44" fill="#E8722C"/>
  <rect x="290" y="316" width="500" height="44" fill="#E8722C"/>
  <text x="540" y="322" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#ffffff" text-anchor="middle">에너지캐시백</text>

  <!-- 입력 단계 -->
  <text x="330" y="450" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#444">① 로그인</text>
  <rect x="330" y="480" width="420" height="80" rx="14" fill="#F4ECE3" stroke="#D8C6B6" stroke-width="2"/>
  <text x="356" y="530" font-family="Malgun Gothic" font-size="32" fill="#999">고객번호 입력</text>

  <text x="330" y="640" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#444">② 신청 정보 확인</text>
  <rect x="330" y="670" width="420" height="80" rx="14" fill="#F4ECE3" stroke="#D8C6B6" stroke-width="2"/>
  <text x="356" y="720" font-family="Malgun Gothic" font-size="32" fill="#999">주소 · 세대 정보</text>

  <!-- 캐시백 구조 박스 -->
  <rect x="330" y="800" width="420" height="240" rx="16" fill="#FFF3E6" stroke="#F0A968" stroke-width="3"/>
  <text x="540" y="858" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#C24E12" text-anchor="middle">캐시백 구조</text>
  <text x="356" y="912" font-family="Malgun Gothic" font-size="30" fill="#555">· 3% 이상 절감 → 1kWh당 30원</text>
  <text x="356" y="958" font-family="Malgun Gothic" font-size="30" fill="#555">· 5% 이상 → 30~70원 차등</text>
  <text x="356" y="1004" font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#C24E12">· 합산 최대 100원/kWh</text>

  <rect x="330" y="1070" width="420" height="56" rx="14" fill="#E8722C"/>
  <text x="540" y="1108" font-family="Malgun Gothic" font-weight="bold" font-size="32" fill="#ffffff" text-anchor="middle">신청하기</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#EDE0D4"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="30" fill="#7A6A5C">출처: 한전:ON 안내 · 요건은 신청 전 최신 기준 확인</text>
</svg>
