<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#FBF4ED"/>
  <rect width="1080" height="140" fill="#E8722C"/>
  <text x="60" y="92" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#ffffff">한전:ON 예상요금 미리보기</text>

  <!-- 카드 -->
  <rect x="90" y="210" width="900" height="380" rx="24" fill="#ffffff" stroke="#D8C6B6" stroke-width="4"/>
  <text x="130" y="290" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#444">이번 달 예상 전기요금</text>

  <text x="130" y="420" font-family="Malgun Gothic" font-weight="bold" font-size="100" fill="#E8722C">62,840<tspan font-size="56" fill="#444">원</tspan></text>
  <text x="130" y="480" font-family="Malgun Gothic" font-size="34" fill="#888">예상 사용량 312 kWh · 하계 1단계 적용</text>

  <line x1="130" y1="510" x2="950" y2="510" stroke="#EADFD4" stroke-width="2"/>
