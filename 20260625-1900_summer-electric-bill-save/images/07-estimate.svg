  <text x="90" y="650" font-family="Malgun Gothic" font-size="32" fill="#7A6A5C">※ 실시간·시간대별 조회는 스마트계량기(AMI) 설치 가구 한정</text>
  <text x="90" y="700" font-family="Malgun Gothic" font-size="30" fill="#A2937F">출처: 한전:ON(online.kepco.co.kr) · 예시 화면(수치는 가상)</text>
