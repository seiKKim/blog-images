<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="125" font-family="Noto Sans CJK KR" font-weight="bold" font-size="60" fill="#ffffff">지원금 분담 구조</text>

  <g font-family="Noto Sans CJK KR" font-size="46" fill="#1a1a1a">
    <rect x="60" y="280" width="960" height="130" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="362" font-weight="bold">근로자 본인 (50%)</text>
    <text x="1000" y="362" font-weight="bold" fill="#1B5FA6" text-anchor="end">20만 원</text>

    <rect x="60" y="430" width="960" height="130" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="512" font-weight="bold">기업 (25%)</text>
    <text x="1000" y="512" font-weight="bold" fill="#1B5FA6" text-anchor="end">10만 원</text>

    <rect x="60" y="580" width="960" height="130" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="662" font-weight="bold">정부 (25%)</text>
    <text x="1000" y="662" font-weight="bold" fill="#1B5FA6" text-anchor="end">10만 원</text>

    <rect x="60" y="730" width="960" height="140" rx="16" fill="#FFD23F"/>
    <text x="100" y="818" font-weight="bold">합계</text>
    <text x="1000" y="818" font-weight="bold" fill="#1B5FA6" text-anchor="end">40만 원</text>
  </g>

  <text x="60" y="980" font-family="Noto Sans CJK KR" font-size="40" fill="#5B6B7C">※ 중견기업·5년차↑ 중기업: 기업 15 + 정부 5만 원</text>
  <text x="60" y="1040" font-family="Noto Sans CJK KR" font-weight="bold" font-size="44" fill="#1a1a1a">내 돈 20만 원으로 40만 원 국내여행</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="34" fill="#5B6B7C">출처: 한국관광공사 근로자 휴가지원사업</text>
</svg>
