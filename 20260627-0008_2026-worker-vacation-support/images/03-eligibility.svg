<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="125" font-family="Noto Sans CJK KR" font-weight="bold" font-size="60" fill="#ffffff">신청 대상 한눈에</text>

  <g font-family="Noto Sans CJK KR" font-size="46" fill="#1a1a1a">
    <rect x="60" y="280" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="354" font-weight="bold">중기업·소기업</text>
    <text x="1000" y="354" font-weight="bold" fill="#1F8A53" text-anchor="end">가능 O</text>

    <rect x="60" y="416" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="490" font-weight="bold">소상공인</text>
    <text x="1000" y="490" font-weight="bold" fill="#1F8A53" text-anchor="end">가능 O</text>

    <rect x="60" y="552" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="626" font-weight="bold">비영리민간단체</text>
    <text x="1000" y="626" font-weight="bold" fill="#1F8A53" text-anchor="end">가능 O</text>

    <rect x="60" y="688" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="762" font-weight="bold">사회복지시설·법인</text>
    <text x="1000" y="762" font-weight="bold" fill="#1F8A53" text-anchor="end">가능 O</text>

    <rect x="60" y="824" width="960" height="120" rx="16" fill="#ffffff" stroke="#E23B3B" stroke-width="2"/>
    <text x="100" y="898" font-weight="bold">대기업</text>
    <text x="1000" y="898" font-weight="bold" fill="#E23B3B" text-anchor="end">불가 X</text>
  </g>

  <text x="60" y="1040" font-family="Noto Sans CJK KR" font-weight="bold" font-size="42" fill="#1a1a1a">개인 신청 X · 회사(사업장) 단위 신청</text>
  <text x="60" y="1100" font-family="Noto Sans CJK KR" font-size="40" fill="#5B6B7C">소상공인 대표·일부 임원도 요건 충족 시 가능</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="34" fill="#5B6B7C">출처: 한국관광공사 근로자 휴가지원사업</text>
</svg>
