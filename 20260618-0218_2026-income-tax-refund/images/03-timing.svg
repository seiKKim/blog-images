<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1F8A53"/>
  <text x="60" y="125" font-family="Noto Sans CJK KR" font-weight="bold" font-size="60" fill="#ffffff">환급금 입금 시기</text>

  <text x="60" y="290" font-family="Noto Sans CJK KR" font-size="40" fill="#5B6B7C">원칙: 환급 결정일로부터 30일 이내 지급</text>

  <g font-family="Noto Sans CJK KR">
    <rect x="60" y="340" width="960" height="190" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="415" font-size="44" font-weight="bold" fill="#1a1a1a">정기신고 (6/1 이전)</text>
    <text x="1000" y="415" font-size="52" font-weight="bold" fill="#1F8A53" text-anchor="end">6월 말~7월 초</text>
    <text x="100" y="478" font-size="34" fill="#5B6B7C">국세청, 7월 초까지 입금 완료 안내</text>

    <rect x="60" y="560" width="960" height="190" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="635" font-size="44" font-weight="bold" fill="#1a1a1a">기한 후 신고 (6/1 이후)</text>
    <text x="1000" y="635" font-size="52" font-weight="bold" fill="#E8722C" text-anchor="end">2주~3개월</text>
    <text x="100" y="698" font-size="34" fill="#5B6B7C">정기신고분보다 처리 지연</text>
  </g>

  <text x="60" y="830" font-family="Noto Sans CJK KR" font-size="38" fill="#1a1a1a">세무서별 신청 건수 차이로</text>
  <text x="60" y="884" font-family="Noto Sans CJK KR" font-weight="bold" font-size="42" fill="#1F8A53">사람마다 입금일이 달라요</text>

  <rect x="0" y="1000" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1052" font-family="Noto Sans CJK KR" font-size="34" fill="#5B6B7C">출처: 국세청·국세상담센터 안내 기준</text>
</svg>
