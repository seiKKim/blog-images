<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1F8A53"/>
  <text x="60" y="125" font-family="Noto Sans CJK KR" font-weight="bold" font-size="60" fill="#ffffff">6월 신청분 한눈에</text>
  <g font-family="Noto Sans CJK KR">
    <rect x="60" y="280" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="372" font-weight="bold" font-size="40" fill="#5B6B7C">신청 기간</text>
    <text x="990" y="372" font-weight="bold" font-size="42" fill="#1F8A53" text-anchor="end">6월 16일 ~ 6월 30일</text>
    <rect x="60" y="454" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="546" font-weight="bold" font-size="40" fill="#5B6B7C">선납 대상 기간</text>
    <text x="990" y="546" font-weight="bold" font-size="42" fill="#1F8A53" text-anchor="end">하반기 7~12월 · 6개월(184일)</text>
    <rect x="60" y="628" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="720" font-weight="bold" font-size="40" fill="#5B6B7C">적용 기준</text>
    <text x="990" y="720" font-weight="bold" font-size="42" fill="#1F8A53" text-anchor="end">연세액 × 184/365 × 5%</text>
    <rect x="60" y="802" width="960" height="150" rx="18" fill="#1F8A53"/>
    <text x="100" y="894" font-weight="bold" font-size="40" fill="#ffffff">실질 할인율</text>
    <text x="990" y="894" font-weight="900" font-size="46" fill="#FFD23F" text-anchor="end">연세액의 약 2.51%</text>
  </g>
  <rect x="60" y="1000" width="960" height="190" rx="20" fill="#E7F2EC" stroke="#1F8A53" stroke-width="2"/>
  <text x="540" y="1075" font-family="Noto Sans CJK KR" font-weight="bold" font-size="38" fill="#1a1a1a" text-anchor="middle">6월은 하반기(2기)분을 미리 선납해</text>
  <text x="540" y="1140" font-family="Noto Sans CJK KR" font-weight="bold" font-size="38" fill="#1F8A53" text-anchor="middle">연세액 대비 약 2.51% 할인받는 구조</text>
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1320" font-family="Noto Sans CJK KR" font-size="30" fill="#5B6B7C">출처: 행정안전부·위택스 안내 기준 (공제율 5% 가정)</text>
</svg>
