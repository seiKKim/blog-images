<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#F4F7FB"/>
  <rect width="1080" height="170" fill="#1F8A53"/>
  <text x="60" y="88" font-family="Noto Sans CJK KR" font-weight="bold" font-size="54" fill="#ffffff">시기별 실질 할인율 비교</text>
  <text x="60" y="142" font-family="Noto Sans CJK KR" font-weight="bold" font-size="32" fill="#E8EEF5">신청이 늦을수록 할인폭이 줄어듭니다</text>
  <!-- 축선 base_y=820, max_h=500, maxv=4.58 -->
  <rect x="60" y="820" width="960" height="3" fill="#D6E0EC"/>
  <g font-family="Noto Sans CJK KR" text-anchor="middle">
    <!-- 1월 4.58% height=500 -->
    <rect x="60" y="320" width="210" height="500" rx="16" fill="#8FC6A8"/>
    <text x="165" y="280" font-weight="900" font-size="46" fill="#5B6B7C">4.58%</text>
    <text x="165" y="884" font-weight="900" font-size="44" fill="#1a1a1a">1월</text>
    <text x="165" y="932" font-size="26" fill="#5B6B7C">334/365 × 5%</text>
    <!-- 3월 3.76% height=410 -->
    <rect x="310" y="410" width="210" height="410" rx="16" fill="#8FC6A8"/>
    <text x="415" y="370" font-weight="900" font-size="46" fill="#5B6B7C">3.76%</text>
    <text x="415" y="884" font-weight="900" font-size="44" fill="#1a1a1a">3월</text>
    <text x="415" y="932" font-size="26" fill="#5B6B7C">275/365 × 5%</text>
    <!-- 6월 강조 2.51% height=274 -->
    <rect x="560" y="546" width="210" height="274" rx="16" fill="#1F8A53"/>
    <rect x="595" y="438" width="140" height="44" rx="12" fill="#FFD23F"/>
    <text x="665" y="470" font-weight="900" font-size="28" fill="#1a1a1a">6월</text>
    <text x="665" y="520" font-weight="900" font-size="46" fill="#1F8A53">2.51%</text>
    <text x="665" y="884" font-weight="900" font-size="44" fill="#1a1a1a">6월</text>
    <text x="665" y="932" font-size="26" fill="#5B6B7C">184/365 × 5%</text>
    <!-- 9월 1.25% height=136 -->
    <rect x="810" y="684" width="210" height="136" rx="16" fill="#8FC6A8"/>
    <text x="915" y="644" font-weight="900" font-size="46" fill="#5B6B7C">1.25%</text>
    <text x="915" y="884" font-weight="900" font-size="44" fill="#1a1a1a">9월</text>
    <text x="915" y="932" font-size="26" fill="#5B6B7C">92/184 × 5%</text>
  </g>
  <text x="540" y="1010" font-family="Noto Sans CJK KR" font-weight="bold" font-size="34" fill="#5B6B7C" text-anchor="middle">1월 &gt; 3월 &gt; 6월 &gt; 9월  순으로 줄어듭니다</text>
  <rect x="0" y="1022" width="1080" height="58" fill="#E8EEF5"/>
  <text x="60" y="1059" font-family="Noto Sans CJK KR" font-size="26" fill="#5B6B7C">공제율 5% 가정 · 출처: 행정안전부·위택스 안내 기준</text>
</svg>
