<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="810" viewBox="0 0 1080 810">
  <defs><style>text{font-family:'Malgun Gothic','Noto Sans CJK KR',sans-serif;}</style></defs>
  <rect width="1080" height="810" fill="#F1F6FB"/>

  <rect width="1080" height="190" fill="#1B5FA6"/>
  <text x="60" y="100" font-weight="bold" font-size="56" fill="#FFD23F">차량 침수 시 탈출 요령</text>
  <text x="60" y="155" font-size="36" fill="#E8EEF5">타이어 2/3 잠기기 전에 이동, 못 나가면 창문을 깬다</text>

  <!-- 차량 + 창문 깨는 위치 일러스트 -->
  <g>
    <!-- 물 -->
    <rect x="60" y="480" width="540" height="180" fill="#1B5FA6" opacity="0.16"/>
    <!-- 차체 -->
    <rect x="100" y="380" width="460" height="120" rx="20" fill="#3B5878"/>
    <path d="M170 380 L230 320 L420 320 L470 380 Z" fill="#52708F"/>
    <!-- 창문 -->
    <rect x="240" y="330" width="160" height="48" rx="6" fill="#cfe0f2"/>
    <!-- 바퀴 -->
    <circle cx="200" cy="500" r="42" fill="#1a242f"/>
    <circle cx="460" cy="500" r="42" fill="#1a242f"/>
    <!-- 망치 타격 위치 표시 -->
    <circle cx="250" cy="354" r="20" fill="none" stroke="#E23B3B" stroke-width="6"/>
    <circle cx="390" cy="354" r="20" fill="none" stroke="#E23B3B" stroke-width="6"/>
    <text x="320" y="280" font-weight="bold" font-size="30" fill="#E23B3B" text-anchor="middle">창문 모서리를 친다</text>
    <line x1="250" y1="334" x2="270" y2="290" stroke="#E23B3B" stroke-width="4"/>
    <line x1="390" y1="334" x2="370" y2="290" stroke="#E23B3B" stroke-width="4"/>
  </g>

  <!-- 단계 목록 -->
  <g font-size="33" fill="#2a3a4a">
    <text x="640" y="320" font-weight="bold" font-size="40" fill="#143A66">탈출 도구</text>
    <text x="640" y="375">· 비상 탈출 망치</text>
    <text x="640" y="425">· 헤드레스트 하단 철재봉</text>
    <text x="640" y="475">· 안전벨트 체결장치</text>

    <rect x="630" y="510" width="390" height="160" rx="16" fill="#FDEBEB" stroke="#F2C0C0"/>
    <text x="655" y="560" font-weight="bold" font-size="32" fill="#E23B3B">못 깰 때는</text>
    <text x="655" y="605" font-size="30" fill="#2a3a4a">내·외부 수위 차이</text>
    <text x="655" y="648" font-weight="bold" font-size="34" fill="#E23B3B">30㎝ 이하 → 문 열림</text>
  </g>

  <!-- 119 안내 -->
  <text x="60" y="720" font-weight="bold" font-size="34" fill="#143A66">탈출 후 높은 곳 대피 · 여의치 않으면 차량 지붕 위 → 119 신고</text>

  <rect x="0" y="740" width="1080" height="70" fill="#E0E9F2"/>
  <text x="60" y="785" font-size="30" fill="#5B6B7C">출처: 행정안전부 국민재난안전포털</text>
</svg>
