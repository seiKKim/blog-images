<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="810" viewBox="0 0 1080 810">
  <defs><style>text{font-family:'Malgun Gothic','Noto Sans CJK KR',sans-serif;}</style></defs>
  <rect width="1080" height="810" fill="#F1F6FB"/>

  <rect width="1080" height="190" fill="#1B5FA6"/>
  <text x="60" y="100" font-weight="bold" font-size="56" fill="#FFD23F">침수 후, 가장 먼저 안전점검</text>
  <text x="60" y="155" font-size="36" fill="#E8EEF5">가스·전기 차단기 확인 → 전문가 점검 전까지 사용 금지</text>

  <!-- 전화번호 2박스 -->
  <g>
    <rect x="60" y="240" width="460" height="230" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="290" y="305" font-weight="bold" font-size="40" fill="#143A66" text-anchor="middle">가스 안전점검</text>
    <text x="290" y="350" font-size="32" fill="#5B6B7C" text-anchor="middle">한국가스안전공사</text>
    <text x="290" y="430" font-weight="bold" font-size="62" fill="#E8722C" text-anchor="middle">1544-4500</text>

    <rect x="560" y="240" width="460" height="230" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="790" y="305" font-weight="bold" font-size="40" fill="#143A66" text-anchor="middle">전기 안전점검</text>
    <text x="790" y="350" font-size="32" fill="#5B6B7C" text-anchor="middle">한국전기안전공사</text>
    <text x="790" y="430" font-weight="bold" font-size="62" fill="#1B5FA6" text-anchor="middle">1588-7500</text>
  </g>

  <!-- 주의 박스 -->
  <rect x="60" y="510" width="960" height="210" rx="20" fill="#FDEBEB" stroke="#F2C0C0"/>
  <text x="95" y="570" font-weight="bold" font-size="40" fill="#E23B3B">⚠ 점검 전까지는 사용 금지</text>
  <text x="95" y="625" font-size="34" fill="#2a3a4a">· 침수된 가전제품은 전원 켜지 말 것 (감전·합선 위험)</text>
  <text x="95" y="675" font-size="34" fill="#2a3a4a">· 수돗물·식수 오염 여부 확인 후 사용</text>

  <rect x="0" y="740" width="1080" height="70" fill="#E0E9F2"/>
  <text x="60" y="785" font-size="30" fill="#5B6B7C">출처: 행정안전부 · 한국가스안전공사 · 한국전기안전공사</text>
</svg>
