<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="810" viewBox="0 0 1080 810">
  <defs><style>text{font-family:'Malgun Gothic','Noto Sans CJK KR',sans-serif;}</style></defs>
  <rect width="1080" height="810" fill="#F1F6FB"/>

  <rect width="1080" height="190" fill="#1B5FA6"/>
  <text x="60" y="100" font-weight="bold" font-size="56" fill="#FFD23F">도움받을 수 있는 곳</text>
  <text x="60" y="155" font-size="36" fill="#E8EEF5">안전디딤돌 앱 2026.6.14 개편 · 비상 연락처</text>

  <!-- 스마트폰 목업 -->
  <g>
    <rect x="80" y="230" width="300" height="510" rx="36" fill="#143A66"/>
    <rect x="100" y="270" width="260" height="430" rx="12" fill="#ffffff"/>
    <rect x="100" y="270" width="260" height="70" fill="#1B5FA6"/>
    <text x="230" y="315" font-weight="bold" font-size="28" fill="#ffffff" text-anchor="middle">안전디딤돌</text>
    <rect x="120" y="360" width="220" height="90" rx="10" fill="#FDEBEB"/>
    <text x="230" y="395" font-size="22" fill="#E23B3B" text-anchor="middle">📍 현재 위치</text>
    <text x="230" y="425" font-weight="bold" font-size="24" fill="#E23B3B" text-anchor="middle">재난문자 자동표시</text>
    <rect x="120" y="470" width="220" height="60" rx="10" fill="#E6F0FA"/>
    <text x="230" y="508" font-size="22" fill="#1B5FA6" text-anchor="middle">호우경보 발효</text>
    <rect x="120" y="550" width="220" height="60" rx="10" fill="#E6F0FA"/>
    <text x="230" y="588" font-size="22" fill="#1B5FA6" text-anchor="middle">대피소 안내</text>
  </g>

  <!-- 개편 내용 -->
  <g>
    <rect x="430" y="230" width="590" height="100" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="455" y="285" font-size="32" fill="#2a3a4a">안전시설 정보</text>
    <text x="990" y="295" font-weight="bold" font-size="40" fill="#1B5FA6" text-anchor="end">16종 → 43종</text>

    <rect x="430" y="345" width="590" height="100" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="455" y="400" font-size="32" fill="#2a3a4a">외국인앱 언어</text>
    <text x="990" y="410" font-weight="bold" font-size="40" fill="#1B5FA6" text-anchor="end">3개 → 22개</text>
  </g>

  <!-- 연락처 -->
  <rect x="430" y="470" width="590" height="270" rx="16" fill="#143A66"/>
  <text x="455" y="525" font-weight="bold" font-size="34" fill="#FFD23F">비상 연락처</text>
  <text x="455" y="585" font-size="32" fill="#ffffff">긴급신고(화재·구조·구급)   <tspan font-weight="bold" fill="#FFD23F">119</tspan></text>
  <text x="455" y="640" font-size="32" fill="#ffffff">범죄·경찰   <tspan font-weight="bold" fill="#FFD23F">112</tspan></text>
  <text x="455" y="695" font-size="32" fill="#ffffff">전국 교통상황   <tspan font-weight="bold" fill="#FFD23F">1644-5000</tspan></text>

  <rect x="0" y="740" width="1080" height="70" fill="#E0E9F2"/>
  <text x="60" y="785" font-size="30" fill="#5B6B7C">출처: 행정안전부 · 국민재난안전포털(safekorea.go.kr)</text>
</svg>
