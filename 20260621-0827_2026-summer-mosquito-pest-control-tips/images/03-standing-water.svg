<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FBF4EC"/>
  <rect width="1080" height="210" fill="#E8722C"/>
  <rect x="60" y="58" rx="28" ry="28" width="160" height="58" fill="#FFD23F"/>
  <text x="140" y="98" font-family="Malgun Gothic" font-weight="bold" font-size="32" fill="#1a1a1a" text-anchor="middle">생활꿀팁</text>
  <text x="60" y="178" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">집 주변 고인 물 점검표</text>

  <text x="60" y="288" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#7a4a23">물 고이는 용기는 주 1회 비우기 · 엎기 · 덮기</text>

  <!-- 표 헤더 -->
  <g font-family="Malgun Gothic">
    <rect x="60" y="330" width="540" height="84" rx="14" fill="#E8722C"/>
    <rect x="612" y="330" width="408" height="84" rx="14" fill="#E8722C"/>
    <text x="90" y="385" font-weight="bold" font-size="38" fill="#ffffff">점검 장소</text>
    <text x="642" y="385" font-weight="bold" font-size="38" fill="#ffffff">조치 방법</text>

    <!-- 행들 -->
    <rect x="60" y="430" width="540" height="130" rx="14" fill="#ffffff" stroke="#EAD8C6"/>
    <rect x="612" y="430" width="408" height="130" rx="14" fill="#FFF6EC" stroke="#EAD8C6"/>
    <text x="90" y="510" font-weight="bold" font-size="38" fill="#1a1a1a">화분 받침 접시</text>
    <text x="642" y="510" font-size="36" fill="#5a5a5a">고인 물 비우기</text>

    <rect x="60" y="576" width="540" height="130" rx="14" fill="#ffffff" stroke="#EAD8C6"/>
    <rect x="612" y="576" width="408" height="130" rx="14" fill="#FFF6EC" stroke="#EAD8C6"/>
    <text x="90" y="640" font-weight="bold" font-size="36" fill="#1a1a1a">빗물받이</text>
    <text x="90" y="684" font-size="30" fill="#8a6a4a">(처마 홈통)</text>
    <text x="642" y="656" font-size="34" fill="#5a5a5a">고임·막힘 확인 후 비우기</text>

    <rect x="60" y="722" width="540" height="130" rx="14" fill="#ffffff" stroke="#EAD8C6"/>
    <rect x="612" y="722" width="408" height="130" rx="14" fill="#FFF6EC" stroke="#EAD8C6"/>
    <text x="90" y="802" font-weight="bold" font-size="38" fill="#1a1a1a">양동이·물통</text>
    <text x="642" y="802" font-size="36" fill="#5a5a5a">비우고 엎어 두기</text>

    <rect x="60" y="868" width="540" height="130" rx="14" fill="#ffffff" stroke="#EAD8C6"/>
    <rect x="612" y="868" width="408" height="130" rx="14" fill="#FFF6EC" stroke="#EAD8C6"/>
    <text x="90" y="932" font-weight="bold" font-size="36" fill="#1a1a1a">폐타이어</text>
    <text x="90" y="976" font-size="30" fill="#8a6a4a">재활용 용기</text>
    <text x="642" y="948" font-size="34" fill="#5a5a5a">덮거나 치우기</text>

    <rect x="60" y="1014" width="540" height="130" rx="14" fill="#ffffff" stroke="#EAD8C6"/>
    <rect x="612" y="1014" width="408" height="130" rx="14" fill="#FFF6EC" stroke="#EAD8C6"/>
    <text x="90" y="1078" font-weight="bold" font-size="36" fill="#1a1a1a">음식물·쓰레기통</text>
    <text x="642" y="1078" font-size="34" fill="#5a5a5a">고인 물 제거, 밀폐</text>
  </g>

  <!-- 메모 -->
  <rect x="60" y="1166" width="960" height="78" rx="16" fill="#FDE9D2"/>
  <text x="90" y="1216" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#9a5a1a">장마·집중호우 직후엔 한 번 더 점검!</text>

  <rect x="0" y="1262" width="1080" height="88" fill="#EDE0D2"/>
  <text x="60" y="1318" font-family="Malgun Gothic" font-size="32" fill="#7a5a3a">출처: 미국 CDC 권고 정리</text>
</svg>
