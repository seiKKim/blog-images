<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FBF4EC"/>
  <rect width="1080" height="210" fill="#E8722C"/>
  <rect x="60" y="58" rx="28" ry="28" width="160" height="58" fill="#FFD23F"/>
  <text x="140" y="98" font-family="Malgun Gothic" font-weight="bold" font-size="32" fill="#1a1a1a" text-anchor="middle">생활꿀팁</text>
  <text x="60" y="178" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">검증된 기피제 유효성분</text>

  <text x="60" y="288" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#7a4a23">CDC·EPA 권장: EPA에 등록된 제품</text>

  <!-- 성분 리스트 -->
  <g font-family="Malgun Gothic">
    <rect x="60" y="324" width="960" height="84" rx="16" fill="#ffffff" stroke="#EAD8C6"/>
    <circle cx="108" cy="366" r="14" fill="#E8722C"/>
    <text x="148" y="380" font-weight="bold" font-size="40" fill="#1a1a1a">DEET (디에틸톨루아미드)</text>

    <rect x="60" y="420" width="960" height="84" rx="16" fill="#ffffff" stroke="#EAD8C6"/>
    <circle cx="108" cy="462" r="14" fill="#E8722C"/>
    <text x="148" y="476" font-weight="bold" font-size="40" fill="#1a1a1a">피카리딘 (이카리딘)</text>

    <rect x="60" y="516" width="960" height="84" rx="16" fill="#ffffff" stroke="#EAD8C6"/>
    <circle cx="108" cy="558" r="14" fill="#E8722C"/>
    <text x="148" y="572" font-weight="bold" font-size="40" fill="#1a1a1a">IR3535</text>

    <rect x="60" y="612" width="960" height="84" rx="16" fill="#ffffff" stroke="#EAD8C6"/>
    <circle cx="108" cy="654" r="14" fill="#E8722C"/>
    <text x="148" y="668" font-weight="bold" font-size="38" fill="#1a1a1a">레몬유칼립투스 오일(OLE)·PMD</text>

    <rect x="60" y="708" width="960" height="84" rx="16" fill="#ffffff" stroke="#EAD8C6"/>
    <circle cx="108" cy="750" r="14" fill="#E8722C"/>
    <text x="148" y="764" font-weight="bold" font-size="40" fill="#1a1a1a">2-운데카논</text>
  </g>

  <!-- 주의사항 박스 -->
  <rect x="60" y="828" width="960" height="378" rx="22" fill="#FDE9D2"/>
  <text x="92" y="892" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#9a5a1a">⚠ 사용 시 주의사항</text>
  <g font-family="Malgun Gothic" font-size="34" fill="#5a3a1a">
    <text x="92" y="956">· 3세 미만 영유아엔 OLE·PMD 제품 사용 금지</text>
    <text x="92" y="1012">· 아이에겐 어른 손에 덜어 얼굴 피해 바르기</text>
    <text x="92" y="1068">· 자외선차단제 먼저, 기피제 나중에</text>
    <text x="92" y="1124">· 사용 전 반드시 라벨 읽기</text>
    <text x="92" y="1180">· 라벨대로 쓰면 임신부·수유부도 안전</text>
  </g>

  <rect x="0" y="1262" width="1080" height="88" fill="#EDE0D2"/>
  <text x="60" y="1318" font-family="Malgun Gothic" font-size="32" fill="#7a5a3a">출처: 미국 CDC·EPA 자료 정리</text>
</svg>
