<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FBF4EC"/>
  <!-- 상단 색띠 + 제목 -->
  <rect width="1080" height="210" fill="#E8722C"/>
  <rect x="60" y="58" rx="28" ry="28" width="160" height="58" fill="#FFD23F"/>
  <text x="140" y="98" font-family="Malgun Gothic" font-weight="bold" font-size="32" fill="#1a1a1a" text-anchor="middle">생활꿀팁</text>
  <text x="60" y="178" font-family="Malgun Gothic" font-weight="bold" font-size="62" fill="#ffffff">모기 생활사 4단계</text>

  <!-- 안내 -->
  <text x="60" y="290" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#7a4a23">유충·번데기 단계는 '고인 물'이 반드시 필요</text>

  <!-- 4 단계 카드 -->
  <g font-family="Malgun Gothic">
    <!-- 1 알 -->
    <rect x="60" y="340" width="960" height="200" rx="22" fill="#ffffff" stroke="#EAD8C6"/>
    <circle cx="160" cy="440" r="58" fill="#FDEBD8"/>
    <text x="160" y="458" font-size="58" text-anchor="middle">🥚</text>
    <text x="270" y="415" font-weight="bold" font-size="48" fill="#1a1a1a">1. 알</text>
    <text x="270" y="478" font-size="36" fill="#5a5a5a">물 표면 등에 산란</text>
    <rect x="800" y="402" rx="22" ry="22" width="180" height="56" fill="#E8722C"/>
    <text x="890" y="440" font-weight="bold" font-size="32" fill="#ffffff" text-anchor="middle">물 필요</text>

    <!-- 2 유충 -->
    <rect x="60" y="560" width="960" height="200" rx="22" fill="#ffffff" stroke="#EAD8C6"/>
    <circle cx="160" cy="660" r="58" fill="#FDEBD8"/>
    <text x="160" y="678" font-size="56" text-anchor="middle">🪱</text>
    <text x="270" y="635" font-weight="bold" font-size="48" fill="#1a1a1a">2. 유충 (장구벌레)</text>
    <text x="270" y="698" font-size="36" fill="#5a5a5a">고인 물 속에서 성장</text>
    <rect x="800" y="622" rx="22" ry="22" width="180" height="56" fill="#E8722C"/>
    <text x="890" y="660" font-weight="bold" font-size="32" fill="#ffffff" text-anchor="middle">물 필요</text>

    <!-- 3 번데기 -->
    <rect x="60" y="780" width="960" height="200" rx="22" fill="#ffffff" stroke="#EAD8C6"/>
    <circle cx="160" cy="880" r="58" fill="#FDEBD8"/>
    <text x="160" y="898" font-size="54" text-anchor="middle">🐛</text>
    <text x="270" y="855" font-weight="bold" font-size="48" fill="#1a1a1a">3. 번데기</text>
    <text x="270" y="918" font-size="36" fill="#5a5a5a">물 속에서 변태 준비</text>
    <rect x="800" y="842" rx="22" ry="22" width="180" height="56" fill="#E8722C"/>
    <text x="890" y="880" font-weight="bold" font-size="32" fill="#ffffff" text-anchor="middle">물 필요</text>

    <!-- 4 성충 -->
    <rect x="60" y="1000" width="960" height="200" rx="22" fill="#ffffff" stroke="#EAD8C6"/>
    <circle cx="160" cy="1100" r="58" fill="#FDEBD8"/>
    <text x="160" y="1118" font-size="54" text-anchor="middle">🦟</text>
    <text x="270" y="1075" font-weight="bold" font-size="48" fill="#1a1a1a">4. 성충</text>
    <text x="270" y="1138" font-size="36" fill="#5a5a5a">수명 약 2~4주 · 암컷만 흡혈</text>
    <rect x="790" y="1062" rx="22" ry="22" width="200" height="56" fill="#FFD23F"/>
    <text x="890" y="1100" font-weight="bold" font-size="32" fill="#1a1a1a" text-anchor="middle">물 밖 활동</text>
  </g>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1262" width="1080" height="88" fill="#EDE0D2"/>
  <text x="60" y="1318" font-family="Malgun Gothic" font-size="32" fill="#7a5a3a">출처: 미국 CDC 등 공식 기관 자료 정리</text>
</svg>
