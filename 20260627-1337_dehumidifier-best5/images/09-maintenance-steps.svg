<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" font-family="Malgun Gothic">
<rect width="1080" height="1350" fill="#F2F8FC"/>
<rect width="1080" height="200" fill="#1B7BB5"/>
<text x="60" y="128" font-weight="bold" font-size="62" fill="#FFFFFF">제습기 관리 5단계</text>
<rect x="60" y="270" width="960" height="180" rx="20" fill="#FFFFFF" stroke="#D3E4F0"/>
<circle cx="155" cy="360" r="54" fill="#21A7B5"/>
<text x="155" y="378" font-weight="bold" font-size="50" fill="#FFFFFF" text-anchor="middle">1</text>
<text x="245" y="342" font-weight="bold" font-size="46" fill="#1A2A35">물통 관리</text>
<text x="245" y="400" font-size="33" fill="#5B6B7C">주 1~2회 구연산·식초 20~30분 담가 물때 제거 후 완전 건조</text>
<rect x="60" y="470" width="960" height="180" rx="20" fill="#FFFFFF" stroke="#D3E4F0"/>
<circle cx="155" cy="560" r="54" fill="#21A7B5"/>
<text x="155" y="578" font-weight="bold" font-size="50" fill="#FFFFFF" text-anchor="middle">2</text>
<text x="245" y="542" font-weight="bold" font-size="46" fill="#1A2A35">사용 후 건조</text>
<text x="245" y="600" font-size="33" fill="#5B6B7C">사용 직후 송풍/건조 모드로 내부 말리기 (곰팡이·냄새 예방)</text>
<rect x="60" y="670" width="960" height="180" rx="20" fill="#FFFFFF" stroke="#D3E4F0"/>
<circle cx="155" cy="760" r="54" fill="#21A7B5"/>
<text x="155" y="778" font-weight="bold" font-size="50" fill="#FFFFFF" text-anchor="middle">3</text>
<text x="245" y="742" font-weight="bold" font-size="46" fill="#1A2A35">필터 청소</text>
<text x="245" y="800" font-size="33" fill="#5B6B7C">필터·흡기망 2~4주마다 세척, 1~3개월마다 교체</text>
<rect x="60" y="870" width="960" height="180" rx="20" fill="#FFFFFF" stroke="#D3E4F0"/>
<circle cx="155" cy="960" r="54" fill="#21A7B5"/>
<text x="155" y="978" font-weight="bold" font-size="50" fill="#FFFFFF" text-anchor="middle">4</text>
<text x="245" y="942" font-weight="bold" font-size="46" fill="#1A2A35">연속배수 설치</text>
<text x="245" y="1000" font-size="33" fill="#5B6B7C">고무마개 제거 후 호스(10~12mm) 꽉 끼우기, 월 1회 누수 점검</text>
<rect x="60" y="1070" width="960" height="180" rx="20" fill="#FFFFFF" stroke="#D3E4F0"/>
<circle cx="155" cy="1160" r="54" fill="#21A7B5"/>
<text x="155" y="1178" font-weight="bold" font-size="50" fill="#FFFFFF" text-anchor="middle">5</text>
<text x="245" y="1142" font-weight="bold" font-size="46" fill="#1A2A35">사용 시간</text>
<text x="245" y="1200" font-size="33" fill="#5B6B7C">습도 높은 날 4~8시간 / 비 안 오는 날 1~2시간</text>
<rect x="0" y="1270" width="1080" height="80" fill="#E3EEF6"/>
<text x="60" y="1322" font-size="34" fill="#5B6B7C">출처: 본문 정리 · blog.naver.com/trip_chocho</text>
</svg>
