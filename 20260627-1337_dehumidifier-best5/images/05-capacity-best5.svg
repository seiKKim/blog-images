<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" font-family="Malgun Gothic">
<rect width="1080" height="1350" fill="#F2F8FC"/>
<rect width="1080" height="200" fill="#1B7BB5"/>
<text x="60" y="128" font-weight="bold" font-size="62" fill="#FFFFFF">용량별 추천 한눈에</text>
<rect x="60" y="270" width="960" height="320" rx="22" fill="#FFFFFF" stroke="#D3E4F0"/>
<rect x="60" y="270" width="22" height="320" rx="0" fill="#21A7B5"/>
<rect x="100" y="310" rx="14" width="170" height="74" fill="#21A7B5"/>
<text x="185" y="360" font-weight="bold" font-size="46" fill="#FFFFFF" text-anchor="middle">소형</text>
<text x="300" y="365" font-weight="bold" font-size="46" fill="#1A2A35">원룸~10평대</text>
<text x="120" y="440" font-size="40" fill="#5B6B7C">적정 제습량</text>
<text x="1000" y="440" font-weight="bold" font-size="44" fill="#21A7B5" text-anchor="end">8~10L (작은 원룸 5~6L)</text>
<text x="120" y="505" font-size="40" fill="#5B6B7C">가격대(2026.6)</text>
<text x="1000" y="505" font-weight="bold" font-size="44" fill="#1A2A35" text-anchor="end">약 5만~12만원대</text>
<text x="120" y="565" font-size="36" fill="#5B6B7C">가볍고 저렴, 단일 공간용</text>
<rect x="60" y="620" width="960" height="320" rx="22" fill="#FFFFFF" stroke="#D3E4F0"/>
<rect x="60" y="620" width="22" height="320" rx="0" fill="#1B7BB5"/>
<rect x="100" y="660" rx="14" width="170" height="74" fill="#1B7BB5"/>
<text x="185" y="710" font-weight="bold" font-size="46" fill="#FFFFFF" text-anchor="middle">중형</text>
<text x="300" y="715" font-weight="bold" font-size="46" fill="#1A2A35">20평대 거실</text>
<text x="120" y="790" font-size="40" fill="#5B6B7C">적정 제습량</text>
<text x="1000" y="790" font-weight="bold" font-size="44" fill="#1B7BB5" text-anchor="end">12~16L</text>
<text x="120" y="855" font-size="40" fill="#5B6B7C">가격대(2026.6)</text>
<text x="1000" y="855" font-weight="bold" font-size="44" fill="#1A2A35" text-anchor="end">약 17만~25만원대</text>
<text x="120" y="915" font-size="36" fill="#5B6B7C">수요 가장 많은 주력 구간</text>
<rect x="60" y="970" width="960" height="320" rx="22" fill="#FFFFFF" stroke="#D3E4F0"/>
<rect x="60" y="970" width="22" height="320" rx="0" fill="#125A86"/>
<rect x="100" y="1010" rx="14" width="170" height="74" fill="#125A86"/>
<text x="185" y="1060" font-weight="bold" font-size="46" fill="#FFFFFF" text-anchor="middle">대형</text>
<text x="300" y="1065" font-weight="bold" font-size="46" fill="#1A2A35">30평 이상/다용도실</text>
<text x="120" y="1140" font-size="40" fill="#5B6B7C">적정 제습량</text>
<text x="1000" y="1140" font-weight="bold" font-size="44" fill="#125A86" text-anchor="end">18~20L 이상</text>
<text x="120" y="1205" font-size="40" fill="#5B6B7C">가격대(2026.6)</text>
<text x="1000" y="1205" font-weight="bold" font-size="44" fill="#1A2A35" text-anchor="end">약 25만~40만원대</text>
<text x="120" y="1265" font-size="36" fill="#5B6B7C">빠른 제습, 넓은 집·다공간</text>
<rect x="0" y="1270" width="1080" height="80" fill="#E3EEF6"/>
<text x="60" y="1322" font-size="34" fill="#5B6B7C">시세는 변동 · 상품카드 가격 우선 확인</text>
</svg>
