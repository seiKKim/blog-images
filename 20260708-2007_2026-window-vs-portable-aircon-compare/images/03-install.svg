<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#EAF5FB"/>
  <rect width="1080" height="180" fill="#0A5E93"/>
  <text x="60" y="90" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">설치 난이도 비교</text>
  <text x="60" y="145" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="36" fill="#BEE3F2">우리 집 창문 형태가 관건입니다</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 왼쪽 창문형 -->
    <rect x="40" y="230" width="490" height="900" rx="24" fill="#ffffff" stroke="#CBE3F0" stroke-width="2"/>
    <rect x="40" y="230" width="490" height="96" rx="24" fill="#0E7FB8"/>
    <rect x="40" y="290" width="490" height="36" fill="#0E7FB8"/>
    <text x="285" y="295" font-size="44" font-weight="bold" fill="#ffffff" text-anchor="middle">창문형 설치</text>

    <!-- 창 아이콘: 미닫이창 -->
    <rect x="180" y="360" width="210" height="150" rx="8" fill="#F2F9FD" stroke="#0A5E93" stroke-width="4"/>
    <line x1="285" y1="360" x2="285" y2="510" stroke="#0A5E93" stroke-width="4"/>
    <rect x="285" y="368" width="97" height="134" fill="#BEE3F2" opacity="0.6"/>
    <path d="M300 435 L360 435" stroke="#0A5E93" stroke-width="6" marker-end="url(#ar)"/>
    <text x="285" y="550" font-size="30" font-weight="bold" fill="#0A5E93" text-anchor="middle">미닫이(옆으로 미는)창 전용</text>

    <g font-size="34" fill="#22323C">
      <text x="80" y="620">본체 무게 <tspan font-weight="bold" fill="#0A5E93">15~25kg</tspan></text>
      <text x="80" y="680">PVC(하이새시) 창틀 권장</text>
      <text x="80" y="740">높이·폭·두께 실측 필수</text>
      <text x="80" y="800">틈은 연장/마감 키트로</text>
      <text x="80" y="860">여닫이·시스템창 어려움</text>
    </g>

    <rect x="80" y="905" width="410" height="180" rx="14" fill="#E6F3FA"/>
    <text x="285" y="960" font-size="34" font-weight="bold" fill="#0A5E93" text-anchor="middle">셀프 약 30분</text>
    <text x="285" y="1010" font-size="30" fill="#3A5A6B" text-anchor="middle">방문설치 약 10만 원</text>
    <text x="285" y="1058" font-size="30" font-weight="bold" fill="#1F8A53" text-anchor="middle">자취·전월세·원룸에 적합</text>
  </g>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 오른쪽 이동식 -->
    <rect x="550" y="230" width="490" height="900" rx="24" fill="#ffffff" stroke="#CBE3F0" stroke-width="2"/>
    <rect x="550" y="230" width="490" height="96" rx="24" fill="#2FB0D6"/>
    <rect x="550" y="290" width="490" height="36" fill="#2FB0D6"/>
    <text x="795" y="295" font-size="44" font-weight="bold" fill="#ffffff" text-anchor="middle">이동식 설치</text>

    <!-- 밀폐 패널 아이콘 -->
    <rect x="690" y="360" width="210" height="150" rx="8" fill="#F2F9FD" stroke="#2FB0D6" stroke-width="4"/>
    <rect x="770" y="365" width="50" height="140" fill="#E8722C" opacity="0.5"/>
    <path d="M710 435 Q745 435 770 435" stroke="#E8722C" stroke-width="14" fill="none"/>
    <text x="795" y="550" font-size="30" font-weight="bold" fill="#0A5E93" text-anchor="middle">호스 빼고 밀폐 패널만</text>

    <g font-size="34" fill="#22323C">
      <text x="590" y="620">설치 제약 가장 적음</text>
      <text x="590" y="680">벽 천공·창틀 거치 없음</text>
      <text x="590" y="740">여닫이·시스템창도 가능</text>
      <text x="590" y="800">창틈·호스 밀폐가 관건</text>
      <text x="590" y="860">밀폐 허술하면 성능 하락</text>
    </g>

    <rect x="590" y="905" width="410" height="180" rx="14" fill="#EAF7FB"/>
    <text x="795" y="960" font-size="34" font-weight="bold" fill="#2FB0D6" text-anchor="middle">초기 설치 가장 쉬움</text>
    <text x="795" y="1010" font-size="30" fill="#3A5A6B" text-anchor="middle">창문형 안 되는 집도 사용</text>
    <text x="795" y="1058" font-size="30" font-weight="bold" fill="#E8722C" text-anchor="middle">밀폐만 신경 쓰면 OK</text>
  </g>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0A5E93"/>
    </marker>
  </defs>

  <!-- 공통 주의 -->
  <rect x="40" y="1160" width="1000" height="80" rx="16" fill="#FFF3D6"/>
  <text x="540" y="1210" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="34" fill="#8A6A16" text-anchor="middle">공통: 결국 '창틈 밀폐'가 성능을 좌우합니다</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#D6E8F2"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="32" fill="#5B7C8F">blog.naver.com/trip_chocho · 정보 정리 참고용</text>
</svg>
