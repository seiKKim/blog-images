<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E7FB8"/>
      <stop offset="1" stop-color="#0A5E93"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5FD3E8"/>
      <stop offset="1" stop-color="#2FB0D6"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- 장식 도형 -->
  <circle cx="960" cy="150" r="270" fill="#ffffff" opacity="0.07"/>
  <circle cx="110" cy="990" r="210" fill="#ffffff" opacity="0.06"/>
  <!-- 눈송이/시원 느낌 -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="880" cy="470" r="7"/>
    <circle cx="930" cy="530" r="5"/>
    <circle cx="840" cy="560" r="4"/>
    <circle cx="985" cy="450" r="5"/>
  </g>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="90" rx="34" ry="34" width="250" height="68" fill="#FFD23F"/>
  <text x="205" y="136" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#0A5E93" text-anchor="middle">여름 냉방 꿀팁</text>

  <!-- 서브 카피 -->
  <text x="80" y="300" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#E8F6FB">원룸·전월세 폭염 대비 (2026)</text>

  <!-- 메인 카피 -->
  <text x="80" y="440" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="900"
        font-size="128" fill="#ffffff">창문형 <tspan fill="#FFD23F">vs</tspan></text>
  <text x="80" y="580" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="900"
        font-size="128" fill="#ffffff">이동식 에어컨</text>

  <!-- 대결 칩 2개 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" text-anchor="middle">
    <rect x="80" y="650" rx="24" width="430" height="150" fill="#ffffff" opacity="0.16"/>
    <text x="295" y="712" font-size="42" font-weight="bold" fill="#FFD23F">창문형</text>
    <text x="295" y="768" font-size="34" font-weight="bold" fill="#ffffff">미닫이창 · 효율 우위</text>

    <rect x="570" y="650" rx="24" width="430" height="150" fill="#ffffff" opacity="0.16"/>
    <text x="785" y="712" font-size="42" font-weight="bold" fill="#FFD23F">이동식</text>
    <text x="785" y="768" font-size="34" font-weight="bold" fill="#ffffff">설치 자유 · 이동성</text>
  </g>

  <!-- 디테일 띠 -->
  <rect x="80" y="838" rx="20" ry="20" width="920" height="112" fill="#062F49" opacity="0.55"/>
  <text x="540" y="908" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff" text-anchor="middle">내 상황엔 뭐가 맞을까? 상황별로 정리</text>

  <!-- 채널 -->
  <text x="80" y="1012" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="34" fill="#E8F6FB" opacity="0.9">blog.naver.com/trip_chocho</text>
</svg>
