<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F0F6FB"/>
  <rect width="1080" height="200" fill="#12457C"/>
  <rect x="60" y="52" rx="26" ry="26" width="160" height="52" fill="#4FD1C5"/>
  <text x="140" y="88" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="30" fill="#0E2A4E" text-anchor="middle">생활꿀팁</text>
  <text x="60" y="168" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">에어컨 취침모드 + 선풍기</text>

  <!-- STEP 1 -->
  <rect x="60" y="270" width="960" height="180" rx="20" fill="#ffffff" stroke="#D6E4F0"/>
  <circle cx="150" cy="360" r="48" fill="#1E88C7"/>
  <text x="150" y="378" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="52" fill="#ffffff" text-anchor="middle">1</text>
  <text x="230" y="345" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="44" fill="#12457C">초반 냉방모드로 빠르게</text>
  <text x="230" y="405" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="38" fill="#3A4A5A">실내를 먼저 시원하게 식히기</text>

  <!-- 화살표 -->
  <text x="540" y="500" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="46" fill="#4FD1C5" text-anchor="middle">▼</text>

  <!-- STEP 2 -->
  <rect x="60" y="520" width="960" height="180" rx="20" fill="#ffffff" stroke="#D6E4F0"/>
  <circle cx="150" cy="610" r="48" fill="#1E88C7"/>
  <text x="150" y="628" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="52" fill="#ffffff" text-anchor="middle">2</text>
  <text x="230" y="595" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="44" fill="#12457C">취침모드로 전환</text>
  <text x="230" y="655" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="38" fill="#3A4A5A">수면 운전·열대야·슬립 모드</text>

  <text x="540" y="750" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="46" fill="#4FD1C5" text-anchor="middle">▼</text>

  <!-- STEP 3 -->
  <rect x="60" y="770" width="960" height="180" rx="20" fill="#ffffff" stroke="#D6E4F0"/>
  <circle cx="150" cy="860" r="48" fill="#1E88C7"/>
  <text x="150" y="878" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="52" fill="#ffffff" text-anchor="middle">3</text>
  <text x="230" y="845" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="44" fill="#12457C">선풍기·서큘레이터 병행</text>
  <text x="230" y="905" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="38" fill="#3A4A5A">찬 공기 순환 + 취침 예약(타이머)</text>

  <!-- 주의 배너 -->
  <rect x="60" y="1000" width="960" height="200" rx="20" fill="#FDF3E8" stroke="#E8722C" stroke-width="3"/>
  <text x="100" y="1068" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#C85E1F">⚠ 밤새 강냉방은 지양</text>
  <text x="100" y="1128" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#5A4632">호흡기 건조·냉방병 위험 → 적정 온도·간헐 가동</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#DDE9F3"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 본문 정리 (전력 절감은 조건·참고용)</text>
</svg>
