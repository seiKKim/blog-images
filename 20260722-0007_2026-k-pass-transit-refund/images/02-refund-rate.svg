  <rect x="60" y="1110" width="960" height="110" rx="16" fill="#E7F1EB"/>
  <text x="90" y="1155" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" font-weight="bold" fill="#1F8A53">💡 경기·인천 거주자</text>
  <text x="90" y="1198" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#3A4A5A">청년 환급률(30%)을 만 39세까지 적용</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: K-패스 공식 홈페이지(korea-pass.kr) · 본문 정리</text>
</svg>
