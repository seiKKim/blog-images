<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#1F8A53"/>
  <circle cx="960" cy="150" r="270" fill="#ffffff" opacity="0.08"/>
  <circle cx="110" cy="990" r="210" fill="#ffffff" opacity="0.06"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="88" rx="34" ry="34" width="200" height="68" fill="#FFD23F"/>
  <text x="180" y="134" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#1a1a1a" text-anchor="middle">세금·환급</text>

  <!-- 서브 카피 -->
  <text x="80" y="270" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#E8EEF5">2026 K-패스 대중교통 환급</text>

  <!-- 메인 카피 -->
  <text x="80" y="400" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="96" fill="#ffffff">유형별 환급률</text>
  <text x="80" y="500" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#FFD23F">쓴 교통비, 다음 달에 돌려받기</text>

  <!-- 환급률 카드 3개 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="80" y="560" width="290" height="290" rx="26" fill="#ffffff"/>
    <text x="225" y="640" font-size="40" font-weight="bold" fill="#1a1a1a" text-anchor="middle">일반</text>
    <text x="225" y="760" font-size="110" font-weight="bold" fill="#1F8A53" text-anchor="middle">20%</text>

    <rect x="395" y="560" width="290" height="290" rx="26" fill="#ffffff"/>
    <text x="540" y="640" font-size="40" font-weight="bold" fill="#1a1a1a" text-anchor="middle">청년</text>
    <text x="540" y="760" font-size="110" font-weight="bold" fill="#1F8A53" text-anchor="middle">30%</text>

    <rect x="710" y="560" width="290" height="290" rx="26" fill="#FFD23F"/>
    <text x="855" y="640" font-size="40" font-weight="bold" fill="#1a1a1a" text-anchor="middle">저소득</text>
    <text x="855" y="758" font-size="92" font-weight="bold" fill="#1a1a1a" text-anchor="middle">53.3%</text>
  </g>

  <!-- 디테일 띠 -->
  <rect x="80" y="888" rx="20" ry="20" width="920" height="90" fill="#ffffff" opacity="0.16"/>
  <text x="110" y="946" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#ffffff">어르신 30%·월 15회 이상 이용 시 환급</text>

  <text x="80" y="1030" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="32" fill="#E8EEF5" opacity="0.9">blog.naver.com/trip_chocho</text>
</svg>
