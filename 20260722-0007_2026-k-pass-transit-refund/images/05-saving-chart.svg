<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1F8A53"/>
  <text x="60" y="118" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">월 교통비 7만원 기준</text>
  <text x="60" y="168" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="34" fill="#E8EEF5">유형별 월 환급액 비교 (단순 적용 예시)</text>

  <!-- 그래프 영역: 바닥 y=880, 막대 폭 200 -->
  <!-- 최대값 37,310 → 막대 높이 최대 560px -->
  <!-- 일반 14000: 210px / 청년 21000: 315px / 저소득 37310: 560px -->
  <line x1="120" y1="880" x2="1000" y2="880" stroke="#C7D2DE" stroke-width="4"/>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" text-anchor="middle">
    <!-- 일반 -->
    <rect x="180" y="670" width="200" height="210" rx="10" fill="#9CC6AE"/>
    <text x="280" y="640" font-size="52" font-weight="bold" fill="#1a1a1a">14,000원</text>
    <text x="280" y="945" font-size="44" font-weight="bold" fill="#1a1a1a">일반</text>
    <text x="280" y="995" font-size="34" fill="#5B6B7C">20%</text>

    <!-- 청년 -->
    <rect x="440" y="565" width="200" height="315" rx="10" fill="#4EA57A"/>
    <text x="540" y="535" font-size="52" font-weight="bold" fill="#1a1a1a">21,000원</text>
    <text x="540" y="945" font-size="44" font-weight="bold" fill="#1a1a1a">청년</text>
    <text x="540" y="995" font-size="34" fill="#5B6B7C">30%</text>

    <!-- 저소득 -->
    <rect x="700" y="320" width="200" height="560" rx="10" fill="#C79A00"/>
    <text x="800" y="290" font-size="52" font-weight="bold" fill="#C79A00">37,310원</text>
    <text x="800" y="945" font-size="44" font-weight="bold" fill="#1a1a1a">저소득</text>
    <text x="800" y="995" font-size="34" fill="#5B6B7C">53.3%</text>
  </g>

  <!-- 연 환급액 요약 -->
  <rect x="60" y="1035" width="960" height="185" rx="16" fill="#E7F1EB"/>
  <text x="90" y="1090" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" font-weight="bold" fill="#1F8A53">연간 환급액 (월 7만원 × 12개월)</text>
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#3A4A5A">
    <text x="90" y="1145">일반 약 16만 8천원 · 청년 약 25만 2천원</text>
    <text x="90" y="1195">저소득 약 44만 8천원 — 안 챙기면 그대로 날아가는 돈</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: K-패스 공식 홈페이지(korea-pass.kr) · 본문 계산 예시</text>
</svg>
