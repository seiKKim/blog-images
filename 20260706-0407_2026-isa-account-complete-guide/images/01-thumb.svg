<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#243B6B"/>
  <circle cx="950" cy="170" r="270" fill="#ffffff" opacity="0.07"/>
  <circle cx="110" cy="990" r="210" fill="#ffffff" opacity="0.05"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="88" rx="34" ry="34" width="170" height="68" fill="#FFD23F"/>
  <text x="165" y="134" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#1a1a1a" text-anchor="middle">재테크</text>

  <!-- 서브 카피 -->
  <text x="80" y="258" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#E8EEF5">2026 ISA 계좌 완벽정리</text>

  <!-- 메인 카피 -->
  <text x="80" y="398" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="76" fill="#ffffff">비과세 한도, 지금은</text>
  <text x="80" y="520" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="150" fill="#FFD23F">200/400만원</text>

  <!-- 비교 박스: 현행 확정 vs 추진 중 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="80" y="600" rx="22" width="440" height="240" fill="#ffffff" opacity="0.14"/>
    <text x="300" y="662" font-size="34" font-weight="bold" fill="#FFD23F" text-anchor="middle">현행 확정</text>
    <text x="300" y="726" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">연 2,000만원</text>
    <text x="300" y="792" font-size="40" font-weight="bold" fill="#E8EEF5" text-anchor="middle">비과세 200/400만</text>

    <rect x="560" y="600" rx="22" width="440" height="240" fill="#ffffff" opacity="0.07"/>
    <text x="780" y="662" font-size="34" font-weight="bold" fill="#E8EEF5" text-anchor="middle">추진 중(미확정)</text>
    <text x="780" y="726" font-size="52" font-weight="bold" fill="#E8EEF5" text-anchor="middle">연 4,000만원?</text>
    <text x="780" y="792" font-size="40" font-weight="bold" fill="#E8EEF5" text-anchor="middle">비과세 1,000만?</text>
  </g>

  <!-- 디테일 -->
  <rect x="80" y="880" rx="20" width="920" height="96" fill="#FFD23F"/>
  <text x="540" y="943" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#243B6B" text-anchor="middle">'1,000만원 상향'은 아직 확정 아님!</text>

  <text x="80" y="1030" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="32" fill="#E8EEF5" opacity="0.9">한도·서민형·연금이전 한눈에</text>
</svg>
