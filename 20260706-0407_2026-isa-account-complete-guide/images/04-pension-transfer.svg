<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="210" fill="#243B6B"/>
  <text x="60" y="110" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">만기자금 연금 이전 세액공제</text>
  <text x="60" y="170" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="38" fill="#E8EEF5">확정 혜택 · 'ISA→연금 릴레이'</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- STEP 1 -->
    <rect x="60" y="270" width="960" height="150" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="140" cy="345" r="42" fill="#243B6B"/>
    <text x="140" y="360" font-size="44" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
    <text x="215" y="332" font-size="42" font-weight="bold" fill="#1a1a1a">ISA 3년 이상 굴린 뒤 만기</text>
    <text x="215" y="388" font-size="34" fill="#4a5568">(또는 해지) 자금 확보</text>

    <!-- 화살표 -->
    <text x="540" y="470" font-size="46" fill="#243B6B" text-anchor="middle">▼</text>

    <!-- STEP 2 (강조: 60일) -->
    <rect x="60" y="490" width="960" height="150" rx="20" fill="#FFF6DA" stroke="#E8C24A" stroke-width="2"/>
    <circle cx="140" cy="565" r="42" fill="#E8722C"/>
    <text x="140" y="580" font-size="44" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
    <text x="215" y="552" font-size="42" font-weight="bold" fill="#1a1a1a">60일 이내 연금저축·IRP로 이전</text>
    <text x="215" y="608" font-size="34" font-weight="bold" fill="#b25a17">기한(60일) 넘기지 않게 주의!</text>

    <text x="540" y="690" font-size="46" fill="#243B6B" text-anchor="middle">▼</text>

    <!-- STEP 3 (핵심 숫자) -->
    <rect x="60" y="710" width="960" height="280" rx="20" fill="#243B6B"/>
    <text x="540" y="800" font-size="40" fill="#C5D3EC" text-anchor="middle">이전금액의 10% 추가 세액공제</text>
    <text x="540" y="912" font-size="104" font-weight="bold" fill="#FFD23F" text-anchor="middle">최대 300만원</text>
    <text x="540" y="965" font-size="32" fill="#C5D3EC" text-anchor="middle">(3,000만원 이상 이전 시 한도 채움)</text>

    <!-- 합산 -->
    <rect x="60" y="1030" width="960" height="130" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="1090" font-size="36" fill="#4a5568">기존 연금공제 900만 + ISA이전 300만</text>
    <text x="100" y="1140" font-size="40" font-weight="bold" fill="#243B6B">= 최대 1,200만원까지 공제 확대</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 본문 정리 · 세율 구간별 환급액 상이</text>
</svg>
