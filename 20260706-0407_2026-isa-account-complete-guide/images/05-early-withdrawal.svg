<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="210" fill="#243B6B"/>
  <text x="60" y="110" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">중도해지 vs 원금인출</text>
  <text x="60" y="170" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="38" fill="#E8EEF5">헷갈리기 쉬운 두 가지, 결과가 다릅니다</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 위험: 3년 전 해지 -->
    <rect x="60" y="270" width="960" height="400" rx="24" fill="#ffffff" stroke="#E23B3B" stroke-width="3"/>
    <rect x="60" y="270" width="960" height="88" rx="24" fill="#E23B3B"/>
    <rect x="60" y="320" width="960" height="38" fill="#E23B3B"/>
    <text x="100" y="330" font-size="44" font-weight="bold" fill="#ffffff">위험  3년(의무기간) 전 계좌 해지</text>
    <text x="100" y="440" font-size="40" fill="#4a5568">· 받은 비과세·9.9% 분리과세 혜택 소멸</text>
    <text x="100" y="510" font-size="40" fill="#4a5568">· 일반세율로 과세</text>
    <text x="540" y="620" font-size="90" font-weight="bold" fill="#E23B3B" text-anchor="middle">15.4% 과세</text>

    <!-- 안전: 원금 인출 -->
    <rect x="60" y="710" width="960" height="400" rx="24" fill="#ffffff" stroke="#1F8A53" stroke-width="3"/>
    <rect x="60" y="710" width="960" height="88" rx="24" fill="#1F8A53"/>
    <rect x="60" y="760" width="960" height="38" fill="#1F8A53"/>
    <text x="100" y="770" font-size="44" font-weight="bold" fill="#ffffff">안전  납입 원금 범위 내 인출</text>
    <text x="100" y="880" font-size="40" fill="#4a5568">· 횟수 제한 없이 자유롭게 인출</text>
    <text x="100" y="950" font-size="40" fill="#4a5568">· 비과세 혜택 그대로 유지</text>
    <text x="540" y="1060" font-size="90" font-weight="bold" fill="#1F8A53" text-anchor="middle">비과세 유지</text>
  </g>

  <text x="540" y="1200" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#243B6B" text-anchor="middle">급전은 '해지' 대신 '원금 인출'부터!</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 본문 정리 · 특별중도해지 사유는 예외</text>
</svg>
