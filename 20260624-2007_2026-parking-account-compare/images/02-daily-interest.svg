<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <rect width="1080" height="150" fill="#243B6B"/>
  <text x="60" y="92" font-family="Noto Sans CJK KR" font-weight="bold" font-size="56" fill="#ffffff">매일이자(일복리) 구조</text>
  <rect x="820" y="48" rx="30" width="180" height="60" fill="#FFD23F"/>
  <text x="910" y="88" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">파킹통장</text>

  <text x="60" y="212" font-family="Noto Sans CJK KR" font-weight="bold" font-size="36" fill="#1a1a1a">하루만 맡겨도 이자가 매일 원금에 더해집니다</text>

  <!-- 범례 -->
  <rect x="60" y="246" rx="6" width="30" height="30" fill="#243B6B"/>
  <text x="102" y="270" font-family="Noto Sans CJK KR" font-size="26" fill="#5B6B7C">원금</text>
  <rect x="230" y="246" rx="6" width="30" height="30" fill="#FFD23F"/>
  <text x="272" y="270" font-family="Noto Sans CJK KR" font-size="26" fill="#5B6B7C">매일 쌓이는 이자</text>

  <!-- 막대 (1~5일차, 점증) baseY=490 heights=100/128/156/184/212 -->
  <!-- 1일차 -->
  <rect x="50" y="390" rx="16" width="140" height="100" fill="#243B6B"/>
  <rect x="50" y="374" width="140" height="16" fill="#FFD23F"/>
  <text x="120" y="460" font-family="Noto Sans CJK KR" font-weight="bold" font-size="26" fill="#ffffff" text-anchor="middle">원금</text>
  <text x="120" y="535" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">1일차</text>
  <text x="220" y="450" font-family="Noto Sans CJK KR" font-weight="bold" font-size="46" fill="#1F8A53" text-anchor="middle">+</text>
  <!-- 2일차 -->
  <rect x="250" y="362" rx="16" width="140" height="128" fill="#243B6B"/>
  <rect x="250" y="346" width="140" height="16" fill="#FFD23F"/>
  <text x="320" y="535" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">2일차</text>
  <text x="420" y="422" font-family="Noto Sans CJK KR" font-weight="bold" font-size="46" fill="#1F8A53" text-anchor="middle">+</text>
  <!-- 3일차 -->
  <rect x="450" y="334" rx="16" width="140" height="156" fill="#243B6B"/>
  <rect x="450" y="318" width="140" height="16" fill="#FFD23F"/>
  <text x="520" y="535" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">3일차</text>
  <text x="620" y="394" font-family="Noto Sans CJK KR" font-weight="bold" font-size="46" fill="#1F8A53" text-anchor="middle">+</text>
  <!-- 4일차 -->
  <rect x="650" y="306" rx="16" width="140" height="184" fill="#243B6B"/>
  <rect x="650" y="290" width="140" height="16" fill="#FFD23F"/>
  <text x="720" y="535" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">4일차</text>
  <text x="820" y="366" font-family="Noto Sans CJK KR" font-weight="bold" font-size="46" fill="#1F8A53" text-anchor="middle">+</text>
  <!-- 5일차 -->
  <rect x="850" y="278" rx="16" width="140" height="212" fill="#243B6B"/>
  <rect x="850" y="262" width="140" height="16" fill="#FFD23F"/>
  <text x="920" y="535" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">5일차</text>

  <!-- 예시 박스 -->
  <rect x="60" y="590" rx="16" width="960" height="105" fill="#EAF1FA"/>
  <text x="540" y="632" font-family="Noto Sans CJK KR" font-weight="bold" font-size="28" fill="#243B6B" text-anchor="middle">예시: 1,200만 원을 연 3% 파킹통장에 두면 매일 약 986원</text>
  <text x="540" y="673" font-family="Noto Sans CJK KR" font-size="26" fill="#5B6B7C" text-anchor="middle">(토스뱅크 예시값 · 금리는 상품별 상이)</text>
</svg>
