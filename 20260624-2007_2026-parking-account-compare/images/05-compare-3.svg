<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#243B6B"/>
  <text x="60" y="98" font-family="Noto Sans CJK KR" font-weight="bold" font-size="52" fill="#ffffff">파킹통장 · CMA · 정기예적금</text>
  <text x="60" y="158" font-family="Noto Sans CJK KR" font-weight="bold" font-size="36" fill="#FFD23F">3종 한눈에 비교</text>

  <!-- 헤더 -->
  <rect x="60" y="250" width="960" height="70" fill="#DCE6F2"/>
  <text x="80" y="293" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#243B6B">구분</text>
  <text x="410" y="293" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#243B6B">입출금</text>
  <text x="600" y="293" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#243B6B">예금자보호</text>
  <text x="840" y="293" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#243B6B">금리 성격</text>

  <!-- 파킹통장 -->
  <rect x="60" y="320" width="960" height="200" fill="#FFFFFF" stroke="#D6E0EC" stroke-width="2"/>
  <text x="80" y="430" font-family="Noto Sans CJK KR" font-weight="bold" font-size="36" fill="#1a1a1a">파킹통장</text>
  <text x="410" y="430" font-family="Noto Sans CJK KR" font-size="30" fill="#5B6B7C">자유</text>
  <text x="600" y="430" font-family="Noto Sans CJK KR" font-weight="bold" font-size="28" fill="#1F8A53">O (1억)</text>
  <text x="840" y="430" font-family="Noto Sans CJK KR" font-size="26" fill="#5B6B7C">변동·구간차등</text>

  <!-- CMA -->
  <rect x="60" y="520" width="960" height="200" fill="#F0F5FB" stroke="#D6E0EC" stroke-width="2"/>
  <text x="80" y="630" font-family="Noto Sans CJK KR" font-weight="bold" font-size="36" fill="#1a1a1a">CMA</text>
  <text x="410" y="630" font-family="Noto Sans CJK KR" font-size="30" fill="#5B6B7C">자유</text>
  <text x="600" y="630" font-family="Noto Sans CJK KR" font-weight="bold" font-size="28" fill="#E23B3B">X (종금형만 O)</text>
  <text x="840" y="630" font-family="Noto Sans CJK KR" font-size="26" fill="#5B6B7C">운용수익 연동</text>

  <!-- 정기예적금 -->
  <rect x="60" y="720" width="960" height="200" fill="#FFFFFF" stroke="#D6E0EC" stroke-width="2"/>
  <text x="80" y="830" font-family="Noto Sans CJK KR" font-weight="bold" font-size="36" fill="#1a1a1a">정기예적금</text>
  <text x="410" y="830" font-family="Noto Sans CJK KR" font-size="30" fill="#5B6B7C">묶임</text>
  <text x="600" y="830" font-family="Noto Sans CJK KR" font-weight="bold" font-size="28" fill="#1F8A53">O (1억)</text>
  <text x="840" y="830" font-family="Noto Sans CJK KR" font-size="26" fill="#5B6B7C">가입시점 고정</text>

  <!-- 강조 박스 -->
  <rect x="60" y="950" rx="20" width="960" height="170" fill="#243B6B"/>
  <text x="90" y="1035" font-family="Noto Sans CJK KR" font-weight="bold" font-size="40" fill="#FFD23F">예금자보호 1억 원 시대</text>
  <text x="90" y="1095" font-family="Noto Sans CJK KR" font-weight="bold" font-size="28" fill="#ffffff">2025.9.1부터 5천만 원 → 1억 원으로 상향 (은행·저축은행)</text>

  <!-- 출처 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1320" font-family="Noto Sans CJK KR" font-size="28" fill="#5B6B7C">출처: 본문 정리 (예금보험 한도 2025.9.1 시행)</text>
</svg>
