<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <!-- 카테고리: 금융/재테크 (네이비 #243B6B / 강조 #FFD23F) -->
  <rect width="1080" height="1080" fill="#243B6B"/>
  <circle cx="950" cy="180" r="260" fill="#ffffff" opacity="0.08"/>
  <circle cx="120" cy="980" r="200" fill="#ffffff" opacity="0.06"/>
  <circle cx="970" cy="870" r="150" fill="#FFD23F" opacity="0.11"/>

  <!-- 카테고리 뱃지 -->
  <rect x="64" y="80" rx="30" ry="30" width="200" height="60" fill="#FFD23F"/>
  <text x="164" y="120" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">금융/재테크</text>

  <!-- 서브 카피 -->
  <text x="64" y="218" font-family="Noto Sans CJK KR" font-weight="bold" font-size="44" fill="#E8EEF5">단기자금 어디에 둘까? 2026 최신</text>

  <!-- 메인 카피 -->
  <text x="64" y="408" font-family="Noto Sans CJK KR" font-weight="bold" font-size="150" fill="#ffffff">파킹통장</text>
  <text x="64" y="570" font-family="Noto Sans CJK KR" font-weight="bold" font-size="150" fill="#FFD23F">금리 비교</text>

  <!-- 하이라이트 띠 -->
  <rect x="64" y="628" rx="24" ry="24" width="952" height="132" fill="#ffffff" opacity="0.14"/>
  <text x="92" y="710" font-family="Noto Sans CJK KR" font-weight="bold" font-size="50" fill="#ffffff">한도 · 예금자보호 1억 · CMA까지</text>

  <!-- 칩 -->
  <rect x="64" y="800" rx="40" width="232" height="80" fill="none" stroke="#FFD23F" stroke-width="4"/>
  <text x="180" y="853" font-family="Noto Sans CJK KR" font-weight="bold" font-size="38" fill="#FFD23F" text-anchor="middle">인터넷은행</text>
  <rect x="320" y="800" rx="40" width="190" height="80" fill="none" stroke="#FFD23F" stroke-width="4"/>
  <text x="415" y="853" font-family="Noto Sans CJK KR" font-weight="bold" font-size="38" fill="#FFD23F" text-anchor="middle">저축은행</text>
  <rect x="534" y="800" rx="40" width="190" height="80" fill="none" stroke="#FFD23F" stroke-width="4"/>
  <text x="629" y="853" font-family="Noto Sans CJK KR" font-weight="bold" font-size="38" fill="#FFD23F" text-anchor="middle">증권 CMA</text>

  <!-- 카피 라인 -->
  <text x="64" y="958" font-family="Noto Sans CJK KR" font-weight="bold" font-size="46" fill="#ffffff">"최고 연 %"가 잔액 전체에 적용될까?</text>

  <!-- 핸들 -->
  <text x="64" y="1028" font-family="Noto Sans CJK KR" font-size="32" fill="#E8EEF5">blog.naver.com/trip_chocho</text>
