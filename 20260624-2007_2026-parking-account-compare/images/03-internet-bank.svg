<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#243B6B"/>
  <text x="60" y="98" font-family="Noto Sans CJK KR" font-weight="bold" font-size="58" fill="#ffffff">인터넷은행 파킹통장 비교</text>
  <text x="60" y="158" font-family="Noto Sans CJK KR" font-size="30" fill="#E8EEF5">금리는 발표 시점 기준 · 가입 전 공식앱 재확인</text>

  <!-- 헤더 -->
  <rect x="60" y="250" width="960" height="70" fill="#DCE6F2"/>
  <text x="80" y="293" font-family="Noto Sans CJK KR" font-weight="bold" font-size="32" fill="#243B6B">상품</text>
  <text x="490" y="293" font-family="Noto Sans CJK KR" font-weight="bold" font-size="32" fill="#243B6B">이자 지급</text>
  <text x="760" y="293" font-family="Noto Sans CJK KR" font-weight="bold" font-size="32" fill="#243B6B">한도</text>

  <!-- 토스뱅크 -->
  <rect x="60" y="320" width="960" height="230" fill="#FFFFFF" stroke="#D6E0EC" stroke-width="2"/>
  <text x="80" y="380" font-family="Noto Sans CJK KR" font-weight="bold" font-size="34" fill="#1a1a1a">토스뱅크 통장</text>
  <text x="80" y="432" font-family="Noto Sans CJK KR" font-weight="bold" font-size="27" fill="#243B6B">기본 연 1.0%(세전)</text>
  <text x="80" y="476" font-family="Noto Sans CJK KR" font-size="25" fill="#5B6B7C">신규 3개월 이벤트 연 2.0%</text>
  <rect x="80" y="500" rx="22" width="230" height="45" fill="#FFD23F"/>
  <text x="100" y="530" font-family="Noto Sans CJK KR" font-weight="bold" font-size="26" fill="#1a1a1a">매일(일복리)</text>
  <text x="1000" y="380" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#243B6B" text-anchor="end">잔액 전체</text>

  <!-- 카카오뱅크 -->
  <rect x="60" y="550" width="960" height="230" fill="#F0F5FB" stroke="#D6E0EC" stroke-width="2"/>
  <text x="80" y="610" font-family="Noto Sans CJK KR" font-weight="bold" font-size="34" fill="#1a1a1a">카카오뱅크 세이프박스</text>
  <text x="80" y="662" font-family="Noto Sans CJK KR" font-weight="bold" font-size="27" fill="#243B6B">연 1.60% (한경 25-07)</text>
  <text x="80" y="706" font-family="Noto Sans CJK KR" font-size="25" fill="#5B6B7C">/ 연 2.0% (26 블로그)</text>
  <rect x="80" y="730" rx="22" width="210" height="45" fill="#E3EAF4"/>
  <text x="100" y="760" font-family="Noto Sans CJK KR" font-weight="bold" font-size="26" fill="#1a1a1a">월 1회(월말)</text>
  <text x="1000" y="610" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#243B6B" text-anchor="end">1억 원</text>

  <!-- 케이뱅크 -->
  <rect x="60" y="780" width="960" height="230" fill="#FFFFFF" stroke="#D6E0EC" stroke-width="2"/>
  <text x="80" y="840" font-family="Noto Sans CJK KR" font-weight="bold" font-size="34" fill="#1a1a1a">케이뱅크 플러스박스</text>
  <text x="80" y="892" font-family="Noto Sans CJK KR" font-weight="bold" font-size="27" fill="#243B6B">기본 연 2.3%·우대 최고 3.0%</text>
  <text x="80" y="936" font-family="Noto Sans CJK KR" font-size="25" fill="#5B6B7C">한경 25-07: 5천 이하 1.7%</text>
  <rect x="80" y="960" rx="22" width="210" height="45" fill="#E3EAF4"/>
  <text x="100" y="990" font-family="Noto Sans CJK KR" font-weight="bold" font-size="26" fill="#1a1a1a">월 1회(월말)</text>
  <text x="1000" y="840" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#243B6B" text-anchor="end">1억 원</text>

  <!-- 주의 박스 -->
  <rect x="60" y="1040" rx="18" width="960" height="140" fill="#FFF3E0"/>
  <text x="90" y="1095" font-family="Noto Sans CJK KR" font-weight="bold" font-size="28" fill="#B5651D">주의: 일부 블로그의 토스뱅크 "연 3.5%·1억" 표기는</text>
  <text x="90" y="1140" font-family="Noto Sans CJK KR" font-weight="bold" font-size="28" fill="#B5651D">공식 안내(연 1.0%, 이벤트 시 2.0%)와 충돌 → 공식앱 확인</text>

  <!-- 출처 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1320" font-family="Noto Sans CJK KR" font-size="28" fill="#5B6B7C">출처: 각 금융사 공식 안내 / 한국경제 2025-07 (발표 시점 기준)</text>
</svg>
