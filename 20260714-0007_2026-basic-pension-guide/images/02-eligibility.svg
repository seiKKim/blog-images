<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <rect x="60" y="60" rx="30" ry="30" width="200" height="60" fill="#FFD23F"/>
  <text x="160" y="102" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="32" fill="#1a1a1a" text-anchor="middle">지원 대상</text>
  <text x="60" y="180" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">누가 받을 수 있나요?</text>

  <text x="60" y="290" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#5B6B7C">아래 조건을 모두 충족해야 합니다</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- row 1 -->
    <rect x="60" y="330" width="960" height="180" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="150" cy="420" r="44" fill="#1B5FA6"/>
    <path d="M128 420 l16 18 l30 -36" stroke="#ffffff" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="240" y="405" font-weight="bold" font-size="48" fill="#1a1a1a">연령</text>
    <text x="240" y="470" font-size="42" fill="#5B6B7C">만 65세 이상</text>

    <!-- row 2 -->
    <rect x="60" y="540" width="960" height="180" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="150" cy="630" r="44" fill="#1B5FA6"/>
    <path d="M128 630 l16 18 l30 -36" stroke="#ffffff" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="240" y="615" font-weight="bold" font-size="48" fill="#1a1a1a">국적</text>
    <text x="240" y="680" font-size="42" fill="#5B6B7C">대한민국 국적 보유자</text>

    <!-- row 3 -->
    <rect x="60" y="750" width="960" height="180" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="150" cy="840" r="44" fill="#1B5FA6"/>
    <path d="M128 840 l16 18 l30 -36" stroke="#ffffff" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="240" y="825" font-weight="bold" font-size="48" fill="#1a1a1a">거주</text>
    <text x="240" y="890" font-size="42" fill="#5B6B7C">국내 거주(주민등록상)</text>

    <!-- row 4 -->
    <rect x="60" y="960" width="960" height="180" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="150" cy="1050" r="44" fill="#1B5FA6"/>
    <path d="M128 1050 l16 18 l30 -36" stroke="#ffffff" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="240" y="1035" font-weight="bold" font-size="48" fill="#1a1a1a">소득</text>
    <text x="240" y="1100" font-size="42" fill="#5B6B7C">월 소득인정액이 선정기준액 이하</text>
  </g>

  <text x="60" y="1215" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1B5FA6">= 소득 하위 약 70% 노인이 대상</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">출처: 보건복지부 · 복지로(bokjiro.go.kr)</text>
</svg>
