<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <rect x="60" y="60" rx="30" ry="30" width="200" height="60" fill="#FFD23F"/>
  <text x="160" y="102" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="32" fill="#1a1a1a" text-anchor="middle">지급 금액</text>
  <text x="60" y="180" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">2026년 월 최대 지급액</text>

  <!-- 기준선 -->
  <line x1="120" y1="850" x2="960" y2="850" stroke="#D6E0EC" stroke-width="3"/>

  <!-- 단독 막대 (349,700 -> 높이 315) -->
  <rect x="220" y="535" width="240" height="315" rx="12" fill="#1B5FA6"/>
  <text x="340" y="505" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#1B5FA6" text-anchor="middle">34만 9,700원</text>
  <text x="340" y="915" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="48" fill="#1a1a1a" text-anchor="middle">단독가구</text>

  <!-- 부부 막대 (559,520 -> 높이 504) -->
  <rect x="620" y="346" width="240" height="504" rx="12" fill="#FFD23F"/>
  <text x="740" y="316" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#C98A00" text-anchor="middle">55만 9,520원</text>
  <text x="740" y="915" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="48" fill="#1a1a1a" text-anchor="middle">부부가구(2인)</text>

  <!-- 안내 문구 -->
  <rect x="120" y="965" width="840" height="90" rx="18" fill="#E8EEF5"/>
  <text x="540" y="1023" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1B5FA6" text-anchor="middle">부부가 모두 받으면 각각 20% 감액</text>
</svg>
