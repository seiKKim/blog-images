<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E8FE0"/>
      <stop offset="1" stop-color="#0B4E8C"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- 청량 장식 원 -->
  <circle cx="930" cy="200" r="280" fill="#ffffff" opacity="0.10"/>
  <circle cx="150" cy="960" r="220" fill="#7FE3E0" opacity="0.12"/>
  <circle cx="880" cy="900" r="120" fill="#ffffff" opacity="0.08"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="88" rx="34" ry="34" width="300" height="68" fill="#FFD23F"/>
  <text x="230" y="134" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="36" fill="#0B4E8C" text-anchor="middle">여름 캠핑·물놀이</text>

  <!-- 서브 카피 -->
  <text x="80" y="330" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="58" fill="#EAF6FF">폭염에도 실패 없는</text>

  <!-- 메인 카피 -->
  <text x="80" y="480" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="132" fill="#ffffff">아이스박스</text>
  <text x="80" y="628" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="132" fill="#FFD23F">추천 BEST 5</text>

  <!-- 아이스박스 아이콘 -->
  <g transform="translate(760,700)">
    <rect x="0" y="40" width="230" height="150" rx="16" fill="#EAF6FF" stroke="#0B4E8C" stroke-width="6"/>
    <rect x="-10" y="18" width="250" height="40" rx="14" fill="#ffffff" stroke="#0B4E8C" stroke-width="6"/>
    <rect x="90" y="4" width="50" height="24" rx="8" fill="#FFD23F" stroke="#0B4E8C" stroke-width="5"/>
    <line x1="0" y1="115" x2="230" y2="115" stroke="#9CC7E8" stroke-width="4"/>
  </g>

  <!-- 디테일 박스 -->
  <rect x="80" y="770" rx="20" ry="20" width="640" height="120" fill="#ffffff" opacity="0.16"/>
  <text x="112" y="848" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="48" fill="#ffffff">용량·보냉시간 총정리</text>

  <!-- 채널 -->
  <text x="80" y="1006" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="34" fill="#EAF6FF" opacity="0.9">blog.naver.com/trip_chocho</text>
</svg>
