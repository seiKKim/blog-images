    <!-- card 2 -->
    <rect x="390" y="240" width="300" height="380" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="540" cy="360" r="62" fill="#1F8A53"/>
    <text x="540" y="378" font-weight="bold" font-size="56" fill="#fff">₩</text>
