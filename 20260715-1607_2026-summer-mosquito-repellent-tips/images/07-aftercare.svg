<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F1FAF9"/>
  <rect width="1080" height="160" fill="#0E7C86"/>
  <rect x="60" y="52" rx="28" ry="28" width="170" height="56" fill="#E8722C"/>
  <text x="145" y="91" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="32" fill="#ffffff" text-anchor="middle">생활꿀팁</text>
  <text x="258" y="105" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="54" fill="#ffffff">모기 물린 후 대처</text>

  <!-- 왼쪽: 금지 -->
  <rect x="60" y="210" width="460" height="440" rx="24" fill="#FFF3F1" stroke="#F3C4BE" stroke-width="2"/>
  <circle cx="150" cy="300" r="46" fill="#E23B3B"/>
  <path d="M132 300 h36" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
  <text x="220" y="316" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#C22323">긁지 않기</text>
  <text x="90" y="400" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="36" fill="#3A3A3A">긁으면 순간 시원해도</text>
  <text x="90" y="452" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="36" fill="#3A3A3A">결국 염증이 악화되고</text>
  <text x="90" y="504" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="36" fill="#3A3A3A">손톱 세균으로 2차</text>
  <text x="90" y="556" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="36" fill="#3A3A3A">감염 위험이 있어요</text>

  <!-- 오른쪽: 냉찜질 -->
  <rect x="560" y="210" width="460" height="440" rx="24" fill="#E6F6F4" stroke="#B7E3DF" stroke-width="2"/>
  <circle cx="650" cy="300" r="46" fill="#12A4A6"/>
  <path d="M638 300 l9 10 l16 -20" stroke="#fff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="720" y="316" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#0E7C86">냉찜질</text>
  <text x="590" y="400" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="36" fill="#3A3A3A">감각을 둔하게 해</text>
  <text x="590" y="452" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="36" fill="#3A3A3A">가려움 완화</text>
  <text x="590" y="512" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#C22323">얼음은 수건에 감싸 약 5분</text>
  <text x="590" y="564" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="34" fill="#7A8C8E">직접 대면 동상 위험 주의</text>

  <text x="60" y="700" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="32" fill="#3E6360">증상이 심하거나 오래가면 약국·병원 상담이 안전합니다</text>
</svg>
