<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F1FAF9"/>
  <rect width="1080" height="200" fill="#0E7C86"/>
  <rect x="60" y="70" rx="30" ry="30" width="180" height="60" fill="#E8722C"/>
  <text x="150" y="112" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="34" fill="#ffffff" text-anchor="middle">생활꿀팁</text>
  <text x="270" y="152" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">기피제 성분별 사용 연령</text>

  <!-- 강조 배너 -->
  <rect x="60" y="250" width="960" height="110" rx="24" fill="#FFD23F"/>
  <text x="540" y="320" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="44" fill="#1a1a1a" text-anchor="middle">반드시 식약처 허가 '의약외품' 확인</text>

  <!-- 표 헤더 -->
  <rect x="60" y="390" width="960" height="86" rx="16" fill="#0E7C86"/>
  <text x="230" y="445" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="38" fill="#ffffff" text-anchor="middle">성분</text>
  <text x="700" y="445" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="38" fill="#ffffff" text-anchor="middle">사용 가능 연령 · 참고</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="60" y="488" width="960" height="160" rx="14" fill="#ffffff" stroke="#CDE8E5" stroke-width="2"/>
    <text x="90" y="560" font-weight="bold" font-size="42" fill="#0E7C86">DEET</text>
    <text x="90" y="612" font-size="30" fill="#7A8C8E">디에칠톨루아미드</text>
    <text x="430" y="548" font-size="34" fill="#1a1a1a">6개월~12세 미만: 10% 이하</text>
    <text x="430" y="592" font-size="34" fill="#1a1a1a">12세 이상: 10~30%</text>
    <text x="430" y="632" font-size="30" fill="#7A8C8E">텐트·옷엔 뿌리지 않기</text>

    <rect x="60" y="660" width="960" height="160" rx="14" fill="#EAF7F5" stroke="#CDE8E5" stroke-width="2"/>
    <text x="90" y="740" font-weight="bold" font-size="42" fill="#0E7C86">이카리딘</text>
    <text x="430" y="720" font-size="34" fill="#1a1a1a">생후 6개월 이상</text>
    <text x="430" y="764" font-size="34" fill="#1a1a1a">10% 5~12h / 20% 8~14h 지속</text>
    <text x="430" y="804" font-size="30" fill="#7A8C8E">냄새·자극 적음</text>

    <rect x="60" y="832" width="960" height="160" rx="14" fill="#ffffff" stroke="#CDE8E5" stroke-width="2"/>
    <text x="90" y="912" font-weight="bold" font-size="42" fill="#0E7C86">IR3535</text>
    <text x="430" y="892" font-size="34" fill="#1a1a1a">생후 6개월 이상</text>
    <text x="430" y="936" font-size="34" fill="#1a1a1a">(미만은 의사 상담)</text>
    <text x="430" y="976" font-size="30" fill="#7A8C8E">무색무취, 플라스틱 손상 우려</text>

    <rect x="60" y="1004" width="960" height="160" rx="14" fill="#FFF3F1" stroke="#F3C4BE" stroke-width="2"/>
    <text x="90" y="1084" font-weight="bold" font-size="42" fill="#C22323">PMD</text>
    <text x="430" y="1064" font-size="34" fill="#1a1a1a">4세 이상</text>
    <text x="430" y="1108" font-size="34" fill="#1a1a1a">지속 약 2시간으로 짧음</text>
    <text x="430" y="1148" font-size="30" fill="#7A8C8E">알레르기 유발 가능</text>
  </g>

  <rect x="0" y="1210" width="1080" height="140" fill="#2B2F36"/>
  <text x="540" y="1268" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="38" fill="#FFD23F" text-anchor="middle">6개월 미만 영아는 기피제 사용 금지</text>
  <text x="540" y="1318" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="32" fill="#DDE3E8" text-anchor="middle">팔찌형·스티커형은 국내 허가 제품 없음 · 출처: 식약처</text>
</svg>
