<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <!-- 상단 색띠 + 제목 -->
  <rect width="1080" height="200" fill="#2B2F36"/>
  <rect x="0" y="0" width="14" height="200" fill="#E23B3B"/>
  <text x="60" y="98" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">월급 실수령액은 얼마?</text>
  <text x="60" y="158" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="38" fill="#E8EEF5">2026년 최저임금 월급 기준</text>

  <!-- 세전 금액 -->
  <rect x="60" y="270" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
  <text x="100" y="335" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="40" font-weight="bold" fill="#5B6B7C">세전 월급</text>
  <text x="1000" y="368" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="70" font-weight="bold" fill="#2B2F36" text-anchor="end">2,156,880원</text>

  <!-- 공제 안내 -->
  <text x="540" y="480" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="42" font-weight="bold" fill="#E23B3B" text-anchor="middle">－ 4대보험 · 소득세 공제</text>

  <!-- 공제 항목 4칸 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="60" y="520" width="465" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="292" y="595" font-size="40" font-weight="bold" fill="#1a1a1a" text-anchor="middle">국민연금</text>

    <rect x="555" y="520" width="465" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="787" y="595" font-size="40" font-weight="bold" fill="#1a1a1a" text-anchor="middle">건강보험</text>

    <rect x="60" y="660" width="465" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="292" y="710" font-size="40" font-weight="bold" fill="#1a1a1a" text-anchor="middle">장기요양</text>
    <text x="292" y="758" font-size="30" fill="#5B6B7C" text-anchor="middle">· 고용보험</text>

    <rect x="555" y="660" width="465" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="787" y="735" font-size="40" font-weight="bold" fill="#1a1a1a" text-anchor="middle">소득세 · 지방세</text>
  </g>

  <!-- 실수령 강조 -->
  <rect x="60" y="830" width="960" height="360" rx="20" fill="#2B2F36"/>
  <text x="540" y="915" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="46" font-weight="bold" fill="#E8EEF5" text-anchor="middle">＝ 실수령액</text>
  <text x="540" y="1035" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="94" font-weight="bold" fill="#FFD23F" text-anchor="middle">약 190만~196만 원대</text>
  <text x="540" y="1120" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#E8EEF5" text-anchor="middle">※ 부양가족 수 · 비과세 식대 등에 따라 변동</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">정밀 금액은 고용노동부 모의계산기(moel.go.kr) 확인</text>
</svg>
