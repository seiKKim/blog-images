<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <!-- 배경: 오늘의 이슈 차콜 -->
  <rect width="1080" height="1080" fill="#2B2F36"/>
  <!-- 장식 도형 -->
  <circle cx="950" cy="170" r="270" fill="#ffffff" opacity="0.05"/>
  <circle cx="110" cy="990" r="210" fill="#E23B3B" opacity="0.10"/>

  <!-- 카테고리 뱃지 (좌상단) -->
  <rect x="80" y="90" rx="34" ry="34" width="230" height="68" fill="#E23B3B"/>
  <text x="195" y="136" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#ffffff" text-anchor="middle">오늘의 이슈</text>

  <!-- 서브 카피 -->
  <text x="80" y="290" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#E8EEF5">2027년 최저임금 인상 전망</text>

  <!-- 메인 카피 (핵심 숫자) -->
  <text x="80" y="450" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="72" fill="#ffffff">노사 격차</text>
  <text x="80" y="600" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="180" fill="#FFD23F">1,290원</text>

  <!-- 시급 화살표 라인 -->
  <text x="80" y="720" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">시급 10,320원 </text>
  <text x="565" y="720" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#E23B3B">→ ?</text>

  <!-- 디테일 박스 -->
  <rect x="80" y="800" rx="20" ry="20" width="920" height="120" fill="#ffffff" opacity="0.12"/>
  <text x="110" y="878" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff">내 월급 실수령액은 얼마나 오를까?</text>

  <!-- 미확정 안내 + 채널 -->
  <text x="80" y="985" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="34" fill="#FFD23F">※ 7/2 논의 중 · 아직 미확정</text>
  <text x="80" y="1030" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="30" fill="#E8EEF5" opacity="0.85">blog.naver.com/trip_chocho</text>
</svg>
