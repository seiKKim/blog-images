<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F9F6"/>
  <rect width="1080" height="170" fill="#1F8A53"/>
  <rect x="60" y="64" width="10" height="46" rx="5" fill="#FFD23F"/>
  <text x="92" y="118" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">부가세 주요 가산세율</text>
  <text x="60" y="240" font-family="Malgun Gothic" font-size="34" fill="#5B6B62">무신고·과소신고와 납부지연 가산세는 합산 부과</text>
  <rect x="60" y="300" width="960" height="150" fill="#1F8A53" stroke="#CFE3D7" stroke-width="2"/>
  <text x="180" y="389" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#FFFFFF" text-anchor="middle">구분</text>
  <text x="420" y="389" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#FFFFFF">가산세율</text>
  <rect x="60" y="450" width="960" height="150" fill="#FFFFFF" stroke="#CFE3D7" stroke-width="2"/>
  <text x="180" y="539" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1A2A22" text-anchor="middle">무신고</text>
  <text x="420" y="515" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#176B40">납부세액 × 20%</text>
  <text x="420" y="569" font-family="Malgun Gothic" font-size="30" fill="#5B6B62">(부정행위 40%)</text>
  <rect x="60" y="600" width="960" height="150" fill="#EEF6F0" stroke="#CFE3D7" stroke-width="2"/>
  <text x="180" y="689" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1A2A22" text-anchor="middle">과소신고</text>
  <text x="420" y="665" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#176B40">과소납부세액 × 10%</text>
  <text x="420" y="719" font-family="Malgun Gothic" font-size="30" fill="#5B6B62">(부정행위 40%)</text>
  <rect x="60" y="750" width="960" height="150" fill="#FFFFFF" stroke="#CFE3D7" stroke-width="2"/>
  <text x="180" y="839" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1A2A22" text-anchor="middle">납부지연</text>
  <text x="420" y="815" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#176B40">미납세액 × 일수 × 2.2/10,000</text>
  <text x="420" y="869" font-family="Malgun Gothic" font-size="30" fill="#5B6B62">(1일 0.022%)</text>

  <rect x="60" y="930" width="960" height="290" rx="20" fill="#E8F3EC"/>
  <text x="92" y="998" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#176B40">기한 후 신고하면 감면</text>
  <text x="92" y="1062" font-family="Malgun Gothic" font-size="34" fill="#1A2A22">무신고 1개월 이내: 50% 감면</text>
  <text x="92" y="1116" font-family="Malgun Gothic" font-size="34" fill="#1A2A22">1~3개월: 30% / 3~6개월: 20% 감면</text>
  <text x="92" y="1180" font-family="Malgun Gothic" font-size="32" fill="#5B6B62">→ 놓쳤다면 하루라도 빨리 신고</text>
  <rect x="0" y="1280" width="1080" height="70" fill="#E8F3EC"/>
  <text x="60" y="1326" font-family="Malgun Gothic" font-size="30" fill="#5B6B62">출처: 국세기본법 제47조의2·3·4, 제48조</text>
</svg>