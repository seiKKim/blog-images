  <text x="752" y="418" font-family="Malgun Gothic" font-weight="bold" font-size="80" fill="#176B40" text-anchor="middle">=</text>
    <rect x="760" y="300" width="300" height="200" rx="24" fill="#FFD23F"/>
  <text x="910" y="392" font-family="Malgun Gothic" font-weight="bold" font-size="50" fill="#1A2A22" text-anchor="middle">납부세액</text>
  <text x="910" y="452" font-family="Malgun Gothic" font-size="30" fill="#1A2A22" text-anchor="middle">최종 납부</text>

  <rect x="80" y="560" width="920" height="96" rx="18" fill="#E8F3EC"/>
  <text x="540" y="620" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#176B40" text-anchor="middle">공제 매입세액을 빠짐없이 챙기는 것이 절세 핵심</text>
</svg>