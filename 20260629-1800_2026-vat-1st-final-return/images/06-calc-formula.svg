  <text x="200" y="392" font-family="Malgun Gothic" font-weight="bold" font-size="50" fill="#ffffff" text-anchor="middle">매출세액</text>
  <text x="200" y="452" font-family="Malgun Gothic" font-size="30" fill="#ffffff" text-anchor="middle">매출액 × 10%</text>
  <text x="390" y="418" font-family="Malgun Gothic" font-weight="bold" font-size="80" fill="#176B40" text-anchor="middle">−</text>
