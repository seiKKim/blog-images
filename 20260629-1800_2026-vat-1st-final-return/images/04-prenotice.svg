<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F9F6"/>
  <rect width="1080" height="170" fill="#1F8A53"/>
  <rect x="60" y="64" width="10" height="46" rx="5" fill="#FFD23F"/>
  <text x="92" y="118" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">예정고지서 예시</text>
  <!-- 고지서 카드 -->
  <rect x="120" y="230" width="840" height="360" rx="24" fill="#ffffff" stroke="#CFE3D7" stroke-width="3"/>
  <rect x="120" y="230" width="840" height="80" rx="24" fill="#1F8A53"/>
  <rect x="120" y="280" width="840" height="30" fill="#1F8A53"/>
  <text x="540" y="285" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">부가가치세 예정고지</text>

  <text x="160" y="380" font-family="Malgun Gothic" font-size="36" fill="#5B6B62">직전 과세기간 납부세액</text>
  <text x="920" y="380" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1A2A22" text-anchor="end">기준 금액</text>
  <line x1="160" y1="410" x2="920" y2="410" stroke="#CFE3D7" stroke-width="2"/>

  <rect x="160" y="430" width="760" height="130" rx="16" fill="#E8F3EC"/>
  <text x="540" y="485" font-family="Malgun Gothic" font-weight="bold" font-size="36" fill="#176B40" text-anchor="middle">예정고지 금액 = 직전 납부세액의</text>
  <text x="540" y="540" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#1F8A53" text-anchor="middle">50%</text>

  <text x="540" y="648" font-family="Malgun Gothic" font-size="32" fill="#5B6B62" text-anchor="middle">개인 일반과세자는 별도 신고 없이 고지액을 4·10월 25일 납부</text>
</svg>