<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="1080" height="1350" fill="#FFF5F7"/>
<rect width="1080" height="200" fill="#E0556E"/><text x="60" y="125" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#FFFFFF">참외, 껍질 버리면 손해</text>
<rect x="60" y="280" width="960" height="118" rx="16" fill="#ffffff" stroke="#F3CAD3"/>
<text x="100" y="352" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#2a2a2a">노란색 선명 · 속 밝고 투명한 흰색</text>
<rect x="60" y="418" width="960" height="118" rx="16" fill="#ffffff" stroke="#F3CAD3"/>
<text x="100" y="490" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#2a2a2a">흰 골 깊고 까슬 · 단 향 강한 것</text>
<rect x="60" y="580" width="960" height="240" rx="20" fill="#FFF7DA" stroke="#E9D27A"/>
<text x="100" y="655" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#B83E55">영양은 껍질·씨 주변에</text>
<text x="100" y="720" font-family="Malgun Gothic" font-size="38" fill="#2a2a2a">· 껍질 항산화 성분 = 과육의 약 29배</text>
<text x="100" y="775" font-family="Malgun Gothic" font-size="38" fill="#2a2a2a">· 씨 주변 태좌 = 당도가 가장 높음</text>
<rect x="60" y="850" width="960" height="180" rx="20" fill="#E0556E"/>
<text x="540" y="925" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#FFFFFF" text-anchor="middle">베이킹소다·식초 물에 5분</text>
<text x="540" y="990" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#FFD23F" text-anchor="middle">→ 흐르는 물에 씻어 껍질째</text>
<rect x="0" y="1270" width="1080" height="80" fill="#FDE8EC"/><text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#9A5563">※ 효능은 알려진 정보 · 본문 참고</text>
</svg>