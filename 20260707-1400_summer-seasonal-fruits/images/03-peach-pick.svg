<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="1080" height="1350" fill="#FFF5F7"/>
<rect width="1080" height="200" fill="#E0556E"/><text x="60" y="125" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#FFFFFF">백도 복숭아 고르는 법</text>
<rect x="60" y="290" width="960" height="180" rx="16" fill="#ffffff" stroke="#F3CAD3"/><rect x="60" y="290" width="14" height="180" rx="7" fill="#E0556E"/><text x="100" y="362" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#B83E55">✔ 주근깨(과점) 확인</text><text x="100" y="425" font-family="Malgun Gothic" font-size="36" fill="#2a2a2a">많고 고르게 박힌 것 = 햇빛 충분·당도 신호</text><rect x="60" y="500" width="960" height="180" rx="16" fill="#ffffff" stroke="#F3CAD3"/><rect x="60" y="500" width="14" height="180" rx="7" fill="#E0556E"/><text x="100" y="572" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#B83E55">✔ 표면</text><text x="100" y="635" font-family="Malgun Gothic" font-size="36" fill="#2a2a2a">상처 없이 매끈한 것</text><rect x="60" y="710" width="960" height="180" rx="16" fill="#ffffff" stroke="#F3CAD3"/><rect x="60" y="710" width="14" height="180" rx="7" fill="#E0556E"/><text x="100" y="782" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#B83E55">✔ 꼭지</text><text x="100" y="845" font-family="Malgun Gothic" font-size="36" fill="#2a2a2a">단 향이 올라오면 좋음</text><rect x="60" y="920" width="960" height="180" rx="16" fill="#ffffff" stroke="#F3CAD3"/><rect x="60" y="920" width="14" height="180" rx="7" fill="#E0556E"/><text x="100" y="992" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#B83E55">✔ 백도 색</text><text x="100" y="1055" font-family="Malgun Gothic" font-size="36" fill="#2a2a2a">붉은빛이 도는 것을 고르기</text>
<rect x="0" y="1270" width="1080" height="80" fill="#FDE8EC"/><text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#9A5563">※ 품종별: 백도=붉은빛 / 황도=단단 / 천도=선명한 붉은색</text>
</svg>