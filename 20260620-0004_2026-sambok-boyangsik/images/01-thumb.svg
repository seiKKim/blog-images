<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#E0556E"/>
  <circle cx="940" cy="180" r="250" fill="#ffffff" opacity="0.08"/>
  <circle cx="130" cy="960" r="200" fill="#ffffff" opacity="0.06"/>
  <!-- badge -->
  <rect x="80" y="84" rx="34" ry="34" width="300" height="68" fill="#FFD23F"/>
  <text x="230" y="130" font-family="Noto Sans CJK KR" font-weight="bold" font-size="36" fill="#1a1a1a" text-anchor="middle">가정의달 · 시즌</text>
  <!-- title -->
  <text x="80" y="280" font-family="Noto Sans CJK KR" font-weight="bold" font-size="62" fill="#E8EEF5">2026년 복날 총정리</text>
  <text x="80" y="372" font-family="Noto Sans CJK KR" font-weight="bold" font-size="96" fill="#ffffff">초복·중복·말복</text>
  <!-- date rows -->
  <g font-family="Noto Sans CJK KR" font-weight="bold">
    <rect x="80" y="430" rx="20" width="920" height="120" fill="#ffffff" opacity="0.16"/>
    <text x="110" y="508" font-size="54" fill="#ffffff">초복</text>
    <text x="970" y="508" font-size="62" fill="#FFD23F" text-anchor="end">7월 15일 (수)</text>
    <rect x="80" y="566" rx="20" width="920" height="120" fill="#ffffff" opacity="0.16"/>
    <text x="110" y="644" font-size="54" fill="#ffffff">중복</text>
    <text x="970" y="644" font-size="62" fill="#FFD23F" text-anchor="end">7월 25일 (토)</text>
    <rect x="80" y="702" rx="20" width="920" height="120" fill="#ffffff" opacity="0.16"/>
    <text x="110" y="780" font-size="54" fill="#ffffff">말복</text>
    <text x="970" y="780" font-size="62" fill="#FFD23F" text-anchor="end">8월 14일 (금)</text>
  </g>
  <!-- bottom strip -->
  <rect x="80" y="858" rx="20" width="920" height="104" fill="#ffffff" opacity="0.92"/>
  <text x="540" y="924" font-family="Noto Sans CJK KR" font-weight="bold" font-size="46" fill="#C03255" text-anchor="middle">올해는 '월복' · 삼복더위 한 달</text>
  <text x="80" y="1024" font-family="Noto Sans CJK KR" font-size="32" fill="#E8EEF5" opacity="0.9">생활·시즌 정보 한잔</text>
</svg>
