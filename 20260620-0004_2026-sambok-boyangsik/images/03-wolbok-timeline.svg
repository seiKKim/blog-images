<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="900" viewBox="0 0 1080 900">
  <rect width="1080" height="900" fill="#F7EEF1"/>
  <rect width="1080" height="180" fill="#E0556E"/>
  <text x="60" y="115" font-family="Noto Sans CJK KR" font-weight="bold" font-size="58" fill="#ffffff">올해는 '월복'이에요</text>
  <!-- normal year -->
  <text x="60" y="290" font-family="Noto Sans CJK KR" font-weight="bold" font-size="42" fill="#8A8F98">보통 해 · 10일 + 10일</text>
  <line x1="120" y1="360" x2="980" y2="360" stroke="#C9CED6" stroke-width="8"/>
  <g font-family="Noto Sans CJK KR" font-weight="bold">
    <circle cx="160" cy="360" r="20" fill="#9AA0A8"/><text x="160" y="430" font-size="34" fill="#5B6B7C" text-anchor="middle">초복</text>
    <circle cx="540" cy="360" r="20" fill="#9AA0A8"/><text x="540" y="430" font-size="34" fill="#5B6B7C" text-anchor="middle">중복</text>
    <circle cx="920" cy="360" r="20" fill="#9AA0A8"/><text x="920" y="430" font-size="34" fill="#5B6B7C" text-anchor="middle">말복</text>
    <text x="350" y="335" font-size="32" fill="#8A8F98" text-anchor="middle">10일</text>
    <text x="730" y="335" font-size="32" fill="#8A8F98" text-anchor="middle">10일</text>
  </g>
  <!-- 2026 -->
  <text x="60" y="560" font-family="Noto Sans CJK KR" font-weight="bold" font-size="42" fill="#C03255">2026년 · 10일 + 20일 (월복)</text>
  <line x1="120" y1="630" x2="980" y2="630" stroke="#E0556E" stroke-width="8"/>
  <g font-family="Noto Sans CJK KR" font-weight="bold">
    <circle cx="160" cy="630" r="22" fill="#E0556E"/><text x="160" y="702" font-size="34" fill="#C03255" text-anchor="middle">초복 7/15</text>
    <circle cx="420" cy="630" r="22" fill="#E0556E"/><text x="420" y="702" font-size="34" fill="#C03255" text-anchor="middle">중복 7/25</text>
    <circle cx="920" cy="630" r="22" fill="#E0556E"/><text x="920" y="702" font-size="34" fill="#C03255" text-anchor="middle">말복 8/14</text>
    <text x="290" y="605" font-size="32" fill="#C03255" text-anchor="middle">10일</text>
    <text x="670" y="605" font-size="36" fill="#C03255" text-anchor="middle" font-weight="bold">20일 ⟵ 길어짐</text>
  </g>
  <rect x="60" y="770" width="960" height="90" rx="16" fill="#FFF4D6"/>
  <text x="540" y="826" font-family="Noto Sans CJK KR" font-weight="bold" font-size="38" fill="#B5781A" text-anchor="middle">삼복더위가 7/15 ~ 8/14, 약 한 달 이어져요</text>
