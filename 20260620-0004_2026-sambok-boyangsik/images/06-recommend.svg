<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#F7EEF1"/>
  <rect width="1080" height="190" fill="#E0556E"/>
  <text x="60" y="120" font-family="Noto Sans CJK KR" font-weight="bold" font-size="58" fill="#ffffff">상황별 보양식 추천</text>
  <g font-family="Noto Sans CJK KR">
    <rect x="60" y="250" width="960" height="160" rx="18" fill="#ffffff" stroke="#E7C4CE"/>
    <text x="92" y="320" font-size="36" fill="#555">정통 복날 분위기를 내고 싶다면</text>
    <text x="988" y="365" font-size="50" font-weight="bold" fill="#C03255" text-anchor="end">삼계탕</text>

    <rect x="60" y="428" width="960" height="160" rx="18" fill="#ffffff" stroke="#E7C4CE"/>
    <text x="92" y="498" font-size="36" fill="#555">색다른 단백질을 원한다면</text>
    <text x="988" y="543" font-size="50" font-weight="bold" fill="#C03255" text-anchor="end">장어·추어탕</text>

    <rect x="60" y="606" width="960" height="160" rx="18" fill="#ffffff" stroke="#E7C4CE"/>
    <text x="92" y="676" font-size="36" fill="#555">여름 피로 해소에 집중한다면</text>
    <text x="988" y="721" font-size="50" font-weight="bold" fill="#C03255" text-anchor="end">전복</text>

    <rect x="60" y="784" width="960" height="160" rx="18" fill="#ffffff" stroke="#E7C4CE"/>
    <text x="92" y="854" font-size="36" fill="#555">입맛 없고 부담 없는 한 그릇이면</text>
    <text x="988" y="899" font-size="50" font-weight="bold" fill="#C03255" text-anchor="end">콩국수</text>
  </g>
  <text x="540" y="1020" font-family="Noto Sans CJK KR" font-weight="bold" font-size="40" fill="#E0556E" text-anchor="middle">올여름도 건강하게 보내세요!</text>
</svg>
