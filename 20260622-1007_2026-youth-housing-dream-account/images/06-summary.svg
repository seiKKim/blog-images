<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#243B6B"/>
  <text x="60" y="125" font-family="Noto Sans CJK KR" font-weight="bold" font-size="58" fill="#ffffff">상황별 추천 정리</text>
  <g font-family="Noto Sans CJK KR">
    <rect x="60" y="290" width="960" height="200" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="370" font-size="44" font-weight="bold" fill="#1a1a1a">높은 금리로 목돈 모으기</text>
    <text x="100" y="445" font-size="50" font-weight="bold" fill="#243B6B">→ 2년 이상 유지, 연 4.5%</text>

