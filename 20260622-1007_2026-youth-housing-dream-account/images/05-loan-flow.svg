<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#F4F7FB"/>
  <rect width="1080" height="190" fill="#243B6B"/>
  <text x="60" y="120" font-family="Noto Sans CJK KR" font-weight="bold" font-size="56" fill="#ffffff">당첨 후 대출 연계</text>
  <g font-family="Noto Sans CJK KR">
    <rect x="120" y="250" width="840" height="150" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="540" y="320" font-size="46" font-weight="bold" fill="#243B6B" text-anchor="middle">STEP 1. 통장 1년 이상 가입</text>
    <text x="540" y="375" font-size="40" fill="#1a1a1a" text-anchor="middle">+ 1,000만원 이상 납입 실적</text>
    <text x="540" y="455" font-size="60" fill="#9AB0CC" text-anchor="middle">▼</text>

    <rect x="120" y="490" width="840" height="120" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="540" y="565" font-size="46" font-weight="bold" fill="#243B6B" text-anchor="middle">STEP 2. 청약 당첨</text>
    <text x="540" y="665" font-size="60" fill="#9AB0CC" text-anchor="middle">▼</text>

    <rect x="120" y="700" width="840" height="210" rx="20" fill="#243B6B"/>
    <text x="540" y="775" font-size="46" font-weight="bold" fill="#FFD23F" text-anchor="middle">STEP 3. 청년 주택드림 대출</text>
    <text x="540" y="845" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">분양가 80% · 연 2.2%</text>
    <text x="540" y="895" font-size="44" font-weight="bold" fill="#ffffff" text-anchor="middle">고정금리 · 최장 40년</text>
  </g>
  <text x="60" y="1010" font-family="Noto Sans CJK KR" font-size="32" fill="#5B6B7C">출처: 국토교통부 · 정책브리핑(korea.kr)</text>
</svg>
