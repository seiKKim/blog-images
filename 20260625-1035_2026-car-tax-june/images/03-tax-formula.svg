<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="1080" height="1350" fill="#F4F7FB"/>
<rect width="1080" height="200" fill="#1F8A53"/><text x="60" y="125" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#FFFFFF">자동차세 세액 산정 (비영업용 승용)</text>
<rect x="60" y="270" width="960" height="150" rx="16" fill="#176B41"/>
<text x="540" y="365" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#FFFFFF" text-anchor="middle">배기량(cc) × cc당 세액 + 지방교육세 30%</text>
<rect x="60" y="450" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/><text x="100" y="524" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1a1a1a">1,000cc 이하</text><text x="1000" y="524" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1F8A53" text-anchor="end">80원 / cc</text>
<rect x="60" y="590" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/><text x="100" y="664" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1a1a1a">1,600cc 이하</text><text x="1000" y="664" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1F8A53" text-anchor="end">140원 / cc</text>
<rect x="60" y="730" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/><text x="100" y="804" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1a1a1a">1,600cc 초과</text><text x="1000" y="804" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1F8A53" text-anchor="end">200원 / cc</text>
<rect x="60" y="890" width="960" height="200" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
<text x="100" y="960" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1a1a1a">예) 2,000cc 비영업용 승용</text>
<text x="100" y="1025" font-family="Malgun Gothic" font-size="38" fill="#1a1a1a">2,000 × 200원 = 40만 원 + 교육세 12만 원</text>
<text x="100" y="1075" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1F8A53">→ 연 52만 원 (6월·12월 절반씩)</text>
<text x="60" y="1180" font-family="Malgun Gothic" font-size="36" fill="#5B6B7C">차령 3년차부터 매년 5% 경감, 최대 50%</text>
<rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/><text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">서초구 자동차세 안내 기준 예시</text>
</svg>