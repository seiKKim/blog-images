<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="1080" height="1350" fill="#F4F7FB"/>
<rect width="1080" height="200" fill="#1F8A53"/><text x="60" y="125" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#FFFFFF">미납 시 단계별 불이익</text>
<rect x="60" y="290" width="960" height="150" rx="16" fill="#ffffff" stroke="#D6E0EC"/><rect x="60" y="290" width="14" height="150" rx="7" fill="#D0021B"/><text x="100" y="352" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#D0021B">납부지연가산세 3%</text><text x="100" y="405" font-family="Malgun Gothic" font-size="34" fill="#1a1a1a">납기 경과 시 체납액에 3% 가산</text><text x="540" y="475" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#9AA7B4" text-anchor="middle">▼</text><rect x="60" y="495" width="960" height="150" rx="16" fill="#ffffff" stroke="#D6E0EC"/><rect x="60" y="495" width="14" height="150" rx="7" fill="#D0021B"/><text x="100" y="557" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#D0021B">중가산금</text><text x="100" y="610" font-family="Malgun Gothic" font-size="34" fill="#1a1a1a">1개월마다 추가, 최대 60개월 누적</text><text x="540" y="680" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#9AA7B4" text-anchor="middle">▼</text><rect x="60" y="700" width="960" height="150" rx="16" fill="#ffffff" stroke="#D6E0EC"/><rect x="60" y="700" width="14" height="150" rx="7" fill="#D0021B"/><text x="100" y="762" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#D0021B">압류</text><text x="100" y="815" font-family="Malgun Gothic" font-size="34" fill="#1a1a1a">예금·급여·부동산·자동차 압류 → 공매</text><text x="540" y="885" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#9AA7B4" text-anchor="middle">▼</text><rect x="60" y="905" width="960" height="150" rx="16" fill="#ffffff" stroke="#D6E0EC"/><rect x="60" y="905" width="14" height="150" rx="7" fill="#D0021B"/><text x="100" y="967" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#D0021B">번호판 영치</text><text x="100" y="1020" font-family="Malgun Gothic" font-size="34" fill="#1a1a1a">계속 미납 시 등록번호판 영치</text>
<rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/><text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">중가산금 기준·요율은 위택스·관할 지자체 확인 권장</text>
</svg>