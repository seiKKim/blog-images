<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#E8722C"/>
  <circle cx="950" cy="170" r="270" fill="#ffffff" opacity="0.08"/>
  <circle cx="110" cy="990" r="210" fill="#ffffff" opacity="0.06"/>

  <!-- 카테고리 뱃지 -->
  <rect x="64" y="80" rx="34" ry="34" width="200" height="68" fill="#FFD23F"/>
  <text x="164" y="126" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="38" fill="#1a1a1a" text-anchor="middle">생활꿀팁</text>

  <!-- 서브 카피 -->
  <text x="64" y="270" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="58" fill="#FFF4E9">2026 장마철 · 지금이 곰팡이 피크</text>

  <!-- 메인 카피 -->
  <text x="64" y="400" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="112" fill="#ffffff">집안 습기·곰팡이</text>
  <text x="64" y="520" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="112" fill="#FFD23F">완벽 예방 꿀팁</text>

  <!-- 핵심 숫자 박스들 -->
  <rect x="64" y="600" rx="24" ry="24" width="440" height="180" fill="#ffffff" opacity="0.15"/>
  <text x="284" y="672" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="40" fill="#FFF4E9" text-anchor="middle">적정 습도</text>
  <text x="284" y="748" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="72" fill="#FFD23F" text-anchor="middle">40~60%</text>

  <rect x="536" y="600" rx="24" ry="24" width="480" height="180" fill="#ffffff" opacity="0.15"/>
  <text x="776" y="672" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="40" fill="#FFF4E9" text-anchor="middle">물기 건조 기한</text>
  <text x="776" y="748" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="72" fill="#FFD23F" text-anchor="middle">24~48시간</text>

  <!-- 디테일 띠 -->
  <rect x="64" y="820" rx="20" ry="20" width="952" height="118" fill="#ffffff" opacity="0.16"/>
  <text x="90" y="896" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff">습도 관리 · 락스 안전수칙 · 장소별 제거법</text>

  <text x="64" y="1012" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="34" fill="#FFF4E9" opacity="0.9">blog.naver.com/trip_chocho</text>
