<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FBF4EE"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <text x="60" y="98" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">실내 습도, 몇 %가 안전할까?</text>
  <text x="60" y="160" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="38" fill="#FFE4CE">장마철 습기 관리 기준표</text>

  <g font-family="'Noto Sans KR','Malgun Gothic',sans-serif">
    <!-- 적정 -->
    <rect x="60" y="270" width="960" height="180" rx="18" fill="#ffffff" stroke="#EBD6C4"/>
    <rect x="60" y="270" width="14" height="180" rx="7" fill="#1F8A53"/>
    <text x="110" y="345" font-size="46" font-weight="bold" fill="#1a1a1a">적정 습도</text>
    <text x="110" y="410" font-size="34" fill="#5B6B7C">안심 · 여름철 권장 구간</text>
    <text x="990" y="382" font-size="72" font-weight="bold" fill="#1F8A53" text-anchor="end">40~60%</text>

    <!-- 주의 -->
    <rect x="60" y="470" width="960" height="180" rx="18" fill="#ffffff" stroke="#EBD6C4"/>
    <rect x="60" y="470" width="14" height="180" rx="7" fill="#E8722C"/>
    <text x="110" y="545" font-size="46" font-weight="bold" fill="#1a1a1a">주의 구간</text>
    <text x="110" y="610" font-size="34" fill="#5B6B7C">곰팡이 위험 시작</text>
    <text x="990" y="582" font-size="72" font-weight="bold" fill="#E8722C" text-anchor="end">60~70%</text>

    <!-- 위험 -->
    <rect x="60" y="670" width="960" height="180" rx="18" fill="#ffffff" stroke="#EBD6C4"/>
    <rect x="60" y="670" width="14" height="180" rx="7" fill="#E23B3B"/>
    <text x="110" y="745" font-size="46" font-weight="bold" fill="#1a1a1a">위험 구간</text>
    <text x="110" y="810" font-size="34" fill="#5B6B7C">장시간 지속 시 곰팡이 급증</text>
    <text x="990" y="782" font-size="72" font-weight="bold" fill="#E23B3B" text-anchor="end">70% 이상</text>

    <!-- 장마철 평균 -->
    <rect x="60" y="870" width="960" height="180" rx="18" fill="#2B2F36"/>
    <text x="110" y="945" font-size="46" font-weight="bold" fill="#ffffff">장마철 실내 평균</text>
    <text x="110" y="1010" font-size="34" fill="#C8D2DC">곰팡이·세균에 이상적인 환경</text>
    <text x="990" y="982" font-size="72" font-weight="bold" fill="#FFD23F" text-anchor="end">80~90%</text>
  </g>

  <!-- 강조 문구 -->
  <rect x="60" y="1090" width="960" height="120" rx="18" fill="#FFF3E2" stroke="#F0C89A"/>
  <text x="90" y="1150" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="40" fill="#C85A16">젖은 자재·가구는 24~48시간 안에 건조!</text>
  <text x="90" y="1195" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="32" fill="#8A5A2E">이틀만 방치해도 곰팡이가 시작될 수 있습니다</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#F0E3D6"/>
  <text x="60" y="1322" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="32" fill="#8A6E56">출처: 정책브리핑 · 미국 환경보호청(EPA)</text>
</svg>
