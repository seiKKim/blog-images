<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F6F8"/>

  <!-- 상단 띠 -->
  <rect width="1080" height="210" fill="#2B2F36"/>
  <rect x="60" y="58" rx="26" ry="26" width="240" height="56" fill="#E23B3B"/>
  <text x="180" y="96" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="700"
        font-size="30" fill="#ffffff" text-anchor="middle">~7/31 연장</text>
  <text x="60" y="172" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="800"
        font-size="62" fill="#ffffff">유류세 인하 연장</text>

  <!-- 안내 띠 -->
  <rect x="60" y="252" width="960" height="92" rx="16" fill="#2B2F36"/>
  <text x="540" y="310" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="700"
        font-size="38" fill="#E8EEF5" text-anchor="middle">7월 31일까지 2개월 연장 (리터당 인하액)</text>

  <!-- 휘발유 카드 -->
  <rect x="60" y="380" width="960" height="300" rx="20" fill="#ffffff" stroke="#DBE2EA"/>
  <text x="100" y="468" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="800"
        font-size="52" fill="#2B2F36">휘발유</text>
  <rect x="100" y="496" rx="14" ry="14" width="150" height="58" fill="#FDE4E4"/>
  <text x="175" y="536" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="700"
        font-size="34" fill="#E23B3B" text-anchor="middle">15% ↓</text>
  <text x="100" y="630" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="500"
        font-size="38" fill="#5B6B7C">유류세분 763원 → 698원</text>
  <text x="990" y="500" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="500"
        font-size="36" fill="#5B6B7C" text-anchor="end">리터당 약</text>
  <text x="990" y="600" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="800"
        font-size="96" fill="#E23B3B" text-anchor="end">65원↓</text>

  <!-- 경유 카드 -->
  <rect x="60" y="708" width="960" height="300" rx="20" fill="#ffffff" stroke="#DBE2EA"/>
  <text x="100" y="796" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="800"
        font-size="52" fill="#2B2F36">경유</text>
  <rect x="100" y="824" rx="14" ry="14" width="150" height="58" fill="#FDE4E4"/>
  <text x="175" y="864" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="700"
        font-size="34" fill="#E23B3B" text-anchor="middle">25% ↓</text>
  <text x="100" y="958" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="500"
        font-size="38" fill="#5B6B7C">유류세분 523원 → 436원</text>
  <text x="990" y="828" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="500"
        font-size="36" fill="#5B6B7C" text-anchor="end">리터당 약</text>
  <text x="990" y="928" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="800"
        font-size="96" fill="#E23B3B" text-anchor="end">87원↓</text>

  <!-- 주석 박스 -->
  <rect x="60" y="1040" width="960" height="180" rx="16" fill="#FFF3E6" stroke="#F2D2A8"/>
  <text x="100" y="1104" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="700"
        font-size="36" fill="#2B2F36">※ 유류세분 기준. 부가세 포함 환산 시</text>
  <text x="100" y="1158" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="700"
        font-size="36" fill="#2B2F36">휘발유 약 122원·경유 약 145원으로 보도</text>
  <text x="100" y="1200" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="500"
        font-size="32" fill="#5B6B7C">8월 이후 추가 연장 여부는 검토 중(미정)</text>

  <!-- 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="500"
        font-size="32" fill="#5B6B7C">출처: 민생물가 특별관리 관계장관 회의(2026.5.21) 발표</text>
</svg>
