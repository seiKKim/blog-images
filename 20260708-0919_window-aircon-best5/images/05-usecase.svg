<text x="60" y="112" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff" text-anchor="start">우리 방엔 어떤 게 맞을까?</text>
<text x="60" y="170" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#DFF3F7" text-anchor="start">용도별 추천 · 방향 잡는 가이드</text>
<rect x="60" y="300" width="464" height="360" rx="24" fill="#3FA9C9"/><text x="292" y="390" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">원룸·간헐 사용</text><rect x="120" y="420" width="344" height="4" fill="#ffffff" opacity="0.4"/><text x="292" y="510" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#FFD23F" text-anchor="middle">가성비 정속형</text><text x="292" y="590" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#EAF6F9" text-anchor="middle">캐리어·신일 등</text><rect x="556" y="300" width="464" height="360" rx="24" fill="#1E6B7A"/><text x="788" y="390" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">침실·저소음</text><rect x="616" y="420" width="344" height="4" fill="#ffffff" opacity="0.4"/><text x="788" y="510" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#FFD23F" text-anchor="middle">저소음 인버터</text><text x="788" y="590" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#EAF6F9" text-anchor="middle">삼성·LG·파세코</text><rect x="60" y="700" width="464" height="360" rx="24" fill="#0E3A44"/><text x="292" y="790" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">작은 미닫이창</text><rect x="120" y="820" width="344" height="4" fill="#ffffff" opacity="0.4"/><text x="292" y="910" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#FFD23F" text-anchor="middle">파세코</text><text x="292" y="990" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#EAF6F9" text-anchor="middle">최소높이·좁은폭 호환</text><rect x="556" y="700" width="464" height="360" rx="24" fill="#5B6B7C"/><text x="788" y="790" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">넓은 방·강냉방</text><rect x="616" y="820" width="344" height="4" fill="#ffffff" opacity="0.4"/><text x="788" y="910" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#FFD23F" text-anchor="middle">벽걸이 병행</text><text x="788" y="990" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#EAF6F9" text-anchor="middle">창문형은 6~7평 상한</text>
<text x="540" y="1120" font-family="Malgun Gothic" font-weight="bold" font-size="36" fill="#1E6B7A" text-anchor="middle">단기 거주·목돈 부담이면 '렌탈'도 선택지</text>
