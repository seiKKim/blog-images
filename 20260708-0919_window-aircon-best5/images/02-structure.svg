<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
<rect width="1080" height="720" fill="#F4F9FB"/>
<rect width="1080" height="150" fill="#1E6B7A"/>
<text x="60" y="96" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#ffffff" text-anchor="start">창문형 에어컨은 어떻게 시원해질까?</text>
<!-- 창틀 -->
<rect x="500" y="210" width="24" height="430" fill="#9DB2BC"/>
<text x="512" y="690" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#5B6B7C" text-anchor="middle">창틀(미닫이창)</text>
<!-- 실내(송풍부) -->
<rect x="80" y="250" width="400" height="330" rx="22" fill="#DFF3F7" stroke="#3FA9C9" stroke-width="4"/>
<text x="280" y="315" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#0E3A44" text-anchor="middle">실내 (앞부분)</text>
<text x="280" y="395" font-family="Malgun Gothic" font-weight="bold" font-size="70" fill="#1E6B7A" text-anchor="middle">송풍부</text>
<text x="280" y="470" font-family="Malgun Gothic" font-weight="normal" font-size="40" fill="#12333B" text-anchor="middle">찬바람을 뿜어</text>
<text x="280" y="525" font-family="Malgun Gothic" font-weight="normal" font-size="40" fill="#12333B" text-anchor="middle">방을 시원하게</text>
<!-- 실외(응축부) -->
<rect x="544" y="250" width="440" height="330" rx="22" fill="#E7EDF0" stroke="#9DB2BC" stroke-width="4"/>
<text x="764" y="315" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#5B6B7C" text-anchor="middle">실외 (뒷부분)</text>
<text x="764" y="395" font-family="Malgun Gothic" font-weight="bold" font-size="70" fill="#5B6B7C" text-anchor="middle">응축부</text>
<text x="764" y="470" font-family="Malgun Gothic" font-weight="normal" font-size="40" fill="#12333B" text-anchor="middle">더운 열을</text>
<text x="764" y="525" font-family="Malgun Gothic" font-weight="normal" font-size="40" fill="#12333B" text-anchor="middle">창밖으로 배출</text>
<!-- 화살표 -->
<text x="400" y="690" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#1E6B7A" text-anchor="middle">실외기·배관 타공 없이 창틀 하나로 일체형 냉방</text>
</svg>