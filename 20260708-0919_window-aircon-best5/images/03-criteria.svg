<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="1080" height="1350" fill="#F4F9FB"/>
<rect width="1080" height="220" fill="#1E6B7A"/>
<text x="60" y="120" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff" text-anchor="start">사기 전 꼭 따질 기준 5가지</text>
<text x="60" y="182" font-family="Malgun Gothic" font-weight="normal" font-size="36" fill="#DFF3F7" text-anchor="start">가격표보다 이 순서로 좁혀가세요</text>
<rect x="56" y="300" width="968" height="176" rx="20" fill="#ffffff" stroke="#D6E4EA" stroke-width="3"/><circle cx="140" cy="388" r="52" fill="#1E6B7A"/><text x="140" y="406" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff" text-anchor="middle">1</text><text x="228" y="370" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#12333B" text-anchor="start">창문 규격·설치 호환</text><text x="228" y="428" font-family="Malgun Gothic" font-weight="normal" font-size="33" fill="#5B6B7C" text-anchor="start">미닫이창 전용 · 가로 45cm↑ 세로 90~146cm</text><rect x="56" y="496" width="968" height="176" rx="20" fill="#ffffff" stroke="#D6E4EA" stroke-width="3"/><circle cx="140" cy="584" r="52" fill="#1E6B7A"/><text x="140" y="602" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff" text-anchor="middle">2</text><text x="228" y="566" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#12333B" text-anchor="start">냉방면적(평수)</text><text x="228" y="624" font-family="Malgun Gothic" font-weight="normal" font-size="33" fill="#5B6B7C" text-anchor="start">대부분 4~7평 · 냉방능력 400W당 약 1평</text><rect x="56" y="692" width="968" height="176" rx="20" fill="#ffffff" stroke="#D6E4EA" stroke-width="3"/><circle cx="140" cy="780" r="52" fill="#1E6B7A"/><text x="140" y="798" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff" text-anchor="middle">3</text><text x="228" y="762" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#12333B" text-anchor="start">인버터 vs 정속형</text><text x="228" y="820" font-family="Malgun Gothic" font-weight="normal" font-size="33" fill="#5B6B7C" text-anchor="start">인버터=1등급·저소음 / 정속형=저가·4~5등급</text><rect x="56" y="888" width="968" height="176" rx="20" fill="#ffffff" stroke="#D6E4EA" stroke-width="3"/><circle cx="140" cy="976" r="52" fill="#1E6B7A"/><text x="140" y="994" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff" text-anchor="middle">4</text><text x="228" y="958" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#12333B" text-anchor="start">소음(dB)</text><text x="228" y="1016" font-family="Malgun Gothic" font-weight="normal" font-size="33" fill="#5B6B7C" text-anchor="start">구형 50~60dB → 프리미엄 인버터 32~40dB대</text><rect x="56" y="1084" width="968" height="176" rx="20" fill="#ffffff" stroke="#D6E4EA" stroke-width="3"/><circle cx="140" cy="1172" r="52" fill="#1E6B7A"/><text x="140" y="1190" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff" text-anchor="middle">5</text><text x="228" y="1154" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#12333B" text-anchor="start">효율등급·자가설치</text><text x="228" y="1212" font-family="Malgun Gothic" font-weight="normal" font-size="33" fill="#5B6B7C" text-anchor="start">인버터 1등급 유리 · 본체 무거워 2인 권장</text>
</svg>