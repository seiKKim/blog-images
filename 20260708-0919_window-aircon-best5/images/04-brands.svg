<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="1080" height="1350" fill="#F4F9FB"/>
<rect width="1080" height="220" fill="#1E6B7A"/>
<text x="60" y="120" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff" text-anchor="start">브랜드별 한눈 비교</text>
<text x="60" y="182" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#DFF3F7" text-anchor="start">6평형 기준 · 가격·소음은 대략치(연식·재고 변동)</text>
<rect x="56" y="300" width="968" height="84" rx="14" fill="#0E3A44"/>
<text x="150" y="356" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">브랜드</text><text x="470" y="356" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">성격</text><text x="690" y="356" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">소음</text><text x="900" y="356" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">가격대</text>
<rect x="56" y="400" width="968" height="150" rx="16" fill="#ffffff" stroke="#D6E4EA" stroke-width="3"/><text x="150" y="492" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#1E6B7A" text-anchor="middle">삼성</text><text x="470" y="490" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#12333B" text-anchor="middle">저소음·앱·디자인</text><text x="690" y="490" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#12333B" text-anchor="middle">약 32dB</text><text x="900" y="490" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#D64545" text-anchor="middle">70~90만</text><rect x="56" y="568" width="968" height="150" rx="16" fill="#ffffff" stroke="#D6E4EA" stroke-width="3"/><text x="150" y="660" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#1E6B7A" text-anchor="middle">LG</text><text x="470" y="658" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#12333B" text-anchor="middle">감성·완성도</text><text x="690" y="658" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#12333B" text-anchor="middle">약 34dB</text><text x="900" y="658" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#D64545" text-anchor="middle">80~120만</text><rect x="56" y="736" width="968" height="150" rx="16" fill="#ffffff" stroke="#D6E4EA" stroke-width="3"/><text x="150" y="828" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#1E6B7A" text-anchor="middle">파세코</text><text x="470" y="826" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#12333B" text-anchor="middle">원조·좁은창 호환</text><text x="690" y="826" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#12333B" text-anchor="middle">약 34.3dB</text><text x="900" y="826" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#D64545" text-anchor="middle">80~110만</text><rect x="56" y="904" width="968" height="150" rx="16" fill="#ffffff" stroke="#D6E4EA" stroke-width="3"/><text x="150" y="996" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#1E6B7A" text-anchor="middle">캐리어</text><text x="470" y="994" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#12333B" text-anchor="middle">실용·저가</text><text x="690" y="994" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#12333B" text-anchor="middle">약 45dB</text><text x="900" y="994" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#D64545" text-anchor="middle">30~60만*</text>
<rect x="0" y="1250" width="1080" height="100" fill="#E8EEF1"/>
<text x="60" y="1310" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#5B6B7C" text-anchor="start">* 캐리어 가격은 모델·재고에 따라 변동 폭이 큼</text>
</svg>