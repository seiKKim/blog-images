<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="210" fill="#1B5FA6"/>
  <rect x="60" y="86" rx="30" ry="30" width="250" height="60" fill="#FFD23F"/>
  <text x="185" y="128" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="32" fill="#16324f" text-anchor="middle">제습기 추천</text>
  <text x="60" y="195" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">사기 전 실수 체크리스트</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 1 -->
    <rect x="60" y="270" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="90" y="318" width="56" height="56" rx="12" fill="#1B5FA6"/>
    <path d="M104 346 l12 12 l22 -24" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="180" y="332" font-weight="bold" font-size="38" fill="#1a1a1a">용량 과소 선택</text>
    <text x="180" y="382" font-size="30" fill="#5B6B7C">애매하면 한 단계 위 · 주택·반지하는 +1단계</text>

    <!-- 2 -->
    <rect x="60" y="436" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="90" y="484" width="56" height="56" rx="12" fill="#1B5FA6"/>
    <path d="M104 512 l12 12 l22 -24" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="180" y="498" font-weight="bold" font-size="38" fill="#1a1a1a">표기 제습량만 믿기</text>
    <text x="180" y="548" font-size="30" fill="#5B6B7C">측정조건 확인: 27℃·60% vs 30℃·80%</text>

    <!-- 3 -->
    <rect x="60" y="602" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="90" y="650" width="56" height="56" rx="12" fill="#1B5FA6"/>
    <path d="M104 678 l12 12 l22 -24" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="180" y="664" font-weight="bold" font-size="38" fill="#1a1a1a">물통 비우기 번거로움</text>
    <text x="180" y="714" font-size="30" fill="#5B6B7C">장시간 운전엔 연속배수·배수구 위치 체크</text>

    <!-- 4 -->
    <rect x="60" y="768" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="90" y="816" width="56" height="56" rx="12" fill="#1B5FA6"/>
    <path d="M104 844 l12 12 l22 -24" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="180" y="830" font-weight="bold" font-size="38" fill="#1a1a1a">소음 간과</text>
    <text x="180" y="880" font-size="30" fill="#5B6B7C">침실·원룸은 정음모드 dB 확인(제습량↓ 감안)</text>

    <!-- 5 -->
    <rect x="60" y="934" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="90" y="982" width="56" height="56" rx="12" fill="#1B5FA6"/>
    <path d="M104 1010 l12 12 l22 -24" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="180" y="996" font-weight="bold" font-size="38" fill="#1a1a1a">인버터/효율등급 미확인</text>
    <text x="180" y="1046" font-size="30" fill="#5B6B7C">매일 길게 쓸수록 1등급+인버터가 유리</text>

    <!-- 6 -->
    <rect x="60" y="1100" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="90" y="1148" width="56" height="56" rx="12" fill="#1B5FA6"/>
    <path d="M104 1176 l12 12 l22 -24" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="180" y="1162" font-weight="bold" font-size="38" fill="#1a1a1a">필터·물통 관리 소홀</text>
    <text x="180" y="1212" font-size="30" fill="#5B6B7C">곰팡이·냄새 방지 주기 세척 · HD 인증마크 확인</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">구매 직전 6가지만 다시 체크하세요</text>
