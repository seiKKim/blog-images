<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F1FAF7"/>
  <rect width="1080" height="230" fill="#1E6B5C"/>
  <rect x="60" y="52" rx="26" ry="26" width="190" height="56" fill="#FFC93C"/>
  <text x="155" y="91" font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#123028" text-anchor="middle">추천아이템</text>
  <text x="60" y="172" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#FFFFFF">유형 5. 대형 쉘터/에어텐트</text>
  <text x="60" y="214" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#DBF1EA">비주얼 끝판왕 — 개방감·감성 세팅</text>
  <g>
    <rect x="60" y="300" width="960" height="112" rx="18" fill="#FFFFFF" stroke="#CFE9E1"/>
    <text x="96" y="350" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#123028">특징</text>
    <text x="96" y="394" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#4A6B62">개방감·감성 디자인 / 에어텐트는 공기 주입만으로 설치</text>
    <rect x="60" y="428" width="960" height="112" rx="18" fill="#FFFFFF" stroke="#CFE9E1"/>
    <text x="96" y="478" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#123028">티피</text>
    <text x="96" y="522" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#4A6B62">형태 특성상 겨울 캠핑까지 넓게 활용</text>
    <rect x="60" y="556" width="960" height="112" rx="18" fill="#FFFFFF" stroke="#CFE9E1"/>
    <text x="96" y="606" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#123028">장점</text>
    <text x="96" y="650" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#4A6B62">넓은 개방감·비주얼, 에어텐트는 설치 편의 우수</text>
    <rect x="60" y="684" width="960" height="112" rx="18" fill="#FFFFFF" stroke="#CFE9E1"/>
    <text x="96" y="734" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#123028">단점</text>
    <text x="96" y="778" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#4A6B62">고가, 무게·수납 부담</text>
    <rect x="60" y="812" width="960" height="112" rx="18" fill="#FFFFFF" stroke="#CFE9E1"/>
    <text x="96" y="862" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#123028">가격대(예시)</text>
    <text x="96" y="906" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#4A6B62">에어텐트 리빙쉘 약 79~80만원대 — 80만원 이상 고가군</text>
  </g>
  <text x="60" y="1218" font-family="Malgun Gothic" font-weight="bold" font-size="29" fill="#155447">※ '사진에 담기는 감성'과 넓은 거실을 중시하고 예산 여유 있을 때</text>
  <rect x="0" y="1270" width="1080" height="80" fill="#DCEEE8"/>
  <text x="60" y="1320" font-family="Malgun Gothic" font-size="27" fill="#5B7280">출처: 업계·판매처 예시가 정리(제품·시점별 상이) / blog.naver.com/trip_chocho</text>
</svg>