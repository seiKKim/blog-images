  <rect x="60" y="52" rx="26" ry="26" width="190" height="56" fill="#FFC93C"/>
  <text x="155" y="91" font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#123028" text-anchor="middle">유형 1</text>
  <text x="60" y="172" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#FFFFFF">원터치/팝업 · 1분 설치</text>
  <text x="60" y="214" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#DBF1EA">캠핑 입문자의 정답, 펼치면 끝</text>
  <g>
    <rect x="60" y="300" width="960" height="196" rx="20" fill="#FFFFFF" stroke="#CFE9E1"/>
    <circle cx="150" cy="398" r="58" fill="#1E6B5C"/>
    <text x="150" y="420" font-family="Malgun Gothic" font-weight="bold" font-size="64" fill="#FFFFFF" text-anchor="middle">1</text>
    <text x="248" y="382" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#123028">펼치기</text>
    <text x="248" y="442" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#4A6B62">버튼 누르거나 던지듯 펼치면 자동으로 뼈대가 섬</text>
    <rect x="60" y="524" width="960" height="196" rx="20" fill="#FFFFFF" stroke="#CFE9E1"/>
    <circle cx="150" cy="622" r="58" fill="#1E6B5C"/>
    <text x="150" y="644" font-family="Malgun Gothic" font-weight="bold" font-size="64" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="248" y="606" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#123028">고정</text>
    <text x="248" y="666" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#4A6B62">펙·스트링으로 바닥 고정 (초보도 어렵지 않음)</text>
    <rect x="60" y="748" width="960" height="196" rx="20" fill="#FFFFFF" stroke="#CFE9E1"/>
    <circle cx="150" cy="846" r="58" fill="#1E6B5C"/>
    <text x="150" y="868" font-family="Malgun Gothic" font-weight="bold" font-size="64" fill="#FFFFFF" text-anchor="middle">3</text>
    <text x="248" y="830" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#123028">완성</text>
    <text x="248" y="890" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#4A6B62">약 1분 안에 설치 끝 — 첫 캠핑부터 진 빼지 않음</text>
