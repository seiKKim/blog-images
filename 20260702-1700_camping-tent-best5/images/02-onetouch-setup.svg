  <text x="60" y="1078" font-family="Malgun Gothic" font-weight="bold" font-size="32" fill="#155447">가격대(예시) 3만~10만원대 · 오토캠핑·차박 서브텐트로 적합</text>
  <text x="60" y="1128" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#4A6B62">※ 접으면 부피·무게 있어 도보 이동보다 차량 이동에 유리</text>
