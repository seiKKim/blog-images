<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F1FAF7"/>
  <rect width="1080" height="230" fill="#1E6B5C"/>
  <rect x="60" y="52" rx="26" ry="26" width="190" height="56" fill="#FFC93C"/>
  <text x="155" y="91" font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#123028" text-anchor="middle">추천아이템</text>
  <text x="60" y="172" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#FFFFFF">유형 4. 거실형/리빙쉘</text>
  <text x="60" y="214" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#DBF1EA">가족 캠핑의 표준 — 취침+거실 분리, 넓은 실내</text>
  <g>
    <rect x="60" y="300" width="960" height="112" rx="18" fill="#FFFFFF" stroke="#CFE9E1"/>
    <text x="96" y="350" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#123028">인원 팁</text>
    <text x="96" y="394" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#4A6B62">표기 인원보다 1~2명 적게 써야 쾌적 (4인이면 4~5인급)</text>
    <rect x="60" y="428" width="960" height="112" rx="18" fill="#FFFFFF" stroke="#CFE9E1"/>
    <text x="96" y="478" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#123028">장·단점</text>
    <text x="96" y="522" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#4A6B62">공간·내구성 우수 / 크고 무거워 설치 난도·수납 부피 큼</text>
    <rect x="60" y="556" width="960" height="112" rx="18" fill="#FFFFFF" stroke="#CFE9E1"/>
    <text x="96" y="606" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#123028">여름 포인트</text>
    <text x="96" y="650" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#4A6B62">메시 창·통풍구 넉넉한지 확인 (통풍이 관건)</text>
    <rect x="60" y="684" width="960" height="112" rx="18" fill="#FFFFFF" stroke="#CFE9E1"/>
    <text x="96" y="734" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#123028">내수압 기준</text>
    <text x="96" y="778" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#4A6B62">오토캠핑 리빙쉘 일반 기준 약 3,000mm 수준</text>
    <rect x="60" y="812" width="960" height="112" rx="18" fill="#FFFFFF" stroke="#CFE9E1"/>
    <text x="96" y="862" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#123028">가격대(예시)</text>
    <text x="96" y="906" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#4A6B62">30만원 이하 ~ 돔형 리빙쉘 약 36~40만원대 ~ 100만원 이상</text>
  </g>
  <text x="60" y="1218" font-family="Malgun Gothic" font-weight="bold" font-size="29" fill="#155447">※ 예시가: 네스트T급 약 79만원 · 오스카하우스급 약 111만원</text>
  <rect x="0" y="1270" width="1080" height="80" fill="#DCEEE8"/>
  <text x="60" y="1320" font-family="Malgun Gothic" font-size="27" fill="#5B7280">출처: 업계·판매처 예시가 정리(제품·시점별 상이) / blog.naver.com/trip_chocho</text>
</svg>