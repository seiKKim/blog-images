<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#FFF6EE"/>
  <rect width="1080" height="150" fill="#E8722C"/>
  <text x="60" y="97" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#FFFFFF">온도차가 크면 몸에 무슨 일이?</text>

  <!-- 바깥 -->
  <rect x="60" y="210" rx="24" width="420" height="230" fill="#F6A05A"/>
  <text x="270" y="290" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#FFFFFF" text-anchor="middle">바깥 (더위)</text>
  <text x="270" y="372" font-family="Malgun Gothic" font-weight="bold" font-size="70" fill="#FFFFFF" text-anchor="middle">🌡 더움</text>

  <!-- 화살표 -->
  <text x="540" y="345" font-family="Malgun Gothic" font-weight="bold" font-size="70" fill="#B4531A" text-anchor="middle">→</text>

  <!-- 실내 -->
  <rect x="600" y="210" rx="24" width="420" height="230" fill="#5B8FB9"/>
  <text x="810" y="290" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#FFFFFF" text-anchor="middle">실내 (차가움)</text>
  <text x="810" y="372" font-family="Malgun Gothic" font-weight="bold" font-size="70" fill="#FFFFFF" text-anchor="middle">❄ 냉방</text>

  <!-- 결과 배너 -->
  <rect x="60" y="480" rx="24" width="960" height="150" fill="#FFFFFF" stroke="#EAD9CB"/>
  <text x="90" y="545" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1a1a1a">온도차 <tspan fill="#B4531A">5~8℃ 이상</tspan> 환경에 오래 있으면</text>
  <text x="90" y="600" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1a1a1a">말초혈관 급격히 수축 → 혈액순환·자율신경 이상</text>

  <text x="60" y="686" font-family="Malgun Gothic" font-size="28" fill="#5B6B7C">출처: 서울아산병원</text>
</svg>