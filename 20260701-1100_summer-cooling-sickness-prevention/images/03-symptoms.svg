<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FFF6EE"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <text x="60" y="122" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#FFFFFF">냉방병 증상 체크리스트</text>
  <rect x="60" y="300" width="960" height="134" rx="18" fill="#FFFFFF" stroke="#EAD9CB"/><rect x="60" y="300" width="14" height="134" rx="7" fill="#E8722C"/><text x="104" y="358" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#B4531A">호흡기·감기 유사</text><text x="104" y="420" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">두통, 콧물, 재채기, 코막힘, 몸살기</text><rect x="60" y="470" width="960" height="184" rx="18" fill="#FFFFFF" stroke="#EAD9CB"/><rect x="60" y="470" width="14" height="184" rx="7" fill="#E8722C"/><text x="104" y="528" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#B4531A">전신</text><text x="104" y="578" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">나른함, 쉽게 피로, 어지럼증, 냉감,</text><text x="104" y="626" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">얼굴 화끈거림, 가슴 두근거림</text><rect x="60" y="690" width="960" height="184" rx="18" fill="#FFFFFF" stroke="#EAD9CB"/><rect x="60" y="690" width="14" height="184" rx="7" fill="#E8722C"/><text x="104" y="748" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#B4531A">근골격</text><text x="104" y="798" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">손발 부종, 어깨·팔다리 무거움,</text><text x="104" y="846" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">허리·무릎·발목 관절 통증</text><rect x="60" y="910" width="960" height="184" rx="18" fill="#FFFFFF" stroke="#EAD9CB"/><rect x="60" y="910" width="14" height="184" rx="7" fill="#E8722C"/><text x="104" y="968" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#B4531A">소화기</text><text x="104" y="1018" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">소화불량, 하복부 불쾌감, 복통,</text><text x="104" y="1066" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">심하면 설사</text>
  <rect x="0" y="1270" width="1080" height="80" fill="#F3E4D7"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">출처: 서울아산병원·서울대학교병원</text>
</svg>