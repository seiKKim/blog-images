  <rect x="90" y="240" width="360" height="180" rx="24" fill="#FFFFFF" stroke="#EAD9CB" stroke-width="4"/>
  <line x1="120" y1="300" x2="420" y2="300" stroke="#D9C4B2" stroke-width="8"/>
  <line x1="120" y1="340" x2="420" y2="340" stroke="#D9C4B2" stroke-width="8"/>
