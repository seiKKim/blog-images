<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
<rect width="1080" height="1080" fill="#F4F7FB"/>
<rect width="1080" height="170" fill="#243B6B"/>
<rect x="60" y="52" rx="32" width="240" height="64" fill="#FFD23F"/>
<text x="180" y="96" font-family="Noto Sans CJK KR" font-weight="bold" font-size="28" fill="#1a1a1a" text-anchor="middle">운용 전략</text>
<text x="320" y="106" font-family="Noto Sans CJK KR" font-weight="bold" font-size="52" fill="#fff">자금 성격별 분산</text>
<text x="60" y="227" font-family="Noto Sans CJK KR" font-size="34" fill="#5B6B7C">비상금 · 생활비 · 투자대기자금 나눠 담기</text>
<rect x="60" y="290" rx="18" width="960" height="150" fill="#fff" stroke="#D6E0EC" stroke-width="2"/><rect x="60" y="290" rx="18" width="16" height="150" fill="#243B6B"/><text x="110" y="338" font-family="Noto Sans CJK KR" font-weight="bold" font-size="36" fill="#243B6B">비상금 · <tspan font-weight="normal" font-size="26" fill="#5B6B7C">언제 쓸지 모르는 돈</tspan></text><text x="110" y="398" font-family="Noto Sans CJK KR" font-size="27" fill="#1a1a1a">파킹통장에 보관 — 해지 없이 바로 출금, 맡긴 만큼 이자</text><rect x="60" y="458" rx="18" width="960" height="150" fill="#fff" stroke="#D6E0EC" stroke-width="2"/><rect x="60" y="458" rx="18" width="16" height="150" fill="#243B6B"/><text x="110" y="506" font-family="Noto Sans CJK KR" font-weight="bold" font-size="36" fill="#243B6B">생활비 · <tspan font-weight="normal" font-size="26" fill="#5B6B7C">월 예산 관리</tspan></text><text x="110" y="566" font-family="Noto Sans CJK KR" font-size="27" fill="#1a1a1a">체크카드 연결형 파킹통장 — 결제와 이자 동시에</text><rect x="60" y="626" rx="18" width="960" height="150" fill="#fff" stroke="#D6E0EC" stroke-width="2"/><rect x="60" y="626" rx="18" width="16" height="150" fill="#243B6B"/><text x="110" y="674" font-family="Noto Sans CJK KR" font-weight="bold" font-size="36" fill="#243B6B">투자 대기자금 · <tspan font-weight="normal" font-size="26" fill="#5B6B7C">투자처 정하기 전</tspan></text><text x="110" y="734" font-family="Noto Sans CJK KR" font-size="27" fill="#1a1a1a">임시 보관처 — 하루만 맡겨도 이자가 붙음</text><rect x="60" y="794" rx="18" width="960" height="150" fill="#fff" stroke="#D6E0EC" stroke-width="2"/><rect x="60" y="794" rx="18" width="16" height="150" fill="#243B6B"/><text x="110" y="842" font-family="Noto Sans CJK KR" font-weight="bold" font-size="36" fill="#243B6B">한도 분산 · <tspan font-weight="normal" font-size="26" fill="#5B6B7C">고금리 한도 작은 상품</tspan></text><text x="110" y="902" font-family="Noto Sans CJK KR" font-size="27" fill="#1a1a1a">여러 통장에 나눠 담아 각 통장 고금리 한도 채우기</text>
<rect x="0" y="1010" width="1080" height="70" fill="#E8EEF5"/><text x="60" y="1050" font-family="Noto Sans CJK KR" font-size="26" fill="#5B6B7C">출처: 은행연합회 소비자포털·각 은행 공시 (2026.6 조사 시점) / 정리: 본 블로그</text></svg>