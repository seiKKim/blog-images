<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <rect width="1080" height="150" fill="#1B5FA6"/>
  <text x="60" y="98" font-family="Malgun Gothic" font-weight="bold" font-size="54" fill="#ffffff">1등급 여부는 ‘라벨’로만 판정</text>

  <!-- 효율등급 라벨 (직접 그린 도형, 실제 사진 아님) -->
  <rect x="110" y="220" width="360" height="400" rx="18" fill="#ffffff" stroke="#cfd8e3" stroke-width="3"/>
  <text x="290" y="270" font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#33485f" text-anchor="middle">에너지소비효율등급</text>
  <!-- 등급 막대 1~5 -->
  <g font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#ffffff">
    <rect x="150" y="300" width="200" height="44" fill="#1F8A53"/><polygon points="350,300 392,322 350,344" fill="#1F8A53"/><text x="170" y="332">1</text>
    <rect x="150" y="350" width="170" height="44" fill="#7FB539"/><polygon points="320,350 362,372 320,394" fill="#7FB539"/><text x="170" y="382">2</text>
    <rect x="150" y="400" width="140" height="44" fill="#F2C200"/><polygon points="290,400 332,422 290,444" fill="#F2C200"/><text x="170" y="432">3</text>
    <rect x="150" y="450" width="110" height="44" fill="#EE8A1E"/><polygon points="260,450 302,472 260,494" fill="#EE8A1E"/><text x="170" y="482">4</text>
    <rect x="150" y="500" width="80" height="44" fill="#E23B3B"/><polygon points="230,500 272,522 230,544" fill="#E23B3B"/><text x="170" y="532">5</text>
  </g>
  <circle cx="410" cy="322" r="30" fill="#1B5FA6"/>
  <text x="410" y="334" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">1</text>
  <text x="290" y="590" font-family="Malgun Gothic" font-size="26" fill="#5B6B7C" text-anchor="middle">※ 이해를 돕기 위한 예시 도식</text>

  <!-- 주의 문구 -->
  <g font-family="Malgun Gothic">
    <text x="560" y="290" font-weight="bold" font-size="38" fill="#1a1a1a">✓ 기기 부착 라벨이 기준</text>
    <text x="560" y="370" font-weight="bold" font-size="38" fill="#1a1a1a">✓ 다른 증빙은 원칙적 불인정</text>
    <text x="560" y="450" font-weight="bold" font-size="38" fill="#1a1a1a">✓ 구매 전 1등급 라벨 확인</text>
  </g>
  <rect x="555" y="500" width="465" height="120" rx="20" fill="#C8423B"/>
  <text x="787" y="552" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#ffffff" text-anchor="middle">최고등급 = 1등급</text>
  <text x="787" y="598" font-family="Malgun Gothic" font-size="32" fill="#ffe5e3" text-anchor="middle">예산 소진 시 조기 마감 주의</text>
</svg>