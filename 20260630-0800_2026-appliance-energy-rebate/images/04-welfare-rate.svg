  <rect x="60" y="200" width="465" height="300" rx="24" fill="#ffffff" stroke="#D6E0EC"/>
  <rect x="60" y="200" width="465" height="80" rx="24" fill="#1B5FA6"/>
  <rect x="60" y="244" width="465" height="36" fill="#1B5FA6"/>
  <text x="292" y="256" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">(가)군</text>
  <text x="292" y="360" font-family="Malgun Gothic" font-weight="bold" font-size="76" fill="#1B5FA6" text-anchor="middle">최대 30%</text>
  <text x="292" y="425" font-family="Malgun Gothic" font-size="29" fill="#5B6B7C" text-anchor="middle">중증장애인·유공자·수급자</text>
  <text x="292" y="465" font-family="Malgun Gothic" font-size="29" fill="#5B6B7C" text-anchor="middle">차상위·복지시설·생명유지장치</text>

  <rect x="555" y="200" width="465" height="300" rx="24" fill="#ffffff" stroke="#D6E0EC"/>
  <rect x="555" y="200" width="465" height="80" rx="24" fill="#5e87b5"/>
  <rect x="555" y="244" width="465" height="36" fill="#5e87b5"/>
