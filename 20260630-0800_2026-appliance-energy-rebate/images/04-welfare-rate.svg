  <text x="787" y="430" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C" text-anchor="middle">다자녀 · 대가족 · 출산가구</text>

  <rect x="60" y="540" width="960" height="140" rx="20" fill="#FFD23F"/>
