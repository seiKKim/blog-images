<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="102" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">2026 아동수당 확대</text>
  <text x="60" y="162" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="36" fill="#CFE0F2">2026.4.24 시행 · 부모급여와 중복 수급 가능</text>

  <!-- 대상 확대 비교 -->
  <rect x="60" y="260" width="450" height="240" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="285" y="330" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#5B6B7C" text-anchor="middle">종전</text>
  <text x="285" y="410" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="58" fill="#8A97A6" text-anchor="middle">만 8세 미만</text>

  <rect x="570" y="260" width="450" height="240" rx="24" fill="#1B5FA6"/>
  <text x="795" y="330" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#CFE0F2" text-anchor="middle">2026년 확대</text>
  <text x="795" y="410" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="58" fill="#FFD23F" text-anchor="middle">만 9세 미만</text>
  <text x="795" y="462" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#CFE0F2" text-anchor="middle">(0~107개월)</text>

  <!-- 화살표 -->
  <text x="540" y="400" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="60" fill="#1B5FA6" text-anchor="middle">→</text>

  <!-- 금액 카드 -->
  <rect x="60" y="540" width="960" height="180" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="100" y="620" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="42" fill="#1a1a1a">기본 지급액</text>
  <text x="980" y="632" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="66" fill="#1B5FA6" text-anchor="end">월 10만원</text>
  <text x="100" y="686" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">비수도권 지역 5천~2만원 추가</text>

  <rect x="60" y="740" width="960" height="180" rx="24" fill="#FFF4D6" stroke="#FFD23F" stroke-width="3"/>
  <text x="100" y="820" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="42" fill="#B26A00">거주지 포함 총액</text>
  <text x="980" y="832" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="60" fill="#E8722C" text-anchor="end">월 10만~13만원</text>
  <text x="100" y="886" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#8A6D2F">지역별 차등 (거주지에 따라 다름)</text>

  <!-- 소급 안내 -->
  <rect x="60" y="960" width="960" height="230" rx="24" fill="#E8F0FA"/>
  <text x="100" y="1040" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#1B5FA6">📌 소급 지급</text>
  <text x="100" y="1102" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#1a1a1a">2017.1~2018.3월생에게 1~3월분 소급 지급</text>
  <text x="100" y="1158" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#1a1a1a">이후 매년 1세씩 상향 예정</text>

  <!-- 하단 출처 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">2026.4.24 시행 기준 · 지역별 추가금액은 거주지에 따라 상이</text>
</svg>
