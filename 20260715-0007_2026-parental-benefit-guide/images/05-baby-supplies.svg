<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <rect width="1080" height="160" fill="#1B5FA6"/>
  <text x="60" y="88" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#ffffff">지원금으로 육아 소모품 실속있게</text>
  <text x="60" y="134" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="32" fill="#CFE0F2">첫만남이용권·부모급여 현금 활용법</text>

  <!-- 카드 1: 기저귀 -->
  <rect x="60" y="210" width="290" height="290" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="150" y="270" width="110" height="80" rx="16" fill="#1B5FA6"/>
  <path d="M150 300 Q205 340 260 300" stroke="#ffffff" stroke-width="6" fill="none"/>
  <text x="205" y="410" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#1a1a1a" text-anchor="middle">기저귀</text>
  <text x="205" y="460" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" fill="#5B6B7C" text-anchor="middle">정기배송</text>

  <!-- 카드 2: 분유 -->
  <rect x="395" y="210" width="290" height="290" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="505" y="262" width="70" height="100" rx="12" fill="#E8722C"/>
  <rect x="518" y="248" width="44" height="24" rx="6" fill="#E8722C"/>
  <text x="540" y="410" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#1a1a1a" text-anchor="middle">분유</text>
  <text x="540" y="460" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" fill="#5B6B7C" text-anchor="middle">대량 확보</text>

  <!-- 카드 3: 물티슈 -->
  <rect x="730" y="210" width="290" height="290" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="820" y="280" width="140" height="80" rx="14" fill="#1F8A53"/>
  <rect x="855" y="272" width="70" height="24" rx="12" fill="#B7E0C8"/>
  <text x="875" y="410" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#1a1a1a" text-anchor="middle">물티슈</text>
  <text x="875" y="460" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" fill="#5B6B7C" text-anchor="middle">정기구독</text>

  <!-- 팁 띠 -->
  <rect x="60" y="540" width="960" height="120" rx="24" fill="#FFF4D6" stroke="#FFD23F" stroke-width="3"/>
  <text x="540" y="592" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="38" fill="#B26A00" text-anchor="middle">첫만남이용권 유효기간 2년 · 온라인쇼핑몰 사용 가능</text>
  <text x="540" y="640" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#8A6D2F" text-anchor="middle">대량·정기구매 전 최신가·낱개당 단가 비교는 필수</text>
</svg>
