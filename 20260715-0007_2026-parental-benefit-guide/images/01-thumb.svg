<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#1B5FA6"/>
  <circle cx="950" cy="180" r="260" fill="#ffffff" opacity="0.08"/>
  <circle cx="120" cy="980" r="200" fill="#ffffff" opacity="0.06"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="88" rx="34" ry="34" width="230" height="68" fill="#FFD23F"/>
  <text x="195" y="134" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="38" fill="#1a1a1a" text-anchor="middle">정부지원금</text>

  <!-- 서브 카피 -->
  <text x="80" y="248" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#E8EEF5">2026 부모급여 총정리</text>

  <!-- 메인 카피 -->
  <text x="80" y="410" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="84" fill="#ffffff">0세 <tspan fill="#FFD23F">월 100만원</tspan></text>
  <text x="80" y="512" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="84" fill="#ffffff">1세 <tspan fill="#FFD23F">월 50만원</tspan></text>

  <!-- 강조 박스: 60일 -->
  <rect x="80" y="576" rx="24" ry="24" width="920" height="196" fill="#ffffff" opacity="0.12"/>
  <text x="112" y="656" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#ffffff">신청 <tspan fill="#FFD23F">60일</tspan> 놓치면</text>
  <text x="112" y="724" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#ffffff">이전 달분 <tspan fill="#FFD23F">소급 불가</tspan></text>

  <!-- 디테일 -->
  <rect x="80" y="812" rx="20" ry="20" width="920" height="112" fill="#FFD23F"/>
  <text x="540" y="884" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#173F6E" text-anchor="middle">소득·재산 무관 · 모든 가정 대상</text>

  <!-- 채널 -->
  <text x="80" y="1006" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#E8EEF5" opacity="0.9">blog.naver.com/trip_chocho</text>
