<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <!-- 상단 색띠 + 제목 -->
  <rect width="1080" height="150" fill="#1B5FA6"/>
  <text x="60" y="98" font-family="Noto Sans CJK KR, Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="54" fill="#ffffff">연말 일정, 이 날짜만 기억하세요</text>

  <!-- 타임라인 -->
  <line x1="140" y1="400" x2="940" y2="400" stroke="#1B5FA6" stroke-width="6"/>
  <g font-family="Noto Sans CJK KR, Noto Sans KR, Malgun Gothic, sans-serif" text-anchor="middle">
    <circle cx="180" cy="400" r="22" fill="#1B5FA6"/>
    <text x="180" y="330" font-size="46" font-weight="bold" fill="#1B5FA6">11.30(월)</text>
    <text x="180" y="465" font-size="32" font-weight="bold" fill="#1a1a1a">카드 발급 마감</text>

    <circle cx="540" cy="400" r="22" fill="#1B5FA6"/>
    <text x="540" y="330" font-size="46" font-weight="bold" fill="#1B5FA6">12월</text>
    <text x="540" y="465" font-size="32" font-weight="bold" fill="#1a1a1a">결제 취소 주의</text>
    <text x="540" y="510" font-size="30" fill="#5B6B7C">환불 3~10영업일</text>

    <circle cx="900" cy="400" r="22" fill="#FFD23F" stroke="#1B5FA6" stroke-width="6"/>
    <text x="900" y="330" font-size="46" font-weight="bold" fill="#1B5FA6">12.31(목)</text>
    <text x="900" y="465" font-size="32" font-weight="bold" fill="#1a1a1a">사용 마감</text>
    <text x="900" y="510" font-size="30" fill="#5B6B7C">잔액 국고 반납</text>
  </g>

  <!-- 경고 박스 -->
  <rect x="60" y="560" width="960" height="90" rx="16" fill="#1B5FA6" opacity="0.10"/>
  <text x="540" y="618" font-family="Noto Sans CJK KR, Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#1a1a1a" text-anchor="middle">12.31까지 환불 미완료 시 지원금 소멸 · 이월 · 환불 불가</text>

  <!-- 출처 -->
  <text x="540" y="695" font-family="Noto Sans CJK KR, Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="28" fill="#5B6B7C" text-anchor="middle">출처: 문화누리카드 누리집(mnuri.kr)</text>
</svg>
