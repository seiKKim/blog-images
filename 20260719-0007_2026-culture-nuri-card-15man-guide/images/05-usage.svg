<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <!-- 상단 색띠 + 제목 -->
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="125" font-family="Noto Sans CJK KR, Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="64" fill="#ffffff">사용처 · 할인 혜택</text>
  <text x="1020" y="125" font-family="Noto Sans CJK KR, Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="38" fill="#FFD23F" text-anchor="end">전국 3만 5천여 가맹점</text>

  <!-- 3개 분야 -->
  <g font-family="Noto Sans CJK KR, Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="60" y="250" width="960" height="210" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="95" y="315" width="120" height="80" rx="14" fill="#1B5FA6"/>
    <text x="155" y="368" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">문화</text>
    <text x="250" y="335" font-size="36" fill="#1a1a1a">도서 · 전자책 / 음반 · 악기 / 영화 · OTT</text>
    <text x="250" y="405" font-size="36" fill="#1a1a1a">공연 · 전시 / 사진 인화 / 공방 · 취미클래스</text>

    <rect x="60" y="480" width="960" height="210" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="95" y="545" width="120" height="80" rx="14" fill="#1B5FA6"/>
    <text x="155" y="598" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">관광</text>
    <text x="250" y="565" font-size="36" fill="#1a1a1a">KTX · SRT · 버스 / 국내 항공 · 렌터카</text>
    <text x="250" y="635" font-size="36" fill="#1a1a1a">국립공원 · 캠핑장 / 테마파크 / 호텔 · 리조트</text>

    <rect x="60" y="710" width="960" height="210" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="95" y="775" width="120" height="80" rx="14" fill="#1B5FA6"/>
    <text x="155" y="828" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">체육</text>
    <text x="250" y="795" font-size="36" fill="#1a1a1a">프로스포츠 · e스포츠 입장권 / 체육용품</text>
    <text x="250" y="865" font-size="36" fill="#1a1a1a">수영 · 헬스 · 요가 · 필라테스 등 체육시설</text>
  </g>

  <!-- 부가 할인 -->
  <text x="60" y="985" font-family="Noto Sans CJK KR, Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1B5FA6">함께 챙길 부가 할인</text>
  <g font-family="Noto Sans CJK KR, Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" font-weight="bold" fill="#1B5FA6">
    <rect x="60" y="1010" width="465" height="110" rx="16" fill="#ffffff" stroke="#1B5FA6" stroke-width="2"/>
    <text x="292" y="1075" text-anchor="middle">영화 관람료 2,500원 할인</text>
    <rect x="555" y="1010" width="465" height="110" rx="16" fill="#ffffff" stroke="#1B5FA6" stroke-width="2"/>
    <text x="787" y="1075" text-anchor="middle">주요 서점 도서 10% 할인</text>
    <rect x="60" y="1135" width="465" height="110" rx="16" fill="#ffffff" stroke="#1B5FA6" stroke-width="2"/>
    <text x="292" y="1200" text-anchor="middle">프로스포츠 최대 40% 할인</text>
    <rect x="555" y="1135" width="465" height="110" rx="16" fill="#ffffff" stroke="#1B5FA6" stroke-width="2"/>
    <text x="787" y="1200" text-anchor="middle">나눔티켓 1인 4매 (월 3회)</text>
  </g>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR, Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">출처: 문화누리카드 누리집(mnuri.kr)</text>
</svg>
