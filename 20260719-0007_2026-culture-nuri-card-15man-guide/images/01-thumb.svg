<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <!-- 배경: 정부지원금 블루 -->
  <rect width="1080" height="1080" fill="#1B5FA6"/>
  <circle cx="950" cy="180" r="260" fill="#ffffff" opacity="0.08"/>
  <circle cx="120" cy="980" r="200" fill="#ffffff" opacity="0.06"/>

  <!-- 카테고리 뱃지 (좌상단) -->
  <rect x="80" y="90" rx="34" ry="34" width="250" height="68" fill="#FFD23F"/>
  <text x="205" y="137" font-family="Noto Sans CJK KR, Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#1a1a1a" text-anchor="middle">정부지원금</text>

  <!-- 일반 카드 그래픽 (직접 그린 도형) -->
  <g transform="rotate(-8 840 265)">
    <rect x="700" y="175" width="280" height="180" rx="20" fill="#FFD23F"/>
    <rect x="728" y="215" width="56" height="42" rx="8" fill="#1B5FA6" opacity="0.85"/>
    <rect x="728" y="292" width="180" height="14" rx="7" fill="#1a1a1a" opacity="0.25"/>
    <rect x="728" y="318" width="120" height="14" rx="7" fill="#1a1a1a" opacity="0.25"/>
  </g>

  <!-- 서브 카피 -->
  <text x="80" y="430" font-family="Noto Sans CJK KR, Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="68" fill="#E8EEF5">2026 문화누리카드</text>

  <!-- 메인 카피 -->
  <text x="80" y="565" font-family="Noto Sans CJK KR, Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="76" fill="#ffffff">1인당 연간</text>
  <text x="72" y="745" font-family="Noto Sans CJK KR, Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="180" fill="#FFD23F">15만 원</text>

  <!-- 디테일 -->
  <rect x="80" y="805" rx="20" ry="20" width="920" height="120" fill="#ffffff" opacity="0.14"/>
  <text x="110" y="882" font-family="Noto Sans CJK KR, Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="48" fill="#ffffff">발급 ~11.30 · 안 쓰면 국고 반납!</text>

  <!-- 채널 표시 -->
  <text x="80" y="1010" font-family="Noto Sans CJK KR, Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="34" fill="#E8EEF5" opacity="0.9">blog.naver.com/trip_chocho</text>
</svg>
