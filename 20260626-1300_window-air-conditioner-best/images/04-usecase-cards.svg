<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FFF3E9"/>
  <rect width="1080" height="190" fill="#E8722C"/>
  <text x="60" y="120" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">용도별 추천 유형 4가지</text>

  <rect x="70" y="250" width="450" height="380" rx="24" fill="#ffffff" stroke="#F0D6C2" stroke-width="2"/><circle cx="128" cy="316" r="36" fill="#E8722C"/><text x="128" y="330" font-family="Malgun Gothic" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">A</text><text x="180" y="330" font-family="Malgun Gothic" font-size="44" font-weight="bold" fill="#1a1a1a">원룸 가성비</text><text x="104" y="415" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">5평형 인버터 1등급</text><text x="104" y="475" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">세로형·자가설치·무배수</text><rect x="104" y="520" width="382" height="78" rx="14" fill="#FFF3E9"/><text x="120" y="572" font-family="Malgun Gothic" font-size="40" font-weight="bold" fill="#E8722C">약 55~65만원</text>
  <rect x="560" y="250" width="450" height="380" rx="24" fill="#ffffff" stroke="#F0D6C2" stroke-width="2"/><circle cx="618" cy="316" r="36" fill="#E8722C"/><text x="618" y="330" font-family="Malgun Gothic" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">B</text><text x="670" y="330" font-family="Malgun Gothic" font-size="44" font-weight="bold" fill="#1a1a1a">침실 저소음</text><text x="594" y="415" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">최저 32~34dB</text><text x="594" y="475" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">저소음/무풍·취침모드</text><rect x="594" y="520" width="382" height="78" rx="14" fill="#FFF3E9"/><text x="610" y="572" font-family="Malgun Gothic" font-size="40" font-weight="bold" fill="#E8722C">약 65~80만원</text>
  <rect x="70" y="680" width="450" height="380" rx="24" fill="#ffffff" stroke="#F0D6C2" stroke-width="2"/><circle cx="128" cy="746" r="36" fill="#E8722C"/><text x="128" y="760" font-family="Malgun Gothic" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">C</text><text x="180" y="760" font-family="Malgun Gothic" font-size="44" font-weight="bold" fill="#1a1a1a">거실 고용량</text><text x="104" y="845" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">6평형 이상 고출력</text><text x="104" y="905" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">듀얼 인버터·강풍량</text><rect x="104" y="950" width="382" height="78" rx="14" fill="#FFF3E9"/><text x="120" y="1002" font-family="Malgun Gothic" font-size="40" font-weight="bold" fill="#E8722C">약 80~92만원+</text>
  <rect x="560" y="680" width="450" height="380" rx="24" fill="#ffffff" stroke="#F0D6C2" stroke-width="2"/><circle cx="618" cy="746" r="36" fill="#E8722C"/><text x="618" y="760" font-family="Malgun Gothic" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">D</text><text x="670" y="760" font-family="Malgun Gothic" font-size="44" font-weight="bold" fill="#1a1a1a">무배수 편의</text><text x="594" y="845" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">자가증발 + 배수호스</text><text x="594" y="905" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">습한 지역·장마 대비</text><rect x="594" y="950" width="382" height="78" rx="14" fill="#FFF3E9"/><text x="610" y="1002" font-family="Malgun Gothic" font-size="40" font-weight="bold" fill="#E8722C">환경따라 호스 권장</text>

  <rect x="0" y="1130" width="1080" height="220" fill="#ffffff"/>
  <text x="60" y="1200" font-family="Malgun Gothic" font-size="38" font-weight="bold" fill="#1a1a1a">한눈 정리</text>
  <text x="60" y="1255" font-family="Malgun Gothic" font-size="34" fill="#1a1a1a">원룸→A · 조용한 침실→B · 넓은방→C(15평+ 일반형) · 장마→D</text>
  <text x="60" y="1305" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C">창문형 단일 제품은 통상 5~6평형이 주력</text>
</svg>