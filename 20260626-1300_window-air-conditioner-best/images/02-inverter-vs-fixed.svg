<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#FFF3E9"/>
  <rect width="1080" height="180" fill="#E8722C"/>
  <text x="60" y="115" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff">인버터 vs 정속형</text>

  <text x="60" y="265" font-family="Malgun Gothic" font-size="40" fill="#5B6B7C">12시간 연속 운전 전기요금 (한 매체 비교)</text>

  <!-- 막대: 인버터 7910 / 정속형 29570 -->
  <g font-family="Malgun Gothic">
    <text x="80" y="360" font-size="48" font-weight="bold" fill="#1a1a1a">인버터</text>
    <rect x="80" y="385" width="240" height="90" rx="14" fill="#E8722C"/>
    <text x="340" y="448" font-size="54" font-weight="bold" fill="#E8722C">약 7,910원</text>

    <text x="80" y="560" font-size="48" font-weight="bold" fill="#1a1a1a">정속형</text>
    <rect x="80" y="585" width="860" height="90" rx="14" fill="#9aa5b1"/>
    <text x="80" y="648" font-size="54" font-weight="bold" fill="#ffffff" dx="20">약 29,570원</text>
  </g>

  <rect x="60" y="730" width="960" height="240" rx="20" fill="#ffffff" stroke="#F0D6C2"/>
  <text x="90" y="800" font-family="Malgun Gothic" font-size="42" font-weight="bold" fill="#1a1a1a">절약 정답이 반대!</text>
  <text x="90" y="865" font-family="Malgun Gothic" font-size="38" fill="#1a1a1a">· 인버터 → 계속 켜두기 (껐다 켜기보다 약 35%↓)</text>
  <text x="90" y="925" font-family="Malgun Gothic" font-size="38" fill="#1a1a1a">· 정속형 → 빠르게 냉방 후 끄기(단속 운전)</text>

  <rect x="0" y="1000" width="1080" height="80" fill="#F0E0D2"/>
  <text x="60" y="1052" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">2026년 표준 = 인버터 + 에너지효율 1등급</text>
</svg>