<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0B3B57"/>
      <stop offset="1" stop-color="#0E5C79"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="#EEF7FA"/>

  <!-- 상단 띠 -->
  <rect width="1080" height="210" fill="url(#top)"/>
  <rect x="60" y="72" rx="30" ry="30" width="180" height="60" fill="#3FD9C9"/>
  <text x="150" y="114" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="34" fill="#083041" text-anchor="middle">생활꿀팁</text>
  <text x="270" y="120" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">열대야란?</text>
  <text x="60" y="180" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#BFE6EC">기상청 공식 기준으로 정리</text>

  <!-- 핵심 25도 카드 -->
  <rect x="60" y="270" width="960" height="340" rx="24" fill="#ffffff" stroke="#CFE3EA"/>
  <text x="100" y="358" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#0B3B57">열대야일 = 밤최저기온</text>
  <text x="100" y="510" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="146" fill="#E8722C">25℃ 이상</text>
  <text x="100" y="575" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="40" fill="#5B6B7C">잠들기 힘들어지는 '수면 한계기온'</text>

  <!-- 측정 시간대 -->
  <rect x="60" y="640" width="960" height="200" rx="24" fill="#ffffff" stroke="#CFE3EA"/>
  <text x="100" y="720" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#0B3B57">측정 시간대</text>
  <text x="100" y="800" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="72" fill="#0E5C79">18:01 ~ 익일 09:00</text>

  <!-- 초열대야 -->
  <rect x="60" y="880" width="960" height="200" rx="24" fill="#0B3B57"/>
  <text x="100" y="960" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#3FD9C9">초열대야</text>
  <text x="100" y="1040" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="72" fill="#ffffff">밤최저기온 <tspan fill="#FFD23F">30℃ 이상</tspan></text>

  <!-- 참고 문구 -->
  <text x="60" y="1170" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="36" fill="#5B6B7C">※ 초열대야는 정식 용어라기보다 통용되는 표현입니다.</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#DCEFF6"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#4B6472">출처: 기상청 기준</text>
</svg>
