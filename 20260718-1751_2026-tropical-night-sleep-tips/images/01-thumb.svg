<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B3B57"/>
      <stop offset="1" stop-color="#093046"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3FD9C9"/>
      <stop offset="1" stop-color="#59E6C4"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- 쿨링 장식 -->
  <circle cx="930" cy="170" r="270" fill="#3FD9C9" opacity="0.10"/>
  <circle cx="150" cy="960" r="220" fill="#3FD9C9" opacity="0.08"/>
  <circle cx="900" cy="900" r="140" fill="#59E6C4" opacity="0.07"/>
  <!-- 달 -->
  <circle cx="905" cy="230" r="70" fill="#EAF7F3" opacity="0.9"/>
  <circle cx="880" cy="210" r="70" fill="#0B3B57"/>

  <!-- 카테고리 뱃지 -->
  <rect x="72" y="88" rx="34" ry="34" width="220" height="68" fill="url(#mint)"/>
  <text x="182" y="134" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="38" fill="#083041" text-anchor="middle">생활꿀팁</text>

  <!-- 서브 카피 -->
  <text x="76" y="290" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#DCEFF6">2026 열대야 숙면 꿀팁</text>
  <text x="76" y="356" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="44" fill="#3FD9C9">뜨거운 밤, 잠 잘 자는 법</text>

  <!-- 메인 카피 -->
  <text x="76" y="510" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="112" fill="#ffffff">침실 <tspan fill="#FFD23F">24~26℃</tspan></text>
  <text x="76" y="640" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="112" fill="#ffffff">취침 <tspan fill="#FFD23F">2~3시간 전</tspan></text>
  <text x="76" y="748" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="88" fill="#ffffff">미지근한 물 샤워</text>

  <!-- 디테일 박스 -->
  <rect x="76" y="812" rx="22" ry="22" width="928" height="128" fill="#ffffff" opacity="0.12"/>
  <text x="112" y="866" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff">열대야 = 밤 최저기온 <tspan fill="#FFD23F">25℃ 이상</tspan></text>
  <text x="112" y="918" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="38" fill="#DCEFF6">에어컨·타이머·환기까지 총정리</text>

  <!-- 채널 -->
  <text x="76" y="1012" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="32" fill="#9FC7D6">blog.naver.com/trip_chocho</text>
</svg>
