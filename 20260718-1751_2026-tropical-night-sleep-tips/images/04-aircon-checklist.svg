<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="top4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0B3B57"/>
      <stop offset="1" stop-color="#0E5C79"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="#EEF7FA"/>

  <rect width="1080" height="210" fill="url(#top4)"/>
  <rect x="60" y="72" rx="30" ry="30" width="180" height="60" fill="#3FD9C9"/>
  <text x="150" y="114" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="34" fill="#083041" text-anchor="middle">생활꿀팁</text>
  <text x="270" y="120" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#ffffff">에어컨 안전 사용</text>
  <text x="60" y="180" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#BFE6EC">냉방병·건조 예방 체크리스트</text>

  <!-- 체크 행들 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- row1 -->
    <rect x="60" y="280" width="960" height="160" rx="20" fill="#ffffff" stroke="#CFE3EA"/>
    <circle cx="140" cy="360" r="34" fill="#3FD9C9"/>
    <path d="M124 360 l12 14 l24 -28" stroke="#083041" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="210" y="345" font-weight="bold" font-size="44" fill="#0B3B57">취침 온도 <tspan fill="#E8722C">25~27℃</tspan></text>
    <text x="210" y="400" font-weight="normal" font-size="34" fill="#5B6B7C">너무 낮게 틀지 않기</text>

    <!-- row2 -->
    <rect x="60" y="460" width="960" height="160" rx="20" fill="#ffffff" stroke="#CFE3EA"/>
    <circle cx="140" cy="540" r="34" fill="#3FD9C9"/>
    <path d="M124 540 l12 14 l24 -28" stroke="#083041" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="210" y="525" font-weight="bold" font-size="44" fill="#0B3B57">타이머(취침예약) 활용</text>
    <text x="210" y="580" font-weight="normal" font-size="34" fill="#5B6B7C">밤새 켜두면 새벽에 깰 수 있어요</text>

    <!-- row3 -->
    <rect x="60" y="640" width="960" height="160" rx="20" fill="#ffffff" stroke="#CFE3EA"/>
    <circle cx="140" cy="720" r="34" fill="#3FD9C9"/>
    <path d="M124 720 l12 14 l24 -28" stroke="#083041" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="210" y="705" font-weight="bold" font-size="44" fill="#0B3B57"><tspan fill="#E8722C">2~4시간</tspan>마다 환기</text>
    <text x="210" y="760" font-weight="normal" font-size="34" fill="#5B6B7C">실내 공기 순환으로 냉방병 예방</text>

    <!-- row4 -->
    <rect x="60" y="820" width="960" height="160" rx="20" fill="#ffffff" stroke="#CFE3EA"/>
    <circle cx="140" cy="900" r="34" fill="#3FD9C9"/>
    <path d="M124 900 l12 14 l24 -28" stroke="#083041" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="210" y="885" font-weight="bold" font-size="44" fill="#0B3B57">필터 <tspan fill="#E8722C">2주에 한 번</tspan> 청소</text>
    <text x="210" y="940" font-weight="normal" font-size="34" fill="#5B6B7C">먼지·곰팡이 관리</text>

    <!-- row5 -->
    <rect x="60" y="1000" width="960" height="160" rx="20" fill="#0B3B57"/>
    <circle cx="140" cy="1080" r="34" fill="#FFD23F"/>
    <path d="M124 1080 l12 14 l24 -28" stroke="#083041" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="210" y="1065" font-weight="bold" font-size="44" fill="#ffffff">끄기 전 송풍 <tspan fill="#FFD23F">10~20분</tspan></text>
    <text x="210" y="1120" font-weight="normal" font-size="34" fill="#BFE6EC">내부 습기 말려 냄새 예방</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#DCEFF6"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#4B6472">출처: 전문의 권고 정리</text>
</svg>
