<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FFF6EF"/>
  <rect width="1080" height="210" fill="#E23B3B"/>
  <rect x="64" y="70" rx="28" ry="28" width="190" height="58" fill="#FFD23F"/>
  <text x="159" y="110" font-family="Malgun Gothic" font-weight="bold" font-size="32" fill="#7a3a10" text-anchor="middle">생활꿀팁</text>
  <text x="64" y="185" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#ffffff">어린이·반려동물 차량 방치 금지</text>

  <!-- 큰 경고 숫자 -->
  <rect x="64" y="280" width="952" height="240" rx="22" fill="#ffffff" stroke="#F0C4C4"/>
  <text x="540" y="380" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#333" text-anchor="middle">외기 33℃인 날, 차 안은</text>
  <text x="540" y="490" font-family="Malgun Gothic" font-weight="bold" font-size="96" fill="#E23B3B" text-anchor="middle">5분 만에 40℃</text>

  <!-- 슬리핑 차일드 체크 -->
  <rect x="64" y="550" width="952" height="230" rx="22" fill="#ffffff" stroke="#F0D6C4"/>
  <circle cx="180" cy="665" r="66" fill="#E8722C"/>
  <text x="180" y="680" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#fff" text-anchor="middle">CHECK</text>
  <text x="290" y="640" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#333">슬리핑 차일드 체크</text>
  <text x="290" y="700" font-family="Malgun Gothic" font-size="36" fill="#666">시동 끈 뒤 맨 뒷좌석 버튼을</text>
  <text x="290" y="746" font-family="Malgun Gothic" font-size="36" fill="#666">눌러 뒷좌석을 반드시 확인</text>

  <!-- 반려동물 -->
  <rect x="64" y="810" width="952" height="200" rx="22" fill="#ffffff" stroke="#F0D6C4"/>
  <text x="100" y="880" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#333">반려동물도 마찬가지</text>
  <text x="100" y="940" font-family="Malgun Gothic" font-size="36" fill="#666">땀샘이 거의 없어 열사병 위험 큼.</text>
  <text x="100" y="986" font-family="Malgun Gothic" font-size="36" fill="#666">창문 조금 열어도 안전하지 않음.</text>

  <!-- 사고 사례 -->
  <rect x="64" y="1040" width="952" height="190" rx="18" fill="#FFD23F"/>
  <text x="540" y="1110" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#7a3a10" text-anchor="middle">2021년 6월 경북 구미</text>
  <text x="540" y="1170" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#7a3a10" text-anchor="middle">3세 아동 방치, 차 안 약 60℃</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#F3E2D6"/>
  <text x="64" y="1322" font-family="Malgun Gothic" font-size="32" fill="#8a6a55">잠깐이라도 혼자 두지 마세요</text>
</svg>
