<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#E8722C"/>
  <!-- 장식 -->
  <circle cx="960" cy="170" r="280" fill="#ffffff" opacity="0.08"/>
  <circle cx="120" cy="980" r="220" fill="#ffffff" opacity="0.06"/>
  <circle cx="900" cy="900" r="150" fill="#FFD23F" opacity="0.10"/>

  <!-- 카테고리 뱃지 -->
  <rect x="64" y="80" rx="34" ry="34" width="220" height="68" fill="#FFD23F"/>
  <text x="174" y="126" font-family="Malgun Gothic" font-weight="bold"
        font-size="38" fill="#7a3a10" text-anchor="middle">생활꿀팁</text>

  <!-- 서브 카피 -->
  <text x="64" y="300" font-family="Malgun Gothic" font-weight="bold"
        font-size="56" fill="#FFE9D6">뙤약볕 주차, 문 열자마자 찜통</text>

  <!-- 메인 카피 -->
  <text x="64" y="470" font-family="Malgun Gothic" font-weight="bold"
        font-size="120" fill="#ffffff">차 안 최대</text>
  <text x="64" y="660" font-family="Malgun Gothic" font-weight="bold"
        font-size="220" fill="#FFD23F">90℃</text>
  <text x="64" y="770" font-family="Malgun Gothic" font-weight="bold"
        font-size="86" fill="#ffffff">1분 만에 식히는 법</text>

  <!-- 디테일 박스 -->
  <rect x="64" y="838" rx="20" ry="20" width="952" height="122" fill="#ffffff" opacity="0.15"/>
  <text x="92" y="893" font-family="Malgun Gothic" font-weight="bold"
        font-size="44" fill="#ffffff">창문 열고 문 3회 여닫기</text>
  <text x="92" y="943" font-family="Malgun Gothic" font-weight="bold"
        font-size="44" fill="#FFD23F">→ 에어컨 외기 → 내기</text>

  <!-- 채널 -->
  <text x="64" y="1016" font-family="Malgun Gothic" font-weight="normal"
        font-size="34" fill="#FFE9D6" opacity="0.95">blog.naver.com/trip_chocho</text>
