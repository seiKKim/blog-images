<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FFF6EF"/>
  <rect width="1080" height="210" fill="#E8722C"/>
  <rect x="64" y="70" rx="28" ry="28" width="190" height="58" fill="#FFD23F"/>
  <text x="159" y="110" font-family="Malgun Gothic" font-weight="bold" font-size="32" fill="#7a3a10" text-anchor="middle">생활꿀팁</text>
  <text x="64" y="185" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff">뜨거운 공기 빼는 문 펌핑</text>

  <!-- 자동차 위에서 본 그림 -->
  <g transform="translate(0,0)">
    <rect x="290" y="300" width="500" height="360" rx="60" fill="#ffffff" stroke="#E8722C" stroke-width="6"/>
    <!-- 앞유리 -->
    <path d="M330 360 L750 360 L710 430 L370 430 Z" fill="#FFE0C8"/>
    <!-- 좌석 표시 -->
    <rect x="360" y="470" width="140" height="140" rx="18" fill="#F3E2D6"/>
    <rect x="580" y="470" width="140" height="140" rx="18" fill="#F3E2D6"/>
    <!-- 조수석 창 열림(왼쪽) -->
    <rect x="270" y="470" width="22" height="140" rx="8" fill="#3FA9C9"/>
    <text x="180" y="440" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#3FA9C9">조수석 창</text>
    <text x="180" y="480" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#3FA9C9">열어두기</text>
    <!-- 운전석 문 여닫기(오른쪽) -->
    <path d="M788 470 q120 20 120 90 q0 70 -120 90" fill="none" stroke="#E8722C" stroke-width="10" stroke-dasharray="14 12"/>
    <polygon points="905,545 930,560 905,590" fill="#E8722C"/>
    <text x="820" y="700" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#E8722C">운전석 문</text>
    <text x="820" y="740" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#E8722C">3회 여닫기</text>
    <!-- 열기 배출 화살표 -->
    <text x="150" y="600" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#E23B3B">↞</text>
    <text x="80" y="560" font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#E23B3B">더운 공기</text>
  </g>

  <!-- 순서 카드 -->
  <rect x="64" y="820" width="952" height="120" rx="18" fill="#ffffff" stroke="#F0D6C4"/>
  <circle cx="130" cy="880" r="34" fill="#E8722C"/>
  <text x="130" y="896" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#fff" text-anchor="middle">1</text>
  <text x="190" y="896" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#333">조수석 창문을 연다</text>

  <rect x="64" y="960" width="952" height="120" rx="18" fill="#ffffff" stroke="#F0D6C4"/>
  <circle cx="130" cy="1020" r="34" fill="#E8722C"/>
  <text x="130" y="1036" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#fff" text-anchor="middle">2</text>
  <text x="190" y="1036" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#333">운전석 문을 3회 여닫는다</text>

  <!-- 핵심 강조 -->
  <rect x="64" y="1120" width="952" height="110" rx="18" fill="#FFD23F"/>
  <text x="540" y="1188" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#7a3a10" text-anchor="middle">문 3회 여닫기 = 실내 공기 5℃ ↓</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#F3E2D6"/>
  <text x="64" y="1322" font-family="Malgun Gothic" font-size="32" fill="#8a6a55">출처: 한국교통안전공단(TS) 실험</text>
</svg>
