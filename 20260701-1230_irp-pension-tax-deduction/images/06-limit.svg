<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <rect width="1080" height="150" fill="#243B6B"/>
  <text x="60" y="97" font-family="Malgun Gothic" font-weight="bold" font-size="54" fill="#ffffff">연금 수령, 이 선을 지키세요</text>

  <!-- 기준선 라벨 -->
  <text x="540" y="255" font-family="Malgun Gothic" font-weight="bold" font-size="50" fill="#1a1a1a" text-anchor="middle">사적연금 연 수령액 기준</text>
  <text x="540" y="335" font-family="Malgun Gothic" font-weight="bold" font-size="88" fill="#243B6B" text-anchor="middle">연 1,500만원</text>

  <!-- 이하 박스 -->
  <rect x="60" y="410" rx="20" width="460" height="230" fill="#1F8A53"/>
  <text x="290" y="480" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#ffffff" text-anchor="middle">1,500만원 이하</text>
  <text x="290" y="555" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#FFD23F" text-anchor="middle">저율 분리과세</text>
  <text x="290" y="610" font-family="Malgun Gothic" font-size="38" fill="#E8EEF5" text-anchor="middle">3.3 ~ 5.5%</text>

  <!-- 초과 박스 -->
  <rect x="560" y="410" rx="20" width="460" height="230" fill="#E23B3B"/>
  <text x="790" y="480" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#ffffff" text-anchor="middle">1,500만원 초과</text>
  <text x="790" y="555" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#ffffff" text-anchor="middle">종합과세 또는</text>
  <text x="790" y="610" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#ffffff" text-anchor="middle">16.5% 분리과세</text>

  <text x="60" y="695" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C">※ 연금저축+IRP 등 사적연금 합산 기준 · 경계를 넘기면 세 부담이 크게 늘어요</text>
</svg>
