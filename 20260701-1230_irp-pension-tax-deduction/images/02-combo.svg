<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <rect width="1080" height="150" fill="#243B6B"/>
  <text x="60" y="97" font-family="Malgun Gothic" font-weight="bold" font-size="54" fill="#ffffff">실무 최다 조합 · 900만원 채우기</text>

  <!-- 연금저축 박스 -->
  <rect x="60" y="240" rx="20" width="380" height="220" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="250" y="315" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#243B6B" text-anchor="middle">연금저축</text>
  <text x="250" y="400" font-family="Malgun Gothic" font-weight="bold" font-size="72" fill="#1a1a1a" text-anchor="middle">600만원</text>

  <!-- + -->
  <text x="490" y="375" font-family="Malgun Gothic" font-weight="bold" font-size="80" fill="#8A97A8" text-anchor="middle">+</text>

  <!-- IRP 박스 -->
  <rect x="540" y="240" rx="20" width="380" height="220" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="730" y="315" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#243B6B" text-anchor="middle">IRP</text>
  <text x="730" y="400" font-family="Malgun Gothic" font-weight="bold" font-size="72" fill="#1a1a1a" text-anchor="middle">300만원</text>

  <!-- = 결과 띠 -->
  <rect x="60" y="510" rx="20" width="960" height="130" fill="#243B6B"/>
  <text x="130" y="595" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#ffffff">합산 세액공제 한도</text>
  <text x="990" y="595" font-family="Malgun Gothic" font-weight="bold" font-size="72" fill="#FFD23F" text-anchor="end">900만원</text>

  <text x="60" y="695" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C">※ 연금저축은 단독 600만원까지만 공제 · IRP는 단독 900만원까지 가능</text>
</svg>
