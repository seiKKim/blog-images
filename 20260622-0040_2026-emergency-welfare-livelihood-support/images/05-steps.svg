<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="125" font-family="Noto Sans CJK KR" font-weight="bold" font-size="60" fill="#ffffff">신청 4단계</text>
  <g font-family="Noto Sans CJK KR" fill="#1a1a1a">
    <circle cx="120" cy="345" r="46" fill="#1B5FA6"/>
    <text x="120" y="362" font-size="50" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
    <text x="200" y="335" font-size="50" font-weight="bold">신청</text>
    <text x="200" y="395" font-size="40" fill="#5B6B7C">주민센터 방문 또는 129 전화</text>

    <circle cx="120" cy="555" r="46" fill="#1B5FA6"/>
    <text x="120" y="572" font-size="50" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
    <text x="200" y="545" font-size="50" font-weight="bold">현장 확인</text>
    <text x="200" y="605" font-size="40" fill="#5B6B7C">공무원 방문, 위기 인정 시 즉시 결정</text>

    <circle cx="120" cy="765" r="46" fill="#1B5FA6"/>
    <text x="120" y="782" font-size="50" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
    <text x="200" y="755" font-size="50" font-weight="bold">지원 실시</text>
    <text x="200" y="815" font-size="40" fill="#5B6B7C">생계비 현금·의료·주거 지원</text>

    <circle cx="120" cy="975" r="46" fill="#1B5FA6"/>
    <text x="120" y="992" font-size="50" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
    <text x="200" y="965" font-size="50" font-weight="bold">사후 확인</text>
    <text x="200" y="1025" font-size="40" fill="#5B6B7C">소득·재산 확인 (선지원 후확인)</text>
  </g>
  <rect x="60" y="1110" width="960" height="110" rx="16" fill="#FFF6D6" stroke="#FFD23F" stroke-width="3"/>
  <text x="540" y="1178" font-family="Noto Sans CJK KR" font-size="46" font-weight="bold" fill="#1a1a1a" text-anchor="middle">긴급하면? 전화 한 통 ☎ 129</text>
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="32" fill="#5B6B7C">출처: 보건복지부 · 복지로</text>
</svg>
