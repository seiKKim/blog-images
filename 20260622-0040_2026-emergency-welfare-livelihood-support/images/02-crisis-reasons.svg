<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="125" font-family="Noto Sans CJK KR" font-weight="bold" font-size="60" fill="#ffffff">위기 사유 8가지 (하나면 신청)</text>
  <g font-family="Noto Sans CJK KR" font-size="44" fill="#1a1a1a" font-weight="bold">
    <rect x="60" y="270" width="960" height="115" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="342">① 주소득자 사망·가출·구금</text>
    <rect x="60" y="400" width="960" height="115" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="472">② 중한 질병 또는 부상</text>
    <rect x="60" y="530" width="960" height="115" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="602">③ 방임·유기·학대 피해</text>
    <rect x="60" y="660" width="960" height="115" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="732">④ 가정폭력·성폭력 피해</text>
    <rect x="60" y="790" width="960" height="115" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="862">⑤ 화재·자연재해</text>
    <rect x="60" y="920" width="960" height="115" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="992">⑥ 휴업·폐업으로 영업 곤란</text>
    <rect x="60" y="1050" width="960" height="115" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="1122">⑦ 실직으로 소득 상실</text>
  </g>
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="32" fill="#5B6B7C">⑧ 그 밖에 보건복지부 장관이 정하는 위기 사유 · 출처: 보건복지부</text>
</svg>
