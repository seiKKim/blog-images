<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1F8A53"/>
      <stop offset="1" stop-color="#166B41"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="960" cy="180" r="270" fill="#ffffff" opacity="0.07"/>
  <circle cx="120" cy="980" r="210" fill="#ffffff" opacity="0.06"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="88" rx="34" ry="34" width="188" height="68" fill="#FFD23F"/>
  <text x="174" y="134" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
