<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1F8A53"/>
  <rect x="60" y="86" rx="30" ry="30" width="150" height="60" fill="#FFD23F"/>
  <text x="135" y="127" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="34" fill="#153a26" text-anchor="middle">조회</text>
  <text x="240" y="130" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">고지서 없어도 조회·납부</text>

  <!-- 안내 -->
  <text x="60" y="300" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#1a1a1a">고지서를 못 받았거나 잃어버렸다면?</text>

  <!-- 모의 조회 카드 -->
  <rect x="60" y="360" width="960" height="620" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="60" y="360" width="960" height="96" rx="24" fill="#166B41"/>
  <rect x="60" y="420" width="960" height="36" fill="#166B41"/>
  <text x="100" y="422" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#ffffff">위택스 · 지방세 납부 내역</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <text x="100" y="540" font-size="42" fill="#5B6B7C">세목</text>
    <text x="1000" y="540" font-size="42" font-weight="bold" fill="#1a1a1a" text-anchor="end">재산세(주택분 1기)</text>
    <line x1="100" y1="575" x2="980" y2="575" stroke="#E3E9F1" stroke-width="2"/>

    <text x="100" y="650" font-size="42" fill="#5B6B7C">납부기한</text>
    <text x="1000" y="650" font-size="42" font-weight="bold" fill="#E23B3B" text-anchor="end">2026. 7. 31.</text>
    <line x1="100" y1="685" x2="980" y2="685" stroke="#E3E9F1" stroke-width="2"/>

    <text x="100" y="760" font-size="42" fill="#5B6B7C">납부상태</text>
    <text x="1000" y="760" font-size="42" font-weight="bold" fill="#1a1a1a" text-anchor="end">미납</text>
  </g>

  <rect x="100" y="830" width="880" height="110" rx="18" fill="#1F8A53"/>
  <text x="540" y="900" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff" text-anchor="middle">카드로 납부하기</text>

  <!-- 채널 안내 -->
  <text x="60" y="1070" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#1a1a1a">위택스(wetax.go.kr) 또는 서울시 이택스에서</text>
  <text x="60" y="1130" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#1a1a1a">바로 조회하고 납부할 수 있습니다.</text>
  <text x="60" y="1200" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="36" fill="#5B6B7C">카카오·네이버·PASS 간편인증 로그인 지원</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">화면은 이해를 돕기 위한 예시 · 본문 정리</text>
</svg>
