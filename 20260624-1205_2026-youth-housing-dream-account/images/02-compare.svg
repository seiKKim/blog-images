  <rect x="0" y="1010" width="1080" height="70" fill="#E8EEF5"/>
  <text x="60" y="1056" font-family="Noto Sans CJK KR" font-size="30" fill="#5B6B7C">출처: 주택도시기금(상품기준일 2026.1.1)</text>
