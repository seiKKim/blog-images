<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#F4F7FB"/>
  <rect width="1080" height="180" fill="#243B6B"/>
  <text x="60" y="115" font-family="Noto Sans CJK KR" font-weight="bold" font-size="58" fill="#ffffff">일반 청약 vs 청년 주택드림</text>
  <g font-family="Noto Sans CJK KR">
    <rect x="60" y="240" width="470" height="760" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <rect x="60" y="240" width="470" height="92" rx="20" fill="#9AA8BD"/>
    <text x="295" y="302" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle">일반 주택청약</text>
    <text x="90" y="430" font-size="36" fill="#1a1a1a">청약 기능</text><text x="500" y="430" font-size="36" font-weight="bold" fill="#1a1a1a" text-anchor="end">있음</text>
    <text x="90" y="540" font-size="36" fill="#1a1a1a">2년+ 금리</text><text x="500" y="540" font-size="44" font-weight="bold" fill="#5B6B7C" text-anchor="end">연 3.1%</text>
    <text x="90" y="650" font-size="36" fill="#1a1a1a">월 한도</text><text x="500" y="650" font-size="36" font-weight="bold" fill="#1a1a1a" text-anchor="end">동일</text>
    <text x="90" y="760" font-size="36" fill="#1a1a1a">비과세</text><text x="500" y="760" font-size="36" font-weight="bold" fill="#5B6B7C" text-anchor="end">없음</text>
    <text x="90" y="870" font-size="36" fill="#1a1a1a">대출 연계</text><text x="500" y="870" font-size="36" font-weight="bold" fill="#5B6B7C" text-anchor="end">없음</text>

    <rect x="550" y="240" width="470" height="760" rx="20" fill="#ffffff" stroke="#FFD23F" stroke-width="4"/>
    <rect x="550" y="240" width="470" height="92" rx="20" fill="#243B6B"/>
    <text x="785" y="302" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle">청년 주택드림</text>
    <text x="580" y="430" font-size="36" fill="#1a1a1a">청약 기능</text><text x="990" y="430" font-size="36" font-weight="bold" fill="#1a1a1a" text-anchor="end">동일</text>
    <text x="580" y="540" font-size="36" fill="#1a1a1a">2년+ 금리</text><text x="990" y="540" font-size="46" font-weight="bold" fill="#243B6B" text-anchor="end">연 4.5%</text>
    <text x="580" y="650" font-size="36" fill="#1a1a1a">월 한도</text><text x="990" y="650" font-size="36" font-weight="bold" fill="#1a1a1a" text-anchor="end">100만원</text>
    <text x="580" y="760" font-size="36" fill="#1a1a1a">비과세</text><text x="990" y="760" font-size="36" font-weight="bold" fill="#243B6B" text-anchor="end">최대 500만</text>
    <text x="580" y="870" font-size="36" fill="#1a1a1a">대출 연계</text><text x="990" y="870" font-size="36" font-weight="bold" fill="#243B6B" text-anchor="end">가능</text>
