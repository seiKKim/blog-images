  <!-- 삼복 날짜 3칸 카드 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="80" y="628" rx="22" width="290" height="188" fill="#ffffff" opacity="0.16"/>
    <rect x="395" y="628" rx="22" width="290" height="188" fill="#FFD23F"/>
