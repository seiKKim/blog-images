  <!-- 카테고리 뱃지 -->
  <rect x="80" y="86" rx="34" ry="34" width="250" height="68" fill="#FFD23F"/>
  <text x="205" y="132" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
