      <stop offset="0" stop-color="#D8531F"/>
      <stop offset="1" stop-color="#A8330F"/>
    </linearGradient>
    <linearGradient id="bowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6EEDD"/>
      <stop offset="1" stop-color="#E6D6B4"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="950" cy="170" r="270" fill="#ffffff" opacity="0.08"/>
