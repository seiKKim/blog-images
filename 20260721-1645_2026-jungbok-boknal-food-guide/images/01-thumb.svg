    <text x="225" y="692" font-size="40" font-weight="bold" fill="#FFE9C7" text-anchor="middle">초복</text>
    <text x="225" y="770" font-size="62" font-weight="800" fill="#ffffff" text-anchor="middle">7/15</text>
    <text x="540" y="692" font-size="40" font-weight="bold" fill="#8A2A0C" text-anchor="middle">중복</text>
