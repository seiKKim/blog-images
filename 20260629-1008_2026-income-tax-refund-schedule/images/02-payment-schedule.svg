<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1F8A53"/>
  <text x="60" y="125" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff">환급금 지급 시기</text>

  <g font-family="Malgun Gothic">
    <!-- 소득세 -->
    <rect x="60" y="270" width="960" height="180" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="345" font-size="46" font-weight="bold" fill="#1a1a1a">소득세 (국세)</text>
    <text x="100" y="410" font-size="34" fill="#5B6B7C">관할 세무서 지급</text>
    <text x="1000" y="378" font-size="52" font-weight="bold" fill="#1F8A53" text-anchor="end">6월말~7월초</text>

    <!-- 지방소득세 -->
    <rect x="60" y="470" width="960" height="180" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="545" font-size="46" font-weight="bold" fill="#1a1a1a">지방소득세</text>
    <text x="100" y="610" font-size="34" fill="#5B6B7C">시·군·구청 지급</text>
    <text x="1000" y="578" font-size="48" font-weight="bold" fill="#1F8A53" text-anchor="end">국세 후 약 4주 내</text>
  </g>

  <!-- 안내 박스 -->
  <rect x="60" y="710" width="960" height="230" rx="18" fill="#E6F4EC"/>
  <text x="100" y="785" font-family="Malgun Gothic" font-size="40" font-weight="bold" fill="#1F8A53">정기신고(기한 내) 기준</text>
  <text x="100" y="850" font-family="Malgun Gothic" font-size="36" fill="#33414F">신고서에 입력한 본인 계좌로 자동 입금</text>
  <text x="100" y="905" font-family="Malgun Gothic" font-size="36" fill="#33414F">기한 후 신고·경정청구는 더 늦어질 수 있어요</text>

  <!-- 주의 -->
  <text x="60" y="1030" font-family="Malgun Gothic" font-size="34" fill="#8A6D1A">※ '6월 24일 입금' 등 특정 날짜는 비공식 추정이에요.</text>
  <text x="60" y="1085" font-family="Malgun Gothic" font-size="34" fill="#8A6D1A">   공식 표현은 '6월 말~7월 초'입니다.</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">출처: 국세청 국세상담센터(126)</text>
</svg>
