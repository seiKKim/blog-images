<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#2B2F36"/>
  <text x="60" y="125" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">국세청 사칭 주의</text>
  <text x="980" y="125" font-family="Malgun Gothic" font-weight="bold" font-size="80" fill="#E23B3B" text-anchor="end">!</text>

  <!-- 핵심 원칙 -->
  <rect x="60" y="270" width="960" height="220" rx="18" fill="#FBEAEA"/>
  <text x="100" y="350" font-family="Malgun Gothic" font-size="42" font-weight="bold" fill="#E23B3B">국세청은 절대 이렇게 안 합니다</text>
  <text x="100" y="415" font-family="Malgun Gothic" font-size="36" fill="#33414F">메일·문자로 아이디/비밀번호 요구 ✕</text>
  <text x="100" y="465" font-family="Malgun Gothic" font-size="36" fill="#33414F">환급 빌미로 금전·계좌이체 요구 ✕</text>

  <g font-family="Malgun Gothic">
    <text x="60" y="585" font-size="40" font-weight="bold" fill="#1a1a1a">이렇게 대응하세요</text>

    <circle cx="95" cy="665" r="12" fill="#1F8A53"/>
    <text x="130" y="680" font-size="40" fill="#33414F">문자 속 링크·첨부파일 클릭 금지</text>

    <circle cx="95" cy="745" r="12" fill="#1F8A53"/>
    <text x="130" y="760" font-size="40" fill="#33414F">의심 전화는 끊고 126으로 직접 확인</text>

    <circle cx="95" cy="825" r="12" fill="#1F8A53"/>
    <text x="130" y="840" font-size="40" fill="#33414F">피해 발생 시 경찰 112(또는 182) 신고</text>

    <circle cx="95" cy="905" r="12" fill="#1F8A53"/>
    <text x="130" y="920" font-size="40" fill="#33414F">조회는 공식 채널에서만</text>
  </g>

  <!-- 공식채널 박스 -->
  <rect x="60" y="980" width="960" height="160" rx="18" fill="#E6F4EC"/>
  <text x="100" y="1052" font-family="Malgun Gothic" font-size="38" font-weight="bold" fill="#1F8A53">공식 채널</text>
  <text x="100" y="1108" font-family="Malgun Gothic" font-size="36" fill="#33414F">hometax.go.kr · 손택스 앱 · 정부24</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">출처: 국세청 · 경찰청 안내</text>
</svg>
