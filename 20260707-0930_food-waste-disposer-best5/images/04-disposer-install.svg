<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
<rect width="1080" height="720" fill="#F1F8FA"/>
<rect width="1080" height="120" fill="#0E3A44"/>
<text x="60" y="80" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#ffffff" text-anchor="start">씽크대형(디스포저) 설치 예시</text>
<!-- 싱크볼 단면 -->
<rect x="120" y="190" width="420" height="40" fill="#5B6B7C"/>
<path d="M170 230 h320 l-40 150 h-240 z" fill="#E8EEF5" stroke="#CFE3E8" stroke-width="3"/>
<text x="330" y="320" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#5B6B7C" text-anchor="middle">싱크볼</text>
<!-- 배수구 -->
<rect x="300" y="378" width="60" height="26" fill="#5B6B7C"/>
<!-- 디스포저 본체 -->
<rect x="278" y="404" width="104" height="120" rx="16" fill="#1E6B7A"/>
<text x="330" y="458" font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#ffffff" text-anchor="middle">분쇄</text>
<text x="330" y="498" font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#ffffff" text-anchor="middle">기</text>
<!-- 칼날 표현 -->
<circle cx="330" cy="524" r="6" fill="#FFD23F"/>
<!-- 배수관 -->
<path d="M330 524 v70 h180" stroke="#5B6B7C" stroke-width="14" fill="none"/>
<polygon points="500,580 500,608 534,594" fill="#5B6B7C"/>
<text x="330" y="640" font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#0E3A44" text-anchor="middle">배수구에 장착 · 칼날로 분쇄</text>
<!-- 오른쪽 설명 -->
<rect x="620" y="190" width="400" height="180" rx="18" fill="#ffffff" stroke="#CFE3E8"/>
<text x="650" y="258" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1E6B7A" text-anchor="start">처리시간 1분 이내</text>
<text x="650" y="318" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#5B6B7C" text-anchor="start">다량 처리가 편리</text>
<rect x="620" y="400" width="400" height="230" rx="18" fill="#FDECEC" stroke="#F3C6C6"/>
<text x="650" y="468" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#D64545" text-anchor="start">주의!</text>
<text x="650" y="528" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#0C2A31" text-anchor="start">아무 제품이나 사면 안 됨</text>
<text x="650" y="584" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#D64545" text-anchor="start">인증 제품만 합법 (다음 장)</text>
</svg>