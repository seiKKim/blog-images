<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
<rect width="1080" height="720" fill="#F1F8FA"/>
<rect width="1080" height="120" fill="#0E3A44"/>
<text x="60" y="80" font-family="Malgun Gothic" font-weight="bold" font-size="50" fill="#ffffff" text-anchor="start">미생물 음식물처리기, 어떻게 분해하나</text>
<!-- 본체 단면 -->
<rect x="70" y="200" width="480" height="360" rx="28" fill="#ffffff" stroke="#CFE3E8" stroke-width="3"/>
<rect x="70" y="200" width="480" height="70" rx="28" fill="#1E6B7A"/>
<text x="310" y="246" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#ffffff" text-anchor="middle">본체 내부</text>
<!-- 분해조 -->
<path d="M120 320 h380 v150 a190 75 0 0 1 -380 0 z" fill="#E7D6A8" opacity="0.55"/>
<!-- 교반봉 -->
<line x1="310" y1="300" x2="310" y2="470" stroke="#5B6B7C" stroke-width="10"/>
<circle cx="310" cy="300" r="16" fill="#5B6B7C"/>
<g stroke="#8A6B2E" stroke-width="12" stroke-linecap="round">
<line x1="310" y1="430" x2="210" y2="410"/>
<line x1="310" y1="430" x2="410" y2="410"/>
<line x1="310" y1="380" x2="230" y2="360"/>
<line x1="310" y1="380" x2="390" y2="360"/>
</g>
<!-- 미생물/음식물 점 -->
<g fill="#1F8A53" opacity="0.85">
<circle cx="200" cy="480" r="9"/><circle cx="250" cy="500" r="7"/><circle cx="300" cy="490" r="10"/>
<circle cx="360" cy="500" r="7"/><circle cx="420" cy="480" r="9"/><circle cx="270" cy="470" r="6"/>
</g>
<rect x="120" y="285" rx="16" width="150" height="52" fill="#FFD23F"/>
<text x="195" y="322" font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#0C2A31" text-anchor="middle">30~40℃</text>
<!-- 오른쪽 팩트 -->
<circle cx="600" cy="206" r="12" fill="#FFD23F"/><text x="636" y="216" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#0E3A44" text-anchor="start">30~40℃ 유지</text><text x="636" y="264" font-family="Malgun Gothic" font-weight="normal" font-size="28" fill="#5B6B7C" text-anchor="start">호기성 미생물이 살기 좋은 온도</text><circle cx="600" cy="356" r="12" fill="#FFD23F"/><text x="636" y="366" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#0E3A44" text-anchor="start">교반봉이 계속 섞음</text><text x="636" y="414" font-family="Malgun Gothic" font-weight="normal" font-size="28" fill="#5B6B7C" text-anchor="start">24시간 안에 부피 95~98% 감소</text><circle cx="600" cy="506" r="12" fill="#FFD23F"/><text x="636" y="516" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#0E3A44" text-anchor="start">작동 중 상시 투입 OK</text><text x="636" y="564" font-family="Malgun Gothic" font-weight="normal" font-size="28" fill="#5B6B7C" text-anchor="start">전기료 월 3,000원대로 최저</text>
<rect x="600" y="600" rx="18" width="410" height="70" fill="#FDECEC"/>
<text x="620" y="645" font-family="Malgun Gothic" font-weight="bold" font-size="29" fill="#D64545" text-anchor="start">뼈·조개껍데기·식이섬유는 못 넣음</text>
</svg>