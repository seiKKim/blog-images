<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="1080" height="1350" fill="#F1F8FA"/>
<rect width="1080" height="220" fill="#0E3A44"/>
<text x="60" y="120" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#ffffff" text-anchor="start">가구원수·상황별 추천 매핑</text>
<text x="60" y="180" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#DFF3F7" text-anchor="start">우리 집 상황 → 딱 맞는 방식</text>
<rect x="40" y="300" width="1000" height="160" rx="18" fill="#ffffff" stroke="#CFE3E8"/><text x="70" y="370" font-family="Malgun Gothic" font-weight="bold" font-size="33" fill="#0E3A44" text-anchor="start">전기료·소음 최소로 조용하게</text><text x="70" y="422" font-family="Malgun Gothic" font-weight="normal" font-size="25" fill="#5B6B7C" text-anchor="start">이런 분께 추천</text><path d="M560 380 h60" stroke="#FFD23F" stroke-width="10" fill="none"/><polygon points="620,366 620,394 650,380" fill="#FFD23F"/><text x="680" y="370" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1E6B7A" text-anchor="start">미생물 발효식</text><text x="680" y="420" font-family="Malgun Gothic" font-weight="normal" font-size="27" fill="#C06A2E" text-anchor="start">월3천원대 · 27~28dB</text><rect x="40" y="490" width="1000" height="160" rx="18" fill="#ffffff" stroke="#CFE3E8"/><text x="70" y="560" font-family="Malgun Gothic" font-weight="bold" font-size="33" fill="#0E3A44" text-anchor="start">빠른 처리·편의 원하는 3~4인</text><text x="70" y="612" font-family="Malgun Gothic" font-weight="normal" font-size="25" fill="#5B6B7C" text-anchor="start">이런 분께 추천</text><path d="M560 570 h60" stroke="#FFD23F" stroke-width="10" fill="none"/><polygon points="620,556 620,584 650,570" fill="#FFD23F"/><text x="680" y="560" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1E6B7A" text-anchor="start">분쇄건조식</text><text x="680" y="610" font-family="Malgun Gothic" font-weight="normal" font-size="27" fill="#C06A2E" text-anchor="start">2~6시간 · 판매 1위 방식</text><rect x="40" y="680" width="1000" height="160" rx="18" fill="#ffffff" stroke="#CFE3E8"/><text x="70" y="750" font-family="Malgun Gothic" font-weight="bold" font-size="33" fill="#0E3A44" text-anchor="start">예산 빠듯한 1~2인 가구</text><text x="70" y="802" font-family="Malgun Gothic" font-weight="normal" font-size="25" fill="#5B6B7C" text-anchor="start">이런 분께 추천</text><path d="M560 760 h60" stroke="#FFD23F" stroke-width="10" fill="none"/><polygon points="620,746 620,774 650,760" fill="#FFD23F"/><text x="680" y="750" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1E6B7A" text-anchor="start">단순 건조식</text><text x="680" y="800" font-family="Malgun Gothic" font-weight="normal" font-size="27" fill="#C06A2E" text-anchor="start">10~50만원대 가성비</text><rect x="40" y="870" width="1000" height="160" rx="18" fill="#ffffff" stroke="#CFE3E8"/><text x="70" y="940" font-family="Malgun Gothic" font-weight="bold" font-size="33" fill="#0E3A44" text-anchor="start">배출량 많고 설치 가능한 집</text><text x="70" y="992" font-family="Malgun Gothic" font-weight="normal" font-size="25" fill="#5B6B7C" text-anchor="start">이런 분께 추천</text><path d="M560 950 h60" stroke="#FFD23F" stroke-width="10" fill="none"/><polygon points="620,936 620,964 650,950" fill="#FFD23F"/><text x="680" y="940" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1E6B7A" text-anchor="start">씽크대형</text><text x="680" y="990" font-family="Malgun Gothic" font-weight="normal" font-size="27" fill="#C06A2E" text-anchor="start">단, 합법 인증 필수</text><rect x="40" y="1060" width="1000" height="160" rx="18" fill="#ffffff" stroke="#CFE3E8"/><text x="70" y="1130" font-family="Malgun Gothic" font-weight="bold" font-size="33" fill="#0E3A44" text-anchor="start">3년 이상 길게 쓸 계획</text><text x="70" y="1182" font-family="Malgun Gothic" font-weight="normal" font-size="25" fill="#5B6B7C" text-anchor="start">이런 분께 추천</text><path d="M560 1140 h60" stroke="#FFD23F" stroke-width="10" fill="none"/><polygon points="620,1126 620,1154 650,1140" fill="#FFD23F"/><text x="680" y="1130" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1E6B7A" text-anchor="start">렌탈보다 구매</text><text x="680" y="1180" font-family="Malgun Gothic" font-weight="normal" font-size="27" fill="#C06A2E" text-anchor="start">보조금 대상은 구매가 유리</text>
<rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
<text x="60" y="1322" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#5B6B7C" text-anchor="start">가격대 단순건조 10~50 · 분쇄건조 43~150 · 미생물 45~150만원</text>
</svg>