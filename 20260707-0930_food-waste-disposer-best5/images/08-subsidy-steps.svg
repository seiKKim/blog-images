<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="1080" height="1350" fill="#F1F8FA"/>
<rect width="1080" height="220" fill="#0E3A44"/>
<text x="60" y="120" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#ffffff" text-anchor="start">지원금 확인·신청 절차</text>
<text x="60" y="180" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#DFF3F7" text-anchor="start">지원율·상한액이 지역마다 크게 다름</text>
<!-- 편차 경고 박스 -->
<rect x="40" y="270" width="1000" height="150" rx="18" fill="#FFD23F"/>
<text x="540" y="332" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#0C2A31" text-anchor="middle">전국 공통 금액은 없습니다</text>
<text x="540" y="388" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#0C2A31" text-anchor="middle">지원율 30~80% · 상한액 21만~70만원 (지역별 편차)</text>
<rect x="40" y="470" width="1000" height="170" rx="18" fill="#ffffff" stroke="#CFE3E8"/><circle cx="120" cy="555" r="46" fill="#1E6B7A"/><text x="120" y="572" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#ffffff" text-anchor="middle">1</text><text x="200" y="540" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#0E3A44" text-anchor="start">우리 지역 고시 확인</text><text x="200" y="588" font-family="Malgun Gothic" font-weight="normal" font-size="28" fill="#5B6B7C" text-anchor="start">정부24 또는 관할 시·군·구청·주민센터에서</text><text x="200" y="628" font-family="Malgun Gothic" font-weight="normal" font-size="28" fill="#5B6B7C" text-anchor="start">지원율·상한액·대상을 직접 확인</text><rect x="40" y="670" width="1000" height="170" rx="18" fill="#ffffff" stroke="#CFE3E8"/><circle cx="120" cy="755" r="46" fill="#1E6B7A"/><text x="120" y="772" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#ffffff" text-anchor="middle">2</text><text x="200" y="740" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#0E3A44" text-anchor="start">인증 제품 구매</text><text x="200" y="788" font-family="Malgun Gothic" font-weight="normal" font-size="28" fill="#5B6B7C" text-anchor="start">2025년부터 K마크·환경표지 등</text><text x="200" y="828" font-family="Malgun Gothic" font-weight="normal" font-size="28" fill="#5B6B7C" text-anchor="start">인증 제품만 지원 대상</text><rect x="40" y="870" width="1000" height="170" rx="18" fill="#ffffff" stroke="#CFE3E8"/><circle cx="120" cy="955" r="46" fill="#1E6B7A"/><text x="120" y="972" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#ffffff" text-anchor="middle">3</text><text x="200" y="940" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#0E3A44" text-anchor="start">30일 이내 접수</text><text x="200" y="988" font-family="Malgun Gothic" font-weight="normal" font-size="28" fill="#5B6B7C" text-anchor="start">대체로 구매 후 30일 이내</text><text x="200" y="1028" font-family="Malgun Gothic" font-weight="normal" font-size="28" fill="#5B6B7C" text-anchor="start">영수증·신청서 제출</text>
<rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
<text x="60" y="1322" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#5B6B7C" text-anchor="start">예산 소진 시 조기 마감 · 특정 금액 믿고 계산 금지</text>
</svg>