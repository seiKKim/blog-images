<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A2016"/>
      <stop offset="1" stop-color="#2B2F36"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- 상단 햇빛 광원 장식 -->
  <circle cx="900" cy="150" r="300" fill="#FFB020" opacity="0.14"/>
  <circle cx="900" cy="150" r="180" fill="#FF6A2C" opacity="0.16"/>
  <circle cx="120" cy="980" r="220" fill="#E23B3B" opacity="0.08"/>

  <!-- 카테고리 뱃지 -->
  <rect x="64" y="80" rx="34" ry="34" width="330" height="70" fill="#FFD23F"/>
  <text x="229" y="128" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="38" fill="#2B2F36" text-anchor="middle">폭염 안전정보</text>

  <!-- 서브 카피 -->
  <text x="64" y="252" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#E8EEF5">2026 폭염특보 18년 만의 개편</text>

  <!-- 메인 카피 -->
  <text x="64" y="360" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="96" fill="#ffffff">폭염특보 <tspan fill="#FFD23F">3단계</tspan></text>

  <!-- 3단계 온도 바 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold">
    <!-- 주의보 -->
    <rect x="64" y="430" rx="20" width="952" height="130" fill="#F2B21A"/>
    <text x="96" y="500" font-size="46" fill="#3A2016">주의보</text>
    <text x="96" y="545" font-size="30" fill="#5A3A10">체감 33℃ 이상</text>
    <text x="984" y="522" font-size="64" fill="#3A2016" text-anchor="end">33℃</text>
    <!-- 경보 -->
    <rect x="64" y="576" rx="20" width="952" height="130" fill="#EC6A22"/>
    <text x="96" y="646" font-size="46" fill="#ffffff">경보</text>
    <text x="96" y="691" font-size="30" fill="#FFE3CC">체감 35℃ 이상</text>
    <text x="984" y="668" font-size="64" fill="#ffffff" text-anchor="end">35℃</text>
    <!-- 중대경보 -->
    <rect x="64" y="722" rx="20" width="952" height="130" fill="#E23B3B"/>
    <rect x="336" y="758" rx="14" width="98" height="42" fill="#FFD23F"/>
    <text x="385" y="788" font-size="26" fill="#7A1010" text-anchor="middle">신설</text>
    <text x="96" y="792" font-size="46" fill="#ffffff">중대경보</text>
    <text x="96" y="837" font-size="30" fill="#FFD8D8">체감 38℃ 이상</text>
    <text x="984" y="814" font-size="64" fill="#FFD23F" text-anchor="end">38℃</text>
  </g>

  <!-- 디테일 띠 -->
  <text x="64" y="920" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#ffffff">7월 12일 포항·경산 사상 첫 발령</text>

  <!-- 채널 -->
  <text x="64" y="1012" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="32" fill="#9BA6B2">blog.naver.com/trip_chocho</text>
</svg>
