<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#2B2F36"/>
  <circle cx="960" cy="80" r="240" fill="#E23B3B" opacity="0.12"/>

  <!-- 상단 경보 라벨 -->
  <rect x="60" y="56" rx="30" width="470" height="70" fill="#E23B3B"/>
  <text x="295" y="104" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="38" fill="#ffffff" text-anchor="middle">폭염중대경보 발령 시</text>

  <!-- 금지 픽토그램 -->
  <g transform="translate(230,380)">
    <circle r="150" fill="none" stroke="#E23B3B" stroke-width="26"/>
    <line x1="-106" y1="-106" x2="106" y2="106" stroke="#E23B3B" stroke-width="26"/>
    <!-- 사람(걷는) 아이콘 -->
    <g fill="#E8EEF5">
      <circle cx="-6" cy="-72" r="26"/>
      <rect x="-18" y="-42" width="24" height="70" rx="10" transform="rotate(8 -6 -20)"/>
      <rect x="-46" y="-30" width="20" height="60" rx="10" transform="rotate(-38 -36 0)"/>
      <rect x="16" y="-30" width="20" height="60" rx="10" transform="rotate(28 26 0)"/>
      <rect x="-38" y="18" width="20" height="66" rx="10" transform="rotate(-24 -28 40)"/>
      <rect x="6" y="20" width="20" height="66" rx="10" transform="rotate(22 16 45)"/>
    </g>
  </g>

  <!-- 메인 문구 -->
  <text x="470" y="330" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="94" fill="#ffffff">야외활동</text>
  <text x="470" y="440" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="94" fill="#FFD23F">즉시 중단</text>

  <!-- 보조 문구 -->
  <rect x="470" y="500" rx="16" width="546" height="130" fill="#3A3F48"/>
  <text x="500" y="558" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#E8EEF5">건강한 사람도 중대한</text>
  <text x="500" y="606" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#E8EEF5">인명 피해 우려 수준</text>

  <text x="60" y="686" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="28" fill="#8B96A2">출처: 기상청 폭염특보 개편 보도자료(2026.5.12)</text>
</svg>
