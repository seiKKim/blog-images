<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <rect x="0" y="200" width="1080" height="8" fill="#3FD0C9"/>
  <text x="60" y="112" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">여름·겨울 사용방법</text>
  <text x="60" y="164" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="34" fill="#CFE0F0">총액은 하나, 사용수단은 계절마다 다름</text>

  <!-- 여름 카드 -->
  <rect x="60" y="270" width="460" height="620" rx="24" fill="#E7F6F5" stroke="#3FD0C9" stroke-width="3"/>
  <rect x="60" y="270" width="460" height="96" rx="24" fill="#3FD0C9"/>
  <rect x="60" y="330" width="460" height="36" fill="#3FD0C9"/>
  <text x="290" y="332" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="48" fill="#0E3B57" text-anchor="middle">여름 (하절기)</text>
  <text x="290" y="470" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="44" fill="#0E5A54" text-anchor="middle">요금차감</text>
  <text x="290" y="530" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="44" fill="#0E5A54" text-anchor="middle">(가상카드) 전용</text>
  <line x1="120" y1="580" x2="460" y2="580" stroke="#9FD9D4" stroke-width="2"/>
  <text x="290" y="650" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="34" fill="#33565E" text-anchor="middle">적용 에너지원</text>
  <text x="290" y="710" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="46" fill="#1B5FA6" text-anchor="middle">전기</text>
  <text x="290" y="810" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="30" fill="#B4482E" text-anchor="middle">실물카드 결제 불가</text>
  <text x="290" y="852" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="30" fill="#33565E" text-anchor="middle">고지서에서 자동 차감</text>

  <!-- 겨울 카드 -->
  <rect x="560" y="270" width="460" height="620" rx="24" fill="#EAF1F8" stroke="#7FB3DD" stroke-width="3"/>
  <rect x="560" y="270" width="460" height="96" rx="24" fill="#1B5FA6"/>
  <rect x="560" y="330" width="460" height="36" fill="#1B5FA6"/>
  <text x="790" y="332" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="48" fill="#ffffff" text-anchor="middle">겨울 (동절기)</text>
  <text x="790" y="470" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="42" fill="#173A5E" text-anchor="middle">요금차감 또는</text>
  <text x="790" y="524" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="42" fill="#173A5E" text-anchor="middle">국민행복카드</text>
  <text x="790" y="576" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="42" fill="#173A5E" text-anchor="middle">(실물) 택1</text>
  <line x1="620" y1="620" x2="960" y2="620" stroke="#B9CFE4" stroke-width="2"/>
  <text x="790" y="686" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="34" fill="#3B4A59" text-anchor="middle">적용 에너지원</text>
  <text x="790" y="738" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="30" fill="#1B5FA6" text-anchor="middle">전기·도시가스·지역난방</text>
  <text x="790" y="782" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="30" fill="#1B5FA6" text-anchor="middle">등유·LPG·연탄 등</text>
  <text x="790" y="852" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="30" fill="#3B4A59" text-anchor="middle">요금 많은 에너지원 선택</text>

  <!-- 하단 주의 -->
  <rect x="60" y="920" width="960" height="200" rx="20" fill="#FFF6D9" stroke="#FFD23F" stroke-width="3"/>
  <text x="100" y="994" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="42" fill="#8A6A00">2026년부터 하절기·동절기 한도 구분 폐지</text>
  <text x="100" y="1054" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#5C4B12">사용기간(2026.7.1~2027.5.31) 안에서</text>
  <text x="100" y="1100" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#5C4B12">총액을 자유롭게 배분해 사용할 수 있어요.</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="32" fill="#5B6B7C">본문 기준 · 여름은 전기요금 차감 전용</text>
</svg>
