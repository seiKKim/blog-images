<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <rect x="0" y="200" width="1080" height="8" fill="#3FD0C9"/>
  <text x="60" y="112" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">지원대상 체크리스트</text>
  <text x="60" y="164" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="34" fill="#CFE0F0">두 조건을 모두 충족해야 선정</text>

  <!-- STEP 1 -->
  <rect x="60" y="256" width="960" height="270" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="60" y="256" width="220" height="270" rx="20" fill="#1B5FA6"/>
  <rect x="200" y="256" width="80" height="270" fill="#1B5FA6"/>
  <text x="118" y="360" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="40" fill="#FFD23F">STEP</text>
  <text x="140" y="470" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="120" fill="#ffffff" text-anchor="middle">1</text>
  <text x="320" y="340" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="44" fill="#173A5E">소득기준</text>
  <text x="320" y="410" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#3B4A59">국민기초생활보장법에 따른</text>
  <text x="320" y="462" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="38" fill="#1B5FA6">생계·의료·주거·교육급여 수급자</text>

  <!-- AND 표시 -->
  <circle cx="540" cy="565" r="42" fill="#3FD0C9"/>
  <text x="540" y="580" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="34" fill="#ffffff" text-anchor="middle">AND</text>

  <!-- STEP 2 -->
  <rect x="60" y="606" width="960" height="520" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="60" y="606" width="220" height="520" rx="20" fill="#0E7C74"/>
  <rect x="200" y="606" width="80" height="520" fill="#0E7C74"/>
  <text x="118" y="700" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="40" fill="#FFD23F">STEP</text>
  <text x="140" y="810" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="120" fill="#ffffff" text-anchor="middle">2</text>
  <text x="320" y="686" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="44" fill="#0E5A54">세대원 특성기준</text>
  <text x="320" y="736" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="32" fill="#3B4A59">본인 또는 등본상 세대원 중 1명 이상 해당</text>

  <g font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="34" fill="#173A5E" font-weight="bold">
    <text x="320" y="808">· 노인(만 65세 이상 등)</text>
    <text x="700" y="808">· 영유아</text>
    <text x="320" y="866">· 장애인</text>
    <text x="700" y="866">· 임산부</text>
    <text x="320" y="924">· 중증·희귀·중증난치질환자</text>
    <text x="320" y="982">· 한부모가족</text>
    <text x="700" y="982">· 다자녀 세대</text>
    <text x="320" y="1040">· 소년소녀가정(가정위탁 보호아동 포함)</text>
  </g>

  <text x="60" y="1200" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="36" fill="#1B5FA6">대상 확인 문의 · 통합 상담센터 ☎ 1600-3190</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="32" fill="#5B6B7C">본문 기준 · 소득기준 + 세대원 특성기준 동시 충족</text>
</svg>
