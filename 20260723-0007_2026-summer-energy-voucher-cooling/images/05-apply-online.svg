<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <rect x="0" y="200" width="1080" height="8" fill="#3FD0C9"/>
  <text x="60" y="112" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">신청방법</text>
  <text x="60" y="164" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="34" fill="#CFE0F0">세 가지 방식 + 대리신청 가능</text>

  <!-- 브라우저 목업: 복지로 온라인 -->
  <rect x="60" y="256" width="960" height="360" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="60" y="256" width="960" height="86" rx="20" fill="#EAF1F8"/>
  <rect x="60" y="322" width="960" height="20" fill="#EAF1F8"/>
  <circle cx="102" cy="299" r="12" fill="#FF6058"/>
  <circle cx="140" cy="299" r="12" fill="#FFBD2E"/>
  <circle cx="178" cy="299" r="12" fill="#28C840"/>
  <rect x="230" y="278" width="720" height="44" rx="22" fill="#ffffff" stroke="#C7D3E0"/>
  <text x="256" y="309" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="30" fill="#5B6B7C">www.bokjiro.go.kr</text>
  <text x="110" y="440" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="44" fill="#173A5E">복지로 온라인 신청</text>
  <text x="110" y="502" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="34" fill="#3B4A59">로그인 → 복지서비스 신청 → 에너지바우처</text>
  <rect x="110" y="536" width="360" height="60" rx="30" fill="#1B5FA6"/>
  <text x="290" y="576" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="34" fill="#ffffff" text-anchor="middle">에너지바우처 신청</text>

  <!-- 방식 3가지 -->
  <g font-family="'Noto Sans KR','Malgun Gothic',sans-serif">
    <rect x="60" y="656" width="960" height="110" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="118" cy="711" r="30" fill="#1B5FA6"/>
    <text x="118" y="724" font-weight="bold" font-size="38" fill="#ffffff" text-anchor="middle">1</text>
    <text x="176" y="700" font-weight="bold" font-size="40" fill="#173A5E">온라인</text>
    <text x="176" y="748" font-weight="normal" font-size="32" fill="#3B4A59">복지로 홈페이지에서 신청</text>

    <rect x="60" y="786" width="960" height="110" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="118" cy="841" r="30" fill="#1B5FA6"/>
    <text x="118" y="854" font-weight="bold" font-size="38" fill="#ffffff" text-anchor="middle">2</text>
    <text x="176" y="830" font-weight="bold" font-size="40" fill="#173A5E">방문신청</text>
    <text x="176" y="878" font-weight="normal" font-size="32" fill="#3B4A59">거주지 관할 읍·면·동 행정복지센터</text>

    <rect x="60" y="916" width="960" height="110" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="118" cy="971" r="30" fill="#1B5FA6"/>
    <text x="118" y="984" font-weight="bold" font-size="38" fill="#ffffff" text-anchor="middle">3</text>
    <text x="176" y="960" font-weight="bold" font-size="40" fill="#173A5E">직권신청</text>
    <text x="176" y="1008" font-weight="normal" font-size="32" fill="#3B4A59">담당 공무원이 동의받아 진행(거동 불편 등)</text>
  </g>

  <rect x="60" y="1052" width="960" height="150" rx="20" fill="#E7F6F5" stroke="#3FD0C9" stroke-width="3"/>
  <text x="100" y="1122" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="38" fill="#0E5A54">본인 접수가 어려우면 세대원·8촌 이내 친족 대리신청</text>
  <text x="100" y="1174" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="38" fill="#0E7C74">문의 · 통합 상담센터 ☎ 1600-3190</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="32" fill="#5B6B7C">본문 기준 · 복지로(www.bokjiro.go.kr)</text>
</svg>
