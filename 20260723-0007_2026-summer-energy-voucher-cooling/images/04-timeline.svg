<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <rect x="0" y="200" width="1080" height="8" fill="#3FD0C9"/>
  <text x="60" y="112" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">신청기간 &amp; 사용기간</text>
  <text x="60" y="164" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="34" fill="#CFE0F0">시점이 두 가지로 나뉩니다</text>

  <!-- 신청기간 카드 -->
  <rect x="60" y="270" width="960" height="180" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="60" y="270" width="14" height="180" rx="7" fill="#1B5FA6"/>
  <text x="110" y="340" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="40" fill="#173A5E">에너지바우처 신청</text>
  <text x="110" y="412" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="52" fill="#1B5FA6">2026. 6. 15 ~ 12. 31</text>

  <!-- 연탄전환 카드 -->
  <rect x="60" y="480" width="960" height="180" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="60" y="480" width="14" height="180" rx="7" fill="#7FB3DD"/>
  <text x="110" y="550" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="40" fill="#173A5E">연탄전환 바우처 신청</text>
  <text x="110" y="622" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="52" fill="#3D82C4">2026. 8. 7 ~ 12. 31</text>

  <!-- 사용기간 카드 -->
  <rect x="60" y="690" width="960" height="180" rx="20" fill="#E7F6F5" stroke="#3FD0C9" stroke-width="3"/>
  <rect x="60" y="690" width="14" height="180" rx="7" fill="#0E7C74"/>
  <text x="110" y="760" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="40" fill="#0E5A54">사용기간</text>
  <text x="110" y="832" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="52" fill="#0E7C74">2026. 7. 1 ~ 2027. 5. 31</text>

  <!-- 꿀팁 강조 -->
  <rect x="60" y="920" width="960" height="200" rx="20" fill="#FFF6D9" stroke="#FFD23F" stroke-width="3"/>
  <text x="100" y="994" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="42" fill="#8A6A00">여름 냉방비는 7~8월 신청이 유리</text>
  <text x="100" y="1054" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#5C4B12">지금 신청할수록 이번 달·다음 달</text>
  <text x="100" y="1100" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#5C4B12">전기요금부터 차감받을 수 있어요.</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="32" fill="#5B6B7C">본문 기준 · 마감일 12월 31일까지</text>
</svg>
