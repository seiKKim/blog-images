<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B5FA6"/>
      <stop offset="1" stop-color="#0E4C8F"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- 시원한 민트 장식 -->
  <circle cx="960" cy="150" r="280" fill="#3FD0C9" opacity="0.16"/>
  <circle cx="120" cy="980" r="220" fill="#3FD0C9" opacity="0.12"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="88" rx="34" ry="34" width="230" height="68" fill="#FFD23F"/>
  <text x="195" y="134" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="36" fill="#173A5E" text-anchor="middle">정부지원금</text>
  <!-- 시즌 태그 -->
  <rect x="326" y="88" rx="34" ry="34" width="196" height="68" fill="#3FD0C9"/>
  <text x="424" y="134" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="36" fill="#0E3B57" text-anchor="middle">여름 냉방비</text>

  <!-- 서브 카피 -->
  <text x="80" y="262" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="54" fill="#E8EEF5">2026 에너지바우처</text>
  <text x="80" y="336" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="54" fill="#FFD23F">지금 신청하면 이번 달 전기요금부터 차감</text>

  <!-- 메인 숫자 -->
  <text x="80" y="500" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="72" fill="#ffffff">가구원수별 연간 총액</text>
  <text x="80" y="662" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="150" fill="#ffffff">최대 <tspan fill="#FFD23F">70만 원</tspan></text>

  <!-- 가구원수별 요약 박스 -->
  <rect x="80" y="722" rx="24" ry="24" width="920" height="150" fill="#ffffff" opacity="0.14"/>
  <text x="110" y="792" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="42" fill="#ffffff">1인 29만·2인 40만·3인 53만·4인↑ 70만 원대</text>
  <text x="110" y="846" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="34" fill="#E8EEF5">여름·겨울 합친 연간 총 지원금</text>

  <!-- 신청기간 띠 -->
  <rect x="80" y="898" rx="20" ry="20" width="920" height="96" fill="#FFD23F"/>
  <text x="540" y="960" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="46" fill="#173A5E" text-anchor="middle">신청 2026.6.15 ~ 12.31 · 여름은 7~8월이 유리</text>

  <!-- 채널 -->
  <text x="80" y="1044" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="32" fill="#E8EEF5" opacity="0.9">blog.naver.com/trip_chocho</text>
</svg>
