<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="98" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">냉방비 아끼는 실전 팁</text>
  <text x="60" y="158" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#E8EEF5">같은 지원금으로 더 시원하게</text>

  <!-- 팁 1 -->
  <rect x="60" y="260" width="960" height="200" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="100" y="345" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="42" fill="#1a1a1a">설정온도 1도 올리기</text>
  <text x="100" y="418" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal" font-size="34" fill="#5B6B7C">에어컨 전기요금 절감</text>
  <text x="990" y="395" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="80" fill="#1B5FA6" text-anchor="end">약 10%</text>

  <!-- 팁 2 -->
  <rect x="60" y="490" width="960" height="200" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="100" y="575" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="42" fill="#1a1a1a">에어컨 필터 청소</text>
  <text x="100" y="648" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal" font-size="34" fill="#5B6B7C">주기적으로 청소하면</text>
  <text x="990" y="625" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="80" fill="#1B5FA6" text-anchor="end">3~5%</text>

  <!-- 팁 3 -->
  <rect x="60" y="720" width="960" height="200" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="100" y="805" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="42" fill="#1a1a1a">에어서큘레이터 활용</text>
  <text x="100" y="878" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal" font-size="34" fill="#5B6B7C">방 온도 1~3℃ 낮춤 · 효율 개선</text>
  <text x="990" y="855" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="80" fill="#1B5FA6" text-anchor="end">약 20%</text>

  <!-- 강조 문구 -->
  <rect x="60" y="960" width="960" height="230" rx="20" fill="#1B5FA6"/>
  <text x="540" y="1045" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="46" fill="#ffffff" text-anchor="middle">에어컨 + 서큘레이터 혼합냉방</text>
  <text x="540" y="1110" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="40" fill="#FFD23F" text-anchor="middle">찬 공기 순환 → 가동시간 단축</text>
  <text x="540" y="1160" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal" font-size="34" fill="#E8EEF5" text-anchor="middle">세게 안 틀어도 금방 시원, 전기요금 절약</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="32" fill="#5B6B7C">출처: 본문 리서치 절약팁 정리</text>
</svg>
