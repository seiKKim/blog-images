  <text x="230" y="528" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal" font-size="34" fill="#5B6B7C">읍·면·동 행정복지센터 (고지서 지참)</text>

  <!-- 방법 2 -->
  <rect x="60" y="600" width="960" height="150" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
