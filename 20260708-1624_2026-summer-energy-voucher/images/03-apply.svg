  <!-- 방법 1 -->
  <rect x="60" y="420" width="960" height="150" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="150" cy="495" r="42" fill="#FFD23F"/>
  <text x="150" y="510" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="42" fill="#1a1a1a" text-anchor="middle">1</text>
