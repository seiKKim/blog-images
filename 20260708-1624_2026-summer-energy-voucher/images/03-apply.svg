  <text x="150" y="690" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="42" fill="#1a1a1a" text-anchor="middle">2</text>
  <text x="230" y="660" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold" font-size="42" fill="#1a1a1a">온라인신청</text>
  <text x="230" y="708" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal" font-size="34" fill="#5B6B7C">복지로 www.bokjiro.go.kr</text>

