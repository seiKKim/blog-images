<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="98" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">지원 대상 체크리스트</text>
  <text x="60" y="158" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#E8EEF5">두 기준을 모두 충족해야 대상</text>

  <!-- 조건 1 -->
  <rect x="60" y="250" width="960" height="290" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="60" y="250" width="14" height="290" rx="7" fill="#1B5FA6"/>
  <text x="110" y="330" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="42" fill="#1B5FA6">1. 소득기준</text>
  <text x="110" y="405" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="40" fill="#1a1a1a">생계 · 의료 · 주거 · 교육급여</text>
  <text x="110" y="463" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="40" fill="#1a1a1a">수급자</text>
  <text x="110" y="513" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="32" fill="#5B6B7C">국민기초생활보장법 기준</text>

  <!-- AND 배지 -->
  <circle cx="540" cy="580" r="42" fill="#FFD23F"/>
  <text x="540" y="595" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="38" fill="#1a1a1a" text-anchor="middle">AND</text>

  <!-- 조건 2 -->
  <rect x="60" y="630" width="960" height="500" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="60" y="630" width="14" height="500" rx="7" fill="#1B5FA6"/>
  <text x="110" y="710" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="42" fill="#1B5FA6">2. 세대원 특성기준 (1명 이상)</text>

  <g font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="36" fill="#1a1a1a" font-weight="bold">
    <text x="130" y="785">✓ 노인 (1961.12.31. 이전 출생)</text>
    <text x="130" y="845">✓ 영유아 (2019.1.1. 이후·7세 이하)</text>
    <text x="130" y="905">✓ 장애인 · 임산부</text>
    <text x="130" y="965">✓ 중증·희귀·중증난치질환자</text>
    <text x="130" y="1025">✓ 한부모 · 소년소녀가정</text>
    <text x="130" y="1085">✓ 다자녀 세대 (19세 미만 2명 이상)</text>
  </g>

  <!-- 주의 -->
  <rect x="60" y="1160" width="960" height="70" rx="14" fill="#FDEEDD"/>
  <text x="90" y="1205" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="32" fill="#C0561A">연탄쿠폰·등유바우처 중복 수급 세대는 제외</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="32" fill="#5B6B7C">출처: 에너지바우처 www.energyv.or.kr</text>
</svg>
