<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F2F8F9"/>
  <rect width="1080" height="210" fill="#0E7C86"/>
  <rect x="60" y="78" width="12" height="62" rx="6" fill="#FFD23F"/>
  <text x="92" y="128" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff">에어컨 + 서큘레이터 배치 요령</text>
  <text x="92" y="178" font-family="Malgun Gothic" font-size="34" fill="#CDEFF1">찬 공기를 방 전체로 순환시키기</text>
  <!-- 방 윤곽 -->
  <rect x="80" y="290" width="920" height="640" rx="24" fill="#ffffff" stroke="#C7DDE0" stroke-width="4"/>
  <!-- 에어컨 -->
  <rect x="120" y="330" width="300" height="100" rx="14" fill="#0E7C86"/>
  <text x="270" y="392" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">에어컨</text>
  <!-- 에어컨 찬바람 화살표(아래로) -->
  <line x1="270" y1="430" x2="270" y2="560" stroke="#2BD4D9" stroke-width="12" stroke-linecap="round"/>
  <path d="M270 600 L240 545 L300 545 Z" fill="#2BD4D9"/>
  <!-- 서큘레이터(길목) -->
  <g opacity="1.0"><rect x="230" y="776" width="80" height="22" rx="10" fill="#9CC6CA"/><rect x="260" y="740" width="19" height="48" fill="#9CC6CA"/><circle cx="270" cy="700" r="80" fill="none" stroke="#6FA9AE" stroke-width="9.6"/><circle cx="270" cy="700" r="58" fill="none" stroke="#6FA9AE" stroke-width="4.0" opacity="0.7"/><circle cx="270" cy="700" r="35" fill="none" stroke="#6FA9AE" stroke-width="4.0" opacity="0.7"/><circle cx="270" cy="700" r="13" fill="#6FA9AE"/><line x1="270" y1="700" x2="339" y2="700" stroke="#6FA9AE" stroke-width="2.4" opacity="0.55"/><line x1="270" y1="700" x2="319" y2="749" stroke="#6FA9AE" stroke-width="2.4" opacity="0.55"/><line x1="270" y1="700" x2="270" y2="769" stroke="#6FA9AE" stroke-width="2.4" opacity="0.55"/><line x1="270" y1="700" x2="221" y2="749" stroke="#6FA9AE" stroke-width="2.4" opacity="0.55"/><line x1="270" y1="700" x2="201" y2="700" stroke="#6FA9AE" stroke-width="2.4" opacity="0.55"/><line x1="270" y1="700" x2="221" y2="651" stroke="#6FA9AE" stroke-width="2.4" opacity="0.55"/><line x1="270" y1="700" x2="270" y2="631" stroke="#6FA9AE" stroke-width="2.4" opacity="0.55"/><line x1="270" y1="700" x2="319" y2="651" stroke="#6FA9AE" stroke-width="2.4" opacity="0.55"/></g>
  <text x="270" y="840" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#0A5A62" text-anchor="middle">서큘레이터</text>
  <!-- 순환 직진풍(오른쪽으로) -->
  <line x1="370" y1="690" x2="900" y2="690" stroke="#0A5A62" stroke-width="14" stroke-linecap="round"/>
  <line x1="370" y1="650" x2="820" y2="650" stroke="#0A5A62" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <line x1="370" y1="730" x2="820" y2="730" stroke="#0A5A62" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <path d="M900 656 L960 690 L900 724 Z" fill="#0A5A62"/>
  <text x="700" y="620" font-family="Malgun Gothic" font-size="34" fill="#4A6B6F" text-anchor="middle">→ 방 전체로 찬 공기 확산</text>
  <!-- 팁 박스 -->
  <rect x="80" y="970" width="920" height="240" rx="22" fill="#E8F4F5"/>
  <text x="120" y="1050" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#0E7C86">배치 핵심</text>
  <text x="120" y="1110" font-family="Malgun Gothic" font-size="38" fill="#1A2B2E">· 서큘레이터를 에어컨 바람 길목에 두기</text>
  <text x="120" y="1165" font-family="Malgun Gothic" font-size="38" fill="#1A2B2E">· 설정온도 26~28℃ · 실내외 온도차 5℃ 이내</text>
  <rect x="0" y="1270" width="1080" height="80" fill="#DCEBED"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#4A6B6F">출처: research.md (에어컨 병행 절감 팁)</text>
</svg>