<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <!-- 상단 색띠 + 제목 -->
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <circle cx="990" cy="70" r="120" fill="#38C6E8" opacity="0.18"/>
  <text x="60" y="102" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">신청 방법 3가지</text>
  <text x="60" y="162" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#FFD23F">신청 2026. 6/15 ~ 12/31</text>

  <!-- 방법 1 온라인 -->
  <rect x="60" y="262" width="960" height="200" rx="22" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="150" cy="362" r="46" fill="#1B5FA6"/>
  <text x="150" y="378" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="46" fill="#ffffff" text-anchor="middle">1</text>
  <text x="238" y="352" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="48" fill="#1a1a1a">온라인 신청</text>
  <text x="238" y="412" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#5B6B7C">복지로(bokjiro.go.kr) 로그인 → 에너지바우처</text>

  <!-- 방법 2 방문 -->
  <rect x="60" y="490" width="960" height="200" rx="22" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="150" cy="590" r="46" fill="#1B5FA6"/>
  <text x="150" y="606" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="46" fill="#ffffff" text-anchor="middle">2</text>
  <text x="238" y="580" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="48" fill="#1a1a1a">방문 신청</text>
  <text x="238" y="640" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#5B6B7C">읍·면·동 행정복지센터 (대리신청 가능)</text>

  <!-- 방법 3 직권 -->
  <rect x="60" y="718" width="960" height="200" rx="22" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="150" cy="818" r="46" fill="#1B5FA6"/>
  <text x="150" y="834" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="46" fill="#ffffff" text-anchor="middle">3</text>
  <text x="238" y="808" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="48" fill="#1a1a1a">직권 신청</text>
  <text x="238" y="868" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#5B6B7C">담당 공무원이 대상자 동의 얻어 처리</text>

  <!-- 자동신청 강조 박스 -->
  <rect x="60" y="960" width="960" height="230" rx="24" fill="#E7F1FB" stroke="#1B5FA6" stroke-width="2"/>
  <text x="100" y="1042" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="46" fill="#1B5FA6">자동신청, 나도 될까?</text>
  <text x="100" y="1104" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="38" fill="#1a1a1a">전년도 정보변동 없고 자격 충족 시 자동신청</text>
  <text x="100" y="1156" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="38" fill="#E23B3B">이사·세대원 변동 있으면 → 신규신청 필요</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 한국에너지공단 에너지바우처 · 통합상담센터 1600-3190</text>
</svg>
