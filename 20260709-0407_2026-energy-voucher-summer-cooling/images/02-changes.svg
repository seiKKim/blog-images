<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <!-- 상단 색띠 + 제목 -->
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <circle cx="990" cy="70" r="120" fill="#38C6E8" opacity="0.18"/>
  <text x="60" y="102" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">2026년 달라진 점</text>
  <text x="60" y="162" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#FFD23F">올여름 꼭 챙겨야 하는 이유 2가지</text>

  <!-- 변화 1 카드 -->
  <rect x="60" y="270" width="960" height="440" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="132" cy="352" r="42" fill="#1B5FA6"/>
  <text x="132" y="368" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff" text-anchor="middle">1</text>
  <text x="200" y="368" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#1a1a1a">계절 사용상한 폐지</text>

  <rect x="110" y="430" width="400" height="210" rx="18" fill="#F0F4F9"/>
  <text x="310" y="500" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#8593A3" text-anchor="middle">기존</text>
  <text x="310" y="560" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#5B6B7C" text-anchor="middle">여름·겨울</text>
  <text x="310" y="608" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#5B6B7C" text-anchor="middle">상한 분리</text>
  <text x="540" y="548" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#38C6E8" text-anchor="middle">→</text>
  <rect x="570" y="430" width="400" height="210" rx="18" fill="#E7F1FB"/>
  <text x="770" y="500" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#1B5FA6" text-anchor="middle">2026</text>
  <text x="770" y="560" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1B5FA6" text-anchor="middle">여름·겨울 없이</text>
  <text x="770" y="608" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1B5FA6" text-anchor="middle">자유롭게 사용</text>

  <!-- 변화 2 카드 -->
  <rect x="60" y="750" width="960" height="440" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="132" cy="832" r="42" fill="#1B5FA6"/>
  <text x="132" y="848" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff" text-anchor="middle">2</text>
  <text x="200" y="848" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#1a1a1a">다자녀 기준 완화</text>

  <rect x="110" y="910" width="400" height="210" rx="18" fill="#F0F4F9"/>
  <text x="310" y="980" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#8593A3" text-anchor="middle">기존</text>
  <text x="310" y="1058" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#5B6B7C" text-anchor="middle">19세 미만 3명</text>
  <text x="540" y="1028" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#38C6E8" text-anchor="middle">→</text>
  <rect x="570" y="910" width="400" height="210" rx="18" fill="#E7F1FB"/>
  <text x="770" y="980" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#1B5FA6" text-anchor="middle">2026</text>
  <text x="770" y="1058" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#1B5FA6" text-anchor="middle">19세 미만 2명</text>

  <text x="540" y="1230" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="38" fill="#1a1a1a" text-anchor="middle">자녀 2인 기초수급가구 약 2만 가구 신규 대상</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 한국에너지공단 에너지바우처 · 정책브리핑</text>
</svg>
