<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <rect x="60" y="52" rx="26" ry="26" width="150" height="52" fill="#FFD23F"/>
  <text x="135" y="88" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">정부지원금</text>
  <text x="60" y="165" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="60" fill="#ffffff">지원 대상 — "둘 다" 충족</text>

  <text x="60" y="290" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#5B6B7C">아래 두 조건을 모두 만족해야 지원</text>

  <!-- 조건 1 -->
  <rect x="60" y="330" width="960" height="230" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="130" cy="400" r="34" fill="#1B5FA6"/>
  <text x="130" y="414" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">1</text>
  <text x="190" y="415" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="48" fill="#1a1a1a">소득기준</text>
  <text x="90" y="490" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="38" fill="#333333">생계·의료·주거·교육급여</text>
  <text x="90" y="538" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="38" fill="#1B5FA6">수급자</text>

  <!-- AND 배지 -->
  <rect x="470" y="580" width="140" height="60" rx="30" fill="#E23B3B"/>
  <text x="540" y="622" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">AND</text>

  <!-- 조건 2 -->
  <rect x="60" y="660" width="960" height="500" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="130" cy="730" r="34" fill="#1B5FA6"/>
  <text x="130" y="744" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">2</text>
  <text x="190" y="745" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="48" fill="#1a1a1a">세대원 특성 (1명 이상)</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="37" fill="#333333">
    <text x="90" y="825">· 노인 (1961.12.31 이전 출생)</text>
    <text x="90" y="880">· 영유아 (2019.1.1 이후 출생, 7세 이하)</text>
    <text x="90" y="935">· 장애인 · 임산부</text>
    <text x="90" y="990">· 중증·희귀·중증난치질환자</text>
    <text x="90" y="1045">· 한부모가족 · 소년소녀가정</text>
    <text x="90" y="1100">· 다자녀 세대 (자녀 2명 이상)</text>
  </g>

  <rect x="60" y="1200" width="960" height="60" rx="14" fill="#FFF3D6"/>
  <text x="540" y="1240" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="34" fill="#9A6B00" text-anchor="middle">수급자여도 세대원 특성 없으면 대상 아님</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">출처: 에너지바우처(energyv.or.kr)</text>
</svg>
