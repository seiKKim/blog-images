  <rect x="60" y="1090" width="960" height="120" rx="16" fill="#FCEADD"/>
  <text x="100" y="1165" font-family="Noto Sans CJK KR" font-size="40" font-weight="bold" fill="#9A4F1E">⚠ 고온 세탁 전 의류 라벨 온도 확인</text>
