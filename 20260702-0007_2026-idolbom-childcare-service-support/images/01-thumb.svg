  <!-- 디테일 박스 -->
  <rect x="80" y="792" rx="20" ry="20" width="920" height="132" fill="#ffffff" opacity="0.14"/>
  <text x="112" y="855" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
