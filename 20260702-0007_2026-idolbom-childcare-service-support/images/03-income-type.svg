<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="210" fill="#1B5FA6"/>
  <text x="60" y="120" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="58" fill="#ffffff">소득유형별 정부지원 비율</text>
  <text x="60" y="178" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal" font-size="36" fill="#E8EEF5">2026년 기준 중위소득 250% 이하까지 확대</text>

  <!-- 표 헤더 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="60" y="270" width="230" height="80" rx="12" fill="#1B5FA6"/>
    <rect x="298" y="270" width="360" height="80" rx="12" fill="#1B5FA6"/>
    <rect x="666" y="270" width="176" height="80" rx="12" fill="#1B5FA6"/>
    <rect x="850" y="270" width="170" height="80" rx="12" fill="#1B5FA6"/>
    <text x="175" y="322" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">소득유형</text>
    <text x="478" y="322" font-size="30" font-weight="bold" fill="#ffffff" text-anchor="middle">중위소득 범위</text>
    <text x="754" y="322" font-size="30" font-weight="bold" fill="#ffffff" text-anchor="middle">정부지원</text>
    <text x="935" y="322" font-size="30" font-weight="bold" fill="#ffffff" text-anchor="middle">본인부담</text>
  </g>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36">
    <!-- 가형 -->
    <rect x="60" y="362" width="230" height="130" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="298" y="362" width="360" height="130" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="666" y="362" width="176" height="130" rx="12" fill="#EAF2FA" stroke="#D6E0EC"/>
    <rect x="850" y="362" width="170" height="130" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="175" y="440" font-weight="bold" fill="#1B5FA6" text-anchor="middle">가형</text>
    <text x="478" y="440" font-size="34" fill="#1a1a1a" text-anchor="middle">75% 이하</text>
    <text x="754" y="440" font-weight="bold" fill="#1B5FA6" text-anchor="middle">85%</text>
    <text x="935" y="440" font-weight="bold" fill="#1a1a1a" text-anchor="middle">15%</text>

    <!-- 나형 -->
    <rect x="60" y="502" width="230" height="130" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="298" y="502" width="360" height="130" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="666" y="502" width="176" height="130" rx="12" fill="#EAF2FA" stroke="#D6E0EC"/>
    <rect x="850" y="502" width="170" height="130" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="175" y="580" font-weight="bold" fill="#1B5FA6" text-anchor="middle">나형</text>
    <text x="478" y="580" font-size="30" fill="#1a1a1a" text-anchor="middle">75% 초과~120% 이하</text>
    <text x="754" y="580" font-weight="bold" fill="#1B5FA6" text-anchor="middle">60%</text>
    <text x="935" y="580" font-weight="bold" fill="#1a1a1a" text-anchor="middle">40%</text>

    <!-- 다형 -->
    <rect x="60" y="642" width="230" height="130" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="298" y="642" width="360" height="130" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="666" y="642" width="176" height="130" rx="12" fill="#EAF2FA" stroke="#D6E0EC"/>
    <rect x="850" y="642" width="170" height="130" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="175" y="720" font-weight="bold" fill="#1B5FA6" text-anchor="middle">다형</text>
    <text x="478" y="720" font-size="28" fill="#1a1a1a" text-anchor="middle">120% 초과~150% 이하</text>
    <text x="754" y="720" font-weight="bold" fill="#1B5FA6" text-anchor="middle">30%</text>
    <text x="935" y="720" font-weight="bold" fill="#1a1a1a" text-anchor="middle">70%</text>

    <!-- 라형 -->
    <rect x="60" y="782" width="230" height="130" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="298" y="782" width="360" height="130" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="666" y="782" width="176" height="130" rx="12" fill="#EAF2FA" stroke="#D6E0EC"/>
    <rect x="850" y="782" width="170" height="130" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="175" y="860" font-weight="bold" fill="#1B5FA6" text-anchor="middle">라형</text>
    <text x="478" y="860" font-size="28" fill="#1a1a1a" text-anchor="middle">150% 초과~250% 이하</text>
    <text x="754" y="860" font-weight="bold" fill="#1B5FA6" text-anchor="middle">15%</text>
    <text x="935" y="860" font-weight="bold" fill="#1a1a1a" text-anchor="middle">85%</text>

    <!-- 마형 -->
    <rect x="60" y="922" width="230" height="130" rx="12" fill="#F1F4F8" stroke="#D6E0EC"/>
    <rect x="298" y="922" width="360" height="130" rx="12" fill="#F1F4F8" stroke="#D6E0EC"/>
    <rect x="666" y="922" width="176" height="130" rx="12" fill="#F1F4F8" stroke="#D6E0EC"/>
    <rect x="850" y="922" width="170" height="130" rx="12" fill="#F1F4F8" stroke="#D6E0EC"/>
    <text x="175" y="1000" font-weight="bold" fill="#5B6B7C" text-anchor="middle">마형</text>
    <text x="478" y="1000" font-size="34" fill="#5B6B7C" text-anchor="middle">250% 초과</text>
    <text x="754" y="1000" font-weight="bold" fill="#5B6B7C" text-anchor="middle">0%</text>
    <text x="935" y="1000" font-weight="bold" fill="#5B6B7C" text-anchor="middle">100%</text>
  </g>

  <!-- 감경 강조 -->
  <rect x="60" y="1082" width="960" height="110" rx="16" fill="#FFF6DA" stroke="#F0D98A"/>
  <text x="90" y="1148" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" font-weight="bold" fill="#8A6D1A">맞벌이는 부부 합산 소득에서 25% 감경해 판정</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" fill="#5B6B7C">출처: 아이돌봄서비스 누리집(idolbom.go.kr) · 콜센터 1577-2514</text>
</svg>
