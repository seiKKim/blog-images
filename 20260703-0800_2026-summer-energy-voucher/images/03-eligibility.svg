  <text x="100" y="720" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C">4개 급여 모두 대상</text>

  <rect x="580" y="250" width="440" height="560" rx="24" fill="#ffffff" stroke="#1B5FA6" stroke-width="4"/>
