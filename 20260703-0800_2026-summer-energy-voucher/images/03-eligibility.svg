  <text x="90" y="122" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff">신청 대상 — 둘 다 충족</text>
  <rect x="60" y="250" width="440" height="560" rx="24" fill="#ffffff" stroke="#1B5FA6" stroke-width="4"/>
