  <text x="280" y="310" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#ffffff" text-anchor="middle">① 소득기준</text>
  <text x="100" y="410" font-family="Malgun Gothic" font-size="40" fill="#1a2b3c">· 생계급여 수급</text>
  <text x="100" y="480" font-family="Malgun Gothic" font-size="40" fill="#1a2b3c">· 의료급여 수급</text>
  <text x="100" y="550" font-family="Malgun Gothic" font-size="40" fill="#1a2b3c">· 주거급여 수급</text>
