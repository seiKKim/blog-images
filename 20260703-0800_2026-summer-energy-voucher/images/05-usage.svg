<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="180" fill="#1B5FA6"/>
  <rect x="60" y="70" width="10" height="60" fill="#FFD23F"/>
  <text x="90" y="122" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff">사용처 — 여름은 전기요금 자동차감</text>
  <g font-family="Malgun Gothic">
    <rect x="60" y="250" width="960" height="90" fill="#1B5FA6"/>
    <text x="120" y="308" font-weight="bold" font-size="40" fill="#ffffff">구분</text>
    <text x="500" y="308" font-weight="bold" font-size="40" fill="#ffffff">하절기(여름)</text>
    <text x="800" y="308" font-weight="bold" font-size="40" fill="#ffffff">동절기(겨울)</text>

    <rect x="60" y="340" width="960" height="130" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="120" y="418" font-weight="bold" font-size="40" fill="#1a2b3c">전기</text>
    <text x="500" y="418" font-weight="bold" font-size="40" fill="#1B5FA6">요금차감만</text>
    <text x="800" y="418" font-size="38" fill="#5B6B7C">요금차감·카드</text>

    <rect x="60" y="470" width="960" height="130" fill="#F4F7FB" stroke="#D6E0EC"/>
    <text x="120" y="530" font-weight="bold" font-size="34" fill="#1a2b3c">도시가스</text>
    <text x="120" y="576" font-weight="bold" font-size="34" fill="#1a2b3c">지역난방</text>
    <text x="500" y="548" font-size="38" fill="#5B6B7C">요금차감</text>
    <text x="800" y="548" font-size="38" fill="#5B6B7C">요금차감·카드</text>

    <rect x="60" y="600" width="960" height="130" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="120" y="660" font-weight="bold" font-size="34" fill="#1a2b3c">등유·LPG</text>
    <text x="120" y="706" font-weight="bold" font-size="34" fill="#1a2b3c">연탄</text>
    <text x="500" y="678" font-size="38" fill="#9aa7b4">불가</text>
    <text x="800" y="678" font-size="38" fill="#5B6B7C">국민행복카드</text>
  </g>
  <rect x="60" y="790" width="960" height="140" rx="20" fill="#FFF6D6" stroke="#FFD23F" stroke-width="3"/>
  <text x="100" y="860" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#8a6d00">국민행복카드는 겨울에만 선택 가능</text>
  <text x="100" y="908" font-family="Malgun Gothic" font-size="34" fill="#8a6d00">여름 냉방 지원 = 전기요금 자동차감</text>
<rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">출처: 에너지바우처 공식 사용안내</text>
</svg>