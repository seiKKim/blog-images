<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350"><rect width="1080" height="1350" fill="#F4F7FB"/><rect x="0" y="0" width="1080" height="188" rx="0" ry="0" fill="#E8722C"/><rect x="60" y="54" width="208" height="62" rx="31" ry="31" fill="#FFD23F"/><text x="164.0" y="98" font-family="Noto Sans CJK KR" font-weight="800" font-size="34" fill="#1A1A1A" text-anchor="middle">생활꿀팁</text><text x="60" y="168" font-family="Noto Sans CJK KR" font-weight="800" font-size="60" fill="#FFFFFF" text-anchor="start">습도 관리 방법 (환기가 핵심)</text><rect x="60" y="250" width="960" height="232" rx="22" ry="22" fill="#FFFFFF" stroke="#E2D6CC" stroke-width="2"/><rect x="60" y="250" width="30" height="232" rx="8" ry="8" fill="#1F8A53"/><text x="118" y="328" font-family="Noto Sans CJK KR" font-weight="800" font-size="48" fill="#1F8A53" text-anchor="start">환기 (가장 중요·무료)</text><text x="118" y="400" font-family="Noto Sans CJK KR" font-weight="500" font-size="38" fill="#1A1A1A" text-anchor="start">비 안 오는 날 오전 10시~오후 3시 맞바람</text><text x="118" y="458" font-family="Noto Sans CJK KR" font-weight="500" font-size="38" fill="#1A1A1A" text-anchor="start">하루 2회 이상(각 10~30분) 공기 순환</text><rect x="60" y="506" width="960" height="232" rx="22" ry="22" fill="#FFFFFF" stroke="#E2D6CC" stroke-width="2"/><rect x="60" y="506" width="30" height="232" rx="8" ry="8" fill="#E8722C"/><text x="118" y="584" font-family="Noto Sans CJK KR" font-weight="800" font-size="48" fill="#E8722C" text-anchor="start">제습기</text><text x="118" y="656" font-family="Noto Sans CJK KR" font-weight="500" font-size="38" fill="#1A1A1A" text-anchor="start">습도 60% 초과 시 가동 → 목표 도달 시 정지</text><text x="118" y="714" font-family="Noto Sans CJK KR" font-weight="500" font-size="38" fill="#1A1A1A" text-anchor="start">장마철 하루 4~8시간 / 비 안 오는 날 1~2시간</text><rect x="60" y="762" width="960" height="232" rx="22" ry="22" fill="#FFFFFF" stroke="#E2D6CC" stroke-width="2"/><rect x="60" y="762" width="30" height="232" rx="8" ry="8" fill="#E8722C"/><text x="118" y="840" font-family="Noto Sans CJK KR" font-weight="800" font-size="48" fill="#E8722C" text-anchor="start">에어컨 제습 모드</text><text x="118" y="912" font-family="Noto Sans CJK KR" font-weight="500" font-size="38" fill="#1A1A1A" text-anchor="start">온도를 낮추며 일부 습기 제거</text><text x="118" y="970" font-family="Noto Sans CJK KR" font-weight="500" font-size="38" fill="#1A1A1A" text-anchor="start">제습기와 병용 시 체감 온도↓</text><rect x="60" y="1018" width="960" height="232" rx="22" ry="22" fill="#FFFFFF" stroke="#E2D6CC" stroke-width="2"/><rect x="60" y="1018" width="30" height="232" rx="8" ry="8" fill="#6B5B4E"/><text x="118" y="1096" font-family="Noto Sans CJK KR" font-weight="800" font-size="48" fill="#6B5B4E" text-anchor="start">보조 수단(생활 팁)</text><text x="118" y="1168" font-family="Noto Sans CJK KR" font-weight="500" font-size="38" fill="#1A1A1A" text-anchor="start">옷장·신발장·욕실에 숯·베이킹소다</text><text x="118" y="1226" font-family="Noto Sans CJK KR" font-weight="500" font-size="38" fill="#1A1A1A" text-anchor="start">염화칼슘 제습제·신문지 배치</text><rect x="0" y="1272" width="1080" height="78" rx="0" ry="0" fill="#F1E3D8"/><text x="60" y="1320" font-family="Noto Sans CJK KR" font-weight="500" font-size="30" fill="#6B5B4E" text-anchor="start">출처: 보건복지부·EPA·환경보건포털</text></svg>