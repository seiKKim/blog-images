<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350"><rect width="1080" height="1350" fill="#F4F7FB"/><rect x="0" y="0" width="1080" height="188" rx="0" ry="0" fill="#E8722C"/><rect x="60" y="54" width="208" height="62" rx="31" ry="31" fill="#FFD23F"/><text x="164.0" y="98" font-family="Noto Sans CJK KR" font-weight="800" font-size="34" fill="#1A1A1A" text-anchor="middle">생활꿀팁</text><text x="60" y="168" font-family="Noto Sans CJK KR" font-weight="800" font-size="60" fill="#FFFFFF" text-anchor="start">곰팡이 잘 생기는 자리·관리법</text><rect x="60" y="248" width="960" height="196" rx="20" ry="20" fill="#FFFFFF" stroke="#E2D6CC" stroke-width="2"/><rect x="60" y="248" width="240" height="196" rx="20" ry="20" fill="#FBE9DD"/><text x="180" y="360" font-family="Noto Sans CJK KR" font-weight="800" font-size="44" fill="#C75A18" text-anchor="middle">욕실</text><text x="336" y="322" font-family="Noto Sans CJK KR" font-weight="500" font-size="36" fill="#1A1A1A" text-anchor="start">환풍기 30분 이상 가동·물기 즉시 제거</text><text x="336" y="384" font-family="Noto Sans CJK KR" font-weight="500" font-size="36" fill="#1A1A1A" text-anchor="start">검은 줄눈은 락스 1:10 희석 후 20분</text><rect x="60" y="460" width="960" height="196" rx="20" ry="20" fill="#FFFFFF" stroke="#E2D6CC" stroke-width="2"/><rect x="60" y="460" width="240" height="196" rx="20" ry="20" fill="#FBE9DD"/><text x="180" y="572" font-family="Noto Sans CJK KR" font-weight="800" font-size="44" fill="#C75A18" text-anchor="middle">벽지(벽)</text><text x="336" y="534" font-family="Noto Sans CJK KR" font-weight="500" font-size="36" fill="#1A1A1A" text-anchor="start">천에 적셔 두드리듯 닦기 (과습 시 들뜸)</text><text x="336" y="596" font-family="Noto Sans CJK KR" font-weight="500" font-size="36" fill="#1A1A1A" text-anchor="start">깊이 침투하면 교체 필요할 수도</text><rect x="60" y="672" width="960" height="196" rx="20" ry="20" fill="#FFFFFF" stroke="#E2D6CC" stroke-width="2"/><rect x="60" y="672" width="240" height="196" rx="20" ry="20" fill="#FBE9DD"/><text x="180" y="784" font-family="Noto Sans CJK KR" font-weight="800" font-size="44" fill="#C75A18" text-anchor="middle">창틀</text><text x="336" y="746" font-family="Noto Sans CJK KR" font-weight="500" font-size="36" fill="#1A1A1A" text-anchor="start">결로로 고무패킹·샷시 하단에 잘 생김</text><text x="336" y="808" font-family="Noto Sans CJK KR" font-weight="500" font-size="36" fill="#1A1A1A" text-anchor="start">검은 점 보이면 조기 제거</text><rect x="60" y="884" width="960" height="196" rx="20" ry="20" fill="#FFFFFF" stroke="#E2D6CC" stroke-width="2"/><rect x="60" y="884" width="240" height="196" rx="20" ry="20" fill="#FBE9DD"/><text x="180" y="996" font-family="Noto Sans CJK KR" font-weight="800" font-size="44" fill="#C75A18" text-anchor="middle">옷장·신발장</text><text x="336" y="958" font-family="Noto Sans CJK KR" font-weight="500" font-size="36" fill="#1A1A1A" text-anchor="start">옷 간격 벌려 통풍, 주 1~2회 문 열기</text><text x="336" y="1020" font-family="Noto Sans CJK KR" font-weight="500" font-size="36" fill="#1A1A1A" text-anchor="start">숯·베이킹소다·염화칼슘 제습제 배치</text><rect x="60" y="1096" width="960" height="196" rx="20" ry="20" fill="#FFFFFF" stroke="#E2D6CC" stroke-width="2"/><rect x="60" y="1096" width="240" height="196" rx="20" ry="20" fill="#FBE9DD"/><text x="180" y="1208" font-family="Noto Sans CJK KR" font-weight="800" font-size="44" fill="#C75A18" text-anchor="middle">세탁기</text><text x="336" y="1170" font-family="Noto Sans CJK KR" font-weight="500" font-size="36" fill="#1A1A1A" text-anchor="start">연 3~4회 세정 권장</text><text x="336" y="1232" font-family="Noto Sans CJK KR" font-weight="500" font-size="36" fill="#1A1A1A" text-anchor="start">젖은 빨래는 통풍 잘되는 곳에서 건조</text><rect x="0" y="1272" width="1080" height="78" rx="0" ry="0" fill="#F1E3D8"/><text x="60" y="1320" font-family="Noto Sans CJK KR" font-weight="500" font-size="30" fill="#6B5B4E" text-anchor="start">출처: 환경보건포털·미국 EPA</text></svg>