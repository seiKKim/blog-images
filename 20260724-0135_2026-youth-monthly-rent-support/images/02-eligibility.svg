<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="105" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">신청 가능 vs 제외 대상</text>
  <text x="60" y="160" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#E8EEF5">국토부 청년월세 특별지원 체크리스트</text>

  <!-- 신청 가능 -->
  <text x="60" y="285" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#1F8A53">신청 가능</text>
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="38" fill="#1a1a1a">
    <rect x="60" y="310" width="960" height="90" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="105" cy="355" r="16" fill="#1F8A53"/>
    <text x="97" y="367" font-size="26" fill="#ffffff" font-weight="bold">O</text>
    <text x="145" y="368" font-weight="bold">만 19~34세 무주택 청년 (1991~2007년생)</text>

    <rect x="60" y="410" width="960" height="90" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="105" cy="455" r="16" fill="#1F8A53"/>
    <text x="97" y="467" font-size="26" fill="#ffffff" font-weight="bold">O</text>
    <text x="145" y="468" font-weight="bold">부모와 별도 거주하는 독립 청년</text>

    <rect x="60" y="510" width="960" height="90" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="105" cy="555" r="16" fill="#1F8A53"/>
    <text x="97" y="567" font-size="26" fill="#ffffff" font-weight="bold">O</text>
    <text x="145" y="568" font-weight="bold">본인 명의 임대차계약 + 주소지 일치</text>
  </g>

  <!-- 제외 대상 -->
  <text x="60" y="695" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#E23B3B">제외 대상</text>
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="38" fill="#1a1a1a">
    <rect x="60" y="720" width="960" height="90" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="105" cy="765" r="16" fill="#E23B3B"/>
    <text x="98" y="777" font-size="26" fill="#ffffff" font-weight="bold">X</text>
    <text x="145" y="778" font-weight="bold">본인 명의 주택 소유자</text>

    <rect x="60" y="820" width="960" height="90" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="105" cy="865" r="16" fill="#E23B3B"/>
    <text x="98" y="877" font-size="26" fill="#ffffff" font-weight="bold">X</text>
    <text x="145" y="878" font-weight="bold">부모와 동거 (방만 따로 써도 동거로 봄)</text>

    <rect x="60" y="920" width="960" height="90" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="105" cy="965" r="16" fill="#E23B3B"/>
    <text x="98" y="977" font-size="26" fill="#ffffff" font-weight="bold">X</text>
    <text x="145" y="978" font-weight="bold">2촌 이내 친족 소유 주택 거주</text>

    <rect x="60" y="1020" width="960" height="90" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="105" cy="1065" r="16" fill="#E23B3B"/>
    <text x="98" y="1077" font-size="26" fill="#ffffff" font-weight="bold">X</text>
    <text x="145" y="1078" font-weight="bold">공공임대·공무원임대 거주 / 이미 월세지원 수혜</text>
  </g>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 국토교통부 청년월세 특별지원 · 정부24 안내</text>
</svg>
