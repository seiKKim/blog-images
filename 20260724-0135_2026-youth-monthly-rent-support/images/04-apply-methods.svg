<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="105" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">청년월세 지원 신청 방법</text>
  <text x="60" y="160" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#E8EEF5">온라인 2곳 + 오프라인 1곳 (참고용 안내 이미지)</text>

  <!-- 방법 1 -->
  <rect x="60" y="270" width="960" height="200" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="60" y="270" width="14" height="200" rx="7" fill="#1B5FA6"/>
  <text x="110" y="345" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="40" fill="#1B5FA6" font-weight="bold">온라인 ①  복지로</text>
  <text x="110" y="410" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#1a1a1a">bokjiro.go.kr · 본인 공동인증 후 신청</text>

  <!-- 방법 2 -->
  <rect x="60" y="500" width="960" height="200" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="60" y="500" width="14" height="200" rx="7" fill="#1B5FA6"/>
  <text x="110" y="575" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="40" fill="#1B5FA6" font-weight="bold">온라인 ②  마이홈포털</text>
  <text x="110" y="640" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#1a1a1a">myhome.go.kr · 청년월세 특별지원 신청</text>

  <!-- 방법 3 -->
  <rect x="60" y="730" width="960" height="200" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="60" y="730" width="14" height="200" rx="7" fill="#1B5FA6"/>
  <text x="110" y="805" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="40" fill="#1B5FA6" font-weight="bold">오프라인  행정복지센터</text>
  <text x="110" y="870" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#1a1a1a">주소지 관할 주민센터 방문 (대리 신청 가능)</text>

  <!-- 신청기간 주의 박스 -->
  <rect x="60" y="980" width="960" height="230" rx="20" fill="#FFF4E0" stroke="#E8722C" stroke-width="2"/>
  <text x="100" y="1055" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="42" fill="#E8722C" font-weight="bold">신청 기간 주의</text>
  <text x="100" y="1120" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#1a1a1a" font-weight="bold">2026 정기 접수: 3/30 09시 ~ 5/29 16시 (종료)</text>
  <text x="100" y="1175" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">다음 신청 시기는 복지로·마이홈 공지를 직접 확인</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 복지로 · 마이홈포털 · 정부24 안내</text>
</svg>
