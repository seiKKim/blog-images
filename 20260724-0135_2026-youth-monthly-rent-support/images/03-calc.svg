<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <rect width="1080" height="160" fill="#1B5FA6"/>
  <text x="60" y="100" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="54" fill="#ffffff">얼마나 받을까? 지원 구조</text>

  <!-- 계산 박스들 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 월 20만원 -->
    <rect x="60" y="250" width="260" height="200" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="190" y="330" font-size="34" fill="#5B6B7C" text-anchor="middle" font-weight="bold">월 최대</text>
    <text x="190" y="410" font-size="72" fill="#1B5FA6" text-anchor="middle" font-weight="bold">20만원</text>

    <text x="360" y="370" font-size="80" fill="#1a1a1a" text-anchor="middle" font-weight="bold">×</text>

    <!-- 24개월 -->
    <rect x="400" y="250" width="260" height="200" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="530" y="330" font-size="34" fill="#5B6B7C" text-anchor="middle" font-weight="bold">최대</text>
    <text x="530" y="410" font-size="72" fill="#1B5FA6" text-anchor="middle" font-weight="bold">24개월</text>

    <text x="700" y="370" font-size="80" fill="#1a1a1a" text-anchor="middle" font-weight="bold">=</text>

    <!-- 480만원 -->
    <rect x="740" y="250" width="280" height="200" rx="20" fill="#1B5FA6"/>
    <text x="880" y="330" font-size="34" fill="#FFD23F" text-anchor="middle" font-weight="bold">최대 총</text>
    <text x="880" y="415" font-size="76" fill="#ffffff" text-anchor="middle" font-weight="bold">480만원</text>
  </g>

  <!-- 안내 -->
  <text x="60" y="540" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#1a1a1a" font-weight="bold">· 청년 본인 계좌로 직접 입금 · 임대인 동의 없이 신청 가능</text>
  <text x="60" y="600" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#1a1a1a" font-weight="bold">· 월세가 20만원 미만이면 실제 낸 월세만큼만 지원</text>
  <text x="60" y="660" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">※ 임차보증금·관리비는 지원 제외(월세분만)</text>
</svg>
