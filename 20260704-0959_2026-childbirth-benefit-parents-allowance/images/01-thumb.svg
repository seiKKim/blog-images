<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <!-- 배경: 정부지원금 신뢰의 블루 -->
  <rect width="1080" height="1080" fill="#1B5FA6"/>
  <!-- 장식 도형 -->
  <circle cx="960" cy="170" r="270" fill="#ffffff" opacity="0.08"/>
  <circle cx="110" cy="990" r="210" fill="#ffffff" opacity="0.06"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="88" rx="34" ry="34" width="230" height="68" fill="#FFD23F"/>
  <text x="195" y="134" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#1a1a1a" text-anchor="middle">정부지원금</text>

  <!-- 서브 카피 -->
  <text x="80" y="250" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#E8EEF5">2026 출산·육아 지원금 3종</text>
  <text x="80" y="324" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#FFD23F">소득·재산 무관, 중복 수급!</text>

  <!-- 3종 카드 -->
  <!-- 첫만남이용권 -->
  <rect x="80" y="380" rx="24" ry="24" width="920" height="150" fill="#ffffff" opacity="0.14"/>
  <text x="112" y="447" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff">첫만남이용권</text>
  <text x="968" y="470" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="72" fill="#FFD23F" text-anchor="end">200만~300만원</text>

  <!-- 부모급여 -->
  <rect x="80" y="546" rx="24" ry="24" width="920" height="150" fill="#ffffff" opacity="0.14"/>
  <text x="112" y="613" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff">부모급여</text>
  <text x="968" y="636" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="66" fill="#FFD23F" text-anchor="end">월 100만·50만원</text>

  <!-- 아동수당 -->
  <rect x="80" y="712" rx="24" ry="24" width="920" height="150" fill="#ffffff" opacity="0.14"/>
  <text x="112" y="779" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff">아동수당</text>
  <text x="968" y="802" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="72" fill="#FFD23F" text-anchor="end">월 10만원</text>

  <!-- 디테일 -->
  <rect x="80" y="892" rx="20" ry="20" width="920" height="96" fill="#FFD23F"/>
  <text x="540" y="954" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="44" fill="#1a1a1a" text-anchor="middle">아동수당 만 9세 미만 확대 (2026년)</text>

  <!-- 채널 표시 -->
  <text x="80" y="1042" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="32" fill="#E8EEF5" opacity="0.9">blog.naver.com/trip_chocho</text>
</svg>
