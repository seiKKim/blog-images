<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <!-- 상단 색띠 + 제목 -->
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="112" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">행복출산 원스톱 서비스</text>
  <text x="60" y="168" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="38" fill="#FFD23F">출생신고 한 번으로 통합 신청</text>

  <!-- 한 번에 신청되는 것 -->
  <text x="60" y="285" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#1a1a1a">한 번에 신청되는 지원</text>

  <rect x="60" y="315" width="960" height="200" rx="20" fill="#EAF1F9" stroke="#D6E0EC" stroke-width="2"/>
  <text x="100" y="385" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1B5FA6">첫만남이용권 · 부모급여 · 아동수당</text>
  <text x="100" y="445" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1B5FA6">양육수당 · 전기료 경감 · 다자녀 할인</text>
  <text x="100" y="490" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="32" fill="#5B6B7C">공공요금·KTX·SRT 할인, 지자체 출산지원금까지</text>

  <!-- 신청 방법 2가지 -->
  <rect x="60" y="555" width="465" height="240" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="292" y="640" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#1a1a1a" text-anchor="middle">온라인</text>
  <text x="292" y="720" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#1B5FA6" text-anchor="middle">정부24</text>
  <text x="292" y="765" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="32" fill="#5B6B7C" text-anchor="middle">gov.kr</text>

  <rect x="555" y="555" width="465" height="240" rx="24" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="787" y="640" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#1a1a1a" text-anchor="middle">방문</text>
  <text x="787" y="720" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#1B5FA6" text-anchor="middle">주민센터</text>
  <text x="787" y="765" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="32" fill="#5B6B7C" text-anchor="middle">주소지 읍·면·동</text>

  <!-- 신청 자격/서류 -->
  <rect x="60" y="835" width="960" height="100" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="100" y="898" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1a1a1a">신청 자격</text>
  <text x="980" y="898" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="40" fill="#1a1a1a" text-anchor="end">출산자 본인 또는 배우자</text>

  <rect x="60" y="953" width="960" height="100" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="100" y="1016" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1a1a1a">구비 서류</text>
  <text x="980" y="1016" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="36" fill="#1a1a1a" text-anchor="end">신분증 / 온라인 간편·공동인증</text>

  <!-- 주의 띠 -->
  <rect x="60" y="1090" width="960" height="130" rx="20" fill="#FBE9E9" stroke="#E23B3B" stroke-width="2"/>
  <text x="100" y="1150" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#C0392B">출생 후 60일 이내 신청</text>
  <text x="100" y="1198" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="36" fill="#C0392B">넘기면 출생월 소급 불가, 신청한 달부터 지급</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">부모급여·아동수당·양육수당 60일 이내 신청 시 출생월부터 소급</text>
</svg>
