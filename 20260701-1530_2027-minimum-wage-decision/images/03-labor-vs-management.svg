<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F5F7"/>
  <rect width="1080" height="180" fill="#2B2F36"/>
  <text x="60" y="112" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">노사 요구안, 얼마나 벌어졌나</text>

  <!-- 범례 -->
  <rect x="60" y="230" width="34" height="34" rx="6" fill="#2E6BE0"/>
  <text x="106" y="258" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#2B2F36">노동계</text>
  <rect x="300" y="230" width="34" height="34" rx="6" fill="#E23B3B"/>
  <text x="346" y="258" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#2B2F36">경영계</text>

  <g font-family="Malgun Gothic">
    <!-- 최초 요구안 (center 260) -->
    <rect x="130" y="540" width="120" height="540" fill="#2E6BE0"/>
    <rect x="270" y="842" width="120" height="238" fill="#E23B3B"/>
    <text x="190" y="512" font-size="32" font-weight="bold" fill="#2E6BE0" text-anchor="middle">12,000</text>
    <text x="330" y="814" font-size="32" font-weight="bold" fill="#E23B3B" text-anchor="middle">10,320</text>
    <text x="260" y="1130" font-size="34" font-weight="bold" fill="#2B2F36" text-anchor="middle">최초 요구안</text>
    <text x="260" y="1172" font-size="30" fill="#8A94A0" text-anchor="middle">격차 1,680원</text>

    <!-- 1차 수정안 (center 620) -->
    <rect x="490" y="545" width="120" height="535" fill="#2E6BE0"/>
    <rect x="630" y="839" width="120" height="241" fill="#E23B3B"/>
    <text x="550" y="517" font-size="32" font-weight="bold" fill="#2E6BE0" text-anchor="middle">11,970</text>
    <text x="690" y="811" font-size="32" font-weight="bold" fill="#E23B3B" text-anchor="middle">10,340</text>
    <text x="620" y="1130" font-size="34" font-weight="bold" fill="#2B2F36" text-anchor="middle">1차 수정안</text>
    <text x="620" y="1172" font-size="30" fill="#8A94A0" text-anchor="middle">격차 1,630원</text>

    <!-- 2차 수정안 (center 908) -->
    <rect x="768" y="558" width="120" height="522" fill="#2E6BE0"/>
    <rect x="908" y="835" width="120" height="245" fill="#E23B3B"/>
    <text x="828" y="530" font-size="32" font-weight="bold" fill="#2E6BE0" text-anchor="middle">11,900</text>
    <text x="968" y="807" font-size="32" font-weight="bold" fill="#E23B3B" text-anchor="middle">10,360</text>
    <text x="898" y="1130" font-size="34" font-weight="bold" fill="#2B2F36" text-anchor="middle">2차 수정안</text>
    <text x="898" y="1172" font-size="30" fill="#8A94A0" text-anchor="middle">격차 1,540원</text>
  </g>

  <line x1="80" y1="1080" x2="1040" y2="1080" stroke="#C4CBD4" stroke-width="3"/>

  <text x="60" y="1250" font-family="Malgun Gothic" font-size="33" fill="#E23B3B" font-weight="bold">※ 전부 확정 아님 — 심의 중 요구안·수정안 기준</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">출처: 최저임금위원회 전원회의 · 언론 종합</text>
</svg>
