<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F5F7"/>
  <rect width="1080" height="150" fill="#2B2F36"/>
  <text x="60" y="98" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">2027년 최저임금, 결정됐나?</text>

  <!-- 도장 스타일 -->
  <g transform="rotate(-12 320 420)">
    <rect x="120" y="330" width="400" height="180" rx="18" fill="none" stroke="#E23B3B" stroke-width="10"/>
    <text x="320" y="420" font-family="Malgun Gothic" font-weight="bold" font-size="72" fill="#E23B3B" text-anchor="middle">심의 중</text>
    <text x="320" y="480" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#E23B3B" text-anchor="middle">미확정</text>
  </g>

  <!-- 달력 -->
  <g transform="translate(640,300)">
    <rect x="0" y="0" width="360" height="300" rx="18" fill="#ffffff" stroke="#D6DAE0" stroke-width="3"/>
    <rect x="0" y="0" width="360" height="70" rx="18" fill="#2B2F36"/>
    <text x="180" y="50" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#ffffff" text-anchor="middle">7월</text>
    <circle cx="180" cy="185" r="72" fill="none" stroke="#E23B3B" stroke-width="8"/>
    <text x="180" y="205" font-family="Malgun Gothic" font-weight="bold" font-size="66" fill="#2B2F36" text-anchor="middle">중순</text>
    <text x="180" y="270" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C" text-anchor="middle">결정 전망</text>
  </g>

  <rect x="0" y="640" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="692" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">출처: 최저임금위원회(minimumwage.go.kr) · 2026.7.1 기준</text>
