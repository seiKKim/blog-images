<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F5F7"/>
  <rect width="1080" height="150" fill="#2B2F36"/>
  <text x="60" y="98" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#ffffff">언제부터, 누구한테?</text>

  <!-- 달력 -->
  <g transform="translate(80,220)">
    <rect x="0" y="0" width="380" height="330" rx="20" fill="#ffffff" stroke="#D6DAE0" stroke-width="3"/>
    <rect x="0" y="0" width="380" height="80" rx="20" fill="#E23B3B"/>
    <text x="190" y="56" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#ffffff" text-anchor="middle">2027. 1</text>
    <circle cx="190" cy="200" r="86" fill="none" stroke="#E23B3B" stroke-width="9"/>
    <text x="190" y="225" font-family="Malgun Gothic" font-weight="bold" font-size="96" fill="#2B2F36" text-anchor="middle">1</text>
    <text x="190" y="300" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C" text-anchor="middle">1월 1일부터 적용</text>
  </g>

  <!-- 오른쪽 안내 -->
  <g font-family="Malgun Gothic">
    <rect x="540" y="220" width="480" height="150" rx="16" fill="#ffffff" stroke="#D6DAE0"/>
    <text x="570" y="290" font-weight="bold" font-size="40" fill="#2B2F36">1인 이상 모든 사업장</text>
    <text x="570" y="340" font-size="32" fill="#5B6B7C">전 업종 단일 적용 (차등 부결)</text>

    <rect x="540" y="400" width="480" height="150" rx="16" fill="#ffffff" stroke="#D6DAE0"/>
    <text x="570" y="470" font-weight="bold" font-size="40" fill="#2B2F36">아르바이트도 대상</text>
    <text x="570" y="520" font-size="32" fill="#5B6B7C">주 15시간 이상 → 주휴수당 적용</text>
  </g>

  <text x="60" y="640" font-family="Malgun Gothic" font-size="32" fill="#E23B3B" font-weight="bold">※ 2027년분은 결정 후 2027.1.1부터 적용 (현재 심의 중)</text>

  <rect x="0" y="660" width="1080" height="60" fill="#E8EEF5"/>
  <text x="60" y="700" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C">출처: 최저임금법 · 최저임금위원회</text>
</svg>
