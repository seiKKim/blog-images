<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F5F7"/>
  <rect width="1080" height="180" fill="#2B2F36"/>
  <text x="60" y="112" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">시급을 월급으로 바꾸면?</text>

  <!-- 공식 박스 -->
  <rect x="60" y="240" width="960" height="150" rx="18" fill="#2B2F36"/>
  <text x="540" y="322" font-family="Malgun Gothic" font-weight="bold" font-size="52" fill="#FFD23F" text-anchor="middle">시급 × 209시간 = 월 환산액</text>
  <text x="540" y="368" font-family="Malgun Gothic" font-size="30" fill="#B8C0CC" text-anchor="middle">※ 209시간 = 주휴수당 포함 (세전 기준)</text>

  <!-- 표 -->
  <g font-family="Malgun Gothic" font-size="42">
    <rect x="60" y="440" width="960" height="110" rx="14" fill="#2E6BE0"/>
    <text x="100" y="510" font-weight="bold" fill="#ffffff">시급</text>
    <text x="980" y="510" font-weight="bold" fill="#ffffff" text-anchor="end">월 환산액</text>

    <rect x="60" y="560" width="960" height="120" rx="14" fill="#ffffff" stroke="#D6DAE0"/>
    <text x="100" y="620" font-weight="bold" fill="#1a1a1a">10,320원</text>
    <text x="100" y="662" font-size="28" fill="#8A94A0">2026 확정</text>
    <text x="980" y="638" font-weight="bold" fill="#2B2F36" text-anchor="end">215만 6,880원</text>

    <rect x="60" y="690" width="960" height="120" rx="14" fill="#ffffff" stroke="#D6DAE0"/>
    <text x="100" y="750" font-weight="bold" fill="#1a1a1a">10,360원</text>
    <text x="100" y="792" font-size="28" fill="#8A94A0">경영계 2차안</text>
    <text x="980" y="768" font-weight="bold" fill="#2B2F36" text-anchor="end">약 216만 5,240원</text>

    <rect x="60" y="820" width="960" height="120" rx="14" fill="#ffffff" stroke="#D6DAE0"/>
    <text x="100" y="880" font-weight="bold" fill="#1a1a1a">11,900원</text>
    <text x="100" y="922" font-size="28" fill="#8A94A0">노동계 2차안</text>
    <text x="980" y="898" font-weight="bold" fill="#2B2F36" text-anchor="end">약 248만 7,100원</text>

    <rect x="60" y="950" width="960" height="120" rx="14" fill="#FFF4E0" stroke="#E8C77A"/>
    <text x="100" y="1010" font-weight="bold" fill="#1a1a1a">12,000원</text>
    <text x="100" y="1052" font-size="28" fill="#8A94A0">노동계 최초 요구</text>
    <text x="980" y="1028" font-weight="bold" fill="#2B2F36" text-anchor="end">250만 8,000원</text>
  </g>

  <text x="60" y="1160" font-family="Malgun Gothic" font-size="33" fill="#E23B3B" font-weight="bold">※ 2026년만 확정 · 나머지는 심의 중 요구안(미확정)</text>
  <text x="60" y="1210" font-family="Malgun Gothic" font-size="31" fill="#5B6B7C">세전 금액 · 4대보험·세금 공제 후 실수령은 더 낮아집니다</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">출처: 최저임금위원회 · 월 209시간 기준 환산</text>
</svg>
