<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <!-- 상단 색띠 + 제목 -->
  <rect width="1080" height="230" fill="#1B5FA6"/>
  <rect x="60" y="54" rx="30" ry="30" width="330" height="60" fill="#FFD23F"/>
  <text x="225" y="96" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="32" fill="#1a1a1a" text-anchor="middle">2025년 참고용</text>
  <text x="60" y="170" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">가구원 수별 건강보험료 기준</text>
  <text x="60" y="212" font-family="Noto Sans KR, Malgun Gothic, sans-serif"
        font-size="32" fill="#E8EEF5">소비쿠폰 2차(하위 90%) · 이하이면 대상</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 헤더 행 -->
    <rect x="60" y="280" width="960" height="100" rx="12" fill="#243B6B"/>
    <text x="150" y="343" font-size="38" font-weight="bold" fill="#ffffff" text-anchor="middle">가구원</text>
    <text x="420" y="343" font-size="38" font-weight="bold" fill="#ffffff" text-anchor="middle">직장</text>
    <text x="660" y="343" font-size="38" font-weight="bold" fill="#ffffff" text-anchor="middle">지역</text>
    <text x="900" y="343" font-size="38" font-weight="bold" fill="#ffffff" text-anchor="middle">혼합</text>

    <!-- 1인 -->
    <rect x="60" y="390" width="960" height="120" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="150" y="465" font-size="42" font-weight="bold" fill="#1a1a1a" text-anchor="middle">1인</text>
    <text x="420" y="465" font-size="42" fill="#1a1a1a" text-anchor="middle">22만원</text>
    <text x="660" y="465" font-size="42" fill="#1a1a1a" text-anchor="middle">22만원</text>
    <text x="900" y="465" font-size="42" fill="#9AA7B4" text-anchor="middle">-</text>

    <!-- 2인 -->
    <rect x="60" y="510" width="960" height="120" fill="#F0F5FB" stroke="#D6E0EC"/>
    <text x="150" y="585" font-size="42" font-weight="bold" fill="#1a1a1a" text-anchor="middle">2인</text>
    <text x="420" y="585" font-size="42" fill="#1a1a1a" text-anchor="middle">33만원</text>
    <text x="660" y="585" font-size="42" fill="#1a1a1a" text-anchor="middle">31만원</text>
    <text x="900" y="585" font-size="42" fill="#1a1a1a" text-anchor="middle">33만원</text>

    <!-- 3인 -->
    <rect x="60" y="630" width="960" height="120" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="150" y="705" font-size="42" font-weight="bold" fill="#1a1a1a" text-anchor="middle">3인</text>
    <text x="420" y="705" font-size="42" fill="#1a1a1a" text-anchor="middle">42만원</text>
    <text x="660" y="705" font-size="42" fill="#1a1a1a" text-anchor="middle">39만원</text>
    <text x="900" y="705" font-size="42" fill="#1a1a1a" text-anchor="middle">42만원</text>

    <!-- 4인 -->
    <rect x="60" y="750" width="960" height="120" fill="#F0F5FB" stroke="#D6E0EC"/>
    <text x="150" y="825" font-size="42" font-weight="bold" fill="#1a1a1a" text-anchor="middle">4인</text>
    <text x="420" y="825" font-size="42" fill="#1a1a1a" text-anchor="middle">51만원</text>
    <text x="660" y="825" font-size="42" fill="#1a1a1a" text-anchor="middle">50만원</text>
    <text x="900" y="825" font-size="42" fill="#1a1a1a" text-anchor="middle">52만원</text>

    <!-- 5인 -->
    <rect x="60" y="870" width="960" height="120" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="150" y="945" font-size="42" font-weight="bold" fill="#1a1a1a" text-anchor="middle">5인</text>
    <text x="420" y="945" font-size="42" fill="#1a1a1a" text-anchor="middle">60만원</text>
    <text x="660" y="945" font-size="42" fill="#1a1a1a" text-anchor="middle">59만원</text>
    <text x="900" y="945" font-size="42" fill="#1a1a1a" text-anchor="middle">62만원</text>
  </g>

  <!-- 주의 띠 -->
  <rect x="60" y="1020" width="960" height="180" rx="20" fill="#FFF4D6" stroke="#F0CE5A" stroke-width="2"/>
  <text x="100" y="1080" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" font-weight="bold" fill="#8A6D1A">이 표는 2025년·하위 90% 기준입니다</text>
  <text x="100" y="1128" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="31" fill="#8A6D1A">2026 고유가 피해지원금 하위 70% 커트라인은 공개 전</text>
  <text x="100" y="1172" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="31" fill="#8A6D1A">맞벌이 가구는 가구원 수 +1 기준 적용</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">출처: 2025 민생회복 소비쿠폰 2차 기준(2025년 6월 부과·가구 합산)</text>
</svg>
