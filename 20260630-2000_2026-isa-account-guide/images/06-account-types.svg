<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="190" fill="#243B6B"/>
  <rect x="80" y="44" rx="28" width="190" height="56" fill="#FFD23F"/>
  <text x="175" y="83" font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">금융·재테크</text>
  <text x="80" y="160" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#FFFFFF">중개형·신탁형·일임형 비교</text>
  <text x="60" y="270" font-family="Malgun Gothic" font-size="38" fill="#5B6B7C">운용 방식 차이 (비과세 한도와는 무관)</text>
  <rect x="60" y="320" width="960" height="230" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="60" y="320" width="230" height="230" rx="18" fill="#243B6B"/>
  <text x="175" y="448" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#fff" text-anchor="middle">중개형</text>
  <text x="320" y="390" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">직접 상품 선택·매매(주식·ETF)</text>
  <text x="320" y="455" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#243B6B">수수료 매매수수료만</text>
  <text x="320" y="515" font-family="Malgun Gothic" font-size="34" fill="#5B6B7C">직접 투자하는 사람</text>
  <rect x="60" y="580" width="960" height="230" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="60" y="580" width="230" height="230" rx="18" fill="#243B6B"/>
  <text x="175" y="708" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#fff" text-anchor="middle">신탁형</text>
  <text x="320" y="650" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">가입자 지정→금융사 편입</text>
  <text x="320" y="715" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#243B6B">수수료 연 약 0.10%</text>
  <text x="320" y="775" font-family="Malgun Gothic" font-size="34" fill="#5B6B7C">예적금·안정형 운용자</text>
  <rect x="60" y="840" width="960" height="230" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="60" y="840" width="230" height="230" rx="18" fill="#243B6B"/>
  <text x="175" y="968" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#fff" text-anchor="middle">일임형</text>
  <text x="320" y="910" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">금융사가 대신 운용(MP)</text>
  <text x="320" y="975" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#243B6B">수수료 연 약 0.3~0.8%</text>
  <text x="320" y="1035" font-family="Malgun Gothic" font-size="34" fill="#5B6B7C">직접 운용 부담스러운 초보</text>
  <rect x="60" y="1110" width="960" height="100" rx="18" fill="#E8EEF5"/>
  <text x="100" y="1172" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#243B6B">직접 투자 가능하면 수수료 낮은 중개형이 대중적</text>
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">수수료·이벤트는 가입 전 각 사 공식 페이지 확인</text>
</svg>