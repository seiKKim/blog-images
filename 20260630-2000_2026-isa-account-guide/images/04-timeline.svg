<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="900" viewBox="0 0 1080 900">
  <rect width="1080" height="900" fill="#F4F7FB"/>
  <rect width="1080" height="190" fill="#243B6B"/>
  <rect x="80" y="44" rx="28" width="190" height="56" fill="#FFD23F"/>
  <text x="175" y="83" font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">금융·재테크</text>
  <text x="80" y="160" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#FFFFFF">의무가입 3년 — 핵심 포인트</text>
  <line x1="120" y1="430" x2="960" y2="430" stroke="#C7D3E2" stroke-width="10"/>
  <circle cx="160" cy="430" r="26" fill="#243B6B"/>
  <text x="160" y="370" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#243B6B" text-anchor="middle">가입</text>
  <circle cx="540" cy="430" r="26" fill="#FFD23F" stroke="#243B6B" stroke-width="6"/>
  <text x="540" y="370" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#243B6B" text-anchor="middle">3년 경과</text>
  <circle cx="920" cy="430" r="26" fill="#243B6B"/>
  <text x="920" y="370" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#243B6B" text-anchor="middle">만기</text>

  <rect x="120" y="500" width="380" height="220" rx="20" fill="#FDECEC" stroke="#E23B3B" stroke-width="3"/>
  <text x="310" y="565" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#E23B3B" text-anchor="middle">3년 내 해지</text>
  <text x="310" y="630" font-family="Malgun Gothic" font-size="38" fill="#1a1a1a" text-anchor="middle">감면세액 추징</text>
  <text x="310" y="685" font-family="Malgun Gothic" font-size="34" fill="#5B6B7C" text-anchor="middle">단기 자금엔 부적합</text>

  <rect x="580" y="500" width="380" height="220" rx="20" fill="#E7F4ED" stroke="#1F8A53" stroke-width="3"/>
  <text x="770" y="565" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#1F8A53" text-anchor="middle">3년 경과 후</text>
  <text x="770" y="630" font-family="Malgun Gothic" font-size="38" fill="#1a1a1a" text-anchor="middle">중도해지해도</text>
  <text x="770" y="685" font-family="Malgun Gothic" font-size="38" fill="#1a1a1a" text-anchor="middle">비과세 혜택 유지</text>

  <text x="540" y="820" font-family="Malgun Gothic" font-size="34" fill="#5B6B7C" text-anchor="middle">※ 중도 인출은 원금 내 가능하나 인출분만큼 한도 미복원</text>
</svg>