<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="190" fill="#243B6B"/>
  <rect x="80" y="44" rx="28" width="190" height="56" fill="#FFD23F"/>
  <text x="175" y="83" font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">금융·재테크</text>
  <text x="80" y="160" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#FFFFFF">만기자금 연금전환 추가공제</text>
  <text x="60" y="270" font-family="Malgun Gothic" font-size="38" fill="#5B6B7C">만기 해지 후 60일 이내 전환 시 추가 세액공제</text>
  <rect x="140" y="330" width="800" height="180" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="3"/>
  <text x="540" y="400" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#243B6B" text-anchor="middle">① ISA 만기 해지</text>
  <text x="540" y="450" font-family="Malgun Gothic" font-size="34" fill="#1a1a1a" text-anchor="middle">운용한 자금 수령</text>
  <text x="540" y="492" font-family="Malgun Gothic" font-size="34" fill="#1a1a1a" text-anchor="middle"></text>
  <text x="540" y="560" font-family="Malgun Gothic" font-weight="bold" font-size="50" fill="#FFD23F" text-anchor="middle">▼ 60일 이내 (필수)</text>
  <rect x="140" y="590" width="800" height="180" rx="20" fill="#EEF3FF" stroke="#243B6B" stroke-width="3"/>
  <text x="540" y="660" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#243B6B" text-anchor="middle">② 연금계좌로 전환</text>
  <text x="540" y="710" font-family="Malgun Gothic" font-size="34" fill="#1a1a1a" text-anchor="middle">연금저축 / IRP · 금융사 연금전환 서비스</text>
  <text x="540" y="752" font-family="Malgun Gothic" font-size="34" fill="#1a1a1a" text-anchor="middle"></text>
  <text x="540" y="820" font-family="Malgun Gothic" font-weight="bold" font-size="50" fill="#1F8A53" text-anchor="middle">▼</text>
  <rect x="140" y="850" width="800" height="180" rx="20" fill="#E7F4ED" stroke="#1F8A53" stroke-width="3"/>
  <text x="540" y="920" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#1F8A53" text-anchor="middle">③ 추가 세액공제</text>
  <text x="540" y="970" font-family="Malgun Gothic" font-size="34" fill="#1a1a1a" text-anchor="middle">전환금액의 10% · 최대 300만원</text>
  <text x="540" y="1012" font-family="Malgun Gothic" font-size="34" fill="#1a1a1a" text-anchor="middle">그 해 연금계좌 한도 900만→1,200만원</text>
  <rect x="140" y="1090" width="800" height="120" rx="18" fill="#E8EEF5"/>
  <text x="540" y="1140" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#243B6B" text-anchor="middle">소득 따라 최대 약 49.5만원 환급</text>
  <text x="540" y="1185" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C" text-anchor="middle">※ 60일 넘기면 일반 입금 처리·추가공제 불가</text>
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">2026년 6월 현행 기준</text>
</svg>