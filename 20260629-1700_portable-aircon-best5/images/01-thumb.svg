<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0852F"/>
      <stop offset="1" stop-color="#D85F1C"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="950" cy="160" r="280" fill="#ffffff" opacity="0.08"/>
  <circle cx="120" cy="980" r="220" fill="#ffffff" opacity="0.06"/>

  <!-- 카테고리 뱃지 -->
  <rect x="64" y="84" rx="34" ry="34" width="240" height="68" fill="#FFD23F"/>
  <text x="184" y="132" font-family="Malgun Gothic" font-weight="bold" font-size="36" fill="#1A1A1A" text-anchor="middle">추천아이템</text>

  <!-- 서브 카피 -->
  <text x="64" y="270" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#E8EEF5" text-anchor="start">벽 타공·실외기 없이 창문 하나면</text>

  <!-- 메인 카피 -->
  <text x="64" y="390" font-family="Malgun Gothic" font-weight="bold" font-size="84" fill="#FFFFFF" text-anchor="start">에어컨 설치 못 하는 집?</text>
  <rect x="58" y="430" width="720" height="96" rx="14" fill="#1A1A1A" opacity="0.18"/>
  <text x="64" y="506" font-family="Malgun Gothic" font-weight="bold" font-size="92" fill="#FFD23F" text-anchor="start">이거 하나면 끝</text>

  <!-- 키워드 -->
  <text x="64" y="628" font-family="Malgun Gothic" font-weight="bold" font-size="70" fill="#FFFFFF" text-anchor="start">이동식 에어컨</text>

  
  <!-- 창문 + 배기호스 + 본체 일러스트 (우측) -->
  <g transform="translate(610,560)">
    <!-- 창문 -->
    <rect x="190" y="-180" width="250" height="430" rx="10" fill="#cfe5f5" stroke="#ffffff" stroke-width="8"/>
    <line x1="315" y1="-180" x2="315" y2="250" stroke="#ffffff" stroke-width="8"/>
    <!-- 창문 키트(배기구) -->
    <rect x="200" y="40" width="230" height="70" rx="8" fill="#3a3f47"/>
    <!-- 배기호스 (주름) -->
    <path d="M120 70 C 150 60, 175 70, 200 75" stroke="#9aa3ad" stroke-width="46" fill="none" stroke-linecap="round"/>
    <path d="M120 70 C 150 60, 175 70, 200 75" stroke="#c7ced5" stroke-width="46" fill="none" stroke-linecap="round" stroke-dasharray="10 14"/>
    <!-- 본체 -->
    <rect x="-40" y="-70" width="190" height="320" rx="22" fill="#ffffff" stroke="#dfe6ee" stroke-width="4"/>
    <rect x="-22" y="-40" width="154" height="120" rx="12" fill="#eef3f8"/>
    <line x1="-10" y1="-18" x2="120" y2="-18" stroke="#cdd8e2" stroke-width="6"/>
    <line x1="-10" y1="4" x2="120" y2="4" stroke="#cdd8e2" stroke-width="6"/>
    <line x1="-10" y1="26" x2="120" y2="26" stroke="#cdd8e2" stroke-width="6"/>
    <circle cx="98" cy="118" r="12" fill="#E8722C"/>
    <rect x="-20" y="150" width="150" height="40" rx="8" fill="#f0f4f8"/>
    <!-- 캐스터 -->
    <circle cx="-12" cy="262" r="14" fill="#3a3f47"/>
    <circle cx="142" cy="262" r="14" fill="#3a3f47"/>
    <!-- 더운 공기 화살표 (창문 안쪽 상단, 안전여백 내) -->
    <text x="315" y="-130" font-family="Malgun Gothic" font-size="38" fill="#E23B3B" font-weight="bold" text-anchor="middle">더운 공기</text>
    <text x="315" y="-78" font-family="Malgun Gothic" font-size="44" fill="#E23B3B" font-weight="bold" text-anchor="middle">▼ 밖으로</text>
  </g>

  <!-- 하단 디테일 박스 -->
  <rect x="64" y="884" rx="20" ry="20" width="690" height="104" fill="#ffffff" opacity="0.16"/>
  <text x="92" y="952" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#FFFFFF" text-anchor="start">평수·용도별 추천 BEST 5</text>

  <text x="64" y="1040" font-family="Malgun Gothic" font-weight="normal" font-size="32" fill="#E8EEF5" text-anchor="start" letter-spacing="0.9">blog.naver.com/trip_chocho</text>
</svg>