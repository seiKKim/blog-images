<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FFF3E9"/>
  <rect width="1080" height="190" fill="#E8722C"/>
  <text x="60" y="120" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">잠귀 밝은 침실용 기준</text>

  <!-- 큰 dB 강조 -->
  <rect x="60" y="260" width="960" height="260" rx="24" fill="#2B2F36"/>
  <text x="540" y="345" font-family="Malgun Gothic" font-size="42" fill="#FFF3E9" text-anchor="middle">신형 저소음 인버터</text>
  <text x="540" y="470" font-family="Malgun Gothic" font-size="130" font-weight="bold" fill="#FFD23F" text-anchor="middle">30dB대</text>

  <!-- 3대 조건 -->
  <text x="60" y="620" font-family="Malgun Gothic" font-size="44" font-weight="bold" fill="#1a1a1a">이 3가지가 다 있어야 합니다</text>

  <g font-family="Malgun Gothic">
    <rect x="60" y="660" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0D6C2"/>
    <text x="95" y="735" font-size="44" font-weight="bold" fill="#E8722C">1</text>
    <text x="150" y="735" font-size="42" fill="#1a1a1a">인버터 + 취침모드</text>

    <rect x="60" y="800" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0D6C2"/>
    <text x="95" y="875" font-size="44" font-weight="bold" fill="#E8722C">2</text>
    <text x="150" y="875" font-size="42" fill="#1a1a1a">30dB대 저소음 스펙</text>

    <rect x="60" y="940" width="960" height="120" rx="16" fill="#ffffff" stroke="#F0D6C2"/>
    <text x="95" y="1015" font-size="44" font-weight="bold" fill="#E8722C">3</text>
    <text x="150" y="1015" font-size="42" fill="#1a1a1a">무풍/저풍속(0.5m/s) 직바람 회피</text>
  </g>

  <rect x="60" y="1100" width="960" height="150" rx="20" fill="#FFF3E9" stroke="#F0D6C2"/>
  <text x="90" y="1165" font-family="Malgun Gothic" font-size="38" font-weight="bold" fill="#1a1a1a">예: 삼성 무풍 윈도우핏 32dB (리뷰 기준)</text>
  <text x="90" y="1220" font-family="Malgun Gothic" font-size="34" fill="#1a1a1a">야간 실사용 후기가 조용한지 꼭 교차 확인!</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#F0E0D2"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">처음 식힐 땐 웅웅거림 → 취침모드 전환 시 대부분 해결</text>
</svg>