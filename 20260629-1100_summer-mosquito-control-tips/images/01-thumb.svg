<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#E8722C"/>
  <circle cx="950" cy="170" r="280" fill="#ffffff" opacity="0.08"/>
  <circle cx="110" cy="980" r="220" fill="#ffffff" opacity="0.06"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="86" rx="34" ry="34" width="220" height="68" fill="#FFD23F"/>
  <text x="190" y="132" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#2A2118" text-anchor="middle">생활꿀팁</text>

  <!-- 채널 핸들 (우상단 안전여백) -->
  <text x="1000" y="132" font-family="Malgun Gothic" font-weight="normal" font-size="30" fill="#FFF3E8" opacity="0.85" text-anchor="end">blog.naver.com/trip_chocho</text>

  <!-- 모기 일러스트 (우측, 서브카피 옆) -->
  <g transform="translate(880,260)">
    <ellipse cx="0" cy="0" rx="40" ry="24" fill="#2A2118" opacity="0.85"/>
    <circle cx="-40" cy="-4" r="18" fill="#2A2118" opacity="0.85"/>
    <line x1="-54" y1="-14" x2="-92" y2="-48" stroke="#2A2118" stroke-width="5"/>
    <line x1="-54" y1="-14" x2="-86" y2="-54" stroke="#2A2118" stroke-width="5"/>
    <ellipse cx="8" cy="-34" rx="48" ry="18" fill="#ffffff" opacity="0.5" transform="rotate(-25 8 -34)"/>
    <ellipse cx="8" cy="-34" rx="48" ry="18" fill="#ffffff" opacity="0.4" transform="rotate(25 8 -34)"/>
  </g>

  <!-- 서브 카피 -->
  <text x="80" y="312" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#FFF3E8">효과 없는 데 돈 쓰기 전에!</text>

  <!-- 메인 카피 -->
  <text x="80" y="452" font-family="Malgun Gothic" font-weight="bold" font-size="124" fill="#FFFFFF">모기 없애는 법</text>
  <text x="80" y="586" font-family="Malgun Gothic" font-weight="bold" font-size="118" fill="#FFD23F">진짜 통하는 것만</text>

  <!-- 핵심 3단계 박스 -->
  <rect x="80" y="668" rx="22" ry="22" width="920" height="168" fill="#ffffff" opacity="0.16"/>
  <text x="540" y="740" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#FFFFFF" text-anchor="middle">유입 차단 · 번식지 제거 · 물린 데 대처</text>
  <text x="540" y="802" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#FFF3E8" text-anchor="middle">핵심은 딱 세 단계</text>

  <!-- 하단 3아이콘 -->
  <g transform="translate(80,862)">
    <!-- 1 차단(창문) -->
    <rect x="70" y="10" width="110" height="110" rx="14" fill="#D9ECF7" stroke="#FFFFFF" stroke-width="6"/>
    <line x1="125" y1="10" x2="125" y2="120" stroke="#FFFFFF" stroke-width="6"/>
    <line x1="70" y1="65" x2="180" y2="65" stroke="#FFFFFF" stroke-width="6"/>
    <text x="125" y="162" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#FFFFFF" text-anchor="middle">차단</text>
    <!-- 2 번식지(물방울) -->
    <path d="M450 14 C422 56 414 78 414 94 a36 36 0 0 0 72 0 C486 78 478 56 450 14 Z" fill="#FFFFFF"/>
    <line x1="416" y1="110" x2="486" y2="40" stroke="#E23B3B" stroke-width="10"/>
    <text x="450" y="162" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#FFFFFF" text-anchor="middle">번식지 제거</text>
    <!-- 3 대처(아이스팩) -->
    <rect x="770" y="14" width="100" height="96" rx="18" fill="#BFE3F7" stroke="#FFFFFF" stroke-width="6"/>
    <text x="820" y="82" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#C85D1C" text-anchor="middle">❄</text>
    <text x="820" y="162" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#FFFFFF" text-anchor="middle">냉찜질</text>
  </g>
</svg>