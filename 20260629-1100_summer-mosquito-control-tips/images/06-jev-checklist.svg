  <text x="107" y="428" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#FFFFFF" text-anchor="middle">✓</text>
  <text x="170" y="432" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#2A2118">모기 활동기(4~10월) 야간 야외활동 자제</text>
  <rect x="50" y="500" width="980" height="130" rx="16" fill="#FFFFFF" stroke="#EAD9C8" stroke-width="3"/>
