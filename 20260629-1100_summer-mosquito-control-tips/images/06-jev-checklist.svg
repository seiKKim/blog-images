  <text x="170" y="582" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#2A2118">야간 외출 시 밝은 색 품 넓은 긴 옷</text>
  <rect x="50" y="650" width="980" height="130" rx="16" fill="#FFFFFF" stroke="#EAD9C8" stroke-width="3"/>
