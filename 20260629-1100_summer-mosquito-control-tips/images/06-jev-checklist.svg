  <text x="170" y="882" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#2A2118">진한 향수·화장품 등 유인 제품 자제</text>
  <rect x="50" y="950" width="980" height="130" rx="16" fill="#FFFFFF" stroke="#EAD9C8" stroke-width="3"/>
  <rect x="80" y="988" width="54" height="54" rx="10" fill="#1F8A53"/>
