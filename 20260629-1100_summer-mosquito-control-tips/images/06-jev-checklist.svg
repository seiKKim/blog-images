  <text x="170" y="1182" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#2A2118">집 주변 고인 물(웅덩이·배수로) 제거</text>

  <rect x="0" y="1278" width="1080" height="72" fill="#FFF3E8"/>
