  <text x="540" y="290" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#FFFFFF" text-anchor="middle">치료법 없어 예방이 최선 · 매개=작은빨간집모기</text>

  <rect x="50" y="350" width="980" height="130" rx="16" fill="#FFFFFF" stroke="#EAD9C8" stroke-width="3"/>
