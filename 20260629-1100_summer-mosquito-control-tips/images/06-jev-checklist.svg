  <text x="170" y="1032" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#2A2118">방충망 정비 및 모기장 사용</text>
  <rect x="50" y="1100" width="980" height="130" rx="16" fill="#FFFFFF" stroke="#EAD9C8" stroke-width="3"/>
  <rect x="80" y="1138" width="54" height="54" rx="10" fill="#1F8A53"/>
