  <text x="60" y="1080" font-family="Noto Sans CJK KR" font-size="40" fill="#5B6B7C">새 금액은 이 기준점에서 인상폭을 정합니다.</text>
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="32" fill="#5B6B7C">출처: 고용노동부 · 최저임금위원회</text>
