<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="1080" height="1350" fill="#FBF4EE"/>
<rect width="1080" height="200" fill="#E8722C"/>
<text x="60" y="128" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff">제습기 vs 에어컨 vs 제습제</text>
<g font-family="Malgun Gothic">
<rect x="60" y="270" width="960" height="130" rx="16" fill="#ffffff" stroke="#F0D8C6"/>
<rect x="60" y="270" width="14" height="130" rx="7" fill="#E8722C"/>
<text x="104" y="328" font-size="42" font-weight="bold" fill="#B4531A">제습기</text>
<text x="104" y="378" font-size="38" fill="#3a3a3a">넓은 거실·방, 빠른 제습에 가장 효과적</text>
<rect x="60" y="420" width="960" height="130" rx="16" fill="#ffffff" stroke="#F0D8C6"/>
<rect x="60" y="420" width="14" height="130" rx="7" fill="#E8722C"/>
<text x="104" y="478" font-size="42" font-weight="bold" fill="#B4531A">에어컨(제습 모드)</text>
<text x="104" y="528" font-size="38" fill="#3a3a3a">냉방 겸용 / 제습기와 병행하면 더 시원</text>
<rect x="60" y="570" width="960" height="130" rx="16" fill="#ffffff" stroke="#F0D8C6"/>
<rect x="60" y="570" width="14" height="130" rx="7" fill="#E8722C"/>
<text x="104" y="628" font-size="42" font-weight="bold" fill="#B4531A">제습제 (염화칼슘·실리카겔·숯)</text>
<text x="104" y="678" font-size="38" fill="#3a3a3a">옷장·신발장 등 밀폐 소공간에 유리</text>
</g>
<rect x="60" y="730" width="960" height="96" rx="16" fill="#FDE7C8"/>
<text x="100" y="790" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#B4531A">공간에 맞게 역할을 나누는 것이 효율적</text>
<rect x="0" y="1270" width="1080" height="80" fill="#F0DECB"/>
<text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#8A6A50">출처: 생활정보 종합</text>
</svg>