<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="1080" height="1350" fill="#FBF4EE"/>
<rect width="1080" height="200" fill="#E8722C"/>
<text x="60" y="128" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff">곰팡이 표면별 처리법</text>
<g font-family="Malgun Gothic">
<rect x="60" y="270" width="960" height="130" rx="16" fill="#ffffff" stroke="#F0D8C6"/>
<rect x="60" y="270" width="14" height="130" rx="7" fill="#E8722C"/>
<text x="104" y="328" font-size="42" font-weight="bold" fill="#B4531A">단단한 표면 (타일·유리)</text>
<text x="104" y="378" font-size="38" fill="#3a3a3a">물·세제 청소 후 완전 건조 / 락스 사용 가능</text>
<rect x="60" y="420" width="960" height="130" rx="16" fill="#ffffff" stroke="#F0D8C6"/>
<rect x="60" y="420" width="14" height="130" rx="7" fill="#E8722C"/>
<text x="104" y="478" font-size="42" font-weight="bold" fill="#B4531A">흡수성 소재 (벽지·천장)</text>
<text x="104" y="528" font-size="38" fill="#3a3a3a">곰팡이가 스며들면 교체가 나을 수 있음</text>
<rect x="60" y="570" width="960" height="130" rx="16" fill="#ffffff" stroke="#F0D8C6"/>
<rect x="60" y="570" width="14" height="130" rx="7" fill="#E8722C"/>
<text x="104" y="628" font-size="42" font-weight="bold" fill="#B4531A">욕실 실리콘·틈새</text>
<text x="104" y="678" font-size="38" fill="#3a3a3a">휴지 얹고 희석 락스 적신 뒤 헹굼(휴지팩)</text>
</g>
<rect x="60" y="730" width="960" height="96" rx="16" fill="#FDE7C8"/>
<text x="100" y="790" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#B4531A">눅눅한 자재는 24~48시간 내 건조</text>
<rect x="0" y="1270" width="1080" height="80" fill="#F0DECB"/>
<text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#8A6A50">출처: 미국 EPA 곰팡이 관리 가이드</text>
</svg>