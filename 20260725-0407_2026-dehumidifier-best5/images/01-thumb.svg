<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0FA3B1"/>
      <stop offset="1" stop-color="#0E6BA8"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- 장식: 물방울/시원함 -->
  <circle cx="930" cy="200" r="270" fill="#ffffff" opacity="0.08"/>
  <circle cx="140" cy="960" r="210" fill="#ffffff" opacity="0.07"/>
  <circle cx="900" cy="870" r="90" fill="#7FE3EC" opacity="0.18"/>
  <circle cx="230" cy="180" r="52" fill="#7FE3EC" opacity="0.22"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="88" rx="34" ry="34" width="228" height="68" fill="#FFD23F"/>
  <text x="194" y="134" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#0E4A5B" text-anchor="middle">여름 생활꿀팁</text>

  <!-- 서브 카피 -->
  <text x="80" y="288" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#E8FBFF">장마 끝? 지금부터가 습기 지옥</text>

  <!-- 메인 카피 -->
  <text x="80" y="452" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="112" fill="#ffffff">2026 제습기</text>
  <text x="80" y="588" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="150" fill="#FFD23F">추천 BEST 5</text>

  <!-- 5유형 칩 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="38" fill="#0E4A5B">
    <rect x="80" y="662" rx="18" width="180" height="72" fill="#EAFBFE"/>
    <text x="170" y="710" text-anchor="middle">대용량</text>
    <rect x="272" y="662" rx="18" width="180" height="72" fill="#EAFBFE"/>
    <text x="362" y="710" text-anchor="middle">인버터</text>
    <rect x="464" y="662" rx="18" width="150" height="72" fill="#EAFBFE"/>
    <text x="539" y="710" text-anchor="middle">소형</text>
    <rect x="626" y="662" rx="18" width="200" height="72" fill="#EAFBFE"/>
    <text x="726" y="710" text-anchor="middle">빨래건조</text>
    <rect x="838" y="662" rx="18" width="162" height="72" fill="#EAFBFE"/>
    <text x="919" y="710" text-anchor="middle">가성비</text>
  </g>

  <!-- 디테일 박스 -->
  <rect x="80" y="782" rx="20" ry="20" width="920" height="132" fill="#ffffff" opacity="0.15"/>
  <text x="112" y="848" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff">평수별 용량 · 전기세 · 빨래건조까지</text>
  <text x="112" y="898" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="38" fill="#E8FBFF">후회 없이 고르는 법 총정리</text>

  <!-- 채널 -->
  <text x="80" y="1006" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#E8FBFF" opacity="0.9">blog.naver.com/trip_chocho</text>
</svg>
