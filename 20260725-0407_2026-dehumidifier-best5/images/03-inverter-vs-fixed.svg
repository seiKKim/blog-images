<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F1FAFB"/>
  <!-- 상단 색띠 -->
  <rect width="1080" height="210" fill="#0E6BA8"/>
  <text x="60" y="112" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">인버터 vs 정속형</text>
  <text x="60" y="168" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="38" fill="#CDE9F5">압축기 방식에 따라 소음·전기·가격이 달라져요</text>

  <!-- 좌: 인버터 카드 -->
  <rect x="60" y="262" width="465" height="740" rx="24" fill="#ffffff" stroke="#0FA3B1" stroke-width="4"/>
  <rect x="60" y="262" width="465" height="120" rx="24" fill="#0FA3B1"/>
  <rect x="60" y="330" width="465" height="52" fill="#0FA3B1"/>
  <text x="292" y="340" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#ffffff" text-anchor="middle">인버터형</text>
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" fill="#1a1a1a">
    <text x="96" y="452" font-weight="bold" font-size="34" fill="#0E6BA8">작동 방식</text>
    <text x="96" y="502" font-size="33">회전수 조절 (강→약)</text>
    <text x="96" y="580" font-weight="bold" font-size="34" fill="#0E6BA8">소음</text>
    <text x="96" y="630" font-size="33">약 30~35dB · 야간 OK</text>
    <text x="96" y="708" font-weight="bold" font-size="34" fill="#0E6BA8">전력</text>
    <text x="96" y="758" font-size="33">약 20~30% 절감</text>
    <text x="96" y="836" font-weight="bold" font-size="34" fill="#0E6BA8">가격대</text>
    <text x="96" y="886" font-weight="bold" font-size="40">약 20~45만원</text>
  </g>
  <rect x="96" y="922" width="393" height="56" rx="14" fill="#EAFBFE"/>
  <text x="292" y="960" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="30" fill="#0E4A5B" text-anchor="middle">침실·야간·상시가동 추천</text>

  <!-- 우: 정속형 카드 -->
  <rect x="555" y="262" width="465" height="740" rx="24" fill="#ffffff" stroke="#B7C7D2" stroke-width="4"/>
  <rect x="555" y="262" width="465" height="120" rx="24" fill="#5B6B7C"/>
  <rect x="555" y="330" width="465" height="52" fill="#5B6B7C"/>
  <text x="787" y="340" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#ffffff" text-anchor="middle">정속형</text>
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" fill="#1a1a1a">
    <text x="591" y="452" font-weight="bold" font-size="34" fill="#5B6B7C">작동 방식</text>
    <text x="591" y="502" font-size="33">항상 100% 출력</text>
    <text x="591" y="580" font-weight="bold" font-size="34" fill="#5B6B7C">소음</text>
    <text x="591" y="630" font-size="33">강풍 시 50dB대 많음</text>
    <text x="591" y="708" font-weight="bold" font-size="34" fill="#5B6B7C">전력</text>
    <text x="591" y="758" font-size="33">On/Off 반복 시 낭비</text>
    <text x="591" y="836" font-weight="bold" font-size="34" fill="#5B6B7C">가격대</text>
    <text x="591" y="886" font-weight="bold" font-size="40">약 10~20만원</text>
  </g>
  <rect x="591" y="922" width="393" height="56" rx="14" fill="#EEF2F5"/>
  <text x="787" y="960" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="30" fill="#40505C" text-anchor="middle">거실만 낮에 쓰면 무난</text>

  <!-- 하단 정리 박스 -->
  <rect x="60" y="1042" width="960" height="150" rx="18" fill="#FFF6DA" stroke="#F3D97A" stroke-width="2"/>
  <text x="96" y="1106" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="38" fill="#8A6D00">💡 인버터의 진짜 실익</text>
  <text x="96" y="1160" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#1a1a1a">전기료보다 '소음·연속 쾌적성'에 있어요</text>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#DDEFF4"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">가격·소음은 소스 기반 대략 범위 · blog.naver.com/trip_chocho</text>
</svg>
