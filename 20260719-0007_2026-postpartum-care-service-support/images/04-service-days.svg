<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="118" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">서비스 유형별 지원 일수</text>
  <text x="60" y="168" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#E8EEF5">태아유형 × 출산순위 × 단축·표준·연장형</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 헤더 -->
    <rect x="60" y="270" width="960" height="110" fill="#1B5FA6"/>
    <text x="90" y="340" font-size="38" font-weight="bold" fill="#ffffff">태아유형</text>
    <text x="600" y="340" font-size="38" font-weight="bold" fill="#FFD23F" text-anchor="middle">단축형</text>
    <text x="770" y="340" font-size="38" font-weight="bold" fill="#FFD23F" text-anchor="middle">표준형</text>
    <text x="945" y="340" font-size="38" font-weight="bold" fill="#FFD23F" text-anchor="middle">연장형</text>

    <!-- 행 1 -->
    <rect x="60" y="380" width="960" height="150" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="90" y="470" font-size="36" font-weight="bold" fill="#1a1a1a">단태아 첫째아</text>
    <text x="600" y="470" font-size="42" font-weight="bold" fill="#3a4658" text-anchor="middle">5일</text>
    <text x="770" y="470" font-size="42" font-weight="bold" fill="#1B5FA6" text-anchor="middle">10일</text>
    <text x="945" y="470" font-size="42" font-weight="bold" fill="#3a4658" text-anchor="middle">15일</text>

    <!-- 행 2 -->
    <rect x="60" y="530" width="960" height="150" fill="#EEF3F9" stroke="#D6E0EC"/>
    <text x="90" y="620" font-size="36" font-weight="bold" fill="#1a1a1a">단태아 둘째아 이상</text>
    <text x="600" y="620" font-size="42" font-weight="bold" fill="#3a4658" text-anchor="middle">10일</text>
    <text x="770" y="620" font-size="42" font-weight="bold" fill="#1B5FA6" text-anchor="middle">15일</text>
    <text x="945" y="620" font-size="42" font-weight="bold" fill="#3a4658" text-anchor="middle">20일</text>

    <!-- 행 3 -->
    <rect x="60" y="680" width="960" height="150" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="90" y="770" font-size="36" font-weight="bold" fill="#1a1a1a">쌍태아 (인력 1명)</text>
    <text x="600" y="770" font-size="42" font-weight="bold" fill="#3a4658" text-anchor="middle">10일</text>
    <text x="770" y="770" font-size="42" font-weight="bold" fill="#1B5FA6" text-anchor="middle">15일</text>
    <text x="945" y="770" font-size="42" font-weight="bold" fill="#3a4658" text-anchor="middle">20일</text>

    <!-- 행 4 -->
    <rect x="60" y="830" width="960" height="150" fill="#EEF3F9" stroke="#D6E0EC"/>
    <text x="90" y="908" font-size="36" font-weight="bold" fill="#1a1a1a">삼태아 이상 (인력 2명)</text>
    <text x="600" y="908" font-size="36" font-weight="bold" fill="#3a4658" text-anchor="middle">3주 내외</text>
    <text x="770" y="908" font-size="36" font-weight="bold" fill="#1B5FA6" text-anchor="middle">5주 내외</text>
    <text x="945" y="908" font-size="36" font-weight="bold" fill="#3a4658" text-anchor="middle">8주 내외</text>
    <text x="90" y="954" font-size="28" fill="#E23B3B">※ 삼태아 이상 일수는 소스마다 달라 보건소·복지로 최종 확인</text>
  </g>

  <rect x="60" y="1020" width="960" height="180" rx="16" fill="#FFF6E0" stroke="#F0D98A"/>
  <text x="90" y="1082" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" font-weight="bold" fill="#8a6d1a">바우처 유효기간(기본)</text>
  <text x="90" y="1136" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5a4a15">서비스 개시: 출산일로부터 60일 이내</text>
  <text x="90" y="1180" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5a4a15">서비스 이용: 출산일로부터 90일 이내 (일부 100일)</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 본문 정리(관할 보건소·복지로 확인) · blog.naver.com/trip_chocho</text>
</svg>
