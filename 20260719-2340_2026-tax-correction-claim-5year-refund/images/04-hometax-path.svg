<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <rect width="1080" height="150" fill="#1F8A53"/>
  <text x="60" y="98" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="54" fill="#ffffff">홈택스 경정청구 메뉴 경로</text>

  <!-- 스텝 리스트 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 1 -->
    <circle cx="110" cy="248" r="40" fill="#1F8A53"/>
    <text x="110" y="264" font-weight="bold" font-size="44" fill="#ffffff" text-anchor="middle">1</text>
    <rect x="180" y="208" width="852" height="80" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="212" y="262" font-weight="bold" font-size="40" fill="#1a1a1a">세금신고</text>

    <path d="M110 300 v40" stroke="#B7C6D6" stroke-width="4"/>

    <!-- 2 -->
    <circle cx="110" cy="380" r="40" fill="#1F8A53"/>
    <text x="110" y="396" font-weight="bold" font-size="44" fill="#ffffff" text-anchor="middle">2</text>
    <rect x="180" y="340" width="852" height="80" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="212" y="394" font-weight="bold" font-size="40" fill="#1a1a1a">종합소득세 신고 → 근로소득 신고</text>

    <path d="M110 432 v40" stroke="#B7C6D6" stroke-width="4"/>

    <!-- 3 -->
    <circle cx="110" cy="512" r="40" fill="#1F8A53"/>
    <text x="110" y="528" font-weight="bold" font-size="44" fill="#ffffff" text-anchor="middle">3</text>
    <rect x="180" y="472" width="852" height="80" rx="16" fill="#FFF6D9" stroke="#FFD23F" stroke-width="3"/>
    <text x="212" y="526" font-weight="bold" font-size="40" fill="#7A5B00">경정청구 → 귀속연도 선택</text>
  </g>

  <!-- 하단 안내 -->
  <rect x="48" y="596" width="984" height="80" rx="16" fill="#E6F3EC"/>
  <text x="80" y="648" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="34" fill="#14663C">누락 공제·감면 추가 입력 후 증빙서류 첨부 → 제출</text>
</svg>
