<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1F8A53"/>
      <stop offset="1" stop-color="#14663C"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="960" cy="170" r="270" fill="#ffffff" opacity="0.07"/>
  <circle cx="110" cy="990" r="220" fill="#ffffff" opacity="0.05"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="86" rx="34" ry="34" width="200" height="68" fill="#FFD23F"/>
  <text x="180" y="132" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#14663C" text-anchor="middle">세금 · 환급</text>

  <!-- 서브 카피 -->
  <text x="80" y="286" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#E8EEF5">놓친 연말정산 공제, 지금도 환급</text>

  <!-- 메인 카피 -->
  <text x="80" y="440" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="130" fill="#ffffff">경정청구</text>
  <text x="80" y="600" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="150" fill="#FFD23F">5년 소급</text>

  <!-- 항목 태그 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#14663C">
    <rect x="80" y="666" rx="18" width="180" height="72" fill="#ffffff"/>
    <text x="170" y="716" text-anchor="middle">월세 17%</text>
    <rect x="278" y="666" rx="18" width="212" height="72" fill="#ffffff"/>
    <text x="384" y="716" text-anchor="middle">안경 50만원</text>
    <rect x="508" y="666" rx="18" width="290" height="72" fill="#ffffff"/>
    <text x="653" y="716" text-anchor="middle">중소기업 감면</text>
  </g>

  <!-- 디테일 박스 -->
  <rect x="80" y="796" rx="20" ry="20" width="920" height="128" fill="#ffffff" opacity="0.15"/>
  <text x="112" y="878" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="48" fill="#ffffff">2021년 귀속분까지 · 홈택스 신청</text>

  <!-- 채널 -->
  <text x="80" y="1006" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#E8EEF5" opacity="0.9">blog.naver.com/trip_chocho</text>
</svg>
