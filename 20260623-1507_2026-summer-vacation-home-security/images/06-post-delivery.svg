<rect x="0" y="0" width="1080" height="200" rx="0" ry="0" fill="#E0556E" stroke="none" stroke-width="0"/><rect x="60" y="46" width="180" height="64" rx="32" ry="32" fill="#FFD23F" stroke="none" stroke-width="0"/><text x="150" y="90" font-family="Noto Sans CJK KR" font-weight="800" font-size="28" fill="#1a1a1a" text-anchor="middle">가정의달 · 시즌</text><text x="60" y="170" font-family="Noto Sans CJK KR" font-weight="800" font-size="56" fill="#ffffff" text-anchor="start">우편 · 택배 처리 (빈집 신호 차단)</text><rect x="0" y="200" width="1080" height="1150" rx="0" ry="0" fill="#F4F7FB" stroke="none" stroke-width="0"/><rect x="60" y="270" width="960" height="230" rx="20" ry="20" fill="#ffffff" stroke="#EBD3DA" stroke-width="2"/><rect x="60" y="270" width="14" height="230" rx="7" ry="7" fill="#E0556E" stroke="none" stroke-width="0"/><text x="110" y="344" font-family="Noto Sans CJK KR" font-weight="800" font-size="44" fill="#B03850" text-anchor="start">우체국 장기부재 신고</text><text x="110" y="410" font-family="Noto Sans CJK KR" font-weight="600" font-size="32" fill="#1a1a1a" text-anchor="start">휴가로 장기간 비울 때 우편물이 쌓이지 않게 처리</text><text x="110" y="464" font-family="Noto Sans CJK KR" font-weight="700" font-size="31" fill="#5B6B7C" text-anchor="start">· 최장 15일분 일괄 배송 (언론 인용 기준)</text><rect x="60" y="530" width="960" height="230" rx="20" ry="20" fill="#ffffff" stroke="#EBD3DA" stroke-width="2"/><rect x="60" y="530" width="14" height="230" rx="7" ry="7" fill="#E0556E" stroke="none" stroke-width="0"/><text x="110" y="604" font-family="Noto Sans CJK KR" font-weight="800" font-size="44" fill="#B03850" text-anchor="start">등기우편</text><text x="110" y="670" font-family="Noto Sans CJK KR" font-weight="600" font-size="32" fill="#1a1a1a" text-anchor="start">배달 실패 시 우체국에서 4일간 보관</text><text x="110" y="724" font-family="Noto Sans CJK KR" font-weight="700" font-size="31" fill="#5B6B7C" text-anchor="start">· 재배달 희망일 지정 가능</text><rect x="60" y="790" width="960" height="230" rx="20" ry="20" fill="#ffffff" stroke="#EBD3DA" stroke-width="2"/><rect x="60" y="790" width="14" height="230" rx="7" ry="7" fill="#E0556E" stroke="none" stroke-width="0"/><text x="110" y="864" font-family="Noto Sans CJK KR" font-weight="800" font-size="44" fill="#B03850" text-anchor="start">택배</text><text x="110" y="930" font-family="Noto Sans CJK KR" font-weight="600" font-size="32" fill="#1a1a1a" text-anchor="start">각 택배사 앱·고객센터 이용</text><text x="110" y="984" font-family="Noto Sans CJK KR" font-weight="700" font-size="31" fill="#5B6B7C" text-anchor="start">· 배송 보류 · 무인보관함 지정 활용</text><rect x="60" y="1060" width="960" height="200" rx="20" ry="20" fill="#FFF3F6" stroke="#EBD3DA" stroke-width="2"/><text x="100" y="1124" font-family="Noto Sans CJK KR" font-weight="800" font-size="36" fill="#B03850" text-anchor="start">정확한 서비스명 · 신청 방법은 확인 필요</text><text x="100" y="1187" font-family="Noto Sans CJK KR" font-weight="700" font-size="33" fill="#1a1a1a" text-anchor="start">인터넷우체국(epost.go.kr) 또는</text><text x="100" y="1232" font-family="Noto Sans CJK KR" font-weight="800" font-size="33" fill="#1a1a1a" text-anchor="start">우편고객센터 ☎ 1588-1300 문의</text><rect x="0" y="1270" width="1080" height="80" rx="0" ry="0" fill="#E8EEF5" stroke="none" stroke-width="0"/><text x="60" y="1318" font-family="Noto Sans CJK KR" font-weight="600" font-size="30" fill="#5B6B7C" text-anchor="start">출처: 인터넷우체국(epost.go.kr) · 우편고객센터 1588-1300</text><text x="1020" y="1318" font-family="Noto Sans CJK KR" font-weight="600" font-size="28" fill="#5B6B7C" text-anchor="end">blog.naver.com/trip_chocho</text>
