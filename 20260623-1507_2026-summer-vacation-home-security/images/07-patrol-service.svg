<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect x="0" y="0" width="1080" height="200" rx="0" ry="0" fill="#E0556E" stroke="none" stroke-width="0"/><rect x="60" y="46" width="180" height="64" rx="32" ry="32" fill="#FFD23F" stroke="none" stroke-width="0"/><text x="150" y="90" font-family="Noto Sans CJK KR" font-weight="800" font-size="28" fill="#1a1a1a" text-anchor="middle">가정의달 · 시즌</text><text x="60" y="170" font-family="Noto Sans CJK KR" font-weight="800" font-size="56" fill="#ffffff" text-anchor="start">경찰 · 공공 순찰 서비스</text><rect x="0" y="200" width="1080" height="1150" rx="0" ry="0" fill="#F4F7FB" stroke="none" stroke-width="0"/><rect x="60" y="250" width="960" height="170" rx="20" ry="20" fill="#FFF3F6" stroke="#EBD3DA" stroke-width="2"/><text x="100" y="320" font-family="Noto Sans CJK KR" font-weight="800" font-size="38" fill="#B03850" text-anchor="start">'빈집 사전신고제'(전국 통일 제도)</text><text x="100" y="380" font-family="Noto Sans CJK KR" font-weight="700" font-size="33" fill="#1a1a1a" text-anchor="start">2020년 폐지 (보도 다수) → 대체 수단 이용</text><rect x="60" y="460" width="960" height="250" rx="20" ry="20" fill="#ffffff" stroke="#EBD3DA" stroke-width="2"/><rect x="60" y="460" width="14" height="250" rx="7" ry="7" fill="#E0556E" stroke="none" stroke-width="0"/><text x="110" y="538" font-family="Noto Sans CJK KR" font-weight="800" font-size="46" fill="#B03850" text-anchor="start">탄력순찰</text><text x="110" y="608" font-family="Noto Sans CJK KR" font-weight="600" font-size="32" fill="#1a1a1a" text-anchor="start">국민이 원하는 시간·장소를 선택하면 경찰이 순찰</text><text x="110" y="664" font-family="Noto Sans CJK KR" font-weight="700" font-size="31" fill="#5B6B7C" text-anchor="start">· 주민 수요 중심 방식</text><rect x="60" y="740" width="960" height="250" rx="20" ry="20" fill="#ffffff" stroke="#EBD3DA" stroke-width="2"/><rect x="60" y="740" width="14" height="250" rx="7" ry="7" fill="#E0556E" stroke="none" stroke-width="0"/><text x="110" y="818" font-family="Noto Sans CJK KR" font-weight="800" font-size="46" fill="#B03850" text-anchor="start">순찰신문고</text><text x="110" y="888" font-family="Noto Sans CJK KR" font-weight="600" font-size="32" fill="#1a1a1a" text-anchor="start">경찰민원24(minwon24.police.go.kr)에서 검색·신청</text><text x="110" y="944" font-family="Noto Sans CJK KR" font-weight="700" font-size="31" fill="#5B6B7C" text-anchor="start">· 인터넷 신청 · 구비서류·수수료 없음 · 처리 1일</text><text x="60" y="1042" font-family="Noto Sans CJK KR" font-weight="600" font-size="30" fill="#5B6B7C" text-anchor="start">* 112 출동 등으로 순찰 제공이 어려울 수 있고,</text><text x="60" y="1084" font-family="Noto Sans CJK KR" font-weight="600" font-size="30" fill="#5B6B7C" text-anchor="start">  모든 요청이 그대로 반영되는 것은 아님</text><rect x="0" y="1270" width="1080" height="80" rx="0" ry="0" fill="#E8EEF5" stroke="none" stroke-width="0"/><text x="60" y="1318" font-family="Noto Sans CJK KR" font-weight="600" font-size="30" fill="#5B6B7C" text-anchor="start">출처: 경찰민원24(minwon24.police.go.kr)</text><text x="1020" y="1318" font-family="Noto Sans CJK KR" font-weight="600" font-size="28" fill="#5B6B7C" text-anchor="end">blog.naver.com/trip_chocho</text>
</svg>
