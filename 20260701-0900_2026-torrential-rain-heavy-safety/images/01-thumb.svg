<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2B2F36"/>
      <stop offset="1" stop-color="#171A1F"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- 빗줄기 장식 -->
  <g stroke="#3C6E9E" stroke-width="6" stroke-linecap="round" opacity="0.35">
    <line x1="120" y1="60" x2="80" y2="180"/>
    <line x1="240" y1="40" x2="200" y2="160"/>
    <line x1="360" y1="70" x2="320" y2="190"/>
    <line x1="900" y1="50" x2="860" y2="170"/>
    <line x1="1000" y1="80" x2="960" y2="200"/>
  </g>
  <circle cx="960" cy="200" r="230" fill="#E23B3B" opacity="0.10"/>
  <circle cx="120" cy="960" r="200" fill="#3C6E9E" opacity="0.12"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="90" rx="34" ry="34" width="300" height="68" fill="#E23B3B"/>
  <text x="230" y="136" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="36" fill="#ffffff" text-anchor="middle">재난안전 · 장마특집</text>

  <!-- 경보 아이콘 (삼각 느낌표) -->
  <g transform="translate(840,270) scale(0.82)">
    <path d="M120 0 L240 210 L0 210 Z" fill="#FFD23F" stroke="#171A1F" stroke-width="8" stroke-linejoin="round"/>
    <rect x="107" y="70" width="26" height="80" rx="10" fill="#171A1F"/>
    <circle cx="120" cy="178" r="16" fill="#171A1F"/>
  </g>

  <!-- 서브 카피 -->
  <text x="80" y="300" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="58" fill="#E8EEF5">호우 긴급재난문자 오면?</text>

  <!-- 메인 카피 -->
  <text x="80" y="450" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="128" fill="#ffffff">즉시 지상으로</text>
  <text x="80" y="590" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="128" fill="#FFD23F">대피하세요</text>

  <!-- 핵심 포인트 박스 -->
  <rect x="80" y="680" rx="20" ry="20" width="920" height="150" fill="#ffffff" opacity="0.10"/>
  <text x="112" y="748" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="46" fill="#FFD23F">지하 30~40cm면 성인도 못 올라옵니다</text>
  <text x="112" y="805" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="40" fill="#E8EEF5">대피 · 산사태 · 침수차 탈출 · 지원금 총정리</text>

  <!-- 하단 강조띠 -->
  <rect x="80" y="870" rx="18" ry="18" width="600" height="86" fill="#E23B3B"/>
  <text x="112" y="927" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff">침수 재난지원금 최대 300만원</text>

  <!-- 채널 -->
  <text x="80" y="1020" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="34" fill="#E8EEF5" opacity="0.85">blog.naver.com/trip_chocho</text>
</svg>
