<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>

  <!-- 상단 색띠 + 제목 -->
  <rect width="1080" height="200" fill="#243B6B"/>
  <rect x="60" y="86" rx="26" width="200" height="56" fill="#FFD23F"/>
  <text x="160" y="125" font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">금융/재테크</text>
  <text x="60" y="178" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">ISA 종류 3가지 비교</text>

  <!-- 중개형 -->
  <g font-family="Malgun Gothic">
    <rect x="60" y="250" width="960" height="320" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <rect x="60" y="250" width="960" height="78" rx="20" fill="#243B6B"/>
    <rect x="60" y="290" width="960" height="38" fill="#243B6B"/>
    <text x="92" y="305" font-weight="bold" font-size="42" fill="#ffffff">① 중개형 ISA (투자중개형)</text>
    <text x="92" y="394" font-size="38" fill="#1a1a1a">· 운용방식: 투자자가 <tspan font-weight="bold">직접 매매</tspan></text>
    <text x="92" y="456" font-size="38" fill="#1a1a1a">· <tspan font-weight="bold" fill="#1F8A53">국내주식 직접투자 가능 (유일)</tspan></text>
    <text x="92" y="518" font-size="38" fill="#1a1a1a">· 예·적금 편입 <tspan font-weight="bold" fill="#E23B3B">불가</tspan> / 수수료 <tspan font-weight="bold">가장 낮음</tspan></text>
  </g>

  <!-- 신탁형 -->
  <g font-family="Malgun Gothic">
    <rect x="60" y="595" width="960" height="320" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <rect x="60" y="595" width="960" height="78" rx="20" fill="#243B6B"/>
    <rect x="60" y="635" width="960" height="38" fill="#243B6B"/>
    <text x="92" y="650" font-weight="bold" font-size="42" fill="#ffffff">② 신탁형 ISA</text>
    <text x="92" y="739" font-size="38" fill="#1a1a1a">· 운용방식: 투자자가 <tspan font-weight="bold">상품 지정</tspan></text>
    <text x="92" y="801" font-size="38" fill="#1a1a1a">· <tspan font-weight="bold" fill="#1F8A53">예·적금 편입 가능</tspan> (안정형 중심)</text>
    <text x="92" y="863" font-size="38" fill="#1a1a1a">· 신탁보수 연 <tspan font-weight="bold">0.10~0.20%</tspan></text>
  </g>

  <!-- 일임형 -->
  <g font-family="Malgun Gothic">
    <rect x="60" y="940" width="960" height="320" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <rect x="60" y="940" width="960" height="78" rx="20" fill="#243B6B"/>
    <rect x="60" y="980" width="960" height="38" fill="#243B6B"/>
    <text x="92" y="995" font-weight="bold" font-size="42" fill="#ffffff">③ 일임형 ISA</text>
    <text x="92" y="1084" font-size="38" fill="#1a1a1a">· 운용방식: <tspan font-weight="bold">전문가가 대신 운용(일임)</tspan></text>
    <text x="92" y="1146" font-size="38" fill="#1a1a1a">· 시간·지식 부족한 분에게 적합</text>
    <text x="92" y="1208" font-size="38" fill="#1a1a1a">· 수수료 연 <tspan font-weight="bold" fill="#E23B3B">0.3~0.8% (가장 높음)</tspan></text>
  </g>

  <!-- 하단 안내 띠 -->
  <rect x="0" y="1285" width="1080" height="65" fill="#E8EEF5"/>
  <text x="60" y="1327" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C">비과세·납입한도·의무기간은 세 유형 모두 동일 (2026년 6월 현행 기준)</text>
</svg>
