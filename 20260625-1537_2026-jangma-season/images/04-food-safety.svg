  <rect x="60" y="62" rx="34" ry="34" width="200" height="68" fill="#E23B3B"/><text x="160.0" y="108" font-family="Malgun Gothic" font-weight="bold" font-size="36" fill="#ffffff" text-anchor="middle">오늘의 이슈</text>
  <text x="60" y="172" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">장마철 식중독 예방 수칙</text>
  
