  <text x="210" y="312" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#1A2129">침수 도로·지하차도 진입 금지</text>
  <text x="210" y="366" font-family="Malgun Gothic" font-size="33" fill="#5B6B7C">급류 하천 포함, 무조건 우회</text>
  
  <rect x="60" y="420" width="960" height="150" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
