<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FDF4EC"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <rect x="60" y="56" rx="26" ry="26" width="180" height="60" fill="#FFD23F"/>
  <text x="150" y="98" font-family="Noto Sans CJK KR" font-weight="bold" font-size="32" fill="#1a1a1a" text-anchor="middle">생활꿀팁</text>
  <text x="270" y="128" font-family="Noto Sans CJK KR" font-weight="bold" font-size="58" fill="#ffffff">필터 청소 4단계</text>

  <g font-family="Noto Sans CJK KR">
    <circle cx="130" cy="360" r="52" fill="#E8722C"/>
    <text x="130" y="378" font-size="50" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
    <text x="220" y="350" font-size="48" font-weight="bold" fill="#1a1a1a">덮개 열고 필터 분리</text>
    <text x="220" y="408" font-size="34" fill="#7a7a7a">전원을 끈 뒤 본체 덮개를 엽니다</text>

    <circle cx="130" cy="560" r="52" fill="#E8722C"/>
    <text x="130" y="578" font-size="50" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
    <text x="220" y="550" font-size="48" font-weight="bold" fill="#1a1a1a">먼지 털어내기</text>
    <text x="220" y="608" font-size="34" fill="#7a7a7a">진공청소기·부드러운 솔로 제거</text>

    <circle cx="130" cy="760" r="52" fill="#E8722C"/>
    <text x="130" y="778" font-size="50" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
    <text x="220" y="750" font-size="48" font-weight="bold" fill="#1a1a1a">중성세제로 물세척</text>
    <text x="220" y="808" font-size="34" fill="#7a7a7a">락스 금지! 중성세제만 사용</text>

    <circle cx="130" cy="960" r="52" fill="#E8722C"/>
    <text x="130" y="978" font-size="50" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
    <text x="220" y="950" font-size="48" font-weight="bold" fill="#1a1a1a">완전 건조 후 장착</text>
    <text x="220" y="1008" font-size="34" fill="#7a7a7a">젖은 채 끼우면 곰팡이 원인이 돼요</text>

    <rect x="60" y="1080" width="960" height="120" rx="18" fill="#FFF6E6" stroke="#FFD23F"/>
    <text x="540" y="1155" font-size="42" font-weight="bold" fill="#8a5a36" text-anchor="middle">권장 주기: 2주에 1번</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#F4DCC8"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="34" fill="#8a5a36">출처: 한국에너지공단 · 제조사 가이드</text>
</svg>
