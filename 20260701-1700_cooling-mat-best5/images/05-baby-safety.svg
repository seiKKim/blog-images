  <text x="155" y="91" font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#14323F" text-anchor="middle">추천아이템</text>
  <text x="60" y="170" font-family="Malgun Gothic" font-weight="bold" font-size="62" fill="#FFFFFF">③ 유아·아기용</text>
  <text x="60" y="212" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#DFF3FA">안전성이 가격보다 우선</text>
