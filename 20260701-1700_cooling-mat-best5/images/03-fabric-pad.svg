    <text x="96" y="864" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#14323F">대략 가격대</text>
    <text x="96" y="908" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#4A6675">약 2만9,900~3만9,900원대 (고급형 약 9만원대)</text>
