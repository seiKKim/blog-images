  <text x="60" y="170" font-family="Malgun Gothic" font-weight="bold" font-size="62" fill="#FFFFFF">① 가성비 냉감원단 패드</text>
  <text x="60" y="212" font-family="Malgun Gothic" font-weight="normal" font-size="34" fill="#DFF3FA">자취생·1인가구라면 여기부터</text>
  <g>
    <rect x="60" y="300" width="960" height="112" rx="18" fill="#FFFFFF" stroke="#CDE7F1"/>
