<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <rect x="60" y="60" rx="26" ry="26" width="160" height="56" fill="#FFD23F"/>
  <text x="140" y="99" font-family="'Noto Sans KR','Malgun Gothic'" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">정부지원금</text>
  <text x="60" y="175" font-family="'Noto Sans KR','Malgun Gothic'" font-weight="bold" font-size="62" fill="#ffffff">I유형 vs II유형 비교</text>

  <!-- 헤더 -->
  <rect x="60" y="250" width="320" height="90" rx="14" fill="#E8EEF5"/>
  <rect x="392" y="250" width="316" height="90" rx="14" fill="#1B5FA6"/>
  <rect x="720" y="250" width="300" height="90" rx="14" fill="#243B6B"/>
  <text x="220" y="308" font-family="'Noto Sans KR','Malgun Gothic'" font-weight="bold" font-size="40" fill="#1B5FA6" text-anchor="middle">구분</text>
  <text x="550" y="308" font-family="'Noto Sans KR','Malgun Gothic'" font-weight="bold" font-size="44" fill="#ffffff" text-anchor="middle">I유형</text>
  <text x="870" y="308" font-family="'Noto Sans KR','Malgun Gothic'" font-weight="bold" font-size="44" fill="#ffffff" text-anchor="middle">II유형</text>

  <g font-family="'Noto Sans KR','Malgun Gothic'">
    <!-- row1 핵심 지원 -->
    <rect x="60" y="354" width="320" height="180" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="392" y="354" width="316" height="180" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="720" y="354" width="300" height="180" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="220" y="455" font-weight="bold" font-size="36" fill="#1a1a1a" text-anchor="middle">핵심 지원</text>
    <text x="550" y="425" font-weight="bold" font-size="33" fill="#1a1a1a" text-anchor="middle">취업지원서비스</text>
    <text x="550" y="470" font-weight="bold" font-size="35" fill="#1B5FA6" text-anchor="middle">+ 구직촉진수당</text>
    <text x="870" y="425" font-weight="bold" font-size="33" fill="#1a1a1a" text-anchor="middle">취업지원서비스</text>
    <text x="870" y="470" font-weight="bold" font-size="32" fill="#243B6B" text-anchor="middle">+ 취업활동비용</text>

    <!-- row2 현금 수당 -->
    <rect x="60" y="548" width="320" height="200" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="392" y="548" width="316" height="200" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="720" y="548" width="300" height="200" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="220" y="658" font-weight="bold" font-size="36" fill="#1a1a1a" text-anchor="middle">현금 수당</text>
    <text x="550" y="630" font-weight="bold" font-size="42" fill="#1B5FA6" text-anchor="middle">월 60만원</text>
    <text x="550" y="680" font-weight="bold" font-size="32" fill="#1a1a1a" text-anchor="middle">× 6개월</text>
    <text x="550" y="718" font-weight="bold" font-size="28" fill="#5B6B7C" text-anchor="middle">(최대 월 100만원)</text>
    <text x="870" y="650" font-weight="bold" font-size="34" fill="#5B6B7C" text-anchor="middle">구직촉진수당</text>
    <text x="870" y="695" font-weight="bold" font-size="34" fill="#E23B3B" text-anchor="middle">없음</text>

    <!-- row3 대상 -->
    <rect x="60" y="762" width="320" height="180" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="392" y="762" width="316" height="180" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="720" y="762" width="300" height="180" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="220" y="860" font-weight="bold" font-size="36" fill="#1a1a1a" text-anchor="middle">대상</text>
    <text x="550" y="835" font-weight="bold" font-size="31" fill="#1a1a1a" text-anchor="middle">만 15~69세 +</text>
    <text x="550" y="878" font-weight="bold" font-size="31" fill="#1a1a1a" text-anchor="middle">소득·재산 요건</text>
    <text x="870" y="835" font-weight="bold" font-size="31" fill="#1a1a1a" text-anchor="middle">I유형 외</text>
    <text x="870" y="878" font-weight="bold" font-size="31" fill="#1a1a1a" text-anchor="middle">만 15~69세</text>

    <!-- row4 취업경험 요건 -->
    <rect x="60" y="956" width="320" height="160" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="392" y="956" width="316" height="160" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="720" y="956" width="300" height="160" rx="14" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="220" y="1028" font-weight="bold" font-size="34" fill="#1a1a1a" text-anchor="middle">취업경험</text>
    <text x="220" y="1068" font-weight="bold" font-size="34" fill="#1a1a1a" text-anchor="middle">요건</text>
    <text x="550" y="1050" font-weight="bold" font-size="31" fill="#1a1a1a" text-anchor="middle">요건심사형 필요</text>
    <text x="870" y="1050" font-weight="bold" font-size="34" fill="#1F8A53" text-anchor="middle">없음</text>
  </g>

  <!-- 강조 박스 -->
  <rect x="60" y="1150" width="960" height="100" rx="16" fill="#1B5FA6"/>
  <text x="540" y="1213" font-family="'Noto Sans KR','Malgun Gothic'" font-weight="bold" font-size="38" fill="#FFD23F" text-anchor="middle">현금 60만원은 I유형만 지급!</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1320" font-family="'Noto Sans KR','Malgun Gothic'" font-size="32" fill="#5B6B7C">출처: 고용노동부 · 고용24(work24.go.kr)</text>
</svg>
