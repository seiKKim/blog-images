<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <rect x="60" y="60" rx="26" ry="26" width="160" height="56" fill="#FFD23F"/>
  <text x="140" y="99" font-family="'Noto Sans KR','Malgun Gothic'" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">정부지원금</text>
  <text x="60" y="175" font-family="'Noto Sans KR','Malgun Gothic'" font-weight="bold" font-size="62" fill="#ffffff">수당 받는 핵심 조건</text>

  <g font-family="'Noto Sans KR','Malgun Gothic'">
    <!-- step 1 -->
    <rect x="90" y="270" width="900" height="160" rx="20" fill="#ffffff" stroke="#1B5FA6" stroke-width="3"/>
    <text x="130" y="335" font-weight="bold" font-size="40" fill="#1B5FA6">1. 수급자격 인정</text>
    <text x="130" y="395" font-weight="normal" font-size="32" fill="#5B6B7C">상담을 통해 지원 방향 확정</text>

    <text x="540" y="475" font-weight="bold" font-size="46" fill="#1B5FA6" text-anchor="middle">▼</text>

    <!-- step 2 -->
    <rect x="90" y="500" width="900" height="180" rx="20" fill="#1B5FA6"/>
    <text x="130" y="565" font-weight="bold" font-size="40" fill="#ffffff">2. 취업활동계획(IAP) 수립</text>
    <text x="130" y="625" font-weight="normal" font-size="32" fill="#E8EEF5">직업훈련 · 일경험 · 구직활동 계획 작성</text>

    <text x="540" y="725" font-weight="bold" font-size="46" fill="#1B5FA6" text-anchor="middle">▼</text>

    <!-- step 3 -->
    <rect x="90" y="750" width="900" height="180" rx="20" fill="#ffffff" stroke="#1B5FA6" stroke-width="3"/>
    <text x="130" y="815" font-weight="bold" font-size="40" fill="#1B5FA6">3. 구직활동 이행 + 보고</text>
    <text x="130" y="875" font-weight="normal" font-size="32" fill="#5B6B7C">계획대로 활동해야 수당 지급</text>

    <text x="540" y="975" font-weight="bold" font-size="46" fill="#1B5FA6" text-anchor="middle">▼</text>

    <!-- 두 갈래 -->
    <rect x="90" y="1000" width="430" height="200" rx="20" fill="#1F8A53"/>
    <text x="305" y="1060" font-weight="bold" font-size="36" fill="#ffffff" text-anchor="middle">이행 시</text>
    <text x="305" y="1115" font-weight="bold" font-size="40" fill="#FFD23F" text-anchor="middle">수당 정상 지급</text>
    <text x="305" y="1165" font-weight="normal" font-size="28" fill="#E8EEF5" text-anchor="middle">+ 조기취업 시 성공수당</text>

    <rect x="560" y="1000" width="430" height="200" rx="20" fill="#E23B3B"/>
    <text x="775" y="1060" font-weight="bold" font-size="36" fill="#ffffff" text-anchor="middle">미이행 시</text>
    <text x="775" y="1120" font-weight="bold" font-size="40" fill="#FFD23F" text-anchor="middle">감액·중단</text>
    <text x="775" y="1170" font-weight="normal" font-size="28" fill="#ffffff" text-anchor="middle">구직활동 보고 필수</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1320" font-family="'Noto Sans KR','Malgun Gothic'" font-size="32" fill="#5B6B7C">출처: 고용노동부 · 고용24(work24.go.kr)</text>
</svg>
