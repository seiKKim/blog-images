    <text x="627" y="812" font-weight="bold" font-size="32" fill="#5B6B7C" text-anchor="middle">무관</text>
    <text x="892" y="812" font-weight="bold" font-size="32" fill="#5B6B7C" text-anchor="middle">무관</text>

    <!-- r5 -->
    <rect x="60" y="866" width="430" height="110" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="500" y="866" width="255" height="110" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="765" y="866" width="255" height="110" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="85" y="912" font-weight="bold" font-size="31" fill="#1a1a1a">II유형 청년</text>
    <text x="85" y="950" font-weight="bold" font-size="29" fill="#5B6B7C">15~34세</text>
    <text x="627" y="930" font-weight="bold" font-size="32" fill="#5B6B7C" text-anchor="middle">무관</text>
    <text x="892" y="930" font-weight="bold" font-size="32" fill="#5B6B7C" text-anchor="middle">무관</text>

    <!-- r6 -->
    <rect x="60" y="984" width="430" height="110" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="500" y="984" width="255" height="110" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="765" y="984" width="255" height="110" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="85" y="1030" font-weight="bold" font-size="31" fill="#1a1a1a">II유형 중장년</text>
    <text x="85" y="1068" font-weight="bold" font-size="29" fill="#5B6B7C">35~69세</text>
    <text x="627" y="1048" font-weight="bold" font-size="32" fill="#1B5FA6" text-anchor="middle">중위 100% 이하</text>
    <text x="892" y="1048" font-weight="bold" font-size="32" fill="#5B6B7C" text-anchor="middle">—</text>
