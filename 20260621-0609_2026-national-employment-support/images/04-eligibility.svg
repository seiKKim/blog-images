  <!-- 안내 -->
  <rect x="60" y="1118" width="960" height="120" rx="16" fill="#1B5FA6"/>
  <text x="540" y="1170" font-family="'Noto Sans KR','Malgun Gothic'" font-weight="bold" font-size="32" fill="#ffffff" text-anchor="middle">I유형 요건심사형: 최근 2년 내 취업경험</text>
  <text x="540" y="1212" font-family="'Noto Sans KR','Malgun Gothic'" font-weight="bold" font-size="34" fill="#FFD23F" text-anchor="middle">100일 또는 800시간 이상 필요</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1320" font-family="'Noto Sans KR','Malgun Gothic'" font-size="32" fill="#5B6B7C">출처: 고용노동부 · 중위소득 금액은 매년 고시</text>
</svg>
