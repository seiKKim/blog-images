    <text x="892" y="330" font-weight="bold" font-size="32" fill="#ffffff" text-anchor="middle">재산 기준</text>

    <!-- rows -->
    <!-- row helper height 120 -->
    <!-- r1 -->
    <rect x="60" y="364" width="430" height="120" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="500" y="364" width="255" height="120" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
