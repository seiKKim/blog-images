    <text x="627" y="436" font-weight="bold" font-size="32" fill="#1B5FA6" text-anchor="middle">중위 60% 이하</text>
    <text x="892" y="436" font-weight="bold" font-size="32" fill="#1B5FA6" text-anchor="middle">4억원 이하</text>

    <!-- r2 -->
    <rect x="60" y="492" width="430" height="120" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="500" y="492" width="255" height="120" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="765" y="492" width="255" height="120" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="85" y="543" font-weight="bold" font-size="31" fill="#1a1a1a">I유형 선발형</text>
    <text x="85" y="583" font-weight="bold" font-size="29" fill="#5B6B7C">비경제활동</text>
    <text x="627" y="564" font-weight="bold" font-size="32" fill="#1B5FA6" text-anchor="middle">중위 60% 이하</text>
    <text x="892" y="564" font-weight="bold" font-size="32" fill="#1B5FA6" text-anchor="middle">4억원 이하</text>

