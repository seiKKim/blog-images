<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#F4F7FB"/>
  <rect width="1080" height="180" fill="#2B2F36"/>
  <rect x="60" y="55" rx="30" ry="30" width="210" height="62" fill="#E23B3B"/>
  <text x="165" y="98" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#FFFFFF" text-anchor="middle">생활 정보</text>
  <text x="320" y="120" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#FFFFFF">가까운 무더위쉼터 찾기</text>

  <!-- 스마트폰 목업 -->
  <rect x="120" y="240" width="460" height="720" rx="48" fill="#2B2F36"/>
  <rect x="140" y="270" width="420" height="660" rx="24" fill="#DFE7EF"/>
  <!-- 검색창 -->
  <rect x="165" y="300" width="370" height="70" rx="35" fill="#FFFFFF" stroke="#C9D4E0"/>
  <circle cx="210" cy="335" r="16" fill="none" stroke="#8593A3" stroke-width="6"/>
  <line x1="222" y1="347" x2="238" y2="363" stroke="#8593A3" stroke-width="6"/>
  <text x="262" y="348" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#2B2F36">무더위쉼터</text>
  <!-- 지도 핀들 -->
  <circle cx="270" cy="520" r="26" fill="#E23B3B"/>
  <circle cx="270" cy="520" r="9" fill="#FFFFFF"/>
  <circle cx="440" cy="470" r="26" fill="#E23B3B"/>
  <circle cx="440" cy="470" r="9" fill="#FFFFFF"/>
  <circle cx="380" cy="640" r="26" fill="#E23B3B"/>
  <circle cx="380" cy="640" r="9" fill="#FFFFFF"/>
  <line x1="165" y1="700" x2="535" y2="700" stroke="#C9D4E0" stroke-width="2"/>
  <text x="190" y="760" font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#2B2F36">행정복지센터 · 도서관</text>
  <text x="190" y="810" font-family="Malgun Gothic" font-size="28" fill="#5B6B7C">누구나 무료 이용</text>
  <text x="190" y="880" font-family="Malgun Gothic" font-weight="bold" font-size="30" fill="#2B2F36">금융기관 · 경로당</text>
  <text x="190" y="930" font-family="Malgun Gothic" font-size="28" fill="#5B6B7C">특보 발효 시 운영 연장</text>

  <!-- 우측 앱 안내 -->
  <text x="650" y="340" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#2B2F36">어디서 찾나요?</text>
  <text x="650" y="440" font-family="Malgun Gothic" font-size="40" fill="#3A4350">· 안전디딤돌 앱</text>
  <text x="650" y="520" font-family="Malgun Gothic" font-size="40" fill="#3A4350">· 네이버 지도</text>
  <text x="650" y="600" font-family="Malgun Gothic" font-size="40" fill="#3A4350">· 카카오맵</text>
  <text x="650" y="680" font-family="Malgun Gothic" font-size="40" fill="#3A4350">· 티맵</text>

  <rect x="0" y="1000" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1052" font-family="Malgun Gothic" font-size="34" fill="#5B6B7C">출처: 행정안전부 폭염 대비 안내(2026.6.24)</text>
</svg>