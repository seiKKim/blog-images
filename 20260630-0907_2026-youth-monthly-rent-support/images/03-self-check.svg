<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <rect x="60" y="52" rx="30" ry="30" width="190" height="60" fill="#FFD23F"/>
  <text x="155" y="94" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="34" fill="#1a1a1a" text-anchor="middle">정부지원금</text>
  <text x="60" y="175" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">내가 대상일까? 자가진단 체크</text>

  <!-- 안내 -->
  <text x="60" y="270" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="38" fill="#1B5FA6">복지로 모의계산(자가진단)으로 확인</text>

  <!-- 체크 카드들 -->
  <g font-family="'Noto Sans KR','Malgun Gothic',sans-serif">
    <rect x="60" y="310" width="960" height="150" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="120" cy="385" r="26" fill="#1B5FA6"/>
    <path d="M108 385 l9 9 l16 -18" stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="175" y="375" font-weight="bold" font-size="42" fill="#1a1a1a">연령</text>
    <text x="175" y="425" font-weight="normal" font-size="36" fill="#5B6B7C">만 19~34세 (1991~2007년생)</text>

    <rect x="60" y="480" width="960" height="150" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="120" cy="555" r="26" fill="#1B5FA6"/>
    <path d="M108 555 l9 9 l16 -18" stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="175" y="545" font-weight="bold" font-size="42" fill="#1a1a1a">거주</text>
    <text x="175" y="595" font-weight="normal" font-size="36" fill="#5B6B7C">부모와 별도(독립) 거주 · 무주택</text>

    <rect x="60" y="650" width="960" height="150" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="120" cy="725" r="26" fill="#1B5FA6"/>
    <path d="M108 725 l9 9 l16 -18" stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="175" y="715" font-weight="bold" font-size="42" fill="#1a1a1a">소득</text>
    <text x="175" y="765" font-weight="normal" font-size="36" fill="#5B6B7C">청년가구 중위 60% · 원가구 100% 이하</text>

    <rect x="60" y="820" width="960" height="150" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="120" cy="895" r="26" fill="#1B5FA6"/>
    <path d="M108 895 l9 9 l16 -18" stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="175" y="885" font-weight="bold" font-size="42" fill="#1a1a1a">재산</text>
    <text x="175" y="935" font-weight="normal" font-size="36" fill="#5B6B7C">청년 1억 2,200만원 · 원가구 4억 7,000만원 이하</text>
  </g>

  <!-- 강조 박스 -->
  <rect x="60" y="1010" width="960" height="200" rx="16" fill="#EAF1F8" stroke="#1B5FA6" stroke-width="2"/>
  <text x="90" y="1075" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="38" fill="#1B5FA6">30세 이상 · 혼인 · 미혼부모 등은</text>
  <text x="90" y="1130" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="38" fill="#1a1a1a">원가구(부모) 소득을 보지 않을 수 있어요</text>
  <text x="90" y="1180" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="32" fill="#5B6B7C">정확한 판정은 복지로 자가진단으로 확인하세요</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="32" fill="#5B6B7C">출처: 복지로(bokjiro.go.kr) 청년월세 지원 자가진단</text>
</svg>
