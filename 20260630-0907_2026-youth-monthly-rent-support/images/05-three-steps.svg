<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <rect x="60" y="52" rx="30" ry="30" width="190" height="60" fill="#FFD23F"/>
  <text x="155" y="94" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="34" fill="#1a1a1a" text-anchor="middle">정부지원금</text>
  <text x="60" y="175" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">신청 놓쳤다면? 지금 할 3가지</text>

  <!-- STEP 1 -->
  <rect x="60" y="270" width="960" height="290" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="150" cy="360" r="50" fill="#1B5FA6"/>
  <text x="150" y="378" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="54" fill="#ffffff" text-anchor="middle">1</text>
  <text x="235" y="350" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="46" fill="#1a1a1a">지자체 청년월세지원 확인</text>
  <text x="235" y="412" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#5B6B7C">서울시는 만 19~39세 · 중위 48~150%</text>
  <text x="235" y="462" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#5B6B7C">월 최대 20만원 × 12개월 = 240만원</text>
  <text x="235" y="520" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="34" fill="#E23B3B">※ 국토부 사업과 동시 수급은 불가</text>

  <!-- STEP 2 -->
  <rect x="60" y="590" width="960" height="250" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="150" cy="680" r="50" fill="#1B5FA6"/>
  <text x="150" y="698" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="54" fill="#ffffff" text-anchor="middle">2</text>
  <text x="235" y="670" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="46" fill="#1a1a1a">다음 정기 모집 미리 대비</text>
  <text x="235" y="732" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#5B6B7C">복지로·마이홈포털 공고 주기적 확인</text>
  <text x="235" y="790" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#5B6B7C">필요서류·월세 이체내역 미리 모으기</text>

  <!-- STEP 3 -->
  <rect x="60" y="870" width="960" height="250" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="150" cy="960" r="50" fill="#1B5FA6"/>
  <text x="150" y="978" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="54" fill="#ffffff" text-anchor="middle">3</text>
  <text x="235" y="950" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="46" fill="#1a1a1a">복지로 자가진단으로 점검</text>
  <text x="235" y="1012" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#5B6B7C">내 대상 여부·소득·재산·임차 조건 확인</text>
  <text x="235" y="1070" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="36" fill="#5B6B7C">조건 애매하면 미리 정비할 시간 확보</text>

  <!-- 하단 강조 -->
  <rect x="60" y="1150" width="960" height="100" rx="16" fill="#1B5FA6"/>
  <text x="540" y="1212" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="40" fill="#FFD23F" text-anchor="middle">"연중 아무때나"가 아닌 정기 모집 사업!</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="32" fill="#5B6B7C">출처: 국토교통부 · 서울시 · 복지로 공고 기준</text>
</svg>
