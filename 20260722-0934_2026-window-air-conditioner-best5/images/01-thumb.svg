<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B7FC4"/>
      <stop offset="1" stop-color="#0E5A93"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4FAFF"/>
      <stop offset="1" stop-color="#D7E9F7"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- 장식 원 -->
  <circle cx="960" cy="170" r="250" fill="#ffffff" opacity="0.08"/>
  <circle cx="120" cy="990" r="210" fill="#ffffff" opacity="0.06"/>

  <!-- 시원한 바람(눈꽃) 장식 -->
  <g fill="#BFE3FF" opacity="0.5" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="52">
    <text x="820" y="470">❄</text>
    <text x="905" y="560">❄</text>
    <text x="770" y="600">❄</text>
  </g>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="88" rx="34" ry="34" width="300" height="70" fill="#FFD23F"/>
  <text x="230" y="136" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="38" fill="#123A5C" text-anchor="middle">자취·원룸 필수템</text>

  <!-- 서브 카피 -->
  <text x="80" y="300" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#CFE8FB">2026 창문형 에어컨</text>

  <!-- 메인 카피 -->
  <text x="80" y="460" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="140" fill="#ffffff">실패 없이</text>
  <text x="80" y="620" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="140" fill="#FFD23F">고르는 법</text>

  <!-- 6가지 강조 배지 -->
  <g>
    <circle cx="880" cy="740" r="118" fill="#FFD23F"/>
    <text x="880" y="735" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
          font-size="130" fill="#123A5C" text-anchor="middle">6</text>
    <text x="880" y="820" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
          font-size="44" fill="#123A5C" text-anchor="middle">가지 기준</text>
  </g>

  <!-- 디테일 박스 -->
  <rect x="80" y="700" rx="20" ry="20" width="640" height="150" fill="#ffffff" opacity="0.16"/>
  <text x="112" y="765" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff">냉방능력 · 소음 · 창문규격</text>
  <text x="112" y="822" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff">인버터 · 설치 · 가격/AS</text>

  <!-- 하단 원룸 창문+에어컨 미니 아이콘 -->
  <g>
    <rect x="80" y="900" width="180" height="120" rx="8" fill="url(#ac)" stroke="#9CC6E6" stroke-width="3"/>
    <line x1="170" y1="900" x2="170" y2="1020" stroke="#9CC6E6" stroke-width="3"/>
    <rect x="92" y="960" width="156" height="48" rx="6" fill="#ffffff" stroke="#6FA6CE" stroke-width="3"/>
    <line x1="104" y1="984" x2="236" y2="984" stroke="#B9D4E8" stroke-width="4"/>
  </g>
  <text x="290" y="985" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#CFE8FB">blog.naver.com/trip_chocho</text>
</svg>
