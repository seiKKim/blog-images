<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <!-- 상단 색띠 -->
  <rect width="1080" height="180" fill="#1B7FC4"/>
  <text x="60" y="112" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">창문형 vs 이동식 vs 벽걸이</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 헤더 행 -->
    <rect x="40" y="215" width="240" height="110" fill="#0E5A93"/>
    <rect x="280" y="215" width="253" height="110" fill="#1B7FC4"/>
    <rect x="533" y="215" width="253" height="110" fill="#3D93CC"/>
    <rect x="786" y="215" width="254" height="110" fill="#6BB0DC"/>
    <text x="160" y="282" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">구분</text>
    <text x="406" y="282" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">창문형</text>
    <text x="659" y="282" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">이동식</text>
    <text x="913" y="272" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">벽걸이</text>
    <text x="913" y="308" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">(인버터)</text>

    <!-- 행 템플릿 -->
    <!-- 설치 -->
    <rect x="40" y="325" width="240" height="180" fill="#EAF2FA"/>
    <rect x="280" y="325" width="760" height="180" fill="#ffffff"/>
    <line x1="533" y1="325" x2="533" y2="505" stroke="#D6E0EC" stroke-width="2"/>
    <line x1="786" y1="325" x2="786" y2="505" stroke="#D6E0EC" stroke-width="2"/>
    <text x="160" y="425" font-size="34" font-weight="bold" fill="#123A5C" text-anchor="middle">설치</text>
    <text x="406" y="405" font-size="27" fill="#1a1a1a" text-anchor="middle">타공 없이</text>
    <text x="406" y="440" font-size="27" fill="#1a1a1a" text-anchor="middle">미닫이창 거치</text>
    <text x="659" y="405" font-size="27" fill="#1a1a1a" text-anchor="middle">배기호스+</text>
    <text x="659" y="440" font-size="27" fill="#1a1a1a" text-anchor="middle">창문 패널</text>
    <text x="913" y="405" font-size="27" fill="#1a1a1a" text-anchor="middle">벽 타공+</text>
    <text x="913" y="440" font-size="27" fill="#1a1a1a" text-anchor="middle">실외기 공사</text>

    <!-- 냉방성능 -->
    <rect x="40" y="505" width="240" height="180" fill="#EAF2FA"/>
    <rect x="280" y="505" width="760" height="180" fill="#ffffff"/>
    <line x1="533" y1="505" x2="533" y2="685" stroke="#D6E0EC" stroke-width="2"/>
    <line x1="786" y1="505" x2="786" y2="685" stroke="#D6E0EC" stroke-width="2"/>
    <text x="160" y="585" font-size="32" font-weight="bold" fill="#123A5C" text-anchor="middle">냉방</text>
    <text x="160" y="620" font-size="32" font-weight="bold" fill="#123A5C" text-anchor="middle">성능</text>
    <text x="406" y="585" font-size="27" fill="#1a1a1a" text-anchor="middle">열을 창밖</text>
    <text x="406" y="620" font-size="27" fill="#1a1a1a" text-anchor="middle">바로 배출</text>
    <text x="659" y="585" font-size="27" fill="#1a1a1a" text-anchor="middle">호스 틈새로</text>
    <text x="659" y="620" font-size="27" fill="#1a1a1a" text-anchor="middle">효율 저하</text>
    <text x="913" y="603" font-size="27" font-weight="bold" fill="#1B7FC4" text-anchor="middle">가장 우수</text>

    <!-- 소음 -->
    <rect x="40" y="685" width="240" height="180" fill="#EAF2FA"/>
    <rect x="280" y="685" width="760" height="180" fill="#ffffff"/>
    <line x1="533" y1="685" x2="533" y2="865" stroke="#D6E0EC" stroke-width="2"/>
    <line x1="786" y1="685" x2="786" y2="865" stroke="#D6E0EC" stroke-width="2"/>
    <text x="160" y="785" font-size="34" font-weight="bold" fill="#123A5C" text-anchor="middle">소음</text>
    <text x="406" y="785" font-size="28" fill="#1a1a1a" text-anchor="middle">약 35~45dB</text>
    <text x="659" y="765" font-size="27" fill="#1a1a1a" text-anchor="middle">본체 실내,</text>
    <text x="659" y="800" font-size="27" fill="#1a1a1a" text-anchor="middle">소리 직접</text>
    <text x="913" y="765" font-size="28" font-weight="bold" fill="#1B7FC4" text-anchor="middle">약 22~30dB</text>
    <text x="913" y="800" font-size="26" fill="#5B6B7C" text-anchor="middle">가장 조용</text>

    <!-- 배수 -->
    <rect x="40" y="865" width="240" height="160" fill="#EAF2FA"/>
    <rect x="280" y="865" width="760" height="160" fill="#ffffff"/>
    <line x1="533" y1="865" x2="533" y2="1025" stroke="#D6E0EC" stroke-width="2"/>
    <line x1="786" y1="865" x2="786" y2="1025" stroke="#D6E0EC" stroke-width="2"/>
    <text x="160" y="955" font-size="34" font-weight="bold" fill="#123A5C" text-anchor="middle">배수</text>
    <text x="406" y="955" font-size="27" fill="#1a1a1a" text-anchor="middle">자가증발형 다수</text>
    <text x="659" y="937" font-size="27" fill="#1a1a1a" text-anchor="middle">물통 비우기·</text>
    <text x="659" y="972" font-size="27" fill="#1a1a1a" text-anchor="middle">배수 관리</text>
    <text x="913" y="955" font-size="27" fill="#1a1a1a" text-anchor="middle">실외 배출</text>

    <!-- 전월세 -->
    <rect x="40" y="1025" width="240" height="160" fill="#EAF2FA"/>
    <rect x="280" y="1025" width="760" height="160" fill="#ffffff"/>
    <line x1="533" y1="1025" x2="533" y2="1185" stroke="#D6E0EC" stroke-width="2"/>
    <line x1="786" y1="1025" x2="786" y2="1185" stroke="#D6E0EC" stroke-width="2"/>
    <text x="160" y="1115" font-size="34" font-weight="bold" fill="#123A5C" text-anchor="middle">전월세</text>
    <text x="406" y="1097" font-size="27" fill="#1a1a1a" text-anchor="middle">자가설치·</text>
    <text x="406" y="1132" font-size="27" fill="#1a1a1a" text-anchor="middle">철거 쉬움</text>
    <text x="659" y="1115" font-size="27" font-weight="bold" fill="#1B7FC4" text-anchor="middle">가장 자유로움</text>
    <text x="913" y="1097" font-size="27" fill="#1a1a1a" text-anchor="middle">공사·원상</text>
    <text x="913" y="1132" font-size="27" fill="#1a1a1a" text-anchor="middle">복구 부담</text>

    <!-- 외곽선 -->
    <rect x="40" y="215" width="1000" height="970" fill="none" stroke="#B9CDDE" stroke-width="2"/>
  </g>

  <!-- 하단 띠 -->
  <rect x="0" y="1250" width="1080" height="100" fill="#E8EEF5"/>
  <text x="60" y="1312" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">창문 규격이 맞으면 방 하나 냉방엔 창문형이 유리</text>
</svg>
