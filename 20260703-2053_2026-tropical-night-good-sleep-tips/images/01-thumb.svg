<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F3D6B"/>
      <stop offset="1" stop-color="#1E6FA8"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- 장식: 달과 별 (여름밤) -->
  <circle cx="930" cy="180" r="240" fill="#5FE0C8" opacity="0.10"/>
  <circle cx="120" cy="980" r="200" fill="#5FE0C8" opacity="0.08"/>
  <circle cx="885" cy="175" r="70" fill="#FFF7D6" opacity="0.9"/>
  <circle cx="915" cy="160" r="70" fill="#0F3D6B"/>
  <g fill="#FFFFFF" opacity="0.85">
    <circle cx="760" cy="120" r="4"/>
    <circle cx="810" cy="230" r="3"/>
    <circle cx="985" cy="250" r="4"/>
    <circle cx="700" cy="230" r="3"/>
  </g>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="90" rx="34" ry="34" width="200" height="68" fill="#FFD23F"/>
  <text x="180" y="136" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="36" fill="#0F3D6B" text-anchor="middle">생활꿀팁</text>

  <!-- 서브 카피 -->
  <text x="80" y="300" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="58" fill="#5FE0C8">2025 서울 열대야 46일</text>
  <text x="80" y="378" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="58" fill="#E8EEF5">잠 못 든 밤, 올여름은 다르게</text>

  <!-- 메인 카피 -->
  <text x="80" y="560" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="150" fill="#FFFFFF">열대야</text>
  <text x="80" y="720" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="150" fill="#FFD23F">숙면 꿀팁</text>

  <!-- 디테일 박스 -->
  <rect x="80" y="808" rx="20" ry="20" width="920" height="128" fill="#FFFFFF" opacity="0.14"/>
  <text x="112" y="872" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="48" fill="#FFFFFF">침실 온도 24~26℃ · 습도 50~60%</text>
  <text x="112" y="920" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="34" fill="#CFF3EA">미지근한 샤워 · 에어컨 취침예약 · 냉감침구</text>

  <!-- 채널 -->
  <text x="80" y="1012" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="normal"
        font-size="32" fill="#CFE3F2" opacity="0.9">blog.naver.com/trip_chocho</text>
</svg>
