<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#EDF5FB"/>
  <rect width="1080" height="150" fill="#1E5C8C"/>
  <rect x="60" y="46" rx="24" ry="24" width="160" height="52" fill="#5FE0C8"/>
  <text x="140" y="82" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="28" fill="#0F3D6B" text-anchor="middle">생활꿀팁</text>
  <text x="245" y="98" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="52" fill="#FFFFFF">취침 전 먹거리 컷 &amp; 픽</text>

  <!-- 왼쪽: 피하기 -->
  <rect x="60" y="200" width="460" height="450" rx="20" fill="#FDECEC" stroke="#F3C6C6"/>
  <text x="290" y="270" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="44" fill="#C63C3C" text-anchor="middle">✕ 피하기</text>
  <line x1="100" y1="300" x2="480" y2="300" stroke="#F3C6C6" stroke-width="2"/>
  <text x="100" y="365" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="36" fill="#5A3232">· 카페인 (오후 2시 이후 금지)</text>
  <text x="100" y="425" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="36" fill="#5A3232">· 커피·녹차·콜라</text>
  <text x="100" y="485" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="36" fill="#5A3232">· 음주 (취침 3시간 전부터)</text>
  <text x="100" y="545" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="36" fill="#5A3232">· 자기 직전 과다 수분</text>
  <text x="100" y="605" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="32" fill="#8A6262">→ 물은 취침 1~2시간 전 소량</text>

  <!-- 오른쪽: 도움 -->
  <rect x="560" y="200" width="460" height="450" rx="20" fill="#DFF3EE" stroke="#B7E4D8"/>
  <text x="790" y="270" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="44" fill="#12735C" text-anchor="middle">○ 도움되는 것</text>
  <line x1="600" y1="300" x2="980" y2="300" stroke="#B7E4D8" stroke-width="2"/>
  <text x="600" y="365" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="36" fill="#245047">· 바나나</text>
  <text x="600" y="425" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="36" fill="#245047">· 체리</text>
  <text x="600" y="485" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="36" fill="#245047">· 따뜻한 우유</text>
  <text x="600" y="555" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="32" fill="#3A6B60">멜라토닌·마그네슘 함유</text>
  <text x="600" y="608" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="32" fill="#3A6B60">낮엔 넉넉히 · 밤엔 소량</text>
</svg>
