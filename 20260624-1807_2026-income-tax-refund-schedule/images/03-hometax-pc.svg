<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1F8A53"/>
  <rect x="60" y="58" rx="26" ry="26" width="160" height="50" fill="#FFD23F"/>
  <text x="140" y="92" font-family="Noto Sans KR" font-weight="bold" font-size="32" fill="#1a1a1a" text-anchor="middle">세금·환급</text>
  <text x="60" y="180" font-family="Noto Sans KR" font-weight="bold" font-size="58" fill="#ffffff">홈택스(PC) 환급금 조회</text>

  <!-- 단계 카드들 -->
  <g font-family="Noto Sans KR">
    <rect x="60" y="280" width="960" height="160" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="150" cy="360" r="44" fill="#1F8A53"/>
    <text x="150" y="377" font-weight="bold" font-size="48" fill="#ffffff" text-anchor="middle">1</text>
    <text x="230" y="345" font-weight="bold" font-size="44" fill="#1a1a1a">홈택스 접속 · 본인인증</text>
    <text x="230" y="400" font-weight="normal" font-size="34" fill="#5B6B7C">hometax.go.kr 로그인 (인증 수단 필요)</text>

    <rect x="60" y="465" width="960" height="160" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="150" cy="545" r="44" fill="#1F8A53"/>
    <text x="150" y="562" font-weight="bold" font-size="48" fill="#ffffff" text-anchor="middle">2</text>
    <text x="230" y="530" font-weight="bold" font-size="44" fill="#1a1a1a">조회/발급 → 국세환급</text>
    <text x="230" y="585" font-weight="normal" font-size="34" fill="#5B6B7C">‘국세환급금 찾기’ 메뉴 선택</text>

    <rect x="60" y="650" width="960" height="160" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="150" cy="730" r="44" fill="#1F8A53"/>
    <text x="150" y="747" font-weight="bold" font-size="48" fill="#ffffff" text-anchor="middle">3</text>
    <text x="230" y="715" font-weight="bold" font-size="44" fill="#1a1a1a">주민(사업자)번호·성명 입력</text>
    <text x="230" y="770" font-weight="normal" font-size="34" fill="#5B6B7C">상세 내역은 ‘환급금 상세조회’에서 확인</text>

    <rect x="60" y="835" width="960" height="160" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="150" cy="915" r="44" fill="#1F8A53"/>
    <text x="150" y="932" font-weight="bold" font-size="48" fill="#ffffff" text-anchor="middle">4</text>
    <text x="230" y="900" font-weight="bold" font-size="44" fill="#1a1a1a">조회 결과 확인</text>
    <text x="230" y="955" font-weight="normal" font-size="34" fill="#5B6B7C">최근 5년치 환급 내역까지 표시</text>
  </g>

  <!-- 팁 박스 -->
  <rect x="60" y="1035" width="960" height="180" rx="20" fill="#FFF7DB" stroke="#F0DC8C"/>
  <text x="95" y="1100" font-family="Noto Sans KR" font-weight="bold" font-size="40" fill="#9A7B00">메뉴 위치가 헷갈린다면?</text>
  <text x="95" y="1158" font-family="Noto Sans KR" font-weight="normal" font-size="38" fill="#7A6400">홈택스 메인 검색창에 ‘국세환급금 찾기’ 검색이</text>
  <text x="95" y="1205" font-family="Noto Sans KR" font-weight="normal" font-size="38" fill="#7A6400">가장 안전합니다 (개편으로 경로 혼재).</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR" font-size="34" fill="#5B6B7C">출처: 홈택스(hometax.go.kr) 안내</text>
</svg>
