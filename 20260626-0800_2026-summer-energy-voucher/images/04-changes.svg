<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="123" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff">2026년 달라진 점 5가지</text>
  
  <rect x="60" y="270" width="960" height="166" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="150" cy="353" r="50" fill="#1B5FA6"/>
  <text x="150" y="370" font-family="Malgun Gothic" font-weight="bold" font-size="54" fill="#ffffff" text-anchor="middle">1</text>
  <text x="240" y="342" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#143F70">계절별 사용 한도 폐지</text>
  <text x="240" y="400" font-family="Malgun Gothic" font-size="36" fill="#5B6B7C">여름·겨울 총액을 자유롭게 배분</text>
  <rect x="60" y="466" width="960" height="166" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="150" cy="549" r="50" fill="#1B5FA6"/>
  <text x="150" y="566" font-family="Malgun Gothic" font-weight="bold" font-size="54" fill="#ffffff" text-anchor="middle">2</text>
  <text x="240" y="538" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#143F70">사전 예외지급(현금) 신설</text>
  <text x="240" y="596" font-family="Malgun Gothic" font-size="36" fill="#5B6B7C">고시원 등 직접 결제 어려운 수급자</text>
  <rect x="60" y="662" width="960" height="166" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="150" cy="745" r="50" fill="#1B5FA6"/>
  <text x="150" y="762" font-family="Malgun Gothic" font-weight="bold" font-size="54" fill="#ffffff" text-anchor="middle">3</text>
  <text x="240" y="734" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#143F70">연탄전환 바우처 신설</text>
  <text x="240" y="792" font-family="Malgun Gothic" font-size="36" fill="#5B6B7C">연탄→다른 난방연료 전환비 지원</text>
  <rect x="60" y="858" width="960" height="166" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="150" cy="941" r="50" fill="#1B5FA6"/>
  <text x="150" y="958" font-family="Malgun Gothic" font-weight="bold" font-size="54" fill="#ffffff" text-anchor="middle">4</text>
  <text x="240" y="930" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#143F70">지원 대상 연료 확대</text>
  <text x="240" y="988" font-family="Malgun Gothic" font-size="36" fill="#5B6B7C">등유·LPG 사용 가구도 포함</text>
  <rect x="60" y="1054" width="960" height="166" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <circle cx="150" cy="1137" r="50" fill="#1B5FA6"/>
  <text x="150" y="1154" font-family="Malgun Gothic" font-weight="bold" font-size="54" fill="#ffffff" text-anchor="middle">5</text>
  <text x="240" y="1126" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#143F70">찾아가는 복지 확대</text>
  <text x="240" y="1184" font-family="Malgun Gothic" font-size="36" fill="#5B6B7C">5.9만 → 12.2만 세대로 확대</text>
