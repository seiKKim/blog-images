<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="1080" height="1350" fill="#F4F7FB"/>
<rect width="1080" height="200" fill="#1F8A53"/><rect x="60" y="32" rx="27" ry="27" width="172" height="54" fill="#FFD23F"/><text x="146" y="70" font-family="Noto Sans CJK KR" font-weight="bold" font-size="27" fill="#1A1A1A" text-anchor="middle">세금/환급</text><text x="60" y="160" font-family="Noto Sans CJK KR" font-weight="bold" font-size="58" fill="#FFFFFF" text-anchor="start">미납 시 불이익 단계</text>
<rect x="60" y="270" width="960" height="200" rx="18" fill="#FFFFFF" stroke="#D6E0EC" stroke-width="2"/>
<rect x="60" y="270" width="200" height="200" rx="18" fill="#1F8A53"/>
<text x="160" y="385" font-family="Noto Sans CJK KR" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle">STEP 1</text>
<text x="290" y="358" font-family="Noto Sans CJK KR" font-weight="900" font-size="46" fill="#1A1A1A" text-anchor="start">가산금 3%</text>
<text x="290" y="420" font-family="Noto Sans CJK KR" font-weight="normal" font-size="30" fill="#5B6B7C" text-anchor="start">납부기한 지나면 본세에 3% 부과</text>
<polygon points="146,469 174,469 160,489" fill="#5B6B7C"/>
<rect x="60" y="492" width="960" height="200" rx="18" fill="#FFFFFF" stroke="#D6E0EC" stroke-width="2"/>
<rect x="60" y="492" width="200" height="200" rx="18" fill="#1F8A53"/>
<text x="160" y="607" font-family="Noto Sans CJK KR" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle">STEP 2</text>
<text x="290" y="580" font-family="Noto Sans CJK KR" font-weight="900" font-size="46" fill="#1A1A1A" text-anchor="start">중가산금</text>
<text x="290" y="642" font-family="Noto Sans CJK KR" font-weight="normal" font-size="30" fill="#5B6B7C" text-anchor="start">체납건 매월 추가 · 최대 60개월(5년)</text>
<polygon points="146,691 174,691 160,711" fill="#5B6B7C"/>
<rect x="60" y="714" width="960" height="200" rx="18" fill="#FFFFFF" stroke="#D6E0EC" stroke-width="2"/>
<rect x="60" y="714" width="200" height="200" rx="18" fill="#D23C3C"/>
<text x="160" y="829" font-family="Noto Sans CJK KR" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle">STEP 3</text>
<text x="290" y="802" font-family="Noto Sans CJK KR" font-weight="900" font-size="46" fill="#1A1A1A" text-anchor="start">번호판 영치</text>
<text x="290" y="864" font-family="Noto Sans CJK KR" font-weight="normal" font-size="30" fill="#5B6B7C" text-anchor="start">조건 초과 시 영치 · 운행 자체가 불법</text>
<polygon points="146,913 174,913 160,933" fill="#5B6B7C"/>
<rect x="60" y="936" width="960" height="200" rx="18" fill="#FFFFFF" stroke="#D6E0EC" stroke-width="2"/>
<rect x="60" y="936" width="200" height="200" rx="18" fill="#D23C3C"/>
<text x="160" y="1051" font-family="Noto Sans CJK KR" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle">STEP 4</text>
<text x="290" y="1024" font-family="Noto Sans CJK KR" font-weight="900" font-size="46" fill="#1A1A1A" text-anchor="start">압류·공매</text>
<text x="290" y="1086" font-family="Noto Sans CJK KR" font-weight="normal" font-size="30" fill="#5B6B7C" text-anchor="start">부동산·자동차·급여·예금 압류 가능</text>
<text x="60" y="1200" font-family="Noto Sans CJK KR" font-weight="normal" font-size="28" fill="#5B6B7C" text-anchor="start">※ 중가산금률·기준금액은 케이스별 상이 — 고지서·지자체 안내 확인</text>
<rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/><text x="60" y="1320" font-family="Noto Sans CJK KR" font-weight="normal" font-size="28" fill="#5B6B7C" text-anchor="start">출처: 위택스(wetax.go.kr) · 행정안전부 · draft 본문 기준</text>
