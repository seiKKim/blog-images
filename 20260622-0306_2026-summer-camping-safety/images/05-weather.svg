  <text x="60" y="690" font-family="Noto Sans CJK KR" font-weight="bold" font-size="50" fill="#1a1a1a">장마 시작(예측)</text>
  <g font-family="Noto Sans CJK KR" font-size="46" fill="#1a1a1a">
    <rect x="60" y="730" width="960" height="120" rx="16" fill="#ffffff" stroke="#E6D2D8"/>
    <text x="100" y="805" font-weight="bold">제주</text><text x="1000" y="805" font-weight="bold" fill="#E0556E" text-anchor="end">6월 19일 전후</text>
