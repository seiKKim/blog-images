  <text x="60" y="125" font-family="Noto Sans CJK KR" font-weight="bold" font-size="60" fill="#ffffff">2026 여름 날씨 대비</text>
  <rect x="60" y="270" width="455" height="300" rx="20" fill="#ffffff" stroke="#E6D2D8"/>
