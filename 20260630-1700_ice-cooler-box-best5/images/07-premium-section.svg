<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <rect x="50" y="60" rx="34" ry="34" width="150" height="68" fill="#ffffff"/><text x="125.0" y="107" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#C85A18" text-anchor="middle">BEST 5</text>
  <text x="230" y="125" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#FFFFFF">프리미엄형</text>

  <text x="60" y="300" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#15324A">로토몰딩 일체성형 단면</text>

  <!-- 단열벽 단면 -->
  <rect x="160" y="360" width="760" height="480" rx="30" fill="#ffffff" stroke="#15324A" stroke-width="6"/>
  <!-- 두꺼운 단열벽 (좌우) -->
  <rect x="160" y="360" width="120" height="480" rx="30" fill="#1E6FB0"/>
  <rect x="800" y="360" width="120" height="480" fill="#1E6FB0"/>
  <rect x="160" y="360" width="760" height="100" fill="#15324A"/>
  <text x="540" y="425" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#FFFFFF" text-anchor="middle">밀폐 개스킷 뚜껑</text>
  <text x="540" y="640" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#15324A" text-anchor="middle">두꺼운</text>
  <text x="540" y="700" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#15324A" text-anchor="middle">발포 우레탄</text>
  <!-- 단열벽 라벨 화살표 -->
  <text x="220" y="900" font-family="Malgun Gothic" font-size="32" fill="#1E6FB0" text-anchor="middle">↑ 두꺼운 단열벽</text>

  <rect x="60" y="960" width="960" height="180" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
  <text x="540" y="1030" font-family="Malgun Gothic" font-size="40" fill="#5B6B7C" text-anchor="middle">가격대 (입문형 대비)</text>
  <text x="540" y="1110" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#E8722C" text-anchor="middle">약 13~20배 (예: 예티 약 40만원대)</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">자주·험하게 쓰는 헤비 캠퍼·장기 사용 전제</text>
</svg>