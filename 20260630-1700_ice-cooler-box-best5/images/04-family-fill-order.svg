<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <rect x="50" y="60" rx="34" ry="34" width="150" height="68" fill="#ffffff"/><text x="125.0" y="107" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#C85A18" text-anchor="middle">BEST 2</text>
  <text x="230" y="125" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#FFFFFF">가족 중대형 (50L 이상)</text>

  <text x="60" y="300" font-family="Malgun Gothic" font-weight="bold" font-size="48" fill="#15324A">채우는 순서 = 보냉의 절반</text>

  <!-- 아이스박스 단면 -->
  <rect x="160" y="360" width="760" height="640" rx="30" fill="#ffffff" stroke="#15324A" stroke-width="8"/>
  <rect x="160" y="340" width="760" height="60" rx="20" fill="#15324A"/>
  <text x="540" y="382" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#FFFFFF" text-anchor="middle">뚜껑 (밀폐 개스킷)</text>

  <!-- 맨 위: 식재료 -->
  <rect x="190" y="430" width="700" height="160" rx="16" fill="#FBE2C8"/>
  <text x="540" y="525" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#C85A18" text-anchor="middle">3. 상하기 쉬운 식품 (맨 위)</text>

  <rect x="190" y="610" width="700" height="160" rx="16" fill="#CDE8F7"/>
  <text x="540" y="705" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#1E6FB0" text-anchor="middle">2. 음료</text>

  <rect x="190" y="790" width="700" height="180" rx="16" fill="#9FC9E8"/>
  <text x="540" y="895" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#15324A" text-anchor="middle">1. 얼음·아이스팩 (맨 아래)</text>

  <!-- 배수구 -->
  <circle cx="900" cy="990" r="26" fill="#15324A"/>
  <text x="540" y="1080" font-family="Malgun Gothic" font-size="38" fill="#5B6B7C" text-anchor="middle">하단 배수구(드레인)로 녹은 물 배출</text>

  <rect x="60" y="1130" width="960" height="100" rx="18" fill="#E8722C"/>
  <text x="540" y="1193" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#FFFFFF" text-anchor="middle">체크: 우레탄 단열 · 밀폐 개스킷 · 배수구</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">보냉: 조건에 따라 약 1~3일 (충분한 예냉·얼음 시)</text>
</svg>