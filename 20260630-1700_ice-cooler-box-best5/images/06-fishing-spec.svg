<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#E8722C"/>
  <rect x="50" y="60" rx="34" ry="34" width="150" height="68" fill="#ffffff"/><text x="125.0" y="107" font-family="Malgun Gothic" font-weight="bold" font-size="34" fill="#C85A18" text-anchor="middle">BEST 4</text>
  <text x="230" y="125" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#FFFFFF">낚시 특화형</text>

  <text x="60" y="300" font-family="Malgun Gothic" font-weight="bold" font-size="46" fill="#15324A">생명은 밀폐 · 세척 · 배수</text>

  <rect x="60" y="360" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/><text x="100" y="436" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#15324A">당일 낚시</text><text x="1000" y="436" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#1E6FB0" text-anchor="end">24L</text>
  <rect x="60" y="500" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/><text x="100" y="576" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#15324A">갯바위 1박</text><text x="1000" y="576" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#1E6FB0" text-anchor="end">30~35L</text>
  <rect x="60" y="640" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/><text x="100" y="716" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#15324A">대형 어종·냄새 차단</text><text x="1000" y="716" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#1E6FB0" text-anchor="end">50L급</text>

  <rect x="60" y="820" width="960" height="320" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
  <text x="540" y="900" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#15324A" text-anchor="middle">꼭 확인할 3가지</text>
  <text x="540" y="985" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#E8722C" text-anchor="middle">냄새 차단 (밀폐)</text>
  <text x="540" y="1055" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1E6FB0" text-anchor="middle">세척이 쉬운 구조</text>
  <text x="540" y="1125" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#15324A" text-anchor="middle">물 잘 빠지는 배수구</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">35L도 당일 낚시에 많이 사용</text>
