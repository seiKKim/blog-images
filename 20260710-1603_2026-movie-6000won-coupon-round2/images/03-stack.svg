  <rect x="60" y="1110" width="960" height="110" rx="14" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="90" y="1152" font-family="Noto Sans CJK KR, Noto Sans KR, sans-serif" font-size="34" font-weight="bold" fill="#2B2F36">꿀조합: 조조/문화가 있는 날 + 할인권 6,000원</text>
  <text x="90" y="1198" font-family="Noto Sans CJK KR, Noto Sans KR, sans-serif" font-size="34" fill="#5B6B7C">+ 카드사 청구할인까지 겹치면 실부담 최소화</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR, Noto Sans KR, sans-serif" font-size="34" fill="#5B6B7C">출처: 문화체육관광부 · 정책브리핑(korea.kr)</text>
