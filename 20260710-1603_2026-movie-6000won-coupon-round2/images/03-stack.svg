        font-size="62" fill="#ffffff">중복 할인 가능 조합</text>

  <g font-family="Noto Sans CJK KR, Noto Sans KR, sans-serif" font-size="46">
    <rect x="60" y="270" width="960" height="140" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="356" font-weight="bold" fill="#1a1a1a">조조 할인</text>
    <text x="980" y="356" font-weight="bold" fill="#1F8A53" text-anchor="end">가능</text>

    <rect x="60" y="430" width="960" height="140" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="516" font-weight="bold" fill="#1a1a1a">문화가 있는 날</text>
    <text x="980" y="516" font-weight="bold" fill="#1F8A53" text-anchor="end">가능</text>

    <rect x="60" y="590" width="960" height="140" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="676" font-weight="bold" fill="#1a1a1a">청소년 · 경로 · 장애인 할인</text>
    <text x="980" y="676" font-weight="bold" fill="#1F8A53" text-anchor="end">가능</text>

    <rect x="60" y="750" width="960" height="140" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
