<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#2B2F36"/>
  <text x="60" y="125" font-family="Noto Sans CJK KR, Noto Sans KR, sans-serif" font-weight="bold"
        font-size="62" fill="#ffffff">받는 법 · 쓰는 법 3단계</text>

  <g font-family="Noto Sans CJK KR, Noto Sans KR, sans-serif">
    <!-- step 1 -->
    <rect x="60" y="280" width="960" height="260" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="150" cy="410" r="48" fill="#E23B3B"/>
    <text x="150" y="432" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
    <text x="240" y="390" font-size="48" font-weight="bold" fill="#1a1a1a">영화관 앱/누리집 접속</text>
    <text x="240" y="465" font-size="38" fill="#5B6B7C">CGV · 롯데시네마 · 메가박스 · 씨네Q</text>

    <!-- step 2 -->
    <rect x="60" y="580" width="960" height="260" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="150" cy="710" r="48" fill="#E23B3B"/>
    <text x="150" y="732" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
    <text x="240" y="690" font-size="48" font-weight="bold" fill="#1a1a1a">마이페이지 → 쿠폰함 확인</text>
    <text x="240" y="765" font-size="38" fill="#5B6B7C">온라인 회원이면 1인 2매 자동 지급</text>

    <!-- step 3 -->
    <rect x="60" y="880" width="960" height="260" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <circle cx="150" cy="1010" r="48" fill="#E23B3B"/>
    <text x="150" y="1032" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
    <text x="240" y="990" font-size="48" font-weight="bold" fill="#1a1a1a">예매 결제 시 할인권 적용</text>
    <text x="240" y="1065" font-size="38" fill="#5B6B7C">일반·특별관 구분 없이 정가에서 6,000원 차감</text>
  </g>

  <rect x="60" y="1170" width="960" height="70" rx="14" fill="#FFF3D6"/>
  <text x="90" y="1217" font-family="Noto Sans CJK KR, Noto Sans KR, sans-serif" font-size="34" font-weight="bold" fill="#B04A00">수량 소진 시 종료 · 미사용 할인권 자동 소멸</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR, Noto Sans KR, sans-serif" font-size="34" fill="#5B6B7C">출처: 문화체육관광부 · 정책브리핑(korea.kr)</text>
</svg>
