<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1F8A53"/>
  <text x="60" y="125" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">손택스 환급계좌 등록</text>

  <!-- 모바일 목업 -->
  <rect x="380" y="270" width="320" height="640" rx="44" fill="#ffffff" stroke="#1F8A53" stroke-width="6"/>
  <rect x="380" y="270" width="320" height="80" rx="44" fill="#1F8A53"/>
  <rect x="380" y="326" width="320" height="24" fill="#1F8A53"/>
  <text x="540" y="322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="34" fill="#ffffff" text-anchor="middle">손택스 앱</text>
  <!-- 화면 안 항목 -->
  <rect x="410" y="380" width="260" height="70" rx="12" fill="#EAF3ED"/>
  <text x="435" y="425" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="30" fill="#1F8A53">전체 메뉴</text>
  <rect x="410" y="470" width="260" height="70" rx="12" fill="#EAF3ED"/>
  <text x="435" y="515" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="28" fill="#1F8A53">납부·고지·환급</text>
  <rect x="410" y="560" width="260" height="70" rx="12" fill="#E8F5EC"/>
  <text x="435" y="605" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="27" fill="#1F8A53">국세환급금 찾기</text>
  <rect x="410" y="670" width="260" height="80" rx="14" fill="#1F8A53"/>
  <text x="540" y="720" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="30" fill="#ffffff" text-anchor="middle">지급 요청</text>
  <rect x="450" y="790" width="180" height="70" rx="35" fill="#FFD23F"/>
  <text x="540" y="835" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">완료</text>

  <!-- 단계 목록 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="60" y="960" width="960" height="90" rx="14" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="90" y="1018" font-size="38" font-weight="bold" fill="#1F8A53">1</text>
    <text x="150" y="1018" font-size="38" font-weight="bold" fill="#1a1a1a">앱 실행 → 간편인증 로그인</text>

    <rect x="60" y="1060" width="960" height="90" rx="14" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="90" y="1118" font-size="38" font-weight="bold" fill="#1F8A53">2</text>
    <text x="150" y="1118" font-size="38" font-weight="bold" fill="#1a1a1a">전체 메뉴 → 국세환급금 찾기</text>

    <rect x="60" y="1160" width="960" height="90" rx="14" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="90" y="1218" font-size="38" font-weight="bold" fill="#1F8A53">3</text>
    <text x="150" y="1218" font-size="38" font-weight="bold" fill="#1a1a1a">환급계좌 등록 후 지급 요청</text>
  </g>

  <!-- 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">출처: 국세청 손택스 앱 안내 기준</text>
</svg>
