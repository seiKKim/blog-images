<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="210" fill="#1B6FA6"/>
  <text x="60" y="105" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="56" fill="#ffffff">구명조끼 맞음새 확인법</text>
  <text x="60" y="168" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal" font-size="34" fill="#CFE3F2">안전장비 1순위 · 사이즈가 생명</text>

  <!-- 확인법 설명 -->
  <rect x="60" y="270" width="960" height="200" rx="18" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="90" y="336" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#1B6FA6">착용 후 이렇게 확인하세요</text>
  <text x="90" y="392" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal" font-size="34" fill="#1a1a1a">아이가 팔을 머리 위로 똑바로 든 상태에서,</text>
  <text x="90" y="440" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal" font-size="34" fill="#1a1a1a">어른이 어깨 부분을 잡고 위로 부드럽게 당긴다.</text>

  <!-- OK / NG 비교 -->
  <!-- OK -->
  <rect x="60" y="510" width="460" height="440" rx="18" fill="#E7F5EC" stroke="#1F8A53" stroke-width="3"/>
  <circle cx="290" cy="595" r="42" fill="#1F8A53"/>
  <path d="M270 596 l14 16 l26 -32" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="290" y="700" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="48" fill="#1F8A53" text-anchor="middle">딱 맞음</text>
  <text x="290" y="770" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal" font-size="34" fill="#1a1a1a" text-anchor="middle">조끼가 제자리</text>
  <text x="290" y="818" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal" font-size="34" fill="#1a1a1a" text-anchor="middle">여유 공간 없이</text>
  <text x="290" y="866" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal" font-size="34" fill="#1a1a1a" text-anchor="middle">몸에 밀착</text>
  <text x="290" y="920" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="34" fill="#1F8A53" text-anchor="middle">→ 안전 O</text>

  <!-- NG -->
  <rect x="560" y="510" width="460" height="440" rx="18" fill="#F6DADA" stroke="#E23B3B" stroke-width="3"/>
  <circle cx="790" cy="595" r="42" fill="#E23B3B"/>
  <path d="M772 577 l36 36 M808 577 l-36 36" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <text x="790" y="700" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="48" fill="#E23B3B" text-anchor="middle">큰 사이즈</text>
  <text x="790" y="770" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal" font-size="34" fill="#1a1a1a" text-anchor="middle">조끼가 턱·얼굴</text>
  <text x="790" y="818" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal" font-size="34" fill="#1a1a1a" text-anchor="middle">위로 밀려</text>
  <text x="790" y="866" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal" font-size="34" fill="#1a1a1a" text-anchor="middle">올라옴</text>
  <text x="790" y="920" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="34" fill="#E23B3B" text-anchor="middle">→ 위험 X</text>

  <!-- 체크 포인트 -->
  <text x="60" y="1030" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#1B6FA6">구매 전 체크</text>
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#1a1a1a">
    <text x="60" y="1090" font-weight="bold" fill="#1B6FA6">✓</text>
    <text x="100" y="1090">라벨의 KC인증·부력·체중 기준 확인</text>
    <text x="60" y="1145" font-weight="bold" fill="#1B6FA6">✓</text>
    <text x="100" y="1145">16세 미만은 고정식(부력재) 사용 · 팽창형 불가</text>
    <text x="60" y="1200" font-weight="bold" fill="#1B6FA6">✓</text>
    <text x="100" y="1200">밝은 색상으로 물속 위치 식별</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" fill="#5B6B7C">참고: 어린이제품 KC인증(안전확인대상) 기준</text>
</svg>
