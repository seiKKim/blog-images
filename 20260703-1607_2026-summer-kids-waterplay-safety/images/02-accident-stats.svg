<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="210" fill="#1B6FA6"/>
  <text x="60" y="105" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="58" fill="#ffffff">물놀이 사망사고, 어디서·왜?</text>
  <text x="60" y="168" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal" font-size="36" fill="#CFE3F2">최근 5년 총 112명 · 7월 하순 31명 집중</text>

  <!-- 섹션1: 장소별 -->
  <text x="60" y="300" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="42" fill="#1B6FA6">장소별 비율</text>
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 하천 35% (track x=300 w=560) -->
    <text x="60" y="360" font-weight="bold" font-size="36" fill="#1a1a1a">하천(강)</text>
    <rect x="300" y="330" width="560" height="44" rx="8" fill="#E1E9F2"/>
    <rect x="300" y="330" width="196" height="44" rx="8" fill="#1B6FA6"/>
    <text x="972" y="362" font-weight="bold" font-size="34" fill="#1B6FA6" text-anchor="end">35%</text>
    <!-- 계곡 30% -->
    <text x="60" y="430" font-weight="bold" font-size="36" fill="#1a1a1a">계곡</text>
    <rect x="300" y="400" width="560" height="44" rx="8" fill="#E1E9F2"/>
    <rect x="300" y="400" width="168" height="44" rx="8" fill="#2A8CC7"/>
    <text x="972" y="432" font-weight="bold" font-size="34" fill="#1B6FA6" text-anchor="end">30%</text>
    <!-- 해수욕장 22% -->
    <text x="60" y="500" font-weight="bold" font-size="36" fill="#1a1a1a">해수욕장</text>
    <rect x="300" y="470" width="560" height="44" rx="8" fill="#E1E9F2"/>
    <rect x="300" y="470" width="123" height="44" rx="8" fill="#59A9D6"/>
    <text x="972" y="502" font-weight="bold" font-size="34" fill="#1B6FA6" text-anchor="end">22%</text>
    <!-- 갯벌 13% -->
    <text x="60" y="570" font-weight="bold" font-size="36" fill="#1a1a1a">갯벌·해변</text>
    <rect x="300" y="540" width="560" height="44" rx="8" fill="#E1E9F2"/>
    <rect x="300" y="540" width="73" height="44" rx="8" fill="#8FC5E4"/>
    <text x="972" y="572" font-weight="bold" font-size="34" fill="#1B6FA6" text-anchor="end">13%</text>
  </g>

  <line x1="60" y1="640" x2="1020" y2="640" stroke="#D6E0EC" stroke-width="2"/>

  <!-- 섹션2: 원인별 -->
  <text x="60" y="710" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="42" fill="#E23B3B">원인별 비율</text>
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 안전부주의 37% -->
    <text x="60" y="775" font-weight="bold" font-size="36" fill="#1a1a1a">안전 부주의</text>
    <text x="60" y="812" font-weight="normal" font-size="26" fill="#6B7A8C">(구명조끼 미착용 등)</text>
    <rect x="360" y="760" width="500" height="44" rx="8" fill="#F6DADA"/>
    <rect x="360" y="760" width="185" height="44" rx="8" fill="#E23B3B"/>
    <text x="972" y="792" font-weight="bold" font-size="36" fill="#E23B3B" text-anchor="end">37%</text>
    <!-- 수영미숙 34% -->
    <text x="60" y="875" font-weight="bold" font-size="36" fill="#1a1a1a">수영 미숙</text>
    <rect x="360" y="845" width="500" height="44" rx="8" fill="#F6DADA"/>
    <rect x="360" y="845" width="170" height="44" rx="8" fill="#EF7B4E"/>
    <text x="972" y="877" font-weight="bold" font-size="34" fill="#E23B3B" text-anchor="end">34%</text>
    <!-- 음주수영 17% -->
    <text x="60" y="960" font-weight="bold" font-size="36" fill="#1a1a1a">음주 수영</text>
    <rect x="360" y="930" width="500" height="44" rx="8" fill="#F6DADA"/>
    <rect x="360" y="930" width="85" height="44" rx="8" fill="#F2A25E"/>
    <text x="972" y="962" font-weight="bold" font-size="34" fill="#E23B3B" text-anchor="end">17%</text>
  </g>

  <!-- 어린이 강조 -->
  <rect x="60" y="1030" width="960" height="160" rx="18" fill="#FFF4D6" stroke="#FFD23F" stroke-width="3"/>
  <text x="90" y="1098" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40" fill="#B36A00">익수 환자 최다 연령</text>
  <text x="90" y="1156" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="52" fill="#E23B3B">9세 이하 어린이 29.6%</text>
  <text x="640" y="1118" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal" font-size="30" fill="#7A5A00">위험 시간대</text>
  <text x="640" y="1160" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="42" fill="#B36A00">낮 12~18시</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="30" fill="#5B6B7C">출처: 행정안전부 물놀이 사망사고 통계 · 질병관리청 익수사고 조사(2020~2024)</text>
</svg>
