<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="1080" height="1350" fill="#F6F1EB"/><rect width="1080" height="190" fill="#E8722C"/><rect y="190" width="1080" height="10" fill="#C75C1E"/><rect x="60" y="46" rx="26" ry="26" width="148" height="52" fill="#FFD23F"/><text x="134" y="82" font-family="Noto Sans CJK KR" font-weight="800" font-size="30" fill="#1a1a1a" text-anchor="middle">추천템</text><text x="60" y="162" font-family="Noto Sans CJK KR" font-weight="900" font-size="60" fill="#ffffff" text-anchor="start">가격대별 차이 (대략)</text><rect x="60" y="260" rx="22" width="960" height="270" fill="#F0E4D6"/><text x="100" y="340" font-family="Noto Sans CJK KR" font-weight="900" font-size="46" fill="#2A2A2A" text-anchor="start">저가형 (AC)</text><text x="1000" y="355" font-family="Noto Sans CJK KR" font-weight="900" font-size="56" fill="#C75C1E" text-anchor="end">약 3~5만원</text><text x="100" y="445" font-family="Noto Sans CJK KR" font-weight="700" font-size="34" fill="#6B5A4E" text-anchor="start">단순 공기순환 / 풍량 3~4단</text><rect x="60" y="560" rx="22" width="960" height="270" fill="#E8722C"/><text x="100" y="640" font-family="Noto Sans CJK KR" font-weight="900" font-size="46" fill="#ffffff" text-anchor="start">중가형 (BLDC)</text><text x="1000" y="655" font-family="Noto Sans CJK KR" font-weight="900" font-size="56" fill="#FFD23F" text-anchor="end">약 7~12만원</text><text x="100" y="745" font-family="Noto Sans CJK KR" font-weight="700" font-size="34" fill="#ffffff" text-anchor="start">정밀 풍량(8~20단)+회전·타이머</text><rect x="60" y="860" rx="22" width="960" height="270" fill="#C75C1E"/><text x="100" y="940" font-family="Noto Sans CJK KR" font-weight="900" font-size="46" fill="#ffffff" text-anchor="start">고가형</text><text x="1000" y="955" font-family="Noto Sans CJK KR" font-weight="900" font-size="56" fill="#FFD23F" text-anchor="end">수십만원대</text><text x="100" y="1045" font-family="Noto Sans CJK KR" font-weight="700" font-size="34" fill="#ffffff" text-anchor="start">3D 회전·충전식·대형/캠핑 겸용</text><rect x="0" y="1270" width="1080" height="80" fill="#FFF3E9"/><text x="60" y="1310" font-family="Noto Sans CJK KR" font-weight="600" font-size="30" fill="#6B5A4E" text-anchor="start">출처/주: 가격대는 자료마다 폭이 커 &quot;대략&quot; 수준 / 모터가 가장 큰 변수</text>
