<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="108" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">다자녀 가구 추가 지원</text>
  <text x="60" y="166" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="36" fill="#E8EEF5">일반 지원보다 높은 단가 적용</text>

  <!-- 표 헤더 -->
  <rect x="60" y="260" width="960" height="96" rx="16" fill="#243B6B"/>
  <text x="330" y="322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#ffffff" text-anchor="middle">구분</text>
  <text x="770" y="322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#ffffff" text-anchor="middle">지원 내용</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 셋째 이상 1~8구간 -->
    <rect x="60" y="376" width="960" height="160" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="450" font-weight="bold" font-size="44" fill="#1a1a1a">셋째 이상</text>
    <text x="100" y="502" font-weight="normal" font-size="34" fill="#5B6B7C">1~8구간</text>
    <text x="990" y="440" font-weight="bold" font-size="46" fill="#1B5FA6" text-anchor="end">등록금</text>
    <text x="990" y="496" font-weight="bold" font-size="46" fill="#1B5FA6" text-anchor="end">전액</text>

    <!-- 셋째 이상 9구간 -->
    <rect x="60" y="556" width="960" height="160" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="630" font-weight="bold" font-size="44" fill="#1a1a1a">셋째 이상</text>
    <text x="100" y="682" font-weight="normal" font-size="34" fill="#5B6B7C">9구간</text>
    <text x="990" y="656" font-weight="bold" font-size="46" fill="#1B5FA6" text-anchor="end">연 200만원</text>

    <!-- 첫째·둘째 -->
    <rect x="60" y="736" width="960" height="160" rx="16" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
    <text x="100" y="810" font-weight="bold" font-size="44" fill="#1a1a1a">첫째·둘째</text>
    <text x="100" y="862" font-weight="normal" font-size="34" fill="#5B6B7C">다자녀 가구</text>
    <text x="990" y="836" font-weight="bold" font-size="42" fill="#1B5FA6" text-anchor="end">일반보다 높은 단가</text>
  </g>

  <!-- 안내 박스 -->
  <rect x="60" y="960" width="960" height="230" rx="20" fill="#EAF1F9"/>
  <text x="100" y="1040" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1B5FA6">참고</text>
  <text x="100" y="1108" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="36" fill="#2B3A4A">실제 지급액은 본인 등록금과 상한액 중</text>
  <text x="100" y="1156" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="36" fill="#2B3A4A">적은 금액(등록금 실비 한도) 기준</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34"
        fill="#5B6B7C">출처: 정책브리핑(korea.kr) · 한국장학재단</text>
</svg>
