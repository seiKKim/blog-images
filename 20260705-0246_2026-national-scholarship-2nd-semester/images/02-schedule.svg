<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <rect width="1080" height="150" fill="#1B5FA6"/>
  <text x="60" y="95" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">국가장학금 신청 일정</text>

  <!-- 타임라인 축 -->
  <line x1="150" y1="330" x2="930" y2="330" stroke="#C6D4E4" stroke-width="8" stroke-linecap="round"/>
  <circle cx="330" cy="330" r="22" fill="#1B5FA6"/>
  <circle cx="750" cy="330" r="22" fill="#E8722C"/>

  <!-- 1차 카드 -->
  <rect x="90" y="380" width="420" height="230" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="90" y="380" width="420" height="70" rx="20" fill="#1B5FA6"/>
  <rect x="90" y="420" width="420" height="30" fill="#1B5FA6"/>
  <text x="300" y="428" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#ffffff" text-anchor="middle">1차 (마감)</text>
  <text x="300" y="512" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1a1a1a" text-anchor="middle">5.22 ~ 6.22</text>
  <text x="300" y="565" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="30" fill="#5B6B7C" text-anchor="middle">서류·가구원동의 ~6.29</text>

  <!-- 2차 카드 -->
  <rect x="570" y="380" width="420" height="230" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="570" y="380" width="420" height="70" rx="20" fill="#E8722C"/>
  <rect x="570" y="420" width="420" height="30" fill="#E8722C"/>
  <text x="780" y="428" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="42" fill="#ffffff" text-anchor="middle">2차 (예정)</text>
  <text x="780" y="512" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1a1a1a" text-anchor="middle">8월 예상</text>
  <text x="780" y="565" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="30" fill="#5B6B7C" text-anchor="middle">날짜 미확정 · 추후 공지</text>

  <text x="330" y="270" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="34" fill="#1B5FA6" text-anchor="middle">이미 마감</text>
  <text x="750" y="270" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="34" fill="#E8722C" text-anchor="middle">준비 시점</text>

  <text x="540" y="680" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="28"
        fill="#8A99A8" text-anchor="middle">정확한 2차 일정은 한국장학재단(kosaf.go.kr) 공지 확인</text>
</svg>
