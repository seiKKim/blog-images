<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="210" fill="#1B5FA6"/>
  <text x="60" y="112" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="800"
        font-size="58" fill="#ffffff">구매 전 체크리스트 5</text>
  <text x="60" y="168" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="600"
        font-size="34" fill="#CFE6FF">사기 전에 이 다섯 가지만 확인하세요</text>

  <!-- 항목 카드 5개 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 1 -->
    <rect x="60" y="256" width="960" height="184" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="140" cy="348" r="46" fill="#1B5FA6"/>
    <text x="140" y="366" text-anchor="middle" font-weight="800" font-size="52" fill="#ffffff">1</text>
    <text x="216" y="334" font-weight="800" font-size="42" fill="#1a1a1a">Q-max 측정조건</text>
    <text x="216" y="392" font-weight="600" font-size="33" fill="#5B6B7C">완제품·온도차 10&#8451;(JIS L 1927)인지</text>
    <text x="216" y="428" font-weight="700" font-size="30" fill="#C0442A">원사·20&#8451;는 부풀린 수치일 수 있음</text>

    <!-- 2 -->
    <rect x="60" y="456" width="960" height="164" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="140" cy="538" r="46" fill="#1B5FA6"/>
    <text x="140" y="556" text-anchor="middle" font-weight="800" font-size="52" fill="#ffffff">2</text>
    <text x="216" y="524" font-weight="800" font-size="42" fill="#1a1a1a">패드형 vs 매트리스형</text>
    <text x="216" y="582" font-weight="600" font-size="33" fill="#5B6B7C">패드형이 세탁·보관 쉬움 (입문 추천 축)</text>

    <!-- 3 -->
    <rect x="60" y="636" width="960" height="164" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="140" cy="718" r="46" fill="#1B5FA6"/>
    <text x="140" y="736" text-anchor="middle" font-weight="800" font-size="52" fill="#ffffff">3</text>
    <text x="216" y="704" font-weight="800" font-size="42" fill="#1a1a1a">사이즈</text>
    <text x="216" y="762" font-weight="600" font-size="33" fill="#5B6B7C">싱글~킹 규격, 매트리스 실측 후 구매</text>

    <!-- 4 -->
    <rect x="60" y="816" width="960" height="184" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="140" cy="908" r="46" fill="#1B5FA6"/>
    <text x="140" y="926" text-anchor="middle" font-weight="800" font-size="52" fill="#ffffff">4</text>
    <text x="216" y="894" font-weight="800" font-size="42" fill="#1a1a1a">세탁·고정</text>
    <text x="216" y="952" font-weight="600" font-size="33" fill="#5B6B7C">30&#8451; 이하 찬물·중성세제·약한 강도</text>
    <text x="216" y="988" font-weight="700" font-size="30" fill="#C0442A">밴드 봉합강도·미끄럼방지 확인</text>

    <!-- 5 -->
    <rect x="60" y="1016" width="960" height="184" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="140" cy="1108" r="46" fill="#1B5FA6"/>
    <text x="140" y="1126" text-anchor="middle" font-weight="800" font-size="52" fill="#ffffff">5</text>
    <text x="216" y="1094" font-weight="800" font-size="42" fill="#1a1a1a">인증·표시정보</text>
    <text x="216" y="1152" font-weight="600" font-size="33" fill="#5B6B7C">OEKO-TEX·KC, 제조연월·혼용율·세탁기호</text>
    <text x="216" y="1188" font-weight="700" font-size="30" fill="#C0442A">시험 11개 중 표시정보 충족은 1개사뿐</text>
  </g>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 서울YWCA 냉감패드 비교시험 (본문 참조)</text>
</svg>
