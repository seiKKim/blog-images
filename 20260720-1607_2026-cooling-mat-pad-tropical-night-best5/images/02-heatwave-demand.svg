<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="210" fill="#1B5FA6"/>
  <text x="60" y="112" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="800"
        font-size="58" fill="#ffffff">2026 여름, 왜 이렇게 팔릴까</text>
  <text x="60" y="168" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="600"
        font-size="34" fill="#CFE6FF">폭염·열대야 전망 + 냉감 침구 수요 급증</text>

  <!-- 카드1: 기온 전망 -->
  <rect x="60" y="262" width="960" height="230" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
  <rect x="60" y="262" width="14" height="230" rx="7" fill="#E8722C"/>
  <text x="104" y="332" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="800" font-size="42" fill="#1a1a1a">평년보다 더울 확률 우세</text>
  <text x="104" y="392" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="600" font-size="34" fill="#5B6B7C">기상청 2026 여름 전망</text>
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <text x="180" y="470" font-weight="800" font-size="66" fill="#E8722C" text-anchor="middle">60%</text>
    <text x="180" y="492" font-size="0" fill="#5B6B7C"></text>
    <text x="520" y="470" font-weight="800" font-size="66" fill="#E8722C" text-anchor="middle">60%</text>
    <text x="860" y="470" font-weight="800" font-size="66" fill="#1B5FA6" text-anchor="middle">50%</text>
  </g>
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="700" font-size="32" fill="#5B6B7C">
    <text x="180" y="440" text-anchor="middle">6월</text>
    <text x="520" y="440" text-anchor="middle">7월</text>
    <text x="860" y="440" text-anchor="middle">8월</text>
  </g>

  <!-- 카드2: 새 경보 -->
  <rect x="60" y="522" width="960" height="180" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
  <rect x="60" y="522" width="14" height="180" rx="7" fill="#1B5FA6"/>
  <text x="104" y="592" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="800" font-size="42" fill="#1a1a1a">올여름 새 경보 운영</text>
  <text x="104" y="652" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="700" font-size="36" fill="#1B5FA6">폭염중대경보 · 열대야주의보</text>

  <!-- 카드3: 매출 -->
  <rect x="60" y="732" width="960" height="300" rx="20" fill="#0E3A66"/>
  <text x="104" y="812" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="700" font-size="40" fill="#CFE6FF">한 유통사 냉감 침구 매출</text>
  <text x="104" y="820" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="600" font-size="30" fill="#9CC4E8"></text>
  <text x="540" y="928" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="800" font-size="150" fill="#FFD23F" text-anchor="middle">180%</text>
  <text x="540" y="990" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="700" font-size="40" fill="#ffffff" text-anchor="middle">전주 대비 성장 (특정 시점)</text>

  <!-- 설명 -->
  <text x="60" y="1110" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="700" font-size="36" fill="#1a1a1a">냉방비 부담 + 폭염 → &#8220;잠자리 표면만 시원하게&#8221;</text>
  <text x="60" y="1162" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="600" font-size="34" fill="#5B6B7C">적용 품목도 침대·베개패드 → 소파패드·방석까지 확대</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">출처: 기상청 여름 전망 · 유통업계 자료 (본문 참조)</text>
</svg>
