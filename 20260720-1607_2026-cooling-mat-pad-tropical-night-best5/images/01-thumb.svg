  <!-- 메인 카피 -->
  <text x="80" y="452" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="800"
        font-size="118" fill="#ffffff">Q-max 숫자에</text>
  <text x="80" y="580" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="800"
        font-size="118" fill="#FFD23F">속지 마세요</text>

  <!-- 강조 라인 -->
  <text x="80" y="672" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="700"
        font-size="46" fill="#CFE6FF">브랜드보다 <tspan fill="#ffffff" font-weight="800">소재 + 측정조건</tspan> 먼저</text>

  <!-- 디테일 박스 -->
  <rect x="80" y="748" rx="22" ry="22" width="920" height="132" fill="#ffffff" opacity="0.13"/>
  <text x="112" y="808" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="800"
        font-size="44" fill="#FFD23F">완제품 · 온도차 10&#8451;(JIS L 1927)</text>
  <text x="112" y="856" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="600"
        font-size="34" fill="#EAF3FF">원사·20&#8451; 기준은 부풀린 수치일 수 있어요</text>

  <!-- 소재 태그 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="700" font-size="30" fill="#12314F">
    <rect x="80" y="916" rx="20" width="150" height="56" fill="#FFD23F"/><text x="155" y="953" text-anchor="middle">젤</text>
    <rect x="246" y="916" rx="20" width="150" height="56" fill="#7FD4FF"/><text x="321" y="953" text-anchor="middle">인견</text>
    <rect x="412" y="916" rx="20" width="200" height="56" fill="#E8722C"/><text x="512" y="953" text-anchor="middle" fill="#ffffff">라텍스</text>
    <rect x="628" y="916" rx="20" width="330" height="56" fill="#CFE6FF"/><text x="793" y="953" text-anchor="middle">메모리폼·냉감원단</text>
  </g>

  <text x="80" y="1028" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="400"
