<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E3A66"/>
      <stop offset="0.55" stop-color="#1B5FA6"/>
      <stop offset="1" stop-color="#2E7BC9"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- 장식: 냉감/눈결정 느낌 원 -->
  <circle cx="940" cy="200" r="270" fill="#ffffff" opacity="0.07"/>
  <circle cx="120" cy="1000" r="230" fill="#ffffff" opacity="0.06"/>
  <circle cx="880" cy="880" r="150" fill="#7FD4FF" opacity="0.10"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="86" rx="34" ry="34" width="240" height="68" fill="#FFD23F"/>
  <text x="200" y="132" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="700"
        font-size="36" fill="#12314F" text-anchor="middle">여름 생활꿀팁</text>

  <!-- 서브 카피 -->
  <text x="80" y="288" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="700"
