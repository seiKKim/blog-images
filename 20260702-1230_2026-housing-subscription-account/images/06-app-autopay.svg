<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#243B6B"/>
  <text x="540" y="120" font-family="Malgun Gothic" font-weight="bold" font-size="60" fill="#ffffff" text-anchor="middle">청약통장 자동이체 설정</text>
  <text x="540" y="185" font-family="Malgun Gothic" font-size="36" fill="#E8EEF5" text-anchor="middle">은행 앱에서 월 25만원 자동이체 걸어두기</text>

  <!-- 폰 목업 -->
  <rect x="240" y="250" width="600" height="1000" rx="60" fill="#ffffff" stroke="#0f1d38" stroke-width="10"/>
  <rect x="240" y="250" width="600" height="150" rx="60" fill="#3E5C93"/>
  <rect x="240" y="330" width="600" height="70" fill="#3E5C93"/>
  <text x="540" y="345" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#ffffff" text-anchor="middle">자동이체 등록</text>
  <circle cx="540" cy="288" r="8" fill="#ffffff" opacity="0.7"/>

  <!-- 입력 행 -->
  <g font-family="Malgun Gothic">
    <text x="300" y="500" font-size="36" fill="#5B6B7C">상품</text>
    <text x="780" y="500" font-size="40" font-weight="bold" fill="#1a1a1a" text-anchor="end">주택청약종합저축</text>
    <line x1="300" y1="540" x2="780" y2="540" stroke="#D6E0EC" stroke-width="2"/>

    <text x="300" y="620" font-size="36" fill="#5B6B7C">이체 금액</text>
    <text x="780" y="628" font-size="60" font-weight="bold" fill="#243B6B" text-anchor="end">250,000원</text>
    <line x1="300" y1="670" x2="780" y2="670" stroke="#D6E0EC" stroke-width="2"/>

    <text x="300" y="750" font-size="36" fill="#5B6B7C">이체일</text>
    <text x="780" y="750" font-size="40" font-weight="bold" fill="#1a1a1a" text-anchor="end">매월 25일</text>
    <line x1="300" y1="790" x2="780" y2="790" stroke="#D6E0EC" stroke-width="2"/>

    <text x="300" y="870" font-size="36" fill="#5B6B7C">주기</text>
    <text x="780" y="870" font-size="40" font-weight="bold" fill="#1a1a1a" text-anchor="end">매월 반복</text>
    <line x1="300" y1="910" x2="780" y2="910" stroke="#D6E0EC" stroke-width="2"/>
  </g>

  <!-- 안내 박스 -->
  <rect x="300" y="960" width="480" height="120" rx="18" fill="#E8EEF5"/>
  <text x="540" y="1010" font-family="Malgun Gothic" font-size="32" fill="#243B6B" text-anchor="middle">연 300만원 = 월 25만원 × 12</text>
  <text x="540" y="1052" font-family="Malgun Gothic" font-size="30" fill="#5B6B7C" text-anchor="middle">소득공제 한도까지 꽉 채우기</text>

  <!-- 등록 버튼 -->
  <rect x="300" y="1120" width="480" height="90" rx="45" fill="#243B6B"/>
  <text x="540" y="1178" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#ffffff" text-anchor="middle">자동이체 등록하기</text>

  <text x="540" y="1320" font-family="Malgun Gothic" font-size="30" fill="#E8EEF5" text-anchor="middle">※ 예시 화면 — 실제 앱 UI는 은행별로 다름</text>
</svg>