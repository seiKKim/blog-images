<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E0556E"/>
      <stop offset="1" stop-color="#C93F5B"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- 장식 도형 -->
  <circle cx="960" cy="170" r="270" fill="#ffffff" opacity="0.08"/>
  <circle cx="110" cy="990" r="210" fill="#ffffff" opacity="0.07"/>
  <circle cx="180" cy="150" r="90" fill="#FFD23F" opacity="0.14"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="88" rx="34" ry="34" width="230" height="68" fill="#FFD23F"/>
  <text x="195" y="134" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#1a1a1a" text-anchor="middle">여름 시즌정보</text>

  <!-- 서브 카피 -->
  <text x="80" y="278" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#FFE9D6">2026 여름휴가, 떠나기 전 필독</text>

  <!-- 메인 카피 -->
  <text x="80" y="430" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="118" fill="#ffffff">물놀이·계곡·캠핑</text>
  <text x="80" y="565" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="150" fill="#FFD23F">필수 준비물</text>

  <!-- 3분류 아이콘 카드 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" text-anchor="middle">
    <rect x="80" y="640" rx="24" width="280" height="150" fill="#ffffff" opacity="0.16"/>
    <text x="220" y="710" font-size="60">🌊</text>
    <text x="220" y="762" font-size="42" fill="#ffffff">물놀이</text>

    <rect x="400" y="640" rx="24" width="280" height="150" fill="#ffffff" opacity="0.16"/>
    <text x="540" y="710" font-size="60">⛰️</text>
    <text x="540" y="762" font-size="42" fill="#ffffff">계곡</text>

    <rect x="720" y="640" rx="24" width="280" height="150" fill="#ffffff" opacity="0.16"/>
    <text x="860" y="710" font-size="60">⛺</text>
    <text x="860" y="762" font-size="42" fill="#ffffff">캠핑</text>
  </g>

  <!-- 디테일 박스 -->
  <rect x="80" y="822" rx="20" ry="20" width="920" height="118" fill="#ffffff" opacity="0.16"/>
  <text x="110" y="898" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="50" fill="#ffffff">구명조끼·아쿠아슈즈·자외선차단제 3종</text>

  <!-- 채널 표시 -->
  <text x="80" y="1012" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#FFE9D6" opacity="0.9">blog.naver.com/trip_chocho</text>
</svg>
