    <text x="1000" y="633" font-weight="bold" fill="#C93F5B" text-anchor="end">AI 기반 실시간 탐지</text>

    <rect x="60" y="692" width="960" height="118" rx="16" fill="#ffffff" stroke="#EAD7DC" stroke-width="2"/>
