<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <rect width="1080" height="150" fill="#2B2F36"/>
  <rect x="0" y="0" width="14" height="150" fill="#E23B3B"/>
  <text x="60" y="78" font-family="Malgun Gothic" font-weight="bold" font-size="50" fill="#ffffff">2026년 최저임금 (확정)</text>
  <text x="60" y="122" font-family="Malgun Gothic" font-size="30" fill="#E8EEF5">2026-01-01부터 적용 중 · 모든 사업장 동일</text>

  <!-- 시급 카드 -->
  <rect x="60" y="200" rx="20" width="460" height="320" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="290" y="278" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#5B6B7C" text-anchor="middle">시급</text>
  <text x="290" y="400" font-family="Malgun Gothic" font-weight="bold" font-size="104" fill="#2B2F36" text-anchor="middle">10,320원</text>
  <text x="290" y="468" font-family="Malgun Gothic" font-size="34" fill="#E23B3B" text-anchor="middle">전년 대비 +290원 (2.9%)</text>

  <!-- 월급 카드 -->
  <rect x="560" y="200" rx="20" width="460" height="320" fill="#2B2F36"/>
  <text x="790" y="278" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#FFD23F" text-anchor="middle">월 환산액</text>
  <text x="790" y="392" font-family="Malgun Gothic" font-weight="bold" font-size="74" fill="#ffffff" text-anchor="middle">2,156,880원</text>
  <text x="790" y="460" font-family="Malgun Gothic" font-size="34" fill="#E8EEF5" text-anchor="middle">월 209시간 기준 (주휴 포함)</text>

  <!-- 계산 띠 -->
  <rect x="60" y="552" rx="16" width="960" height="80" fill="#E8EEF5"/>
  <text x="540" y="603" font-family="Malgun Gothic" font-weight="bold" font-size="38" fill="#2B2F36" text-anchor="middle">10,320원 × 209시간 = 2,156,880원</text>

  <rect x="0" y="660" width="1080" height="60" fill="#DCE4EE"/>
  <text x="60" y="699" font-family="Malgun Gothic" font-size="28" fill="#5B6B7C">출처: 고용노동부 · 최저임금위원회</text>
</svg>
