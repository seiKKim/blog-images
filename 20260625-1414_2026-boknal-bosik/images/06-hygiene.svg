<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
<rect width="1080" height="1080" fill="#FFF5F7"/>
<rect width="1080" height="200" fill="#E0556E"/><text x="60" y="125" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#FFFFFF">삼계탕 위생 · 식중독 예방</text>
<rect x="60" y="290" width="960" height="130" rx="16" fill="#ffffff" stroke="#F3CAD3"/><text x="100" y="348" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#B83E55">✔ 충분히 익히기</text><text x="100" y="396" font-family="Malgun Gothic" font-size="34" fill="#2a2a2a">중심온도 75℃ 이상 완전 가열</text><rect x="60" y="442" width="960" height="130" rx="16" fill="#ffffff" stroke="#F3CAD3"/><text x="100" y="500" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#B83E55">✔ 2시간 규칙</text><text x="100" y="548" font-family="Malgun Gothic" font-size="34" fill="#2a2a2a">조리 후 2시간 내 섭취·남으면 재가열</text><rect x="60" y="594" width="960" height="130" rx="16" fill="#ffffff" stroke="#F3CAD3"/><text x="100" y="652" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#B83E55">✔ 생닭 취급</text><text x="100" y="700" font-family="Malgun Gothic" font-size="34" fill="#2a2a2a">채소 먼저·생닭 마지막, 손 30초 세척</text><rect x="60" y="746" width="960" height="130" rx="16" fill="#ffffff" stroke="#F3CAD3"/><text x="100" y="804" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#B83E55">✔ 교차오염 방지</text><text x="100" y="852" font-family="Malgun Gothic" font-size="34" fill="#2a2a2a">육류 전용 칼·도마 분리 사용</text>
<rect x="0" y="1000" width="1080" height="80" fill="#FDE8EC"/><text x="60" y="1052" font-family="Malgun Gothic" font-size="32" fill="#9A5563">식약처 여름철 식중독 예방 수칙</text>
</svg>