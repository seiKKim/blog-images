<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
<rect width="1080" height="1080" fill="#FFF5F7"/>
<rect width="1080" height="200" fill="#E0556E"/><text x="60" y="125" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#FFFFFF">대표 복날 보양식</text>
<rect x="60" y="290" width="960" height="118" rx="16" fill="#ffffff" stroke="#F3CAD3"/><rect x="60" y="290" width="14" height="118" rx="7" fill="#E0556E"/><text x="100" y="342" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#B83E55">삼계탕</text><text x="100" y="387" font-family="Malgun Gothic" font-size="32" fill="#2a2a2a">찹쌀·마늘·대추·인삼 넣고 푹 곤 대표 보양식</text><rect x="60" y="425" width="960" height="118" rx="16" fill="#ffffff" stroke="#F3CAD3"/><rect x="60" y="425" width="14" height="118" rx="7" fill="#E0556E"/><text x="100" y="477" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#B83E55">장어구이</text><text x="100" y="522" font-family="Malgun Gothic" font-size="32" fill="#2a2a2a">흔히 '보양식의 황제'로 불리는 식재료</text><rect x="60" y="560" width="960" height="118" rx="16" fill="#ffffff" stroke="#F3CAD3"/><rect x="60" y="560" width="14" height="118" rx="7" fill="#E0556E"/><text x="100" y="612" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#B83E55">추어탕</text><text x="100" y="657" font-family="Malgun Gothic" font-size="32" fill="#2a2a2a">미꾸라지를 오래 고아 시래기와 칼칼하게</text><rect x="60" y="695" width="960" height="118" rx="16" fill="#ffffff" stroke="#F3CAD3"/><rect x="60" y="695" width="14" height="118" rx="7" fill="#E0556E"/><text x="100" y="747" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#B83E55">전복죽</text><text x="100" y="792" font-family="Malgun Gothic" font-size="32" fill="#2a2a2a">위에 부담 적어 가볍게 먹기 좋은 죽</text><rect x="60" y="830" width="960" height="118" rx="16" fill="#ffffff" stroke="#F3CAD3"/><rect x="60" y="830" width="14" height="118" rx="7" fill="#E0556E"/><text x="100" y="882" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#B83E55">콩국수</text><text x="100" y="927" font-family="Malgun Gothic" font-size="32" fill="#2a2a2a">더운 날 시원하게 즐기는 여름 보양식</text>
<rect x="0" y="1000" width="1080" height="80" fill="#FDE8EC"/><text x="60" y="1052" font-family="Malgun Gothic" font-size="32" fill="#9A5563">※ 전통 풍습 · 의학적 효능 단정 아님</text>
</svg>