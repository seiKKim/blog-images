<rect x="60" y="430" width="960" height="118" rx="16" fill="#ffffff" stroke="#F3CAD3"/><text x="100" y="502" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#2a2a2a">중복</text><text x="1000" y="502" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#E0556E" text-anchor="end">7월 25일 (토)</text>
