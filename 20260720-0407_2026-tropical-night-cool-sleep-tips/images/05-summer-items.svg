<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <!-- 상단 색띠 -->
  <rect width="1080" height="200" fill="#1E3A6E"/>
  <rect x="60" y="66" rx="30" ry="30" width="220" height="60" fill="#E8722C"/>
  <text x="170" y="107" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="32" fill="#ffffff" text-anchor="middle">보조 수단</text>
  <text x="310" y="128" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">여름 숙면템 정리</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 1 냉감 쿨매트 -->
    <rect x="60" y="260" width="960" height="170" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="60" y="260" width="12" height="170" rx="6" fill="#1E3A6E"/>
    <text x="110" y="330" font-size="46" font-weight="bold" fill="#1a1a1a">냉감 매트·쿨패드</text>
    <text x="110" y="390" font-size="34" fill="#5B6B7C">눕는 초반 냉감 · 지속성엔 한계</text>

    <!-- 2 통기성 베개 -->
    <rect x="60" y="450" width="960" height="170" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="60" y="450" width="12" height="170" rx="6" fill="#1E3A6E"/>
    <text x="110" y="520" font-size="46" font-weight="bold" fill="#1a1a1a">통기성·냉감 베개</text>
    <text x="110" y="580" font-size="34" fill="#5B6B7C">목·머리 열 식히는 데 도움</text>

    <!-- 3 통기성 침구 -->
    <rect x="60" y="640" width="960" height="170" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="60" y="640" width="12" height="170" rx="6" fill="#1E3A6E"/>
    <text x="110" y="710" font-size="46" font-weight="bold" fill="#1a1a1a">통기성 침구</text>
    <text x="110" y="770" font-size="34" fill="#5B6B7C">면·마·텐셀·대나무 레이온 등 천연 소재</text>

    <!-- 4 서큘레이터 -->
    <rect x="60" y="830" width="960" height="170" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="60" y="830" width="12" height="170" rx="6" fill="#1E3A6E"/>
    <text x="110" y="900" font-size="46" font-weight="bold" fill="#1a1a1a">선풍기·서큘레이터</text>
    <text x="110" y="960" font-size="34" fill="#5B6B7C">공기 순환이 핵심 · 활용도 높음</text>

    <!-- 5 제습기 -->
    <rect x="60" y="1020" width="960" height="170" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="60" y="1020" width="12" height="170" rx="6" fill="#1E3A6E"/>
    <text x="110" y="1090" font-size="46" font-weight="bold" fill="#1a1a1a">제습기</text>
    <text x="110" y="1150" font-size="34" fill="#5B6B7C">습도 50% 내외 유지에 활용</text>
  </g>

  <!-- 하단 강조 -->
  <rect x="0" y="1230" width="1080" height="120" fill="#E8722C"/>
  <text x="540" y="1305" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle">모두 &apos;보조&apos; — 온·습도·루틴과 병행해야 효과</text>
</svg>
