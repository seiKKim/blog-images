<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <!-- 상단 색띠 -->
  <rect width="1080" height="200" fill="#1E3A6E"/>
  <rect x="60" y="66" rx="30" ry="30" width="240" height="60" fill="#E8722C"/>
  <text x="180" y="107" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="32" fill="#ffffff" text-anchor="middle">숙면 최적 설정</text>
  <text x="330" y="128" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">침실 온도·습도</text>

  <!-- 에어컨 온도 카드 -->
  <rect x="60" y="270" width="960" height="330" rx="24" fill="#ffffff" stroke="#D6E0EC"/>
  <text x="100" y="360" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="44" font-weight="bold" fill="#1a1a1a">에어컨 설정 온도</text>
  <text x="100" y="500" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="140" font-weight="bold" fill="#1E3A6E">23~26℃</text>
  <text x="100" y="565" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#5B6B7C">한국 여름 병원 전문가 현실 권장 (냉방병 고려)</text>
  <!-- 눈송이 아이콘 -->
  <text x="900" y="470" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="150" text-anchor="middle" fill="#BFD2F2">❄</text>

  <!-- 습도 카드 -->
  <rect x="60" y="630" width="960" height="330" rx="24" fill="#ffffff" stroke="#D6E0EC"/>
  <text x="100" y="720" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="44" font-weight="bold" fill="#1a1a1a">습도</text>
  <text x="100" y="860" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="140" font-weight="bold" fill="#1F8A53">50%</text>
  <text x="480" y="860" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="60" font-weight="bold" fill="#5B6B7C">전후 (40~60%)</text>
  <text x="100" y="925" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="36" fill="#5B6B7C">습하면 제습기 활용 · 목표 50% 전후</text>
  <text x="920" y="830" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="130" text-anchor="middle" fill="#9DD3E8">💧</text>

  <!-- 온도차 강조 박스 -->
  <rect x="60" y="990" width="960" height="210" rx="24" fill="#E8722C"/>
  <text x="100" y="1075" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="46" font-weight="bold" fill="#ffffff">실내외 온도차</text>
  <text x="100" y="1160" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="80" font-weight="bold" fill="#FFD23F">5도 이내</text>
  <text x="560" y="1120" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="40" fill="#ffffff" text-anchor="middle">로 유지해야</text>
  <text x="560" y="1170" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="40" fill="#ffffff" text-anchor="middle">냉방병을 피합니다</text>

  <!-- 출처 띠 -->
  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="32" fill="#5B6B7C">본문 기준 정리 · blog.naver.com/trip_chocho</text>
</svg>
