<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12224A"/>
      <stop offset="1" stop-color="#1E3A6E"/>
    </linearGradient>
  </defs>
  <!-- 밤하늘 배경 -->
  <rect width="1080" height="1080" fill="url(#night)"/>
  <!-- 달 -->
  <circle cx="900" cy="220" r="120" fill="#FFD23F" opacity="0.95"/>
  <circle cx="850" cy="190" r="120" fill="#1E3A6E"/>
  <!-- 별 -->
  <circle cx="180" cy="150" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="320" cy="240" r="4" fill="#ffffff" opacity="0.6"/>
  <circle cx="620" cy="130" r="6" fill="#ffffff" opacity="0.7"/>
  <circle cx="990" cy="430" r="5" fill="#ffffff" opacity="0.6"/>
  <circle cx="120" cy="360" r="4" fill="#ffffff" opacity="0.5"/>
  <!-- 장식 -->
  <circle cx="140" cy="960" r="220" fill="#ffffff" opacity="0.05"/>

  <!-- 카테고리 뱃지 (브랜드 오렌지) -->
  <rect x="80" y="90" rx="34" ry="34" width="220" height="68" fill="#E8722C"/>
  <text x="190" y="136" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#ffffff" text-anchor="middle">생활꿀팁</text>

  <!-- 서브 카피 -->
  <text x="80" y="330" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#BFD2F2">밤새 뒤척였다면?</text>
  <text x="80" y="405" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#BFD2F2">2026 열대야 꿀잠</text>

  <!-- 메인 카피 (핵심 수치) -->
  <text x="80" y="590" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="150" fill="#ffffff">침실 온도</text>
  <text x="80" y="750" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="150" fill="#FFD23F">23~26도</text>

  <!-- 디테일 박스 -->
  <rect x="80" y="820" rx="20" ry="20" width="920" height="120" fill="#ffffff" opacity="0.14"/>
  <text x="110" y="898" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="50" fill="#ffffff">습도 50% 전후 · 미지근한 물 샤워</text>

  <!-- 채널 -->
  <text x="80" y="1015" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#BFD2F2" opacity="0.9">blog.naver.com/trip_chocho</text>
</svg>
