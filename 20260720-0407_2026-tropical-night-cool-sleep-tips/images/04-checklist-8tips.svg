<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <!-- 상단 색띠 -->
  <rect width="1080" height="200" fill="#1E3A6E"/>
  <rect x="60" y="66" rx="30" ry="30" width="240" height="60" fill="#E8722C"/>
  <text x="180" y="107" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="32" fill="#ffffff" text-anchor="middle">실천 꿀팁</text>
  <text x="330" y="128" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="56" fill="#ffffff">열대야 꿀잠 8가지</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 항목 템플릿: 번호원 + 텍스트 -->
    <!-- 1 -->
    <rect x="60" y="250" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="130" cy="310" r="34" fill="#1E3A6E"/>
    <text x="130" y="324" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
    <text x="200" y="325" font-size="42" font-weight="bold" fill="#1a1a1a">취침 2시간 전 미지근한 물 샤워</text>

    <!-- 2 -->
    <rect x="60" y="384" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="130" cy="444" r="34" fill="#1E3A6E"/>
    <text x="130" y="458" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
    <text x="200" y="459" font-size="42" font-weight="bold" fill="#1a1a1a">에어컨 23~26도, 온도차 5도 이내</text>

    <!-- 3 -->
    <rect x="60" y="518" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="130" cy="578" r="34" fill="#1E3A6E"/>
    <text x="130" y="592" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
    <text x="200" y="593" font-size="42" font-weight="bold" fill="#1a1a1a">에어컨 타이머(예약) 활용하기</text>

    <!-- 4 -->
    <rect x="60" y="652" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="130" cy="712" r="34" fill="#1E3A6E"/>
    <text x="130" y="726" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
    <text x="200" y="727" font-size="42" font-weight="bold" fill="#1a1a1a">선풍기·서큘레이터로 공기 순환</text>

    <!-- 5 -->
    <rect x="60" y="786" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="130" cy="846" r="34" fill="#1E3A6E"/>
    <text x="130" y="860" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">5</text>
    <text x="200" y="861" font-size="42" font-weight="bold" fill="#1a1a1a">얇고 통기성 좋은 잠옷·이불</text>

    <!-- 6 -->
    <rect x="60" y="920" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="130" cy="980" r="34" fill="#1E3A6E"/>
    <text x="130" y="994" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">6</text>
    <text x="200" y="995" font-size="42" font-weight="bold" fill="#1a1a1a">취침 전 카페인·음주·과식 피하기</text>

    <!-- 7 -->
    <rect x="60" y="1054" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="130" cy="1114" r="34" fill="#1E3A6E"/>
    <text x="130" y="1128" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">7</text>
    <text x="200" y="1129" font-size="42" font-weight="bold" fill="#1a1a1a">취침 1시간 전 블루라이트 차단</text>

    <!-- 8 -->
    <rect x="60" y="1188" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <circle cx="130" cy="1248" r="34" fill="#E8722C"/>
    <text x="130" y="1262" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">8</text>
    <text x="200" y="1263" font-size="42" font-weight="bold" fill="#1a1a1a">낮 햇빛·규칙적 수면 리듬 지키기</text>
  </g>
</svg>
