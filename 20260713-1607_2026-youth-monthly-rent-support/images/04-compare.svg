<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="105" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">국토부 vs 서울시</text>
  <text x="60" y="165" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#FFD23F">두 사업은 중복 수혜 불가</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <!-- 헤더 행 -->
    <rect x="60" y="270" width="300" height="110" rx="12" fill="#E8EEF5"/>
    <rect x="370" y="270" width="330" height="110" rx="12" fill="#1B5FA6"/>
    <rect x="710" y="270" width="310" height="110" rx="12" fill="#3a4658"/>
    <text x="210" y="338" font-size="38" font-weight="bold" fill="#3a4658" text-anchor="middle">구분</text>
    <text x="535" y="322" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">국토부</text>
    <text x="535" y="362" font-size="30" font-weight="bold" fill="#FFD23F" text-anchor="middle">청년월세 특별지원</text>
    <text x="865" y="322" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">서울시</text>
    <text x="865" y="362" font-size="30" font-weight="bold" fill="#FFD23F" text-anchor="middle">청년월세지원</text>

    <!-- 연령 -->
    <rect x="60" y="392" width="300" height="150" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="370" y="392" width="330" height="150" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="710" y="392" width="310" height="150" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="210" y="480" font-size="38" font-weight="bold" fill="#1a1a1a" text-anchor="middle">연령</text>
    <text x="535" y="480" font-size="38" fill="#1a1a1a" text-anchor="middle">만 19~34세</text>
    <text x="865" y="480" font-size="38" fill="#1a1a1a" text-anchor="middle">만 19~39세</text>

    <!-- 지원액 -->
    <rect x="60" y="554" width="300" height="190" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="370" y="554" width="330" height="190" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="710" y="554" width="310" height="190" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="210" y="660" font-size="38" font-weight="bold" fill="#1a1a1a" text-anchor="middle">지원액</text>
    <text x="535" y="628" font-size="34" fill="#1a1a1a" text-anchor="middle">월 20만원 ×</text>
    <text x="535" y="672" font-size="34" fill="#1a1a1a" text-anchor="middle">최장 24개월</text>
    <text x="535" y="720" font-size="36" font-weight="bold" fill="#1B5FA6" text-anchor="middle">480만원</text>
    <text x="865" y="628" font-size="34" fill="#1a1a1a" text-anchor="middle">월 20만원 ×</text>
    <text x="865" y="672" font-size="34" fill="#1a1a1a" text-anchor="middle">12개월</text>
    <text x="865" y="720" font-size="36" font-weight="bold" fill="#3a4658" text-anchor="middle">240만원</text>

    <!-- 2026 모집 -->
    <rect x="60" y="756" width="300" height="150" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="370" y="756" width="330" height="150" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="710" y="756" width="310" height="150" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="210" y="826" font-size="36" font-weight="bold" fill="#1a1a1a" text-anchor="middle">2026</text>
    <text x="210" y="868" font-size="36" font-weight="bold" fill="#1a1a1a" text-anchor="middle">모집</text>
    <text x="535" y="844" font-size="38" fill="#1a1a1a" text-anchor="middle">3/30~5/29</text>
    <text x="865" y="844" font-size="38" fill="#1a1a1a" text-anchor="middle">5/6~5/19</text>

    <!-- 선정 -->
    <rect x="60" y="918" width="300" height="150" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="370" y="918" width="330" height="150" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <rect x="710" y="918" width="310" height="150" rx="12" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="210" y="1006" font-size="38" font-weight="bold" fill="#1a1a1a" text-anchor="middle">선정</text>
    <text x="535" y="1006" font-size="38" fill="#1a1a1a" text-anchor="middle">요건 심사</text>
    <text x="865" y="984" font-size="34" fill="#1a1a1a" text-anchor="middle">추첨</text>
    <text x="865" y="1028" font-size="32" fill="#1a1a1a" text-anchor="middle">(15,000명)</text>
  </g>

  <rect x="60" y="1100" width="960" height="90" rx="16" fill="#FFF6D6" stroke="#FFD23F" stroke-width="2"/>
  <text x="90" y="1157" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="38" font-weight="bold" fill="#8a6d00">국토부 지원 종료 후에야 서울시 신청 가능</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">출처: 국토교통부 · 서울시 청년월세지원</text>
</svg>
