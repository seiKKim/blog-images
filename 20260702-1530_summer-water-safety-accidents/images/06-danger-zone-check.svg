    <text x="90" y="558" font-family="Malgun Gothic" font-size="36" fill="#333333">국립공원공단 안내(출입허용 110곳/금지 100곳)</text>
    
    <rect x="60" y="610" width="960" height="150" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="90" y="672" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#E23B3B">해수욕장·연안</text>
