    <text x="90" y="388" font-family="Malgun Gothic" font-size="36" fill="#333333">생활안전지도 safemap.go.kr → 물놀이 관리지역</text>
    
    <rect x="60" y="440" width="960" height="150" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
