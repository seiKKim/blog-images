  <rect x="60" y="960" width="960" height="200" rx="20" fill="#2B2F36"/>
  <text x="540" y="1035" font-family="Malgun Gothic" font-weight="bold" font-size="42" fill="#ffffff" text-anchor="middle">2026년 안전요원 5,700여 명 배치</text>
