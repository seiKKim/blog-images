<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4FBF7"/>
  <rect width="1080" height="150" fill="#1F8A53"/>
  <text x="60" y="98" font-family="Malgun Gothic" font-weight="bold" font-size="58" fill="#ffffff">재산세 납부, 어디서 내나요?</text>

  <!-- 온라인 -->
  <rect x="50" y="190" width="480" height="380" rx="22" fill="#ffffff" stroke="#1F8A53" stroke-width="3"/>
  <rect x="50" y="190" width="480" height="80" rx="22" fill="#1F8A53"/>
  <text x="290" y="244" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#ffffff" text-anchor="middle">온라인 · 모바일</text>
  <text x="80" y="330" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">· 전국: 위택스 / 스마트위택스</text>
  <text x="80" y="388" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">· 서울: 이택스 / STAX 앱</text>
  <text x="80" y="446" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">· 신용·체크카드, 계좌이체</text>
  <text x="80" y="504" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">· 간편결제 가능</text>

  <!-- 오프라인 -->
  <rect x="550" y="190" width="480" height="380" rx="22" fill="#ffffff" stroke="#1F8A53" stroke-width="3"/>
  <rect x="550" y="190" width="480" height="80" rx="22" fill="#243B6B"/>
  <text x="790" y="244" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#ffffff" text-anchor="middle">오프라인</text>
  <text x="580" y="330" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">· 은행 · 우체국 창구</text>
  <text x="580" y="388" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">· CD / ATM 기기</text>
  <text x="580" y="446" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">· 편의점(CU·GS25·세븐)</text>
  <text x="580" y="504" font-family="Malgun Gothic" font-size="36" fill="#1a1a1a">· 가상계좌 입금</text>

  <!-- 하단 강조 띠 -->
  <rect x="50" y="610" width="980" height="80" rx="18" fill="#FFD23F"/>
  <text x="540" y="662" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1a1a1a" text-anchor="middle">지방세는 카드 납부 수수료 없음 · 무이자 할부 이벤트 체크</text>
</svg>
