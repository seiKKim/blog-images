  <text x="865" y="294" font-weight="bold" font-size="34" fill="#124275" text-anchor="middle">480만 원</text>
  <text x="865" y="804" font-size="32" fill="#5B6B7C" text-anchor="middle">24개월</text>

  <line x1="100" y1="760" x2="970" y2="760" stroke="#D6E0EC" stroke-width="3"/>

  <rect x="60" y="860" width="960" height="120" rx="18" fill="#fff" stroke="#D6E0EC" stroke-width="2"/>
  <text x="90" y="918" font-weight="bold" font-size="34" fill="#124275">총 한도 총 최대 480만 원 (생애 1회)</text>
  <text x="90" y="958" font-size="28" fill="#5B6B7C">실제 납부 월세 항목만 (보증금·관리비 제외)</text>

  <rect x="0" y="1000" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1048" font-size="26" fill="#5B6B7C">출처: 본문 정리 · 개월수는 신청 전 복지로 확인</text>
