  <text x="60" y="166" font-weight="bold" font-size="42" fill="#FFD23F">쌓이면 총 480만 원</text>
  <rect x="888" y="78" rx="22" width="132" height="44" fill="#FFD23F"/>
  <text x="954" y="107" font-weight="bold" font-size="22" fill="#1a1a1a" text-anchor="middle">정부지원금</text>

