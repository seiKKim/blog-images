  <text x="205" y="804" font-size="32" fill="#5B6B7C" text-anchor="middle">6개월</text>

  <rect x="350" y="545" width="150" height="215" rx="14" fill="#1B5FA6"/>
  <text x="425" y="509" font-weight="bold" font-size="34" fill="#1a1a1a" text-anchor="middle">240만 원</text>
  <text x="425" y="804" font-size="32" fill="#5B6B7C" text-anchor="middle">12개월</text>

  <rect x="570" y="437.5" width="150" height="322.5" rx="14" fill="#1B5FA6"/>
  <text x="645" y="401" font-weight="bold" font-size="34" fill="#1a1a1a" text-anchor="middle">360만 원</text>
