  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1318" font-size="26" fill="#5B6B7C">출처: 본문 정리 · 부모(원가구) 기준도 함께 충족 필요</text>
