<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#2B2F36"/>
  <rect x="60" y="84" rx="28" ry="28" width="200" height="56" fill="#FFD23F"/>
  <text x="160" y="123" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#1a1a1a" text-anchor="middle">오늘의 이슈</text>
  <text x="280" y="128" font-family="Noto Sans CJK KR" font-weight="bold" font-size="56" fill="#ffffff">기름값 누르는 두 정책</text>

  <rect x="60" y="270" width="960" height="430" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="60" y="270" width="14" height="430" rx="6" fill="#E23B3B"/>
  <text x="110" y="360" font-family="Noto Sans CJK KR" font-weight="bold" font-size="50" fill="#2B2F36">① 유류세 한시 인하</text>
  <text x="110" y="448" font-family="Noto Sans CJK KR" font-weight="bold" font-size="46" fill="#E23B3B">휘발유 15% · 경유 25% 인하</text>
  <text x="110" y="528" font-family="Noto Sans CJK KR" font-size="42" fill="#5B6B7C">세금을 깎아 가격을 낮추는 조치</text>
  <text x="110" y="628" font-family="Noto Sans CJK KR" font-weight="bold" font-size="46" fill="#2B2F36">→ 7월 31일까지 연장</text>

  <rect x="60" y="740" width="960" height="470" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="2"/>
  <rect x="60" y="740" width="14" height="470" rx="6" fill="#E23B3B"/>
  <text x="110" y="830" font-family="Noto Sans CJK KR" font-weight="bold" font-size="50" fill="#2B2F36">② 석유 최고가격제</text>
  <text x="110" y="918" font-family="Noto Sans CJK KR" font-weight="bold" font-size="46" fill="#E23B3B">정유사 공급가 상한 설정</text>
  <text x="110" y="998" font-family="Noto Sans CJK KR" font-size="42" fill="#5B6B7C">7차 상한을 150원씩 추가 인하</text>
  <text x="110" y="1098" font-family="Noto Sans CJK KR" font-weight="bold" font-size="46" fill="#2B2F36">→ 6/27 시행 · 약 4주 적용</text>
  <text x="110" y="1166" font-family="Noto Sans CJK KR" font-size="38" fill="#5B6B7C">※ 공급가 상한은 주유소 판매가와 다름</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="34" fill="#5B6B7C">출처: 정책브리핑(korea.kr)·산업통상부</text>
</svg>
