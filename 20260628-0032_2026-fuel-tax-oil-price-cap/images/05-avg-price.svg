<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#2B2F36"/>
  <text x="60" y="105" font-family="Noto Sans CJK KR" font-weight="bold" font-size="56" fill="#ffffff">전국 평균 기름값</text>
  <text x="60" y="165" font-family="Noto Sans CJK KR" font-weight="bold" font-size="40" fill="#FFD23F">오피넷 · 6월 넷째 주 · 6주 연속 하락</text>

  <g font-family="Noto Sans CJK KR">
    <rect x="60" y="270" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="346" font-size="44" font-weight="bold" fill="#1a1a1a">휘발유 전국 평균</text>
    <text x="1000" y="346" font-size="48" font-weight="bold" fill="#E23B3B" text-anchor="end">2,007.8원</text>

    <rect x="60" y="410" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="486" font-size="44" font-weight="bold" fill="#1a1a1a">경유 전국 평균</text>
    <text x="1000" y="486" font-size="48" font-weight="bold" fill="#E23B3B" text-anchor="end">2,001.3원</text>

    <rect x="60" y="550" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="626" font-size="44" font-weight="bold" fill="#1a1a1a">가장 비싼 지역</text>
    <text x="1000" y="626" font-size="46" font-weight="bold" fill="#2B2F36" text-anchor="end">서울 2,049.6원</text>

    <rect x="60" y="690" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="766" font-size="44" font-weight="bold" fill="#1a1a1a">가장 싼 지역</text>
    <text x="1000" y="766" font-size="46" font-weight="bold" fill="#2B2F36" text-anchor="end">대구 1,987.8원</text>

    <rect x="60" y="830" width="960" height="120" rx="16" fill="#FFF7DA" stroke="#FFD23F" stroke-width="2"/>
    <text x="100" y="906" font-size="44" font-weight="bold" fill="#1a1a1a">상표 중 최저가</text>
    <text x="1000" y="906" font-size="46" font-weight="bold" fill="#E23B3B" text-anchor="end">알뜰주유소 1,995.4원</text>
  </g>

  <text x="60" y="1040" font-family="Noto Sans CJK KR" font-size="40" fill="#5B6B7C">두바이유 배럴당 69.1달러 (전주 -5.5달러)</text>
  <text x="60" y="1100" font-family="Noto Sans CJK KR" font-size="40" fill="#5B6B7C">국제유가는 2~3주 시차 두고 국내 반영</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="34" fill="#5B6B7C">출처: 한국석유공사 오피넷(opinet.co.kr)</text>
</svg>
