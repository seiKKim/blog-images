<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1F8A53"/>
  <text x="60" y="125" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">2026 재산세 납부일정</text>

  <!-- 세로 타임라인 축 -->
  <line x1="150" y1="300" x2="150" y2="1120" stroke="#C7D3E0" stroke-width="6"/>

  <!-- 7월분 노드 -->
  <circle cx="150" cy="380" r="30" fill="#1F8A53"/>
  <rect x="230" y="300" width="790" height="360" rx="24" fill="#ffffff" stroke="#1F8A53" stroke-width="4"/>
  <text x="270" y="380" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#1F8A53">7월분 (1기분)</text>
  <rect x="270" y="410" rx="16" width="470" height="72" fill="#E6F4EC"/>
  <text x="295" y="460" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#1a1a1a">07/16 ~ 07/31</text>
  <text x="270" y="545" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#333">· 주택분의 1/2</text>
  <text x="270" y="600" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#333">· 건축물(주택 외)</text>
  <text x="270" y="640" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#333">  + 선박·항공기</text>

  <!-- 9월분 노드 -->
  <circle cx="150" cy="770" r="30" fill="#7CA890"/>
  <rect x="230" y="690" width="790" height="330" rx="24" fill="#ffffff" stroke="#C7D3E0" stroke-width="4"/>
  <text x="270" y="770" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="52" fill="#5B6B7C">9월분 (2기분)</text>
  <rect x="270" y="800" rx="16" width="470" height="72" fill="#E8EEF5"/>
  <text x="295" y="850" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#1a1a1a">09/16 ~ 09/30</text>
  <text x="270" y="935" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#333">· 나머지 주택분 1/2</text>
  <text x="270" y="990" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#333">· 토지분</text>

  <!-- 예외 안내 -->
  <rect x="60" y="1080" width="960" height="130" rx="20" fill="#FFF4D6" stroke="#E8B923" stroke-width="3"/>
  <text x="90" y="1145" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#8A6D00">연 세액 20만원 이하는 7월에 전액 일괄부과</text>
  <text x="90" y="1190" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#8A6D00">(9월분 없음)</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">본문 기준 · 정확한 일정은 위택스(wetax.go.kr) 확인</text>
</svg>
