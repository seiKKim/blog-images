<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1F8A53"/>
  <text x="60" y="125" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">주택 재산세 산정구조</text>

  <!-- Step 1 -->
  <rect x="120" y="270" width="840" height="120" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="3"/>
  <text x="160" y="330" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="44" fill="#1F8A53">1</text>
  <text x="220" y="330" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="46" fill="#1a1a1a">공시가격</text>
  <text x="220" y="375" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">(주택공시가격 확인)</text>
  <text x="540" y="450" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="50" fill="#1F8A53" text-anchor="middle">↓</text>

  <!-- Step 2 -->
  <rect x="120" y="470" width="840" height="130" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="3"/>
  <text x="160" y="530" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="44" fill="#1F8A53">2</text>
  <text x="220" y="530" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="46" fill="#1a1a1a">과세표준</text>
  <text x="220" y="578" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">= 공시가격 × 공정시장가액비율</text>
  <text x="540" y="660" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="50" fill="#1F8A53" text-anchor="middle">↓</text>

  <!-- Step 3 -->
  <rect x="120" y="680" width="840" height="130" rx="20" fill="#ffffff" stroke="#D6E0EC" stroke-width="3"/>
  <text x="160" y="740" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="44" fill="#1F8A53">3</text>
  <text x="220" y="740" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="46" fill="#1a1a1a">재산세 본세</text>
  <text x="220" y="788" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">= 과세표준 × 세율(누진)</text>
  <text x="540" y="870" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="50" fill="#1F8A53" text-anchor="middle">+</text>

  <!-- Step 4 합산 -->
  <rect x="120" y="890" width="840" height="200" rx="20" fill="#E6F4EC" stroke="#1F8A53" stroke-width="4"/>
  <text x="160" y="960" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="46" fill="#1F8A53">4  고지서 총액</text>
  <text x="160" y="1015" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="38" fill="#1a1a1a">+ 도시지역분 (과세표준 × 0.14%)</text>
  <text x="160" y="1062" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="38" fill="#1a1a1a">+ 지방교육세 (본세의 20%)</text>

  <!-- 주석 -->
  <rect x="60" y="1130" width="960" height="90" rx="18" fill="#FFF4D6" stroke="#E8B923" stroke-width="3"/>
  <text x="90" y="1188" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="36" fill="#8A6D00">총액은 본세보다 약 30% 안팎 커지는 경우 많음</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="34" fill="#5B6B7C">본문 정리 기준 · 정확한 금액은 위택스·관할 지자체 확인</text>
</svg>
