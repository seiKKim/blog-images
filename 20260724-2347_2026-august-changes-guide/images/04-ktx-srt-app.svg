<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
  <rect width="1080" height="720" fill="#F4F7FB"/>
  <rect width="1080" height="180" fill="#2B2F36"/>
  <rect x="0" y="0" width="14" height="180" fill="#E23B3B"/>
  <text x="60" y="98" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="52" fill="#ffffff">KTX·SRT 통합 예매 앱</text>
  <text x="60" y="150" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-weight="bold"
        font-size="36" fill="#FFD23F">2026년 8월 중 출시 (정확한 일자 미공개)</text>

  <!-- Before / After -->
  <g font-family="'Noto Sans KR','Malgun Gothic',sans-serif">
    <rect x="60" y="240" width="420" height="360" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="270" y="315" font-size="34" font-weight="bold" fill="#5B6B7C" text-anchor="middle">지금까지</text>
    <text x="270" y="400" font-size="40" font-weight="bold" fill="#1a1a1a" text-anchor="middle">코레일톡</text>
    <text x="270" y="452" font-size="34" fill="#5B6B7C" text-anchor="middle">+</text>
    <text x="270" y="510" font-size="40" font-weight="bold" fill="#1a1a1a" text-anchor="middle">SRT 앱</text>
    <text x="270" y="565" font-size="32" fill="#5B6B7C" text-anchor="middle">각각 따로 예매</text>

    <text x="540" y="435" font-size="70" font-weight="bold" fill="#E23B3B" text-anchor="middle">→</text>

    <rect x="600" y="240" width="420" height="360" rx="20" fill="#2B2F36" stroke="#2B2F36"/>
    <text x="810" y="315" font-size="34" font-weight="bold" fill="#FFD23F" text-anchor="middle">8월부터</text>
    <text x="810" y="400" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle">통합 앱 하나로</text>
    <text x="810" y="500" font-size="36" font-weight="bold" fill="#E8EEF5" text-anchor="middle">조회 · 예매 · 발권</text>
    <text x="810" y="558" font-size="34" fill="#E8EEF5" text-anchor="middle">한 번에 처리</text>
  </g>

  <rect x="0" y="640" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="692" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" font-size="32" fill="#5B6B7C">출처: 2026 하반기부터 이렇게 달라집니다</text>
</svg>
