  <!-- 핵심 기준 알약 3개 -->
  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold" font-size="40">
    <rect x="80" y="690" rx="24" width="300" height="76" fill="#ffffff" opacity="0.16"/>
    <text x="230" y="742" fill="#ffffff" text-anchor="middle">실평수 × 용량</text>
    <rect x="400" y="690" rx="24" width="230" height="76" fill="#ffffff" opacity="0.16"/>
