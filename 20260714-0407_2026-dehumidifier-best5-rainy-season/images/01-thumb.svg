  <path d="M905 660 C905 610 955 585 955 585 C955 585 1005 610 1005 660 A50 50 0 1 1 905 660 Z" fill="#ffffff" opacity="0.10"/>
  <path d="M120 300 C120 262 158 243 158 243 C158 243 196 262 196 300 A38 38 0 1 1 120 300 Z" fill="#ffffff" opacity="0.10"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="88" rx="34" ry="34" width="200" height="68" fill="#FFD23F"/>
  <text x="180" y="134" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
