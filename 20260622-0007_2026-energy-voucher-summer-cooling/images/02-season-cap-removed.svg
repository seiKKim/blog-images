<rect y="1008" width="1080" height="72" fill="#E8EEF5"/><text x="60" y="1052" font-family="Noto Sans CJK KR" font-weight="bold" font-size="30" fill="#5B6B7C" text-anchor="start">출처: 한국에너지공단 energyv.or.kr</text>
