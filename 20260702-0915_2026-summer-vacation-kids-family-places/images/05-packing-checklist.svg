<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#FDF2F4"/>
  <!-- 상단 색띠 -->
  <rect width="1080" height="210" fill="#E0556E"/>
  <rect x="60" y="52" rx="26" ry="26" width="210" height="56" fill="#FFD23F"/>
  <text x="165" y="91" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="30" fill="#1a1a1a" text-anchor="middle">여름방학 · 시즌</text>
  <text x="60" y="175" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="60" fill="#ffffff">여름 나들이 준비물 체크</text>

  <!-- 안전 용품 섹션 -->
  <rect x="60" y="260" width="960" height="70" rx="16" fill="#E0556E"/>
  <text x="90" y="308" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#ffffff">물놀이 필수 · 안전 용품</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="42" fill="#1a1a1a">
    <g transform="translate(0,0)">
      <rect x="60" y="350" width="960" height="90" rx="14" fill="#ffffff" stroke="#F1C6CF"/>
      <rect x="88" y="376" width="38" height="38" rx="8" fill="#E0556E"/>
      <text x="102" y="405" font-size="30" fill="#fff" font-weight="bold">✓</text>
      <text x="150" y="408" font-weight="bold">구명조끼</text>
      <text x="420" y="408" font-size="32" fill="#5B6B7C">몸에 맞는 사이즈 · KC 인증</text>
    </g>
    <g transform="translate(0,100)">
      <rect x="60" y="350" width="960" height="90" rx="14" fill="#ffffff" stroke="#F1C6CF"/>
      <rect x="88" y="376" width="38" height="38" rx="8" fill="#E0556E"/>
      <text x="102" y="405" font-size="30" fill="#fff" font-weight="bold">✓</text>
      <text x="150" y="408" font-weight="bold">아쿠아슈즈</text>
      <text x="420" y="408" font-size="32" fill="#5B6B7C">미끄럼 방지 · 발 보호</text>
    </g>
    <g transform="translate(0,200)">
      <rect x="60" y="350" width="960" height="90" rx="14" fill="#ffffff" stroke="#F1C6CF"/>
      <rect x="88" y="376" width="38" height="38" rx="8" fill="#E0556E"/>
      <text x="102" y="405" font-size="30" fill="#fff" font-weight="bold">✓</text>
      <text x="150" y="408" font-weight="bold">래시가드</text>
      <text x="420" y="408" font-size="32" fill="#5B6B7C">자외선 차단 · 체온 보호</text>
    </g>
    <g transform="translate(0,300)">
      <rect x="60" y="350" width="960" height="90" rx="14" fill="#ffffff" stroke="#F1C6CF"/>
      <rect x="88" y="376" width="38" height="38" rx="8" fill="#E0556E"/>
      <text x="102" y="405" font-size="30" fill="#fff" font-weight="bold">✓</text>
      <text x="150" y="408" font-weight="bold">물안경 · 튜브 · 방수팩</text>
    </g>
  </g>

  <!-- 편의 용품 섹션 -->
  <rect x="60" y="810" width="960" height="70" rx="16" fill="#C13F5C"/>
  <text x="90" y="858" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#ffffff">더위 · 나들이 편의 용품</text>

  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="42" fill="#1a1a1a">
    <g transform="translate(0,550)">
      <rect x="60" y="350" width="960" height="90" rx="14" fill="#ffffff" stroke="#F1C6CF"/>
      <rect x="88" y="376" width="38" height="38" rx="8" fill="#C13F5C"/>
      <text x="102" y="405" font-size="30" fill="#fff" font-weight="bold">✓</text>
      <text x="150" y="408" font-weight="bold">휴대용 선풍기</text>
      <text x="480" y="408" font-size="32" fill="#5B6B7C">넥밴드형 · 손풍기</text>
    </g>
    <g transform="translate(0,650)">
      <rect x="60" y="350" width="960" height="90" rx="14" fill="#ffffff" stroke="#F1C6CF"/>
      <rect x="88" y="376" width="38" height="38" rx="8" fill="#C13F5C"/>
      <text x="102" y="405" font-size="30" fill="#fff" font-weight="bold">✓</text>
      <text x="150" y="408" font-weight="bold">아이스박스 · 보냉백</text>
    </g>
    <g transform="translate(0,750)">
      <rect x="60" y="350" width="960" height="90" rx="14" fill="#ffffff" stroke="#F1C6CF"/>
      <rect x="88" y="376" width="38" height="38" rx="8" fill="#C13F5C"/>
      <text x="102" y="405" font-size="30" fill="#fff" font-weight="bold">✓</text>
      <text x="150" y="408" font-weight="bold">모자 · 자외선차단제 · 여벌옷</text>
    </g>
  </g>

  <!-- 하단 출처 띠 -->
  <rect x="0" y="1300" width="1080" height="50" fill="#F1D7DC"/>
  <text x="60" y="1333" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-size="28" fill="#8A5560">구명조끼·래시가드·아쿠아슈즈는 아이 연령·사이즈·KC 안전인증 확인</text>
</svg>
