<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#1B5FA6"/>
  <circle cx="950" cy="180" r="260" fill="#ffffff" opacity="0.08"/>
  <circle cx="120" cy="980" r="200" fill="#ffffff" opacity="0.06"/>

  <!-- 카테고리 뱃지 -->
  <rect x="80" y="80" rx="34" ry="34" width="220" height="68" fill="#FFD23F"/>
  <text x="190" y="126" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#1a1a1a" text-anchor="middle">정부지원금</text>

  <!-- 서브 카피 -->
  <text x="80" y="248" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="54" fill="#E8EEF5">2026 신생아 특례대출</text>
  <text x="80" y="316" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="44" fill="#FFD23F">아직도 최대 5억? 지금은 다릅니다</text>

  <!-- 메인 숫자 카드 2개 -->
  <rect x="80" y="380" rx="26" ry="26" width="440" height="300" fill="#ffffff" opacity="0.12"/>
  <rect x="560" y="380" rx="26" ry="26" width="440" height="300" fill="#ffffff" opacity="0.12"/>

  <text x="300" y="452" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#E8EEF5" text-anchor="middle">디딤돌(구입)</text>
  <text x="300" y="588" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="130" fill="#ffffff" text-anchor="middle">4억</text>
  <text x="300" y="648" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#E8EEF5" text-anchor="middle">최대 한도</text>

  <text x="780" y="452" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#E8EEF5" text-anchor="middle">버팀목(전세)</text>
  <text x="780" y="588" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="130" fill="#FFD23F" text-anchor="middle">2.4억</text>
  <text x="780" y="648" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="36" fill="#E8EEF5" text-anchor="middle">호당 최대</text>

  <!-- 디테일 박스 -->
  <rect x="80" y="720" rx="20" ry="20" width="920" height="200" fill="#ffffff" opacity="0.14"/>
  <text x="112" y="792" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#ffffff">소득 맞벌이 합산 2억 이하 (현행 기준)</text>
  <text x="112" y="862" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="46" fill="#FFD23F">금리 디딤돌 1.8~4.5% · 버팀목 1.3~4.3%</text>

  <text x="80" y="1008" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#E8EEF5" opacity="0.9">신청 전 최신 기준 꼭 확인!  blog.naver.com/trip_chocho</text>
