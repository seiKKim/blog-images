    <rect x="60" y="1080" width="960" height="90" rx="14" fill="#1B5FA6"/>
    <circle cx="115" cy="1125" r="26" fill="#FFD23F"/>
    <text x="115" y="1138" font-size="34" fill="#1a1a1a" font-weight="bold" text-anchor="middle">6</text>
    <text x="170" y="1138" font-size="40" fill="#ffffff" font-weight="bold">실행</text>
