<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="118" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="58" fill="#ffffff">신청 방법 · 절차</text>
  <text x="60" y="170" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
        font-size="34" fill="#E8EEF5">온라인 기금e든든 또는 수탁은행 5곳 방문</text>

  <!-- 신청 창구 두 카드 -->
  <rect x="60" y="240" width="465" height="180" rx="18" fill="#ffffff" stroke="#D6E0EC"/>
  <text x="100" y="308" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="40" fill="#1B5FA6">온라인</text>
  <text x="100" y="360" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="bold"
        font-size="38" fill="#1a1a1a">기금e든든</text>
  <text x="100" y="400" font-family="Noto Sans KR, Malgun Gothic, sans-serif" font-weight="normal"
