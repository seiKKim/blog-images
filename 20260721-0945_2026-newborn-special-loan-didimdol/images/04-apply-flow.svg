  <g font-family="Noto Sans KR, Malgun Gothic, sans-serif">
    <rect x="60" y="530" width="960" height="90" rx="14" fill="#EAF1F9" stroke="#B9CEE4"/>
    <circle cx="115" cy="575" r="26" fill="#1B5FA6"/>
    <text x="115" y="588" font-size="34" fill="#ffffff" font-weight="bold" text-anchor="middle">1</text>
    <text x="170" y="588" font-size="40" fill="#1a1a1a" font-weight="bold">조건확인</text>

    <rect x="60" y="640" width="960" height="90" rx="14" fill="#EAF1F9" stroke="#B9CEE4"/>
    <circle cx="115" cy="685" r="26" fill="#1B5FA6"/>
    <text x="115" y="698" font-size="34" fill="#ffffff" font-weight="bold" text-anchor="middle">2</text>
    <text x="170" y="698" font-size="40" fill="#1a1a1a" font-weight="bold">동의 / 정보제공</text>

    <rect x="60" y="750" width="960" height="90" rx="14" fill="#EAF1F9" stroke="#B9CEE4"/>
    <circle cx="115" cy="795" r="26" fill="#1B5FA6"/>
    <text x="115" y="808" font-size="34" fill="#ffffff" font-weight="bold" text-anchor="middle">3</text>
    <text x="170" y="808" font-size="40" fill="#1a1a1a" font-weight="bold">서류제출</text>

    <rect x="60" y="860" width="960" height="90" rx="14" fill="#EAF1F9" stroke="#B9CEE4"/>
    <circle cx="115" cy="905" r="26" fill="#1B5FA6"/>
    <text x="115" y="918" font-size="34" fill="#ffffff" font-weight="bold" text-anchor="middle">4</text>
    <text x="170" y="918" font-size="40" fill="#1a1a1a" font-weight="bold">자산·소득·담보 심사</text>

    <rect x="60" y="970" width="960" height="90" rx="14" fill="#EAF1F9" stroke="#B9CEE4"/>
