<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#F4F7FB"/>
  <rect width="1080" height="200" fill="#1B5FA6"/>
  <text x="60" y="115" font-family="Noto Sans CJK KR" font-weight="bold" font-size="56" fill="#ffffff">서울(1급지) 기준임대료</text>
  <text x="60" y="170" font-family="Noto Sans CJK KR" font-size="36" fill="#E8EEF5">월세를 한도까지 현금 지원 (2026년)</text>

  <g font-family="Noto Sans CJK KR" font-size="46" fill="#1a1a1a">
    <rect x="60" y="280" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="356" font-weight="bold">1인 가구</text>
    <text x="1000" y="356" font-weight="bold" fill="#1B5FA6" text-anchor="end">약 36만 9천 원</text>

    <rect x="60" y="420" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="496" font-weight="bold">2인 가구</text>
    <text x="1000" y="496" font-weight="bold" fill="#1B5FA6" text-anchor="end">약 41만 원</text>

    <rect x="60" y="560" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="636" font-weight="bold">3인 가구</text>
    <text x="1000" y="636" font-weight="bold" fill="#1B5FA6" text-anchor="end">약 49만 원</text>

    <rect x="60" y="700" width="960" height="120" rx="16" fill="#ffffff" stroke="#D6E0EC"/>
    <text x="100" y="776" font-weight="bold">4인 가구</text>
    <text x="1000" y="776" font-weight="bold" fill="#1B5FA6" text-anchor="end">약 57만 원</text>
  </g>

  <rect x="60" y="870" width="960" height="120" rx="16" fill="#ffffff" stroke="#1B5FA6" stroke-width="3"/>
  <text x="90" y="942" font-family="Noto Sans CJK KR" font-size="36" fill="#1a1a1a">2~4급지는 더 낮아요 · 내 급지는 마이홈/복지로 확인</text>

  <rect x="0" y="1270" width="1080" height="80" fill="#E8EEF5"/>
  <text x="60" y="1322" font-family="Noto Sans CJK KR" font-size="34" fill="#5B6B7C">출처: 보건복지부·국토교통부 2026 기준임대료</text>
</svg>
