<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720">
<rect width="1080" height="720" fill="#F4F7FB"/>
<rect width="1080" height="150" fill="#1B5FA6"/>
<text x="60" y="98" font-family="Malgun Gothic" font-weight="bold" font-size="56" fill="#FFFFFF">무엇이 달라졌나 — 한시에서 상시로</text>
<rect x="60" y="200" width="430" height="430" rx="20" fill="#ffffff" stroke="#D6E0EC"/>
<rect x="60" y="200" width="430" height="80" rx="20" fill="#9AA7B4"/>
<text x="275" y="255" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#FFFFFF" text-anchor="middle">~2025 한시 특별지원</text>
<text x="95" y="360" font-family="Malgun Gothic" font-size="40" fill="#1a1a1a">· 연 1회 정해진 기간만 모집</text>
<text x="95" y="440" font-family="Malgun Gothic" font-size="40" fill="#1a1a1a">· 시기 놓치면 1년 대기</text>
<text x="95" y="520" font-family="Malgun Gothic" font-size="40" fill="#1a1a1a">· 청약통장 가입 요건 필수</text>
<text x="540" y="430" font-family="Malgun Gothic" font-weight="bold" font-size="80" fill="#1B5FA6" text-anchor="middle">→</text>
<rect x="590" y="200" width="430" height="430" rx="20" fill="#ffffff" stroke="#1B5FA6" stroke-width="3"/>
<rect x="590" y="200" width="430" height="80" rx="20" fill="#1B5FA6"/>
<text x="805" y="255" font-family="Malgun Gothic" font-weight="bold" font-size="44" fill="#FFFFFF" text-anchor="middle">2026~ 상시(계속) 사업</text>
<text x="625" y="360" font-family="Malgun Gothic" font-size="40" fill="#1a1a1a">· 자격 충족 시점에 신청</text>
<text x="625" y="440" font-family="Malgun Gothic" font-size="40" fill="#1a1a1a">· 국정과제로 편입</text>
<text x="625" y="520" font-family="Malgun Gothic" font-weight="bold" font-size="40" fill="#1B5FA6">· 청약통장 요건 폐지</text>
<text x="60" y="685" font-family="Malgun Gothic" font-size="32" fill="#5B6B7C">정식 신규 모집 일정은 복지로(bokjiro.go.kr) 공식 공지 확인</text>
